welcome:
  title: "Eddie räknar"
  subChapter:
    willkommen: "Välkommen"
    ubersicht: "Översikt"
  imageTitle: "Eddie"
  heading: "Välkommen"
  p1: "Hej, jag är Eddie, och om du känner till min bok vet du detta: min flykt från Östtyskland var inte tur, utan en plan gjord av papper, mod och matematik."
  p2: "I mitt huvud blir kartor geometri, rädsla blir sannolikhet och \"omöjligt\" blir en ekvation jag kan knäcka."
  p3: "Det är precis därför <strong>Eddie räknar</strong> finns: så att du kan se hur matematik i verkliga livet plötsligt avgör frihet, riktning och nästa steg."
  p4: "I de enskilda kapitlen tas alla situationer från min flykt upp där matematiken på något sätt hjälpte till att rädda mig. I boken skulle det ha varit distraherande, men här har jag utrymme att fördjupa mina tankar och beräkningar. Och så att du inte bara behöver se mig tänka avslutas varje kapitel med en interaktiv del där du själv kan prova beräkningen. Uråldriga datorer väcks till liv igen, och ännu äldre segelfartyg kommer att sjunka."
  p5: "Och nu, ha så roligt...."
  index: "Index"
