welcome:
  title: "Eddie Does The Maths"
  subChapter:
    willkommen: "Welcome"
    ubersicht: "Overview"
  imageTitle: "Eddie"
  heading: "Welcome"
  p1: "Hey, I'm Eddie, and if you know my book, you know this: my escape from East Germany was not luck, but a plan made of paper, courage, and mathematics."
  p2: "In my head, maps become geometry, fear becomes probability, and \"impossible\" becomes an equation I can crack."
  p3: "That is exactly why <strong>Eddie Does The Maths</strong> exists: so you can see how mathematics in real life suddenly decides freedom, direction, and the next steps."
  p4: "In the individual chapters, all the situations from my escape are picked up in which mathematics somehow helped save me. In the book that would have been distracting, but here I have the space to deepen my thoughts and calculations. And so you do not only have to watch me think, every chapter ends with an interactive part where you can try the calculation yourself. Ancient computers are brought back to life, and even older sailing ships are going to sink."
  p5: "And now, have fun...."
  index: "Index"
