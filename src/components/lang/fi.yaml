welcome:
  title: "Eddie laskee"
  subChapter:
    willkommen: "Tervetuloa"
    ubersicht: "Yleiskatsaus"
  imageTitle: "Eddie"
  heading: "Tervetuloa"
  p1: "Hei, minä olen Eddie, ja jos tunnet kirjani, tiedät tämän: pakoni Itä-Saksasta ei ollut onnea, vaan paperista, rohkeudesta ja matematiikasta tehty suunnitelma."
  p2: "Päässäni kartat muuttuvat geometriaksi, pelko todennäköisyydeksi ja \"mahdoton\" yhtälöksi, jonka voin ratkaista."
  p3: "Juuri siksi <strong>Eddie laskee</strong> on olemassa: jotta voit nähdä, miten matematiikka oikeassa elämässä yhtäkkiä ratkaisee vapauden, suunnan ja seuraavat askeleet."
  p4: "Yksittäisissä luvuissa palataan kaikkiin pakoni tilanteisiin, joissa matematiikka auttoi jollain tavalla pelastamaan minut. Kirjassa se olisi ollut häiritsevää, mutta täällä minulla on tilaa syventää ajatuksiani ja laskujani. Ja jotta sinun ei tarvitse vain katsoa minun ajattelevan, jokainen luku päättyy interaktiiviseen osaan, jossa voit kokeilla laskua itse. Vanhat tietokoneet herätetään henkiin, ja vielä vanhemmat purjelaivat ovat uppoamassa."
  p5: "Ja nyt, pidä hauskaa...."
  index: "Hakemisto"
