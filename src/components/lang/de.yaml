welcome:
  title: "Eddie rechnet"
  subChapter:
    willkommen: "Willkommen"
    ubersicht: "Übersicht"
  imageTitle: "Eddie"
  heading: "Willkommen"
  p1: "Hey, ich bin Eddie, und wenn du mein Buch kennst, weißt du: Meine Flucht aus der DDR ist kein Zufall, sondern ein Plan aus Papier, Mut und Mathe."
  p2: "In meinem Kopf werden Karten zu Geometrie, Angst zu Wahrscheinlichkeiten und „unmöglich“ zu einer Gleichung, die ich knacken kann."
  p3: "Genau darum gibt's <strong>Eddie rechnet</strong>: damit du siehst, wie Mathe im echten Leben plötzlich über Freiheit, Richtung und die nächsten Schritte entscheidet."
  p4: "In den einzelnen Kapiteln werden all die Situationen meiner Flucht aufgegriffen, in denen ich mich mit Mathe irgendwie gerettet habe. Im Buch hätte das gestört, aber hier habe ich den Raum, meine Gedanken und Rechnungen zu vertiefen. Damit du mir nicht nur beim Denken zusehen musst, gibt es am Ende jedes Kapitels einen interaktiven Teil, in dem du die Rechnung selbst ausprobieren kannst. Steinalte Computer werden wieder zum Leben erweckt, und noch ältere Segelschiffe werden sinken."
  p5: "Und nun viel Spaß...."
  index: "Index"
