calculation:
  title: "Schritt für Schritt"
  step1Title: "1) Ein Versuch scheitert mit 1-p"
  step1Body: "Wenn ein Treffer mit p eintritt, dann bleibt für „kein Treffer“ genau das Komplement übrig."
  step2Title: "2) Viele Fehlversuche multiplizieren sich"
  step2Body: "Bei unabhängigen Versuchen darfst du die Wahrscheinlichkeiten für „kein Treffer“ miteinander multiplizieren."
  step3Title: "3) Jetzt das Komplement nehmen"
  step3Body: "Was nicht „kein Treffer“ ist, ist automatisch „mindestens ein Treffer“."
  step4Title: "4) Zielquote rückwärts lösen"
  step4Body: "Für eine gewünschte Gesamtchance T suchst du die kleinste Versuchszahl n, die die Grenze überschreitet."
  table:
    target: "Zielquote"
    trials: "Benötigte Versuche"
summary:
  title: "Kurzfassung"
  cards:
    one:
      title: "Kleine p können groß werden"
      text: "Mit wachsendem n schrumpft (1-p)^n. Genau deshalb wächst die Chance auf mindestens einen Treffer."
    two:
      title: "Das Gegenteil ist leichter"
      text: "Oft ist „kein Treffer“ einfacher zu berechnen als „mindestens einer“. Danach nimmst du nur noch das Komplement."
    three:
      title: "Unabhängigkeit ist die Bedingung"
      text: "Wenn frühere Versuche spätere Chancen verändern, musst du genauer modellieren. Die Standardformel setzt gleiche, unabhängige Versuche voraus."
  commentTitle: "Viele Chancen sind keine Garantie."
  commentBody: "Aber sie sind eben auch nicht nichts. Und manchmal reicht genau dieser Unterschied, damit aus Resignation wieder Rechnung wird."
