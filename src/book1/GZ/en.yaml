calculation:
  title: "Step by step"
  step1Title: "1) One try fails with 1-p"
  step1Body: "If a hit occurs with probability p, then the complement is exactly what remains for “no hit.”"
  step2Title: "2) Many failures multiply"
  step2Body: "For independent tries you may multiply the probabilities for “no hit.”"
  step3Title: "3) Now take the complement"
  step3Body: "Whatever is not “no hit” is automatically “at least one hit.”"
  step4Title: "4) Solve the target rate backwards"
  step4Body: "For a desired overall chance T you look for the smallest number of tries n that crosses the threshold."
  table:
    target: "Target rate"
    trials: "Required tries"
summary:
  title: "In short"
  cards:
    one:
      title: "Small p can grow large"
      text: "As n grows, (1-p)^n shrinks. That is exactly why the chance of at least one hit grows."
    two:
      title: "The opposite is easier"
      text: "Often “no hit” is easier to compute than “at least one.” After that you only need the complement."
    three:
      title: "Independence is the condition"
      text: "If earlier tries change later chances, you need a better model. The standard formula assumes equal, independent tries."
  commentTitle: "Many chances are not a guarantee."
  commentBody: "But they are not nothing either. And sometimes exactly that difference is enough to turn resignation back into calculation."
