title: "The Principle of Large Numbers"
imageTitle: "Eddie suffers a string of humiliations"
imageAlt: "Illustration for Eddie's chapter about many small probabilities"
introDate: "Vaasa, September 15, 1985"
subChapter:
  grundidee: "Core idea"
  gegenwahrscheinlichkeit: "Complement"
  zielquote: "Target rate"
  rechner: "Calculator"
  schritt-fur-schritt: "Step by step"
book:
  p1: "Sometimes math looks pretty sad from the outside."
  p2: "For example like this: I knock on the bus door, try to smile politely, and get another no. Then I run to the next bus and get turned down again. And again. At some point it no longer feels like strategy, only like humiliation in series. But that is exactly where it becomes mathematically interesting. Because each individual question has only a miserable little chance of success. Maybe one driver being in a bad mood is enough. Maybe there really is no ticket left. Maybe I mumble too much. So a single attempt can fail spectacularly without proving anything at all."
  p3: "The interesting question is not: How good is one attempt? The interesting question is: What happens if I try often enough?"
  p4: "Suddenly failure is no longer simply failure, but only one of many spaces in a long row. And success is no longer the miracle you hope for, but an event whose probability grows with every additional attempt."
  p5: "In other words: maybe this time I will not be saved by courage. Not by charm. Not by good English."
  p6: "Maybe statistics will save me."
sections:
  part1:
    title: "Part 1 — Small chance, big effect"
    p1: "A single try can be tiny and the total chance can still be far from tiny. Repetition changes the picture. Not magically. Computably."
    p2: "If every try has only a <b>{chance}</b> chance of success and you get <b>{tries}</b> independent tries, then the chance of <b>at least one hit</b> is already <b>{total}</b>."
    p3: "People casually call this the “principle of large numbers.” More precisely: <b>many independent repetitions often turn a small single chance into a surprisingly large overall chance.</b>"
  part2:
    title: "Part 2 — Calculate the opposite"
    p1: "Counting “at least once” directly is often messy. The opposite is much nicer: <b>no hit</b>."
    p2: "For one try that is <katex tex=\"1-p\" />. For <katex tex=\"n\" /> independent tries it multiplies to <katex tex=\"(1-p)^n\" />. Then you just flip the result."
    p3: "That is the whole trick. No magic, no gut feeling, just a carefully chosen viewpoint."
  part3:
    title: "Part 3 — How many tries do I need?"
    p1: "Sometimes you do not just want the total chance. You want to hit a target: 50%, 90%, or 95%."
    p2: "Then you solve the formula for <katex tex=\"n\" />. For a moment it looks logarithmic, but really it is just the backwards version of the power."
    p3: "The important condition remains the same: the formula works only if the tries are roughly independent and the single-trial chance <katex tex=\"p\" /> does not secretly change from one try to the next."
  comment:
    title: "Do not mix them up"
    p1: "This chapter uses the everyday idea that “many small chances eventually add up to something serious.” The strict <b>law of large numbers</b> says something else: relative frequencies stabilize when you repeat an experiment many times."
    p2: "And one more classic trap: many failures do not mean the next try is “finally due.” If the model stays the same, the next single-trial chance stays the same too."
