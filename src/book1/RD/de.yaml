book:
  p1: "Am zweiten Morgen bin ich schon wach, noch bevor Sini die Tür richtig zu hat. Neugier ist mein Wecker. Der Zettel zeigt ein Rentier, das aussieht wie ein Hund mit Antennen und darunter die fiese Frage: Wie weit komme ich in die Wildnis rein und wieder raus, wenn ich nur begrenzt Essen tragen kann, aber unterwegs kleine Vorratsstapel anlegen darf? Das ist kein „einfach laufen“-Problem. Das ist „schleppen, ablegen, umdrehen, nochmal schleppen, und dabei nicht verhungern“."
  p2: "Ich liege wieder mit den Beinen oben, die Mullstreifen enger, der Kopf freier. In meinem Heft werden aus Rationen kleine Punkte, aus Wegen Pfeile, aus Umkehrpunkten Entscheidungen. Und ja: Der Trick ist nicht Mut, sondern Ordnung. Nicht immer alles gleichzeitig wollen. Erst Depots bauen, dann Strecke machen."
  p3: "Hier zeige ich dir die clevere Depot-Logik: kalt rechnen, dann erst loslaufen. Und unten gibt’s ein interaktives Schema, mit dem du deine eigene Strategie ausprobieren kannst."
sections:
  part1:
    title: "Teil 1 — Die konkrete Aufgabe"
    p1: "Eine Wanderin startet am Rand der Wildnis. Sie läuft <katex tex=\"v=20\" /> km pro Tag, verbraucht dabei <katex tex=\"c=1\" /> Tagesration pro Tag und kann höchstens <katex tex=\"C=3\" /> Tagesrationen tragen. Unterwegs darf sie Rationen verlustfrei in Depots ablegen und später wieder aufnehmen. Gesucht ist die größte Entfernung <katex tex=\"D\" /> vom Startpunkt, die sie erreichen kann, wenn sie am Ende wieder sicher zum Start zurückkehren muss."
    p2: "Wir rechnen dieselbe Aufgabe mit zwei Startbedingungen: A) Am Start liegt unbegrenzt viel Vorrat. B) Am Start liegen genau <katex tex=\"n=5\" /> volle Ladungen, also <katex tex=\"nC=15\" /> Tagesrationen. Fall A beantwortet die Frage, ob es überhaupt eine endliche Obergrenze gibt. Fall B liefert eine konkrete Strecke."
    p3: "Außerdem trennen wir zwei typische Zielfragen: <b>Erforsche die Wildnis</b> bedeutet: möglichst weit hinein und sicher wieder zurück zum Start. <b>Durchquere die Wildnis</b> bedeutet: möglichst weit hinein, aber ohne Rückkehrpflicht. Die konkrete Aufgabe oben ist die Erforschungsfrage; die Durchquerungsfrage läuft in den Formeln und in der Grafik mit, weil dort andere Kostenfaktoren entstehen."
  part2:
    title: "Teil 2 — Unbegrenzter Vorrat: keine Obergrenze"
    p1: "In Startbedingung A ist der Vorrat am Start unbeschränkt. Für jedes natürliche <katex tex=\"k\" /> kann man mit <katex tex=\"3^k\" /> Tagesrationen eine Strategie bauen, die wieder eine Tagestour weiter in die Wildnis reicht."
    p2: "Die Idee ist rekursiv: Mit <katex tex=\"3^{k-1}\" /> Pendeltouren legt man Depot 1 eine Tagestour vom Start entfernt an. Von drei getragenen Rationen wird eine auf dem Hinweg verbraucht, eine auf dem Rückweg, eine bleibt im Depot. Bei der letzten Hinfahrt geht man nicht sofort zurück, sondern legt die Rückration zur Seite und wiederholt dieselbe Konstruktion vom Depot aus."
    p3: "Diese Strategie behauptet keine Optimalität. Sie zeigt nur: Ohne endlichen Startvorrat ist die Reichweite unbeschränkt."
  part3:
    title: "Teil 3 — Endlicher Vorrat: das Phasenmodell"
    p1: "In Startbedingung B liegen am Start nur endlich viele Rationen. Allgemein seien es <katex tex=\"n\" /> volle Ladungen, also <katex tex=\"nC\" /> Rationen. Dann ergibt das klassische Depot- oder Jeep-Modell eine endliche Distanz."
    p2: "Der Index <katex tex=\"j\" /> zählt, wie viele volle Ladungen in der aktuellen Phase noch nach vorn verlagert werden. Beim Rückkehrproblem muss jedes kleine Streckenstück in dieser Phase <katex tex=\"2j\" />-mal durchlaufen werden: <katex tex=\"j\" /> Hinbewegungen und <katex tex=\"j\" /> Rückbewegungen. Beim Einwegproblem sind es <katex tex=\"2j-1\" /> Durchläufe, weil die letzte Rückkehr entfällt."
    p3: "Für <katex tex=\"n=2\" /> sieht man die Zählung besonders gut: Die erste, startnahe Stufe hat Länge <katex tex=\"15\" /> km, die letzte Stufe hat Länge <katex tex=\"30\" /> km; zusammen sind das <katex tex=\"45\" /> km. Dafür werden <katex tex=\"2C=6\" /> Rationen eingesetzt."
    p4: "Für die konkrete Startbedingung B mit <katex tex=\"n=5\" /> vollen Ladungen ergibt sich <katex tex=\"D_5=68{,}5\\,\\text{km}\" />. Mit <katex tex=\"n=6\" /> wären es <katex tex=\"73{,}5\\,\\text{km}\" />, und für wachsendes <katex tex=\"n\" /> wächst die harmonische Summe weiter."
  part4:
    title: "Teil 4 — Ein Depot: Bilanz und richtige Rückkehrfrage"
    p1: "Dieser Abschnitt ist nicht ein zweites Lösungsverfahren für die ganze Aufgabe, sondern eine Bilanz-Lupe: An einem einzigen Depot sieht man, warum Depots Strecke gewinnen, aber zugleich Hin- und Rückwege kosten. Genau diese Kostenstruktur steckt später in den Faktoren <katex tex=\"2j\" /> und <katex tex=\"2j-1\" />."
    p2: "Für ein einzelnes Depot bei <katex tex=\"x\" /> und <katex tex=\"k\" /> Shuttle-Rundtouren mit Ablage <katex tex=\"d\" /> pro Tour ist die erste Bedingung nur die Machbarkeit einer Shuttle-Rundtour."
    p3: "Nach den <katex tex=\"k\" /> Shuttle-Rundtouren kommt eine letzte Hinfahrt vom Start zum Depot. Dann liegt am Depot insgesamt <katex tex=\"S=kd+C-cx/v\" />. Ab hier muss die Frage ausdrücklich festgelegt werden:"
    p4: "Für Rückkehr bis zum Depot wird der Vorrat hinter dem Depot halbiert, weil Hin- und Rückweg bezahlt werden müssen. Für Rückkehr bis zum Start muss zusätzlich <katex tex=\"cx/v\" /> am Depot reserviert werden. Für den Einwegfall entfällt der Faktor <katex tex=\"1/2\" /> hinter dem Depot."
    p5: "Diese Ein-Depot-Bilanz ist noch keine vollständige optimale Mehrdepot-Strategie. Wenn hinter dem Depot mehr Vorrat liegt, als man auf einmal tragen kann, beginnt dort dasselbe Depotproblem erneut; daraus entsteht das Phasenmodell aus Teil 3."
  summary:
    title: "Teil 5 - Grafische Darstellung"
    p1: "Die Grafik unten verwendet dasselbe kontinuierliche Depotmodell mit Rationen und Tagen. Sie trennt Durchqueren, Erforschen und Lieferproblem explizit."
