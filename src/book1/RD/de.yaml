title: "Frühstücks\u00ADzettel\u00A0#2 Das Rentier-Problem"
imageTitle: "Eddie als Rentierführerin"
imageAlt: "Eddie als Rentierführerin"
introDate: "Vaasa, 9. August 1985"
subChapter:
  einleitung: "Einleitung"
  problemstellung: "Problemstellung"
