title: "Frühstücks\u00ADzettel\u00A0#2 Das Rentier-Problem"
imageTitle: "Eddie als Rentierführerin"
imageAlt: "Eddie als Rentierführerin"
introDate: "Vaasa, 9. August 1985"
subChapter:
  einleitung: "Einleitung"
  depot-strategie: "Depot-Strategie"
  vorstufe-plus-klassisches-mehrdepot-modell: "Vorstufe + klassisches Mehrdepot-Modell"
book:
  p1: "Am zweiten Morgen bin ich schon wach, noch bevor Sini die Tür richtig zu hat. Neugier ist mein Wecker. Der Zettel zeigt ein Rentier, das aussieht wie ein Hund mit Antennen und darunter die fiese Frage: Wie weit komme ich in die Wildnis rein und wieder raus, wenn ich nur begrenzt Essen tragen kann, aber unterwegs kleine Vorratsstapel anlegen darf? Das ist kein „einfach laufen“-Problem. Das ist „schleppen, ablegen, umdrehen, nochmal schleppen, und dabei nicht verhungern“."
  p2: "Ich liege wieder mit den Beinen oben, die Mullstreifen enger, der Kopf freier. In meinem Heft werden aus Rationen kleine Punkte, aus Wegen Pfeile, aus Umkehrpunkten Entscheidungen. Und ja: Der Trick ist nicht Mut, sondern Ordnung. Nicht immer alles gleichzeitig wollen. Erst Depots bauen, dann Strecke machen."
  p3: "In Eddie rechnet zeige ich dir die clevere Depot-Logik für Five-Card-Draw-ähnliche Disziplin: kalt rechnen, dann erst loslaufen. Und unten gibt’s ein interaktives Schema, mit dem du deine eigene Strategie ausprobieren kannst."
sections:
  part1:
    title: "Teil 1 — Aufgabe (Lappland-Version)"
    p1: "Eine Wanderin kann pro Tag <katex tex=\"c\" /> Rationen verbrauchen und maximal <katex tex=\"C\" /> Rationen tragen. Am Start liegt unbegrenzter Vorrat. Mit Depots soll die maximale Entfernung in die Wildnis mit sicherer Rückkehr möglichst groß werden."
  part2:
    title: "Teil 2 — Warum ein Depot nur die Vorstufe ist"
    p1: "Dein Punkt ist richtig: Mit genau einem Depot entsteht noch keine Reihenstruktur. Die Ein-Depot-Version ist nur eine saubere Einstiegsversion Machbarkeit, Bilanz, Formeln, aber noch nicht das eigentliche klassische Jeep-Problem."
    p2: "Die Reihe entsteht erst, wenn man mehrere Depotstufen nutzt. Dann wird jeder weitere Kilometer teurer und der Zusatzgewinn pro Stufe kleiner."
  part3:
    title: "Teil 3 — Klassische Mehrdepot-Idee (harmonische Struktur)"
    p1: "Für das idealisierte Mehrdepot-Modell mit Rückkehrpflicht gilt pro Stufe <code>j</code> der effektive Faktor <katex tex=\"2j-1\" />. Damit ergibt sich:"
    p2: "Die Summe wächst weiter sehr langsam, also gibt es keine harte endliche Obergrenze bei unbegrenzt vielen Depotstufen. Praktisch sieht es aber wie eine Sättigung aus, weil jeder neue Term kleiner wird."
  part4:
    title: "Teil 4 — Ein-Depot-Formel (Vorstufe)"
    p1: "Für die Vorstufe mit einem Depot bei <katex tex=\"x\" />, Ablage <katex tex=\"d\" /> pro Shuttle und <katex tex=\"k\" /> Shuttles gilt:"
  summary:
    title: "Teil 5 - Grafische Darstellung"
