introDate: "Vaasa, August 9, 1985"
subChapter:
  einleitung: "Introduction"
  depot-strategie: "Depot Strategy"
  vorstufe-plus-klassisches-mehrdepot-modell: "Warm-up + Classic Multi-Depot Model"
book:
  p1: "On the second morning I am already awake before Sini has even properly shut the door. Curiosity is my alarm clock. The note shows a reindeer that looks like a dog with antennae, and underneath it the nasty question: how far can I get into the wilderness and back out again if I can only carry limited food, but may leave little supply caches along the way? This is not an \"just keep walking\" problem. It is a \"carry, drop, turn around, carry again, and do not starve while doing it\" problem."
  p2: "I am lying there again with my legs up, the bandages tighter, my head clearer. In my notebook, rations become little dots, routes become arrows, turnaround points become decisions. And yes: the trick is not courage, but order. Not trying to do everything at once. First build depots, then make distance."
  p3: "In Eddie Does The Maths I show you the clever depot logic for a discipline that feels almost like five-card draw: calculate coldly first, only then start moving. And below there is an interactive scheme where you can try your own strategy."
sections:
  part1:
    title: "Part 1 — The Problem (Lapland Version)"
    p1: "A traveler consumes <katex tex=\"c\" /> rations per day and can carry at most <katex tex=\"C\" /> rations. At the starting point there is unlimited supply. Using depots, the goal is to maximize how far into the wilderness one can go while still returning safely."
  part2:
    title: "Part 2 — Why One Depot Is Only the Warm-up"
    p1: "Your point is correct: with exactly one depot, no series structure appears yet. The one-depot version is only a clean introductory version feasibility, accounting, formulas, but not yet the actual classical jeep problem."
    p2: "The series appears only when one uses several depot levels. Then each additional kilometer becomes more expensive and the marginal gain of each extra stage gets smaller."
  part3:
    title: "Part 3 — The Classic Multi-Depot Idea (Harmonic Structure)"
    p1: "For the idealized multi-depot model with mandatory return, the effective factor in stage <code>j</code> is <katex tex=\"2j-1\" />. Hence:"
    p2: "The sum keeps growing, very slowly, so there is no hard finite upper bound if one allows infinitely many depot stages. In practice it looks like saturation because each new term gets smaller."
