title: "Breakfast Note\u00A0#2 The Reindeer Problem"
imageTitle: "Eddie as a reindeer guide"
imageAlt: "Eddie as a reindeer guide"
introDate: "Vaasa, August 9, 1985"
subChapter:
  einleitung: "Introduction"
  problemstellung: "Problem Statement"
  unbegrenzter-vorrat: "Unlimited Supply"
  endlicher-vorrat: "Finite Supply"
  ein-depot-bilanz: "One-Depot Accounting"
book:
  p1: "On the second morning I am already awake before Sini has even properly shut the door. Curiosity is my alarm clock. The note shows a reindeer that looks like a dog with antennae, and underneath it the nasty question: how far can I get into the wilderness and back out again if I can only carry limited food, but may leave little supply caches along the way? This is not an \"just keep walking\" problem. It is a \"carry, drop, turn around, carry again, and do not starve while doing it\" problem."
  p2: "I am lying there again with my legs up, the bandages tighter, my head clearer. In my notebook, rations become little dots, routes become arrows, turnaround points become decisions. And yes: the trick is not courage, but order. Not trying to do everything at once. First build depots, then make distance."
  p3: "Here I show you the clever depot logic: calculate coldly first, only then start moving. And below there is an interactive scheme where you can try your own strategy."
sections:
  part1:
    title: "Part 1 — The Concrete Problem"
    p1: "A traveler starts at the edge of the wilderness. She walks <katex tex=\"v=20\" /> km per day, consumes <katex tex=\"c=1\" /> daily ration per day, and can carry at most <katex tex=\"C=3\" /> daily rations. Along the way she may leave rations in lossless depots and pick them up later. We want the greatest distance <katex tex=\"D\" /> from the start that she can reach if she must return safely to the start at the end."
    p2: "We solve the same problem with two starting conditions: A) The starting point has unlimited supply. B) The starting point has exactly <katex tex=\"n=5\" /> full loads, i.e. <katex tex=\"nC=15\" /> daily rations. Case A answers whether a finite upper bound exists at all. Case B gives a concrete distance."
    p3: "We also separate two typical goal questions: <b>explore the wilderness</b> means going as far in as possible and returning safely to the start. <b>cross the wilderness</b> means going as far in as possible with no requirement to return. The concrete problem above is the exploration question; the crossing question is carried along in the formulas and in the graphic because it has different cost factors."
  part2:
    title: "Part 2 — Unlimited Supply: No Upper Bound"
    p1: "In starting condition A, the supply at the start is unlimited. For every natural number <katex tex=\"k\" />, one can build a strategy using <katex tex=\"3^k\" /> daily rations that reaches one more day-trip into the wilderness."
    p2: "The idea is recursive: with <katex tex=\"3^{k-1}\" /> shuttle round trips, build depot 1 one day-trip from the start. Of three carried rations, one is consumed on the outward leg, one on the return leg, and one stays in the depot. On the last outward trip, do not immediately return; set aside the return ration and repeat the same construction from the depot."
    p3: "This strategy makes no claim of optimality. It only shows that without a finite starting supply the reachable distance is unbounded."
  part3:
    title: "Part 3 — Finite Supply: The Phase Model"
    p1: "In starting condition B, only finitely many rations are available at the start. In general, let these be <katex tex=\"n\" /> full loads, i.e. <katex tex=\"nC\" /> rations. Then the classical depot or jeep model gives a finite distance."
    p2: "The index <katex tex=\"j\" /> counts how many full loads still have to be moved forward in the current phase. In the return-to-start problem, each small piece of road in that phase is traversed <katex tex=\"2j\" /> times: <katex tex=\"j\" /> outward movements and <katex tex=\"j\" /> return movements. In the one-way problem it is <katex tex=\"2j-1\" /> traversals, because the last return is missing."
    p3: "For <katex tex=\"n=2\" />, the counting is especially visible: the first stage near the start has length <katex tex=\"15\" /> km and the final outer stage has length <katex tex=\"30\" /> km, for a total of <katex tex=\"45\" /> km. This uses <katex tex=\"2C=6\" /> rations."
    p4: "For the concrete starting condition B with <katex tex=\"n=5\" /> full loads, the result is <katex tex=\"D_5=68{,}5\\,\\text{km}\" />. With <katex tex=\"n=6\" /> it would be <katex tex=\"73{,}5\\,\\text{km}\" />, and as <katex tex=\"n\" /> grows, the harmonic sum keeps growing."
  part4:
    title: "Part 4 — One Depot: Accounting and the Return Question"
    p1: "This section is not a second solution method for the whole problem, but an accounting close-up: with one depot, we can see why depots extend the route while also costing outward and return trips. That same cost structure is what later appears in the factors <katex tex=\"2j\" /> and <katex tex=\"2j-1\" />."
    p2: "For a single depot at <katex tex=\"x\" /> and <katex tex=\"k\" /> shuttle round trips with drop amount <katex tex=\"d\" /> per trip, the first condition is only the feasibility of one shuttle round trip."
    p3: "After the <katex tex=\"k\" /> shuttle round trips, one final outward trip from the start reaches the depot. The total amount available there is then <katex tex=\"S=kd+C-cx/v\" />. From here the question has to be stated explicitly:"
    p4: "For returning as far as the depot, the supply beyond the depot is halved because both the outward and return legs must be paid for. To return all the way to the start, an additional <katex tex=\"cx/v\" /> must be reserved at the depot. In the one-way case, the factor <katex tex=\"1/2\" /> beyond the depot disappears."
    p5: "This one-depot accounting is still not a complete optimal multi-depot strategy. If the amount behind the depot is larger than one can carry at once, the same depot problem starts again there; that is what produces the phase model in Part 3."
  summary:
    title: "Part 5 - Graphical Representation"
    p1: "The graphic below uses the same continuous depot model with rations and days. It explicitly separates crossing, exploration, and the delivery problem."
