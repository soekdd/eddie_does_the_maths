title: "Eddie Does The Maths: Five Card Draw - 7 Statistical Problems"
imageTitle: "Eddie takes the boys to the cleaners"
imageAlt: "Eddie takes the boys to the cleaners"
introDate: "Joutsenlampi, July 4, 1985"
subChapter:
  einleitung: "Introduction"
  poker: "Poker"
  wahrscheinlichkeiten: "Probabilities"
  bayes: "Bayes"
  ev: "EV"
book:
  p1: "I sit among the boys as if I were just harmless decoration at the table. That is exactly why they let me get so close: dress, innocent look, \"I cannot really do this\". And yes, I really do still need to understand the rules. But a hand is not a mystery. It is math. Which combinations are possible. How often I hit them. How likely a specific draw card still is in the deck. Those are fixed laws, and I understand them faster than Aaron can say \"all in\"."
  p2: "We are playing five-card draw, no upcards. Which means: mental arithmetic, and the rest is psychology. I watch timing, too-fast betting is often panic, hands, too much fidgeting screams bluff, voices, suddenly too relaxed means performed. And I ask questions just to see who dodges."
  p3: "Here I show you how to calculate cleanly in five-card draw, and below you can try an interactive hand yourself."
sections:
  poker:
    title: "Five Card Draw: Problem Set"
    p1: "In <b>five-card draw</b> (5 cards from a 52-card deck, order irrelevant), decisions can be modeled very well using <b>probabilities</b> and <b>expected values</b>."
    p2: "Important counting note for the draw problems: on a 1-card draw there are <b>47 drawable cards</b>, so <katex tex=\"52-5=47\" />. Reason: the 4 kept cards <i>and</i> the discarded card are not in the draw stack."
  task1:
    imageTitle: "Example hand: One pair"
    title: "Step 1.1 - Problem 1: The classic pair - Is \"draw 3\" worth it?"
    p1: "<b>Situation:</b> After the deal, Eddie holds a pair and discards the other three cards. She draws <b>3 new cards</b>."
    questions: "Questions:"
    q1: "How likely is she to improve to two pair, three of a kind, full house, or four of a kind?"
    q2: "How often does she remain with just one pair?"
    solution: "Exact solution:"
    solution2: "In total there are"
    solution3: "draws."
    twoPair: "Two pair: 2592/16215 ≈ 15.985%"
    threeKind: "Three of a kind: 1854/16215 ≈ 11.434%"
    fullHouse: "Full house: 165/16215 ≈ 1.018%"
    fourKind: "Four of a kind: 45/16215 ≈ 0.278%"
    keepPair: "Still just a pair: 11559/16215 ≈ 71.286%"
    storyHook: "Story hook: \"Seven times out of ten, I stay on the pair.\""
  task2:
    imageTitle: "Example hand: Two pair"
    title: "Step 1.2 - Problem 2: Two pair - Do I draw 1 card or stand pat?"
    p1: "<b>Situation:</b> Eddie has two pair plus a kicker, throws away the kicker, and draws <b>1 card</b>."
    p2: "Question: How likely is this to become a full house?"
    p3: "Drawable cards: <katex tex=\"52-5=47\" /> (not 48), because the 5th hand card was discarded. Outs: 2 kings + 2 fours = 4 of 47"
  task3:
    imageTitle: "Example hand: Four to a flush"
    title: "Step 1.3 - Problem 3: Four cards to a flush - How good is the 1-card draw?"
    p1: "<b>Situation:</b> Eddie has 4 cards of one suit and draws <b>1 card</b>."
    p2: "Question: How often does she hit the flush?"
    p3: "Drawable cards: <katex tex=\"52-5=47\" />, of which 9 are of the desired suit."
  task4:
    imageTitle: "Example hand: Open-ended draw"
    title: "Step 1.4 - Problem 4: Four cards to a straight - open-ended vs. gutshot"
    p1: "<b>Situation:</b> Eddie has 4 cards to a straight and draws <b>1 card</b>."
    l1: "Open-ended draw, e.g. 6-7-8-9 missing 5 or 10"
    l2: "Gutshot draw, e.g. 6-7-9-10 missing 8"
    p2: "Again, for a 1-card draw we have <katex tex=\"52-5=47\" /> drawable cards."
  task5:
    imageTitle: "Eddie, poker queen"
    imageAlt: "Eddie, poker queen"
    title: "Step 1.5 - Problem 5: Bayes from draw count - Opponent draws 1 card"
    p1: "Simplified model assumption:"
    l1: "Whoever has two pair draws exactly 1 card, aiming for a full house."
    l2: "Whoever has a 4-flush draws exactly 1 card, aiming for a flush."
    l3: "In this model, other hands do not draw exactly 1 card."
    p2: "Observation:"
    p3: "The opponent draws 1 card. We want"
    p4: "So: about 52.6% two pair vs. 47.4% 4-flush."
  task6:
    title: "Step 1.6 - Problem 6: Bluff math - How often must it work?"
    p1: "<b>Situation:</b> After the draw, the pot is <katex tex=\"P\" />. Eddie bluffs with a bet <katex tex=\"B\" />."
    p2: "Question: What minimum fold rate <katex tex=\"f\" /> does she need to break even?"
  task7:
    title: "Step 1.7 - Problem 7: EV instead of gut feeling - Which line is better?"
    p1: "<b>Situation:</b> Eddie has a pair and can choose:"
    l1: "Line A: draw 3 cards, the classic line"
    l2: "Line B: draw 0 cards and stand pat to represent strength"
    p2: "After the draw, the opponent only calls with two pair or better."
    o1: "Use this probability for line A."
    o2: "Line B only wins through folds."
    o3: "Insert pot size, bet size, and calling range, then compare the EV."
  comment:
    title: "Real Talk from the Poker Table"
    p1: "Math is mandatory in poker, but it is never the whole story. The numbers show you strong lines, but the game is played against people."
    p2: "Psychology, acting skill, intuition, and observation matter just as much: who suddenly looks unsure, who overacts strength, who changes their timing?"
    p3: "In short: calculate carefully, but always read the person on the other side as well."
