title: "Eddie rechnet: Five Card Draw - 7 statistische Aufgaben"
imageTitle: "Eddie zockt die Jungs ab"
imageAlt: "Eddie zockt die Jungs ab"
introDate: "Joutsenlampi, 4. Juli 1985"
subChapter:
  einleitung: "Einleitung"
  poker: "Poker"
  wahrscheinlichkeiten: "Wahrscheinlichkeiten"
  bayes: "Bayes"
  ev: "EV"
book:
  p1: "Ich sitze zwischen den Jungs, als wäre ich nur harmlose Deko am Tisch. Genau deshalb lassen sie mich so nah ran: Kleidchen, braver Blick, \"ich kann das gar nicht\". Und ja, die Regeln muss ich wirklich noch verstehen. Aber ein Blatt ist kein Mysterium. Es ist Mathe. Welche Kombinationen möglich sind. Wie oft ich sie treffe. Wie wahrscheinlich eine bestimmte Karte im Draw überhaupt noch im Deck liegt. Das folgt festen Gesetzen, und die begreife ich schneller als Aaron \"All-in\" sagen kann."
  p2: "Wir spielen Five-Card-Draw, ohne offene Karten. Heißt: Rechnen im Kopf, und der Rest ist Psychologie. Ich achte auf Timing (zu schnelles Setzen ist oft Panik), auf Hände (zu viel Rumfummeln schreit Bluff), auf Stimmen (plötzlich zu locker = gespielt). Und ich stelle Fragen, nur um zu sehen, wer ausweicht."
  p3: "Hier zeige ich dir, wie du bei Five-Draw sauber rechnest – und unten kannst du ein interaktives Blatt selbst ausprobieren."
sections:
  poker:
    title: "Five Card Draw: Aufgabenblock"
    p1: "Im <b>Five Card Draw</b> (5 Karten aus einem 52er-Deck, Reihenfolge egal) lassen sich Entscheidungen sehr gut über <b>Wahrscheinlichkeiten</b> und <b>Erwartungswerte</b> modellieren."
    p2: "Wichtiger Zählhinweis für die Draw-Aufgaben: Bei einer 1-Karten-Ziehung sind <b>47 Karten ziehbar</b>, also <katex tex=\"52-5=47\" />. Grund: 4 gehaltene Karten <i>und</i> die abgeworfene Karte sind nicht im Ziehstapel."
  task1:
    imageTitle: "Beispielhand: Ein Paar"
    title: "Schritt 1.1 - Aufgabe 1: Das klassische Paar - Lohnt sich \"3 ziehen\"?"
    p1: "<b>Situation:</b> Eddie hält nach dem Deal ein Paar und wirft die anderen drei Karten weg. Sie zieht <b>3 neue Karten</b>."
    questions: "Fragen:"
    q1: "Wie wahrscheinlich verbessert sie sich zu Two Pair, Drilling, Full House, Vierling?"
    q2: "Wie oft bleibt sie bei nur einem Paar?"
    solution: "Lösung (exakt):"
    solution2: "Insgesamt gibt es"
    solution3: "Ziehungen."
    twoPair: "Two Pair: 2592/16215 ≈ 15,985%"
    threeKind: "Drilling: 1854/16215 ≈ 11,434%"
    fullHouse: "Full House: 165/16215 ≈ 1,018%"
    fourKind: "Vierling: 45/16215 ≈ 0,278%"
    keepPair: "Bleibt Paar: 11559/16215 ≈ 71,286%"
    storyHook: "Story-Hook: \"Sieben von zehn Mal bleib ich beim Paar.\""
  task2:
    imageTitle: "Beispielhand: Zwei Paare"
    title: "Schritt 1.2 - Aufgabe 2: Zwei Paare - Zieh ich 1 Karte oder bleib ich stehen?"
    p1: "<b>Situation:</b> Eddie hat zwei Paare plus Kicker, wirft den Kicker weg und zieht <b>1 Karte</b>."
    p2: "Frage: Wie wahrscheinlich wird daraus ein Full House?"
    p3: "Ziehbare Karten: <katex tex=\"52-5=47\" /> (nicht 48), denn die 5. Handkarte wurde abgeworfen. Outs: 2 Könige + 2 Vieren = 4 von 47"
  task3:
    imageTitle: "Beispielhand: Vier zum Flush"
    title: "Schritt 1.3 - Aufgabe 3: Vier Karten zum Flush - Wie gut ist der 1-Karten-Draw?"
    p1: "<b>Situation:</b> Eddie hat 4 Karten einer Farbe und zieht <b>1 Karte</b>."
    p2: "Frage: Wie oft trifft sie den Flush?"
    p3: "Ziehbare Karten: <katex tex=\"52-5=47\" />, davon 9 in der gesuchten Farbe."
  task4:
    imageTitle: "Beispielhand: Open-ended Draw"
    title: "Schritt 1.4 - Aufgabe 4: Vier Karten zur Strasse - Open-Ended vs. Gutshot"
    p1: "<b>Situation:</b> Eddie hat 4 Karten zur Strasse und zieht <b>1 Karte</b>."
    l1: "Open-ended Draw, z.B. 6-7-8-9 (es fehlt 5 oder 10)"
    l2: "Gutshot Draw, z.B. 6-7-9-10 (es fehlt 8)"
    p2: "Auch hier gilt beim 1-Karten-Draw: <katex tex=\"52-5=47\" /> ziehbare Karten."
  task5:
    imageTitle: "Eddie Pokerqueen"
    imageAlt: "Eddie Pokerqueen"
    title: "Schritt 1.5 - Aufgabe 5: Bayes aus Ziehzahl - Gegner zieht 1 Karte"
    p1: "Modellannahme (vereinfacht):"
    l1: "Wer Two Pair hat, zieht genau 1 Karte (auf Full House)."
    l2: "Wer 4-Flush hat, zieht genau 1 Karte (auf Flush)."
    l3: "Andere Hände ziehen in diesem Modell nicht genau 1 Karte."
    p2: "Beobachtung:"
    p3: "Gegner zieht 1 Karte. Gesucht ist"
    p4: "Also: ca. 52,6% Two Pair vs. 47,4% 4-Flush."
  task6:
    title: "Schritt 1.6 - Aufgabe 6: Bluff-Mathe - Wie oft muss er funktionieren?"
    p1: "<b>Situation:</b> Nach dem Draw ist der Pot <katex tex=\"P\" />. Eddie blufft mit Einsatz <katex tex=\"B\" />."
    p2: "Frage: Welche Mindest-Foldrate <katex tex=\"f\" /> braucht sie für Break-even?"
  task7:
    title: "Schritt 1.7 - Aufgabe 7: EV statt Bauchgefühl - Welche Linie ist besser?"
    p1: "<b>Situation:</b> Eddie hat ein Paar und kann wählen:"
    l1: "Linie A: 3 Karten ziehen (klassisch)"
    l2: "Linie B: 0 ziehen (stehen bleiben), um Stärke zu repräsentieren"
    p2: "Gegner callt nach dem Draw nur ab Two Pair."
    o1: "Nutze diese Wahrscheinlichkeit für Linie A."
    o2: "Linie B gewinnt nur über Folds."
    o3: "Setze Pot, Bet und Calling-Range ein und vergleiche den EV."
  comment:
    title: "Real Talk vom Pokertisch"
    p1: "Mathematik ist beim Poker Pflicht, aber nie die ganze Geschichte. Die Zahlen zeigen dir gute Linien, doch gespielt wird gegen Menschen."
    p2: "Psychologie, Schauspieltalent, Intuition und Beobachtungsgabe zählen genauso: Wer wirkt plötzlich unsicher? Wer overacted Stärke? Wer verändert sein Timing?"
    p3: "Kurz: Rechne sauber, aber lies immer auch die Person auf der anderen Seite."
