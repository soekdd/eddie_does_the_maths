    p5: "Therefore for all"
    p6: "Hence the interval lengths of the nested intervals tend to 0. Therefore"
    p6b: "consists of exactly one point; call it"
    p7: "Because the intervals are nested, we have <katex tex=\"a_n<a_{n+1}\\le x^*\" /> and <katex tex=\"x^*\\le b_{n+1}<b_n\" />. So <katex tex=\"x^*\" /> lies strictly inside for every <katex tex=\"n\\ge2\" />: <katex tex=\"a_n<x^*<b_n\" />. By strict monotonicity of <katex tex=\"T_n\" />, this implies:"
    p8: "For <katex tex=\"n=1\" /> we additionally have <katex tex=\"a_1=0<a_2\\le x^*\\le b_2<b_1=1\" />, so <katex tex=\"0<x^*<1\" />. Together with the equivalence from Part 3, this gives:"
    conclusionBox: 'x_n=T_n(x^*)\quad\Longrightarrow\quad 0<x_n<x_{n+1}<1\ \text{for all }n.'
    p9: "Finally, the formal uniqueness argument: if <katex tex=\"x_1\" /> and <katex tex=\"y_1\" /> both have the property, then for every <katex tex=\"n\\ge2\" /> they both lie in <katex tex=\"(a_n,b_n)\" />."
    p10: "Since this holds for all <katex tex=\"n\\ge2\" />, we get <katex tex=\"|x_1-y_1|=0\" />, hence <katex tex=\"x_1=y_1\" />."
    commentTitle: "Grinning Conclusion"
    commentText: "In the end it is almost cheekily beautiful: try infinitely many starting values, but only one lands exactly on the track between \"too small\" and \"too large\". If you hit it, the sequence marches upward obediently and still stays below 1. A mathematically precise launch."
  backward:
    title: "Part 5 — Computing the Starting Value Backward"
    p1: "The existence proof does not require a formula for the starting value. But if we want to compute the value numerically, forward trial and error is unnecessarily expensive."
    p2: "On the positive range the recursion is invertible. Solving the quadratic equation for <katex tex=\"x_n\" /> gives:"
    p3: "For a large <katex tex=\"N\" /> we know an admissible final interval for <katex tex=\"x_N\" />. We then carry this interval step by step back to <katex tex=\"x_1\" /> with the inverse functions:"
    p4: "The width shrinks very quickly. For an interval <katex tex=\"[a_{n+1},b_{n+1}]\" /> and its preimage <katex tex=\"[a_n,b_n]\" />, rationalizing gives:"
    p5: "The denominator is roughly <katex tex=\"4n\" />, so each backward step approximately halves the width. With <katex tex=\"N=328\" /> one already gets more than 100 reliable decimal places."
