  part4:
    title: "Part 4 — Uniqueness (via a Distance Argument)"
    p1: "For uniqueness, we must show that the interval lengths tend to 0. Fix some <katex tex=\"n\\ge2\" /> and consider the corresponding interval <katex tex=\"I_n=[a_n,b_n]\" />, whose length <katex tex=\"b_n-a_n\" /> we want to estimate. If this length tends to 0 for large <katex tex=\"n\" />, uniqueness follows."
