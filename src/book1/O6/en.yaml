book:
  p1: "Joutsa, second day of competition. It feels as if someone stuffed cotton into my head. I read the text twice and notice: I understand it and at the same time I am slipping away. As if my brain were standing on a wet pier."
  p2: "This one is about a sequence of numbers. You start with one value, and then you generate the next one from the previous one, always by the same rule. Like a machine: you feed it the current value and it spits out the next one."
  p3: "The nasty part is that the sequence behaves completely differently depending on where you start. It can get too large, it can turn the wrong way, it can leave the \"safe zone\". And the problem claims that there is exactly <strong>one</strong> starting value that gets everything right. Then the sequence always stays between zero and one and still grows step by step. That is actually beautiful: a single perfect starting value that hits the balance exactly. But today, when I hear \"unique starting value\", I do not think of beauty, I think of risk. Of <em>only one chance</em>."
  p4: "Here I explain it in the plainest possible way: why almost all starts fail and why exactly one slips through. I hope I do too today."
sections:
  part1:
    title: "Part 1 — Problem Statement"
    p1: "For every real starting value <katex tex=\"x_1\" />, define a sequence by"
    p2a: "We must show that there is"
    p2b: "exactly one"
    p2c: "starting value"
    p2d: "for which"
    proveBox: '0<x_n<x_{n+1}<1\quad\text{for all }n'
    p3: "In words, this means: every term is positive, stays below 1, and is always larger than the previous one. So the sequence increases, but it must never reach or exceed 1."
    p4a: "You can think of the rule as a little calculator: you feed in the current value"
    p4b: "and get the next value"
    p4c: "out. The problem does not ask for just any suitable starting value, but for one unique value."
