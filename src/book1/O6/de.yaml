book:
  p1: "Joutsa, zweiter Wettkampftag. Mir ist, als hätte jemand Watte in meinen Kopf gestopft. Ich lese den Text zweimal und merke: Ich verstehe ihn und gleichzeitig rutsche ich weg. Als würde mein Gehirn auf einem nassen Bootssteg stehen."
  p2: "Hier geht es um eine Zahlenfolge. Du startest mit einer Zahl, und dann erzeugst du die nächste aus der vorherigen, immer nach derselben Vorschrift. Wie ein Automat: du fütterst ihn mit dem aktuellen Wert und bekommst den nächsten ausgespuckt."
  p3: "Das Gemeine ist: Je nachdem, womit du startest, benimmt sich diese Folge komplett anders. Sie kann zu groß werden, sie kann falsch abbiegen, sie kann aus dem \"sicheren Bereich\" rausfallen. Und die Aufgabe behauptet: Es gibt genau <strong>einen</strong> einzigen Startwert, der alles richtig macht. Dann bleibt die Folge immer zwischen null und eins und sie wächst trotzdem Schritt für Schritt. Das ist eigentlich wunderschön: eine einzige perfekte Startzahl, die genau die Balance trifft. Aber ausgerechnet heute denke ich bei \"einziger Startwert\" nicht an Schönheit, sondern an Risiko. An <em>nur eine Chance</em>."
  p4: "Hier erkläre ich das ganz schlicht: Warum fast alle Starts scheitern und warum genau einer durchrutscht. Hoffe ich, dass auch ich heute durchkomme."
sections:
  part1:
    title: "Teil 1 — Aufgabenstellung"
    p1: "Für jede reelle Startzahl <katex tex=\"x_1\" /> wird eine Folge durch"
    p2a: "definiert. Zu zeigen ist: Es gibt"
    p2b: "genau einen"
    p2c: "Startwert"
    p2d: "für den"
    proveBox: '0<x_n<x_{n+1}<1\quad\text{für alle }n'
    p3: "In Worten bedeutet das: Jedes Folgenglied ist positiv, bleibt kleiner als 1 und ist immer größer als das vorherige. Die Folge wächst also, aber sie darf nie die 1 erreichen oder überschreiten."
    p4a: "Man kann sich die Vorschrift wie einen kleinen Rechner vorstellen: Du gibst den aktuellen Wert"
    p4b: "hinein und bekommst den nächsten Wert"
    p4c: "heraus. Die Aufgabe fragt dabei nicht nur nach irgendeinem passenden Startwert, sondern nach genau einem einzigen."
  part2:
    title: "Teil 2 — Umformulierung mit Hilfsfunktionen"
    p1: "Für den Beweis führen wir zuerst Hilfsfunktionen (Iterationsfunktionen) ein:"
    p2a: "Damit gilt bei Startwert"
    p2b: "stets"
    derivativeBox: 'f_n''(t)=2t+\frac1n>0\quad\text{für }t\in[0,1].'
    p3: "Damit ist jede Funktion <katex tex=\"f_n\" /> auf <katex tex=\"[0,1]\" /> stetig und streng wachsend. Als Komposition solcher Funktionen ist auch jede Funktion <katex tex=\"T_n\" /> stetig und streng wachsend."
    boundaryBox: 'T_n(0)=0,\qquad T_1(1)=1,\qquad T_n(1)>1\ \text{für }n\ge2.'
  part3:
    title: "Teil 3 — Existenz über Intervallschachtelung"
    p1: "<strong>Vorbetrachtung:</strong> Angenommen, ein Startwert <katex tex=\"x_1\" /> erfüllt bereits <katex tex=\"0<x_n<x_{n+1}<1\" /> für alle <katex tex=\"n\" />. Dann folgt für jedes feste <katex tex=\"n\" />:"
    p2: "Das ist die notwendige Richtung. Umgekehrt nehmen wir an, dass für alle <katex tex=\"n\\ge1\" /> gilt <katex tex=\"1-\\frac{1}{n}<x_n<1\" />. Dann ist <katex tex=\"x_n>0\" /> für alle <katex tex=\"n\" />."
    p3: "Außerdem liefert die Annahme mit Index <katex tex=\"n+1\" /> direkt <katex tex=\"x_{n+1}<1\" />. Daher gilt für alle <katex tex=\"n\\ge1\" />:"
    p4: "Damit dürfen wir äquivalent nach einem Startwert mit <katex tex=\"1-\\frac{1}{n}<T_n(x_1)<1\" /> für alle <katex tex=\"n\" /> suchen."
    p5a: "Für"
    p5b: "genügt die Grundbedingung"
    p5c: "wir setzen daher"
    p5d: "und"
    p5e: "Für jedes"
    p5f: "definieren wir"
    p5g: "durch:"
    p6: "Wegen Stetigkeit und strenger Monotonie von <katex tex=\"T_n\" /> sind <katex tex=\"a_n,b_n\" /> eindeutig bestimmt und es gilt <katex tex=\"a_n<b_n\" />."
    p7: "Jetzt die Monotoniebeweise (für"
    l1Title: "ist streng wachsend."
    l1Text: "Da"
    l1Text2: "streng wachsend ist, folgt"
    l2Title: "ist streng fallend."
    l2Text: "Wegen der strengen Monotonie von"
    l2Text2: "folgt"
    p8: "Damit sind die abgeschlossenen Intervalle"
    p8b: "(für"
    p8c: "geschachtelt:"
    p9: "Nach dem Intervallschachtelungsprinzip ist"
    p9b: "nichtleer. Die Existenz ist damit gezeigt."
  part4:
    title: "Teil 4 — Eindeutigkeit (mit Distanzbeweis)"
    p1: "Für die Eindeutigkeit müssen wir zeigen, dass die Intervalllängen gegen 0 gehen. Wir fixieren ein <katex tex=\"n\\ge2\" /> und betrachten das zugehörige Intervall <katex tex=\"I_n=[a_n,b_n]\" />, dessen Länge <katex tex=\"b_n-a_n\" /> wir abschätzen wollen. Wenn wir zeigen, dass diese Länge für große <katex tex=\"n\" /> gegen 0 geht, folgt die Eindeutigkeit."
    p2: "Setze für"
    p3: "Für"
    p3b: "rechnen wir explizit:"
    p4: "Nun zeigen wir, dass der Faktor streng größer als 1 ist:"
    positiveBox: 'd_k>0\quad\text{(da }a_n<b_n\text{ und }T_k\text{ streng wachsend ist).}'
    p5: "Damit folgt für alle"
    p6: "Die Intervalllängen der geschachtelten Intervalle gehen also gegen 0. Daher besteht"
    p6b: "aus genau einem Punkt, nenne ihn"
    p7: "Weil die Intervalle geschachtelt sind, gilt <katex tex=\"a_n<a_{n+1}\\le x^*\" /> und <katex tex=\"x^*\\le b_{n+1}<b_n\" />. Also liegt <katex tex=\"x^*\" /> für jedes <katex tex=\"n\\ge2\" /> strikt im Inneren: <katex tex=\"a_n<x^*<b_n\" />. Mit der strengen Monotonie von <katex tex=\"T_n\" /> folgt dann:"
    p8: "Für <katex tex=\"n=1\" /> gilt zusätzlich <katex tex=\"a_1=0<a_2\\le x^*\\le b_2<b_1=1\" />, also <katex tex=\"0<x^*<1\" />. Mit der Äquivalenz aus Teil 3 folgt damit:"
    conclusionBox: 'x_n=T_n(x^*)\quad\Longrightarrow\quad 0<x_n<x_{n+1}<1\ \text{für alle }n.'
    p9: "Zum Schluss die formale Eindeutigkeit: Haben <katex tex=\"x_1\" /> und <katex tex=\"y_1\" /> die Eigenschaft, dann liegen beide für jedes <katex tex=\"n\\ge2\" /> in <katex tex=\"(a_n,b_n)\" />."
    p10: "Da dies für alle <katex tex=\"n\\ge2\" /> gilt, folgt <katex tex=\"|x_1-y_1|=0\" />, also <katex tex=\"x_1=y_1\" />."
    commentTitle: "Fazit mit Grinsen"
    commentText: "Am Ende ist es fast schon frech schön: unendlich viele Startwerte probieren, aber nur einer trifft exakt die Spur zwischen „zu klein“ und „zu groß“. Wenn der sitzt, marschiert die Folge brav aufwärts und bleibt trotzdem unter 1. Ein mathematischer Präzisionsstart."
  backward:
    title: "Teil 5 — Den Startwert rückwärts berechnen"
    p1: "Der Existenzbeweis verlangt keine Formel für den Startwert. Wenn wir den Wert aber numerisch berechnen wollen, ist Vorwärtsprobieren unnötig teuer."
    p2: "Die Rekursion ist auf dem positiven Bereich umkehrbar. Aus der quadratischen Gleichung für <katex tex=\"x_n\" /> folgt direkt:"
    p3: "Für ein großes <katex tex=\"N\" /> kennen wir ein erlaubtes Endintervall für <katex tex=\"x_N\" />. Dieses Intervall wird dann Schritt für Schritt mit den Umkehrfunktionen zurück nach <katex tex=\"x_1\" /> getragen:"
    p4: "Dabei schrumpft die Breite sehr schnell. Für ein Intervall <katex tex=\"[a_{n+1},b_{n+1}]\" /> und sein Urbild <katex tex=\"[a_n,b_n]\" /> ergibt Rationalisieren:"
    p5: "Der Nenner ist ungefähr <katex tex=\"4n\" />, also wird die Breite in jedem Rückwärtsschritt ungefähr halbiert. Mit <katex tex=\"N=328\" /> bekommt man bereits mehr als 100 sichere Nachkommastellen."
  interactive:
    title: "Spielplatz: Näherung für den eindeutigen Startwert"
    intro: "Wir berechnen für ein gewähltes <katex tex=\"N\" /> die numerischen Schranken <katex tex=\"A_N=\\max_{1\\le n\\le N}a_n\" /> und <katex tex=\"B_N=\\min_{1\\le n\\le N}b_n\" />. Das Intervall <katex tex=\"[A_N,B_N]\" /> enthält den eindeutigen Startwert."
