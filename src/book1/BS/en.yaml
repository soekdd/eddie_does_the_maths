  book:
    p1: "It is the first of September, and suddenly my stomach feels like a timetable: empty and full at the same time. Sini does a fake FDJ salute, and I almost fall off my stool laughing. But as soon as the giggling fades, that nasty feeling remains: <em>You are losing time.</em>"
    p2: "So I walk alone to the university library. Tall shelves, foreign languages, the smell of paper. I pull out a thick volume, <b>Technical Mechanics</b>, and open it as if it were a lifebuoy. Lines, boxes, cross-sections. Suddenly my head is back, awake, hungry. I notice how good it feels to understand something again that does not run away."
    p3: "Between the pages I stumble across <b>Steiner's theorem</b>. No magic, more like a trick: a few clean steps, and you know how stiff a shape really is, even when it looks complicated."
    p4: "That is exactly what this is about now: we look at how to size an <b>I-beam</b> sensibly with it. Below, a small simulation is waiting where you can tweak the profile yourself and see what strength feels like when you are allowed to calculate it."
  sections:
    part1:
      title: "Part 1 - Second moment of area using Steiner's theorem on a double-T beam (I-profile)"
      p1: "<b>Goal:</b> We calculate the <b>second moment of area</b> of a double-T cross-section about the <b>strong axis</b> using Steiner's theorem (parallel axis theorem)."
      p2: "You need this, for example, for bending stress and deflection."
    part2:
      title: "Part 2 - Steiner's theorem: what it says and how to use it"
      p1: "The second moment of area measures not only how much area exists, but above all how far that area lies from the axis under consideration. This is exactly where Steiner's theorem comes in: it shifts a known moment of inertia from the <b>centroidal axis</b> of a partial area to a <b>parallel axis</b> (for example the overall axis of the section)."
      graphTitle: "Double-T beam"
      p2: "Here, <code>I_{x,S}</code> is the moment of inertia about the centroidal axis of the partial area, <code>A</code> its area, and <code>d</code> the distance between the two axes. The Steiner term <code>A d^2</code> grows quadratically with distance and often dominates the total value."
      p3: "For arbitrary geometries, the procedure is always the same:"
      step1: "Break the section into simple partial areas (rectangles, triangles, circles, cut-outs)."
      step2: "Determine <code>A_i</code> and <code>I_{x,S,i}</code> for each partial area."
      step3: "Calculate the distance <code>d_i</code> from each partial-area axis to the overall axis."
      step4: "Sum all contributions: <code>I_x=\\sum_i \\left(I_{x,S,i}+A_i d_i^2\\right)</code>."
      p4: "For openings (holes), the area and Steiner term are subtracted with a negative sign. This also allows complex profiles to be calculated systematically."
      p5: "For the double-T beam, we use a decomposition into three rectangles: 2 flanges and 1 web. The flanges lie far from the neutral axis, so their Steiner contribution is large. The web lies centrally, and for it <code>d=0</code> usually applies."
      p6: "Rectangle formulas and geometry:"
      p7: "That is exactly why the I-profile is efficient: a lot of material sits in the flanges with a large lever arm and increases <code>I_x</code> much more strongly than additional web material in the middle."
    part3:
      title: "Part 3 - Typical sources of error (Steiner pitfalls)"
      trap1: "Wrong <code>d</code>: the distance is always between centroidal axes, not between edges."
      trap2: "Forgetting <code>h_w</code>: <code>h_w=h-2t_f</code>, not <code>h_w=h</code>."
      trap3: "Mixing up axes: for the strong axis, the height with power <code>h^3</code> is decisive."
