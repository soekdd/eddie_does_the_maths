  book:
    p1: "Es ist der erste September, und plötzlich fühlt sich mein Bauch an wie ein Stundenplan: leer und gleichzeitig voll. Sini macht einen falschen FDJ-Gruß, ich falle lachend fast vom Hocker. Aber sobald das Kichern nachlässt, bleibt dieses miese Gefühl: <em>Du verlierst Zeit.</em>"
    p2: "Also laufe ich allein zur Uni-Bibliothek. Hohe Regale, fremde Sprachen, Papiergeruch. Ich ziehe einen dicken Band raus, <b>Technical Mechanics</b>, und klappe ihn auf, als wäre er ein Rettungsring. Linien, Kästen, Querschnitte. Plötzlich ist mein Kopf wieder da, wach, hungrig. Ich merke, wie gut es tut, wieder etwas zu verstehen, das nicht wegläuft."
    p3: "Zwischen den Seiten stolpere ich über den <b>Satz von Steiner</b>. Kein Zauber, eher ein Trick: Ein paar saubere Schritte - und du weißt, wie fest eine Form wirklich ist, auch wenn sie kompliziert aussieht."
    p4: "Genau darum geht's jetzt hier: Wir schauen uns an, wie man damit einen <b>I-Träger</b> sinnvoll dimensioniert. Unten wartet eine kleine Simulation, in der du selbst am Profil drehen kannst und siehst, wie sich Stärke anfühlt, wenn man sie rechnen darf."
  sections:
    part1:
      title: "Teil 1 - Flächenträgheitsmoment mit dem Satz von Steiner am Beispiel eines Doppelt-T-Träger (I-Profil)"
      p1: "<b>Ziel:</b> Wir berechnen das <b>zweite Flächenträgheitsmoment</b> eines Doppelt-T-Querschnitts um die <b>starke Achse</b> mit dem Satz von Steiner (Parallelachsen-Satz)."
      p2: "Das braucht man z.B. für Biegespannung und Durchbiegung."
    part2:
      title: "Teil 2 - Der Satz von Steiner: Was er aussagt und wie man ihn nutzt"
      p1: "Das Flächenträgheitsmoment misst nicht nur, wie viel Fläche vorhanden ist, sondern vor allem, in welchem Abstand zur betrachteten Achse diese Fläche liegt. Genau hier setzt der Satz von Steiner an: Er verschiebt ein bekanntes Trägheitsmoment von der <b>eigenen Schwerpunktachse</b> einer Teilfläche auf eine <b>parallele Achse</b> (z.B. die Gesamtachse des Querschnitts)."
      graphTitle: "Doppelt-T-Träger"
      p2: "Dabei ist <code>I_{x,S}</code> das Trägheitsmoment um die Schwerpunktachse der Teilfläche, <code>A</code> deren Fläche und <code>d</code> der Abstand der beiden Achsen. Der Steiner-Anteil <code>A d^2</code> wächst quadratisch mit dem Abstand und dominiert oft den gesamten Wert."
      p3: "Für beliebige Geometrien ist das Vorgehen immer gleich:"
      step1: "Querschnitt in einfache Teilflächen zerlegen (Rechtecke, Dreiecke, Kreise, Aussparungen)."
      step2: "Für jede Teilfläche <code>A_i</code> und <code>I_{x,S,i}</code> bestimmen."
      step3: "Abstand <code>d_i</code> der Teilflächenachse zur Gesamtachse berechnen."
      step4: "Alle Beiträge summieren: <code>I_x=\\sum_i \\left(I_{x,S,i}+A_i d_i^2\\right)</code>."
      p4: "Bei Aussparungen (Löchern) werden Fläche und Steiner-Anteil mit negativem Vorzeichen abgezogen. So lassen sich auch komplexe Profile systematisch berechnen."
      p5: "Für den Doppelt-T-Träger verwenden wir die Zerlegung in drei Rechtecke: 2 Flansche und 1 Steg. Die Flansche liegen weit von der neutralen Achse entfernt, dadurch ist ihr Steiner-Anteil groß. Der Steg liegt zentriert, für ihn gilt meist <code>d=0</code>."
      p6: "Rechteck-Formeln und Geometrie:"
      p7: "Genau deshalb ist das I-Profil effizient: viel Material sitzt in den Flanschen mit großem Hebelarm und erhöht <code>I_x</code> deutlich stärker als zusätzlicher Stegquerschnitt in der Mitte."
    part3:
      title: "Teil 3 - Typische Fehlerquellen (Steiner-Fallen)"
      trap1: "Falsches <code>d</code>: Abstand immer zwischen Schwerpunktachsen, nicht zwischen Kanten."
      trap2: "<code>h_w</code> vergessen: <code>h_w=h-2t_f</code>, nicht <code>h_w=h</code>."
      trap3: "Achsen vertauscht: Für die starke Achse ist die Höhe mit Potenz <code>h^3</code> entscheidend."
