ba:
  title: "BASIC for runaways"
  imageTitle: "Eddie at Kari's C64"
  introDate: "Vaasa, August 11, 1985"
  subChapter:
    einleitung: "Introduction"
    casar: "Caesar"
    vigenere: "Vigenere"
    c64-emulator: "C64 emulator"
  book:
    p1: "The string of letters <em>DXNZG.<wbr>EMIKN.<wbr>AOJUT.<wbr>CNNUT.<wbr>BXTLJ</em> lies in front of me like a bad joke, except nobody is laughing. At the kitchen table there are eraser crumbs, coffee stains, and embarrassingly many failed attempts. I have wrestled with Caesar, nibbled at Vigenere, burned through birthdays as keys, and it still looks like alphabet soup."
    p2: "Then Jukka drags in this beige box, and <b>READY.</b> flickers onto the TV screen. I can tell immediately: this is not a device, this is an accomplice. BASIC is like math with keys: blunt, honest, and fast. Exactly what I need when my fingers are already starting to give up."
    p3: "Here I show you how I systematically decrypt with a few lines of C64 BASIC: first the simple shifts, then rotating keys. And if you do not want to just read: a real BASIC interpreter is waiting below. Press <b>RUN</b>. Then the letter soup starts to dissolve."
  sections:
    part1:
      title: "Part 1 - Caesar & Vigenere"
      lead: "Two classics: once “shift the alphabet”, once “shift with a rotating key”."
    part2:
      title: "Part 2 - The basic idea: letters as numbers"
      p1: "We almost always work with the alphabet <strong>A-Z</strong> and turn it into numbers. The most popular convention is:"
      mapping: "Mapping"
      circle: "Arithmetic “in a circle”"
      circleText: "After Z comes A again. Mathematically this is arithmetic <em>modulo 26</em>."
      circleExampleBox: '\text{Example: } 25+3=28 \equiv 2 \pmod{26}\ \Rightarrow\ Z \xrightarrow{+3} C'
      cleanup: "And yes: in real texts you usually have to “clean things up” first: uppercase letters, replace umlauts, remove punctuation, or handle them separately."
    part3:
      title: "Part 3 - Caesar cipher"
      p1: "Caesar is the minimal version: one fixed shift <span class=\"font-weight-medium\">k</span>. Every letter is shifted forward by <span class=\"font-weight-medium\">k</span> positions."
      formulaBox: '\textbf{Encryption:}\quad C \equiv P + k \pmod{26} \\\\ \textbf{Decryption:}\quad P \equiv C - k \pmod{26}'
      example: "Example"
      plainShift: "Plaintext: <code>{plain}</code> | Shift: <code>k={k}</code>"
      result: "Result: <code>{cipher}</code>"
      whyTitle: "Why Caesar often falls quickly"
      why1: "There are only <strong>25</strong> meaningful keys (k=1...25)."
      why2: "You can simply try all of them (“bruteforce”)."
      why3: "Or you use <strong>frequencies</strong>: E, N, I, R, S... appear often."
      table:
        letter: "Letter"
        number: "Number"
        shift: "+k"
        cipher: "Cipher"
    part4:
      title: "Part 4 - Vigenere cipher"
      p1: "Vigenere is like Caesar, but with a <strong>rotating key</strong>. Instead of always taking the same shift, you use a sequence of shifts that repeats."
      formulaBox: 'C_i \equiv P_i + K_i \pmod{26} \\\\ \text{where } K_i \text{ comes cyclically from the key.}'
      classicTitle: "Example (classic word key)"
      classicText: "Plaintext: <code>{plain}</code><br />Key: <code>{key}</code> (repeated)"
      classicResult: "Result: <code>{cipher}</code>"
      numericTitle: "Example (numeric key like “2,9,5”)"
      numericText: "Here the key is directly a sequence of numbers: <code>{key}</code> (repeated)."
      numericResult: "Plaintext: <code>{plain}</code><br />Cipher: <code>{cipher}</code>"
      whyTitle: "Why Vigenere is stronger"
      why1: "No single shift -> frequencies get “smeared out”."
      why2: "Security depends heavily on the <strong>key length</strong>."
      why3: "Short keys can be attacked (Kasiski/Friedman), long keys are much tougher."
      tipTitle: "Eddie's mental model"
      tipText: "Imagine several Caesar ciphers alternating. If you know the period length, the problem breaks back down into several small Caesar tasks."
      table:
        pos: "Pos"
        p: "P"
        k: "K"
        c: "C"
        shift: "Shift"
    part5:
      title: "Part 5 - Key takeaways"
      caesar: "Caesar"
      caesar1: "One shift for everything."
      caesar2: "Easy to crack (25 tries or frequency analysis)."
      vigenere: "Vigenere"
      vigenere1: "A shift sequence (key) repeats."
      vigenere2: "Key length is the weak point - short keys are attackable."
  interactive:
    title: "BASIC emulator"
    programLabel: "BASIC program"
    run: "RUN"
    clear: "CLEAR"
    reset: "RESET"
    ready: "basic ready"
    loading: "loading..."
    source: "BASIC source"
    output: "Emulator output"
    footer: "Thanks to Michael Steil and James Abbatiello for their cbmbasic (BSD2-like License)"
  programs:
    hello: "Hello World"
    ceasar: "Caesar Decryption"
    vigenereDe: "Vigenere Decryption"
    vigenereEn: "Vigenere Encryption"
    vigenereEnInput: "Vigenere Encryption (with INPUT)"
    fractionReduce: "Reduce fractions (with INPUT)"
    primes: "Prime numbers until reset"
    pi: "Digits of pi until reset"
  emulator:
    screenAria: "C64 text screen"
    inputLine: "INPUT line (Enter sends)"
    send: "SEND"
    clearQueue: "Clear queue"
    awaitingInput: "Interpreter is waiting for INPUT. Send input and the program continues immediately."
