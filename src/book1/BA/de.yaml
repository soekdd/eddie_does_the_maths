    vigenereDe: "Vigenère Decryption"
    vigenereEn: "Vigenère Encryption"
    vigenereEnInput: "Vigenère Encryption (mit INPUT)"
    fractionReduce: "Bruch kuerzen (mit INPUT)"
    primes: "Primzahlen bis Reset"
    pi: "PI-Stellen bis Reset"
