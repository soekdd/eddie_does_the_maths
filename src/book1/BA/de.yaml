ba:
  title: "Eddie rechnet: BASIC for runaways"
  imageTitle: "Eddie am Karis C64"
  introDate: "Vaasa, 11. August 1985"
  subChapter:
    einleitung: "Einleitung"
    casar: "Cäsar"
    vigenere: "Vigenère"
    c64-emulator: "C64 Emulator"
  book:
    p1: "Die Buchstabenreihe <em>DXNZG.<wbr>EMIKN.<wbr>AOJUT.<wbr>CNNUT.<wbr>BXTLJ</em> liegt vor mir wie ein schlechter Witz, nur dass keiner lacht. Am Küchentisch stapeln sich Radierkrümel, Kaffeeflecken und peinlich viele Fehlversuche. Cäsar hab ich durchgeprügelt, Vigenère angeknabbert, Geburtstage verheizt und trotzdem bleibt alles erst mal nur Buchstabensuppe."
    p2: "Dann schleppt Jukka diese beige Kiste rein, und auf dem Fernseher flackert <b>READY.</b> auf. Ich spüre sofort: Das ist kein Gerät, das ist ein Komplize. BASIC ist wie Mathe mit Tasten: stumpf, ehrlich und schnell. Genau das brauche ich, wenn meine Finger schon streiken."
    p3: "Hier zeige ich dir, wie ich mit ein paar Zeilen C64-BASIC systematisch entschlüssele: erst die einfachen Shifts, dann rotierende Schlüssel. Und wenn du nicht nur lesen willst: Unten wartet ein echter BASIC-Interpreter. Drücke <b>RUN</b>. Und der Buchstabensalat löst sich auf."
  sections:
    part1:
      title: "Teil 1 - Cäsar & Vigenère"
      lead: "Zwei Klassiker: einmal „Alphabet verschieben“, einmal „Verschieben mit rotierendem Schlüssel“."
    part2:
      title: "Teil 2 - Grundidee: Buchstaben als Zahlen"
      p1: "Wir arbeiten fast immer mit dem Alphabet <strong>A-Z</strong> und machen daraus Zahlen. Am beliebtesten ist:"
      mapping: "Zuordnung"
      circle: "Rechnen „im Kreis“"
      circleText: "Nach Z kommt wieder A. Mathematisch ist das Rechnen <em>modulo 26</em>."
      cleanup: "Und ja: In echten Texten muss man vorher meist „aufräumen“: Großbuchstaben, Umlaute ersetzen (Ä→AE, Ö→OE, Ü→UE), Satzzeichen raus - oder man behandelt sie getrennt."
    part3:
      title: "Teil 3 - Cäsar-Verschlüsselung"
      p1: "Cäsar ist die Minimalversion: ein fester Shift <span class=\"font-weight-medium\">k</span>. Jeder Buchstabe wird um <span class=\"font-weight-medium\">k</span> Stellen weitergeschoben."
      example: "Beispiel"
      plainShift: "Klartext: <code>{plain}</code> | Shift: <code>k={k}</code>"
      result: "Ergebnis: <code>{cipher}</code>"
      whyTitle: "Warum Cäsar oft schnell fällt"
      why1: "Es gibt nur <strong>25</strong> sinnvolle Schlüssel (k=1...25)."
      why2: "Man kann einfach alles durchprobieren („Bruteforce“)."
      why3: "Oder man nutzt <strong>Häufigkeiten</strong>: E, N, I, R, S... treten oft auf."
      table:
        letter: "Buchstabe"
        number: "Zahl"
        shift: "+k"
        cipher: "Cipher"
    part4:
      title: "Teil 4 - Vigenère-Verschlüsselung"
      p1: "Vigenère ist wie Cäsar - nur mit einem <strong>rotierenden Schlüssel</strong>. Statt immer denselben Shift zu nehmen, hast du eine Folge von Shifts, die sich wiederholt."
      classicTitle: "Beispiel (klassisch mit Wortschlüssel)"
      classicText: "Klartext: <code>{plain}</code><br />Schlüssel: <code>{key}</code> (wird wiederholt)"
      classicResult: "Ergebnis: <code>{cipher}</code>"
      numericTitle: "Beispiel (Zahlenschlüssel wie „2,9,5“)"
      numericText: "Hier ist der Schlüssel direkt eine Zahlenfolge: <code>{key}</code> (wiederholt)."
      numericResult: "Klartext: <code>{plain}</code><br />Cipher: <code>{cipher}</code>"
      whyTitle: "Warum Vigenère stärker ist"
      why1: "Kein einzelner Shift -> Häufigkeiten „verwischen“."
      why2: "Die Sicherheit hängt stark von der <strong>Schlüssellänge</strong> ab."
      why3: "Kurze Schlüssel sind knackbar (Kasiski/Friedman), lange sind deutlich zäher."
      tipTitle: "Eddie-Tipp fürs Denken"
      tipText: "Stell dir vor, du hast mehrere Cäsar-Chiffren, die sich abwechseln. Wenn du die Periodenlänge kennst, zerfällt das Problem wieder in mehrere kleine Cäsar-Aufgaben."
      table:
        pos: "Pos"
        p: "P"
        k: "K"
        c: "C"
        shift: "Shift"
    part5:
      title: "Teil 5 - Merksätze"
      caesar: "Cäsar"
      caesar1: "Ein Shift für alles."
      caesar2: "Schnell zu knacken (25 Versuche oder Frequenzanalyse)."
      vigenere: "Vigenère"
      vigenere1: "Shift-Folge (Schlüssel) wiederholt sich."
      vigenere2: "Schlüssellänge ist die Schwachstelle - kurze Schlüssel sind angreifbar."
  interactive:
    title: "BASIC-Emulator"
    programLabel: "BASIC-Programm"
    run: "RUN"
    clear: "CLEAR"
    reset: "RESET"
    ready: "basic ready"
    loading: "loading..."
    source: "BASIC Quelltext"
    output: "Emulator-Ausgabe"
    footer: "Thanks to Michael Steil and James Abbatiello for their cbmbasic (BSD2-like License)"
