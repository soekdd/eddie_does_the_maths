title: "Spiel\u00ADtheorie am Bus\u00ADbahn\u00ADhof"
imageTitle: "Eddie muss sich entscheiden"
imageAlt: "Eddie sitzt auf einer Bettkante und denkt nach"
introDate: "Joutsenlampi, 4. Juli 1985"
subChapter:
  entscheidungsbaum: "Entscheidungsbaum"
  wahrscheinlichkeiten: "Wahrscheinlichkeiten"
  rechner: "Rechner"
book:
  p1: "Joutsenlampi, Joutsenlampi. Ich sitze auf der Bettkante, die Luft klebt, und in meinem Kopf fährt schon der Bus rein, Fensterplatz, Helsinki, Freiheit. Klingt so schön einfach, dass es gefährlich ist. Papas Stimme kommt sofort hinterher wie ein Zeigefinger. Hüte dich vor den einfachen Lösungen. Also zwinge ich mich zu dem, was ich kann, wenn alles andere wackelt. Ich baue mir im Kopf einen Entscheidungsbaum."
  p2: "Nicht mit hübschen Kästchen auf Papier, eher wie mit Türen in einem dunklen Flur. Jede Tür hat eine Chance, dass sie genau jetzt offen ist. Und hinter jeder Tür wartet nochmal eine kleine Gemeinheit, falsches Ticket, falscher Fahrer, falscher Zufall, falscher Moment und ganz am Ende vielleicht Mielke."
  p3: "Ich schiebe die Pfeile hin und her, streiche Wege weg, bis mir klar wird Wenn ich auf Glück setze, verliere ich. Punkt."
  p4: "Hier packe ich diese Mini-Rechnung Schritt für Schritt aus, Spieltheorie, Entscheidungsbäume und wie man aus Bauchpanik wieder klare Entscheidungen macht."
sections:
  part1:
    title: "Teil 1 — Worum's geht (Kurzfassung)"
    kicker: "Spieltheorie"
    p1: "Ich entscheide nicht aus dem Bauch, sondern rechne mir die Chance auf Freiheit aus. Ich zerlege die Szene in Pfad-Entscheidungen, gebe jeder Kante eine Wahrscheinlichkeit, und am Ende bleibt eine Zahl, mit der ich leben kann."
    p2: "Der Baum hat drei Ebenen:"
    levels:
      - "Bus-Situation: Kommt ein Bus (Süden/Norden) in meinem Zeitfenster?"
      - "Fahrer-Test: Nimmt der Fahrer meine D-Mark?"
      - "Verfolger-Risiko: Erwischt er mich oder verpasst er mich?"
  part2:
    title: "Teil 2 — Wie komme ich an p (Bus kommt)?"
    p1: "Ein einfaches Bauch-zu-Zahl-Modell. Ich betrachte eine Stunde als Zeitfenster und frage Wie viel Prozent dieser Stunde steht ein Bus wirklich da?"
    p2a: "Wenn pro Richtung"
    p2b: " Busse pro Stunde kommen und jeder Bus im Schnitt "
    p2c: " Minuten am Bahnsteig steht, dann ist der Zeitanteil "
    example: "Beispiel:"
    and: " Minuten und "
    perHour: "pro Stunde"
  part3:
    title: "Teil 3 — Warum man Wahrscheinlichkeiten nicht addieren darf"
    figureTitle: "Entscheidungsbaum"
    p1a: "Hier ist der typische Denkfehler. Ich habe zwei Chancen (Süden"
    p1b: " und Norden "
    p1c: ") und will die Wahrscheinlichkeit, dass mindestens eine davon eintritt:"
    p2a: "Wenn man einfach"
    p2b: "rechnet, kann das schiefgehen, weil man den Fall"
    both: "beide treten ein"
    p2c: "doppelt zählt. Im Extrem landet man sogar bei"
    p2d: "(z.B."
    p3a: "Sauber geht es über das"
    complement: "Komplement"
    p3b: "Statt mindestens ein Bus rechne ich kein Bus aus Süden UND kein Bus aus Norden."
    p3c: "Wenn wir wie im Modell annehmen, dass die beiden Richtungen unabhängig sind, darf man diese Komplementwahrscheinlichkeiten multiplizieren:"
  part4:
    title: "Teil 4 — Wann man Wahrscheinlichkeiten doch addieren darf"
    p1a: "Heute machen wir's schlanker:"
    p2a: "Warum ist bei kleinem"
    p2b: "die Summe trotzdem näherungsweise erlaubt? Weil die exakte Formel aus Teil 3 beim Ausmultiplizieren fast genau zur Summe wird"
    p2c: "Der Unterschied zur Addition"
    p2d: "ist also genau der kleine Korrekturterm"
    p2e: "Wenn"
    p2f: "nur wenige Prozent ist, ist"
    p2g: "noch viel kleiner und die Näherung passt sehr gut."
    list:
      f: "Busse pro Stunde pro Richtung"
      t: "Standzeit (Minuten)"
      p: "daraus pro Richtung die Bus-Wahrscheinlichkeit"
      a: "Fahrer akzeptiert D-Mark"
      r: "Erwischt-Wahrscheinlichkeit"
    p3a: "Exakt mit Teil 3 und"
    p3b: "und damit"
    p4a: "Wenn"
    p4b: "noch viel kleiner ist. Dann darf man näherungsweise addieren"
    p4c: "bzw. hier"
    p4d: "."
  part5:
    title: "Teil 5 — Erfolgsformel"
    p1: "Erst muss überhaupt ein Bus kommen (Süden oder Norden), dann muss der Fahrer meine D-Mark annehmen, und dann darf mich der Verfolger nicht erwischen. Darum ist die Erfolgswahrscheinlichkeit:"
    p2: "Alles andere ist Misserfolg:"
  part6:
    title: "Teil 6 — Mini-Beispiel"
    p1: "Beispielwerte: f=1 pro Stunde, t=5 Minuten, a=0,8, r=0,2."
    row1: "pro Richtung: p = f·t/60 ="
    row2: "Gesamt: (2p-p²)·a·(1-r) ="
    commentTitle: "Kurzdiagnose"
    comment1: "Ich sehe sofort, welche Kante am meisten weh tut (p, a oder r)."
    comment2a: "Wenn ich Bus killen will:"
    comment2b: "Wenn ich Fahrer killen will:"
    comment3a: "Und wenn ich Mielke kleiner machen will"
    comment3b: "runter."
