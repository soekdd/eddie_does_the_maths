title: "Game Theory at the Bus Station"
imageTitle: "Eddie has to decide"
imageAlt: "Eddie sitting on the edge of a bed, thinking"
introDate: "Joutsenlampi, July 4, 1985"
subChapter:
  entscheidungsbaum: "Decision Tree"
  wahrscheinlichkeiten: "Probabilities"
  rechner: "Calculator"
book:
  p1: "Joutsenlampi, Joutsenlampi. I sit on the edge of the bed, the air is sticky, and in my head the bus is already arriving, window seat, Helsinki, freedom. It sounds so beautifully simple that it becomes dangerous. Papa's voice follows immediately like a wagging finger. Beware of simple solutions. So I force myself into the one thing I can still do when everything else shakes. I build a decision tree in my head."
  p2: "Not with neat little boxes on paper, more like doors in a dark hallway. Every door has a chance of being open right now. And behind every door there is one more small cruelty waiting, wrong ticket, wrong driver, wrong coincidence, wrong moment, and maybe at the very end Mielke."
  p3: "I push the arrows back and forth, erase paths, until it becomes clear to me If I bet on luck, I lose. Period."
  p4: "Here I unpack this mini-calculation step by step, game theory, decision trees, and how to turn gut panic back into clear decisions."
sections:
  part1:
    title: "Part 1 - What this is about (short version)"
    kicker: "Game theory"
    p1: "I do not decide by gut feeling. I calculate my chance of freedom. I split the scene into path decisions, assign a probability to each edge, and in the end one number remains, a number I can live with."
    p2: "The tree has three levels:"
    levels:
      - "Bus situation: Does a bus arrive within my time window, southbound or northbound?"
      - "Driver test: Will the driver accept my D-Mark?"
      - "Pursuer risk: Does he catch me or miss me?"
  part2:
    title: "Part 2 - How do I get p (a bus arrives)?"
    p1: "A simple gut-to-number model. I look at one hour as a time window and ask What percentage of that hour is a bus actually standing there?"
    p2a: "If"
    p2b: " buses per hour arrive in each direction and each bus stands at the platform for "
    p2c: " minutes on average, then the time share is "
    example: "Example:"
    and: " minutes and "
    perHour: "per hour"
  part3:
    title: "Part 3 - Why you must not add probabilities"
    figureTitle: "Decision tree"
    p1a: "This is the typical mistake. I have two chances, southbound"
    p1b: " and northbound "
    p1c: ", and I want the probability that at least one of them happens:"
    p2a: "If you simply calculate"
    p2b: ", things can go wrong because you count the case "
    both: "both happen"
    p2c: "twice. In the extreme you even end up with"
    p2d: "(for example"
    p3a: "The clean way is through the"
    complement: "complement"
    p3b: "Instead of at least one bus, I calculate no bus from the south AND no bus from the north."
    p3c: "If we assume, as in the model, that the two directions are independent, then these complement probabilities may be multiplied:"
  part4:
    title: "Part 4 - When you may add probabilities after all"
    p1a: "Today we make it leaner:"
    p2a: "Why is the sum still approximately allowed for small"
    p2b: "? Because when you expand the exact formula from part 3, it almost turns into the sum:"
    p2c: "The difference to the addition"
    p2d: " is exactly the small correction term "
    p2e: "If"
    p2f: " is only a few percent, then "
    p2g: "is much smaller still, so the approximation works very well."
    list:
      f: "buses per hour in each direction"
      t: "dwell time (minutes)"
      p: "resulting bus probability per direction"
      a: "driver accepts D-Mark"
      r: "probability of getting caught"
    p3a: "Exactly, using part 3 and"
    p3b: "and therefore"
    p4a: "If"
    p4b: "is much smaller still. Then you may approximately add"
    p4c: "or here"
    p4d: "."
  part5:
    title: "Part 5 - Success formula"
    p1: "First a bus has to arrive at all, southbound or northbound, then the driver has to accept my D-Mark, and then the pursuer must not catch me. That is why the success probability is"
    p2: "Everything else is failure"
  part6:
    title: "Part 6 - Mini example"
    p1: "Example values: f=1 per hour, t=5 minutes, a=0.8, r=0.2."
    row1: "per direction: p = f·t/60 ="
    row2: "overall: (2p-p²)·a·(1-r) ="
    commentTitle: "Quick diagnosis"
    comment1: "I immediately see which edge hurts the most, p, a, or r."
    comment2a: "If I want to kill the bus branch:"
    comment2b: "If I want to kill the driver branch:"
    comment3a: "And if I want to make Mielke smaller"
    comment3b: "lower r."
