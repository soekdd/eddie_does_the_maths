decoder:
  editorTitle: Funktext
  editorHint: Klicke Codes in den Editor oder schreibe deine Sequenz direkt hinein.
  examplesLabel: Beispiele
  placeholder: CQ CQ DE DL1XYZ K
  sampleSequence: SM5ABC DE Y41ZL TNX FER CALL RST 559 QTH DRESDEN PWR 100W ANT DIPOLE WX FINE KN
  examples:
    - label: Der seltsame Ruf aus der DDR
      value: |-
        # Ruf von der TU-Dresden
        CQ SM CQ SM DE Y41ZL Y41ZL K
        CQ OH CQ OH DE Y41ZL Y41ZL K
        # Antwort aus Schweden
        Y41ZL DE SM5ABC K
        # TU Dresden fragt nach Eddie
        SM5ABC DE Y41ZL RST 559 QTH QER? QTH DRESDEN K
        # Schweden antwortet
        Y41ZL DE SM5ABC R RST 579 QTH NR NYKOPING
        QER? SRI NO CPY QER K
        # TU Dresden startet mit dem Payload DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ 
        SM5ABC DE Y41ZL D RIG JENA85 NXA PWR 10W G
        E ANT DIPOLE HT WX FINE WN
        QRM NIL AUJ QRN 2 U QSB LIL T
        CN TEMP 24 N CONDX FAIR FJ 
        B TNX X FER TLJ QSO KN
        # Schwede merkt, dass da etwas nicht stimmt
        Y41ZL DE SM5ABC R FB CPY MOST
        SRI SOME LETTERS MISSED
        QER STILL NOT UNDERSTOOD K
        # TU Dresden bleibt betont locker
        SM5ABC DE Y41ZL R R TNX
        NIL IMP
        TNX FER PATIENCE
        QSO FB KN
        # Schwede gibt am Ende offen zu, dass ihm nicht alles klar war
        Y41ZL DE SM5ABC R
        TNX QSO
        SRI NOT CPY ALL
        73 K
        # Dresdner bedankt sich entspannt und macht zu
        SM5ABC DE Y41ZL R TU TU
        NO PROB
        TNX FER CALL
        73 SK
        # Schweden verabschiedet sich
        Y41ZL DE SM5ABC 73 SK
    - label: Klassische Verbindung
      value: |-
        # Anruf aus Dresden
        SM5ABC DE Y41ZL TNX RST 559 QTH DRESDEN
        # Stationsdaten
        PWR 100W ANT DIPOLE WX FINE
        # Abschluss
        KN
    - label: Allgemeiner CQ-Anruf
      value: |-
        # Allgemeiner Rundruf
        CQ CQ DE DL1XYZ K
        # Freundlicher Abschluss
        73
    - label: CQ-Anruf an DL
      value: |-
        # Rundruf an Deutschland
        CQ DL
        # Kurzer Abschluss
        73
    - label: Eddie mit QER
      value: |-
        # Eddie meldet sich aus Dresden
        QER QTH DRESDEN WX FINE
        # Eddie grüßt in die Runde
        73
    - label: Technik und Bedingungen
      value: |-
        # Technische Daten
        CALL RST 599 RIG FT-857
        # Aufbau und Bedingungen
        ANT VERTICAL CONDX GOOD
        # Abschluss
        TNX
    - label: Mit geheimem Payload
      value: |-
        # Verbindungsaufbau
        SM5ABC DE Y41ZL QTH DRESDEN
        # Versteckter Test
        ALPHA OMEGA
        # Abschluss
        KN
