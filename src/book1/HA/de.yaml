decoder:
  editorTitle: Funktext
  editorHint: Klicke Codes in den Editor oder schreibe deine Sequenz direkt hinein.
  examplesLabel: Beispiele
  placeholder: CQ CQ DE DL1XYZ K
  sampleSequence: SM5ABC DE Y41ZL TNX FER CALL RST 559 QTH DRESDEN PWR 100W ANT DIPOLE WX FINE KN
  examples:
    - label: Der seltsame Ruf aus der DDR
      value: |-
        # Ruf von der TU-Dresden
        CQ SM CQ SM DE Y41ZL Y41ZL K
        CQ OH CQ OH DE Y41ZL Y41ZL K
        # Antwort aus Schweden
        Y41ZL DE SM5ABC K
        # TU Dresden fragt nach Eddie
        SM5ABC DE Y41ZL RST 559 QTH QER? QTH DRESDEN K
        # Schweden antwortet
        Y41ZL DE SM5ABC R RST 579 QTH NR NYKOPING
        QER? SRI NO CPY QER K
        # TU Dresden startet mit dem Payload DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ 
        SM5ABC DE Y41ZL D RIG JENA85 NXA PWR 10W G
        E ANT DIPOLE HT WX FINE WN
        QRM NIL AUJ QRN 2 U QSB LIL T
        CN TEMP 24 N CONDX FAIR FJ 
        B TNX X FER TLJ QSO KN
        # Schwede merkt, dass da etwas nicht stimmt
        Y41ZL DE SM5ABC R FB CPY MOST
        SRI SOME LETTERS MISSED
        QER STILL IMI K
        # TU Dresden bleibt betont locker
        SM5ABC DE Y41ZL R R TNX
        NIL IMP
        TNX FER PATIENCE
        QSO FB KN
        # Schwede gibt am Ende offen zu, dass ihm nicht alles klar war
        Y41ZL DE SM5ABC R
        TNX QSO
        SRI NOT CPY ALL
        73 K
        # Dresdner bedankt sich entspannt und macht zu
        SM5ABC DE Y41ZL R TU TU
        NO PROB
        TNX FER CALL
        73 SK
        # Schweden verabschiedet sich
        Y41ZL DE SM5ABC 73 SK
    - label: Eddies erste Antwort über Helsinki
      value: |-
        # Direkter Anruf aus Helsinki an die Dresdner Station.
        # Kein CQ mehr, weil der Finne Y41ZL gezielt erreichen will.
        Y41ZL DE OH2ABC OH2ABC K
        # Dresden antwortet knapp und normal.
        OH2ABC DE Y41ZL RST 559 QTH DRESDEN DRESDEN K
        # Der Finne meldet Helsinki zurück und setzt früh das verabredete Signal.
        # "QTH QER" fällt absichtlich auf: Die Dresdner sollen kurz stutzen.
        Y41ZL DE OH2ABC R RST 579 QTH HELSINKI QTH QER K
        # Dresden stolpert hörbar über das seltsame QER, bleibt aber höflich.
        OH2ABC DE Y41ZL R
        SRI QER? CPY QTH HELSINKIvK
        # Der Finne geht locker darüber hinweg und schiebt die eigentliche Nachricht direkt nach.
        # Nicht zerlegt, nicht in Alltagsfloskeln versteckt, sondern blockhaft.
        Y41ZL DE OH2ABC R QTH QER GANUBFHN K
        # In Dresden merkt man: Das ist kein normales Funkstück.
        # Gerade deshalb reagieren sie zurückhaltend und nicht zu glatt.
        OH2ABC DE Y41ZL R SRI NOT ALL CPY MSG STRANGE TNX K
        # Der Finne tut so, als sei das nichts Besonderes.
        Y41ZL DE OH2ABC R R TNX 73 K
        # Die Dresdner brechen betont korrekt und unauffällig ab.
        OH2ABC DE Y41ZL R TU 73 SK
        # Formeller Schluss aus Helsinki.
        Y41ZL DE OH2ABC 73 SK            
    - label: Der letzte Funkverkehr der Titanic
      value: |-
        # Rufzeichen der Titanic
        MGY DE ...
        # Frühe Notmeldung nach der Kollision
        CQD CQD CQD DE MGY
        # "CQD" war das damals gebräuchliche Marconi-Notzeichen.
        # Die Titanic benutzte später zusätzlich auch "SOS".
        # Sinngemäßer Inhalt:
        # Eisberg getroffen. Benötigen sofort Hilfe.
        MGY DE ... STRUCK ICEBERG
        REQUIRE IMMEDIATE ASSISTANCE
        POSITION 41.46 N 50.14 W
        # Die Position wurde in den überlieferten Mitschriften in dieser korrigierten Form weitergegeben.
        # Funkverkehr mit umliegenden Schiffen, besonders Carpathia
        MGY DE MPA
        # MPA war das Rufzeichen der Carpathia.
        MPA DE MGY
        COME AT ONCE
        WE ARE SINKING
        # In den Überlieferungen klingt der Austausch mit der Carpathia sinngemäß so:
        # Kommt schnell, wir sinken, der Zustand wird kritisch.
        # Carpathia antwortet sinngemäß:
        MGY DE MPA
        COMING HARD
        AS FAST AS POSSIBLE
        # Die Carpathia macht sich mit voller Kraft auf den Weg.
        # Spätere Phase: CQD und SOS nebeneinander
        CQD CQD SOS SOS DE MGY
        REQUIRE ASSISTANCE IMMEDIATELY
        # Die Titanic sendete im Verlauf beides: das ältere CQD und das neuere SOS.
        # Weitere Hilferufe an andere Stationen/Schiffe
        DE MGY
        WE HAVE COLLISION WITH ICEBERG
        SINKING
        PLEASE TELL CAPTAIN TO COME
        # Solche Bitten an andere Schiffe sind in mehreren Mitschriften sinngemäß belegt.
        # Sehr späte Phase: nur noch kurze, schwächer werdende Signale
        CQD DE MGY
        CQD DE MGY
        # Die Meldungen wurden zum Ende hin knapper und bruchstückhafter.
        # Letztes überliefertes Restsignal kurz vor dem Ende
        CQ ... CQ ...
        # Laut späterer britischer Untersuchung hörte die Virginian gegen 2:17 Uhr
        # nur noch ein abgehacktes "CQ", dann brach das Signal plötzlich ab.
    - label: Klassische Verbindung
      value: |-
        # Anruf aus Dresden
        SM5ABC DE Y41ZL TNX RST 559 QTH DRESDEN
        # Stationsdaten
        PWR 100W ANT DIPOLE WX FINE
        # Abschluss
        KN
    - label: Allgemeiner CQ-Anruf
      value: |-
        # Allgemeiner Rundruf
        CQ CQ DE DL1XYZ K
        # Freundlicher Abschluss
        73
    - label: CQ-Anruf an DL
      value: |-
        # Rundruf an Deutschland
        CQ DL
        # Kurzer Abschluss
        73
    - label: Technik und Bedingungen
      value: |-
        # Technische Daten
        CALL RST 599 RIG FT-857
        # Aufbau und Bedingungen
        ANT VERTICAL CONDX GOOD
        # Abschluss
        TNX
    - label: Mit geheimem Payload
      value: |-
        # Verbindungsaufbau
        SM5ABC DE Y41ZL QTH DRESDEN
        # Versteckter Test
        ALPHA OMEGA
        # Abschluss
        KN
