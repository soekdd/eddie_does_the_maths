bookPart:
  introText: "Dieser Abschnitt fehlt noch in der Buchvorlage. Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua. At vero eos et accusam et justo duo dolores et ea rebum. Stet clita kasd gubergren, no sea takimata sanctus est Lorem ipsum dolor sit amet. Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua. At vero eos et accusam et justo duo dolores et ea rebum. Stet clita kasd gubergren, no sea takimata sanctus est Lorem ipsum dolor sit amet."
description:
  figureTitle: Morsebaum
  tree:
    ariaLabel: Morsebaum mit zeitbasierter vertikaler Skala
    timeAxis: Zeit
    rootLabel: Start
    legendTitle: Legende
    legendEdge: Verbindung
    legendTerminal: Knoten mit Zeichen
    legendIntermediate: Zwischenknoten
    tooltipCode: Morsecode
    tooltipDuration: Dauer
    durationSingle: "{count} Zeiteinheit"
    durationPlural: "{count} Zeiteinheiten"
    letterTitle: "Buchstabe {value}"
    intermediateTitle: Zwischenknoten
  sections:
    baumgedanke:
      title: "1. Der Baumgedanke"
      p1: "Das internationale Morsealphabet kann man sich als <strong>binären Baum</strong> vorstellen."
      choices:
        - label: Punkt
          symbol: "."
        - label: Strich
          symbol: "-"
      p2: "Bei jedem Schritt gibt es genau zwei Möglichkeiten. Man startet an der Wurzel und läuft dann für jedes weitere Zeichen einen Schritt tiefer in den Baum."
      rootIntro: "Ganz nah an der Wurzel stehen sehr kurze Zeichen:"
      rootExamples:
        - letter: E
          code: "."
        - letter: T
          code: "-"
      levelIntro: "Eine Ebene tiefer liegen zum Beispiel:"
      levelExamples:
        - letter: I
          code: ".."
        - letter: A
          code: ".-"
        - letter: N
          code: "-."
        - letter: M
          code: "--"
      p3: "Das ist schon die erste mathematische Idee:"
      lead1: Ein Morsezeichen ist ein Pfad in einem binären Baum.
      p4: "Häufige Buchstaben bekommen meist kurze Pfade, seltenere längere. Das ist dieselbe Grundidee wie bei vielen späteren Verfahren der Informationstheorie:"
      lead2: Häufiges kurz, seltenes lang.
    tiefe:
      title: "2. Aber: Nicht nur die Tiefe zählt"
      p1: "Man könnte denken:"
      lead: Je näher ein Buchstabe an der Wurzel liegt, desto schneller ist er.
      p2: "Das stimmt <strong>nur ungefähr</strong>, denn im Morsealphabet sind die beiden Äste nicht gleich teuer:"
      costs:
        - label: ein Punkt dauert
          value: 1 Zeiteinheit
        - label: ein Strich dauert
          value: 3 Zeiteinheiten
        - label: zwischen zwei Zeichen innerhalb eines Buchstabens liegt noch eine Pause von
          value: 1 Zeiteinheit
      p3: "Darum zählt mathematisch nicht bloß die <strong>Tiefe im Baum</strong>, sondern die <strong>gesamte Sendedauer</strong>."
    zeitformel:
      title: "3. Die Zeitformel"
      p1: "Hat ein Buchstabe"
      parts:
        - symbol: d
          text: Punkte
        - symbol: s
          text: Striche
        - symbol: k = d+s
          text: Elemente insgesamt
      p2: "dann ist seine Dauer innerhalb des Buchstabens:"
      p3: "Denn:"
      reasons:
        - jeder Punkt kostet 1
        - jeder Strich kostet 3
        - zwischen den k Elementen liegen k-1 Binnenpausen
    beispiele:
      title: "4. Beispiele"
      cards:
        - key: e
          title: E
          code: "."
          facts:
            - "Punkte: d=1"
            - "Striche: s=0"
            - "Elemente: k=1"
        - key: t
          title: T
          code: "-"
          facts:
            - "Punkte: d=0"
            - "Striche: s=1"
            - "Elemente: k=1"
        - key: i
          title: I
          code: ".."
          facts:
            - "Punkte: d=2"
            - "Striche: s=0"
            - "Elemente: k=2"
        - key: a
          title: A
          code: ".-"
          facts:
            - "Punkte: d=1"
            - "Striche: s=1"
            - "Elemente: k=2"
        - key: s
          title: S
          code: "..."
          facts:
            - "Punkte: d=3"
            - "Striche: s=0"
            - "Elemente: k=3"
    ueberraschung:
      title: "5. Was daran überraschend ist"
      p1: "Jetzt sieht man sofort:"
      items:
        - "<code>T</code> liegt sehr nah an der Wurzel, ist aber mit Dauer 3 <strong>nicht schneller</strong> als <code>I</code>."
        - "<code>S</code> liegt tiefer im Baum als <code>A</code>, braucht aber <strong>gleich viel Zeit</strong>."
      p2: "Also gilt:"
      lead1: Die Tiefe des Knotens allein beschreibt Morse nicht gut genug.
      p3: "Die eigentlich passende mathematische Größe ist:"
      lead2: gewichtete Pfadlänge in der Zeit
    optimierung:
      title: "6. Der eigentliche Optimierungsgedanke"
      p1: "Jetzt wird es richtig mathematisch. Angenommen, ein Buchstabe <span class=\"mono\">i</span> kommt mit Wahrscheinlichkeit <span class=\"mono\">p_i</span> vor."
      p2: "Dann ist die mittlere Sendezeit eines Alphabets:"
      p3: "Das ist ein <strong>Erwartungswert</strong>."
      goals:
        - häufige Buchstaben sollten wenig Zeit kosten
        - seltene dürfen länger dauern
      p4: "Genau hier steckt dieselbe Logik wie später bei <strong>optimalen Codes</strong> in der Informationstheorie."
    huffman:
      title: "7. Nähe zu Huffman-Codes"
      p1: "Morse erinnert stark an einen <strong>Huffman-Code</strong>:"
      similarities:
        - häufige Zeichen bekommen kurze Codes
        - seltene Zeichen längere
      p2: "Aber es gibt einen wichtigen Unterschied. Beim Morsealphabet ist zum Beispiel <code>.</code> schon ein ganzer Buchstabe und zugleich der Anfang weiterer Zeichen:"
      prefixExamples:
        - letter: E
          code: "."
        - letter: I
          code: ".."
        - letter: A
          code: ".-"
      cards:
        huffman:
          title: Huffman-Code
          text: "Ein Huffman-Code ist ein <strong>Präfixcode</strong>. Kein Codewort darf der Anfang eines anderen sein."
        morse:
          title: Morse
          text: "Beim Morsealphabet ist das anders. Ein kurzer Code kann bereits vollständig sein und gleichzeitig in längeren Zeichen weitergehen."
      p3: "Darum funktioniert Morse nur, weil die <strong>Pausen</strong> mit zur Information gehören."
      lead: Nicht nur Punkte und Striche werden gelesen, sondern auch die Trennung zwischen Buchstaben.
    menschenCode:
      title: "8. Warum Morse trotzdem so gut funktioniert"
      p1: "Morse ist kein streng mathematisch perfekter Code, sondern ein sehr kluger <strong>Menschen-Code</strong>."
      strengths:
        - rhythmisch gut hörbar
        - mit der Hand gut gebbar
        - unter Störungen oft noch erkennbar
        - für häufige Buchstaben ziemlich sparsam
      p2: "Das Morsealphabet ist also keine reine Optimallösung auf dem Papier, sondern ein Kompromiss aus:"
      compromises:
        - mathematischer Effizienz
        - Hörbarkeit
        - Merkbarkeit
        - praktischer Funkerfahrung
    pointe:
      title: "9. Die schöne mathematische Pointe"
      p1: "Das Faszinierende ist:"
      lead1: Morse sieht aus wie Sprache, klingt wie Rhythmus und lässt sich gleichzeitig mit Baumstrukturen, Gewichtungen und Erwartungswerten beschreiben.
      p2: "Oder noch kürzer:"
      lead2: Das Morsealphabet ist ein historischer Code, in dem schon viel von der späteren Informationstheorie steckt.
    eddie:
      title: "10. Eddies Schluss"
      subtitle: Was Eddie plötzlich sieht
      p1: "Als ich das begreife, sehe ich plötzlich nicht mehr nur Punkte und Striche."
      p2: "Ich sehe einen Baum. Ganz oben stehen die Buchstaben, die man dauernd braucht. Weiter unten verstecken sich die seltenen."
      p3: "Aber entscheidend ist nicht nur, <strong>wie tief</strong> ein Buchstabe liegt, sondern auch, <strong>wie teuer der Weg dorthin in der Zeit ist</strong>."
      p4: "Das ist das eigentlich Schöne daran: Morse ist nicht bloß eine Funkersprache. Es ist ein kleines Stück Mathematik, das man hören kann."
encoder:
  editorTitle: Natürliche Sprache
  editorHint: Klicke Sprachbausteine in den Editor oder schreibe eigene Aussagen. Trenne mehrere Aussagen mit |.
  examplesLabel: Beispiele
  placeholder: "Y41ZL ruft SM5ABC | danke | Standort: Dresden"
  sampleSequence: "Y41ZL ruft SM5ABC | danke | Anruf | Signalbericht 559 | Standort: DRESDEN | Sendeleistung: 100W | Antenne: DIPOLE | Wetter: FINE | Nur die angesprochene Station soll antworten"
  examples:
    - label: Der seltsame Ruf aus der DDR
      value: |-
        # Ruf von der TU-Dresden
        Allgemeiner Anruf an SM | Allgemeiner Anruf an SM | von / hier ist | Rufzeichen Y41ZL | Rufzeichen Y41ZL | kommen / Antwort erbeten
        Allgemeiner Anruf an OH | Allgemeiner Anruf an OH | von / hier ist | Rufzeichen Y41ZL | Rufzeichen Y41ZL | kommen / Antwort erbeten
        # Antwort aus Schweden
        SM5ABC ruft Y41ZL | kommen / Antwort erbeten
        # TU Dresden fragt nach Eddie
        Y41ZL ruft SM5ABC | RST 559: Lesbarkeit mittel lesbar, Signalstärke ziemlich gut, Ton vollkommen rein | Standort: QER? | Standort: DRESDEN | kommen / Antwort erbeten
        # Schweden antwortet
        SM5ABC ruft Y41ZL | Roger / verstanden / empfangen | RST 579: Lesbarkeit mittel lesbar, Signalstärke kräftig, Ton vollkommen rein | Standort / Aufenthaltsort der Station | Nummer oder nahe / mehrdeutig: NYKOPING
        QER? | SRI | NO | kopiere / verstanden | Eddie Riedel | kommen / Antwort erbeten
        # TU Dresden startet mit dem Payload DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ 
        Y41ZL ruft SM5ABC | D | Funkgerät / Ausrüstung: JENA85 | NXA | Sendeleistung: 10W | G
        E | Antenne: DIPOLE | HT | Wetter: FINE | WN
        Störung durch andere Stationen | nichts / keine | AUJ | atmosphärische Störungen / Rauschen | Wert 2 | U | Schwund / Fading | wenig / leicht | T
        CN | Temperatur: 24 | N | Ausbreitungsbedingungen: FAIR | FJ
        B | danke | X | für | TLJ | Funkverbindung / Kontakt | nur die angesprochene Station soll antworten
        # Schwede merkt, dass da etwas nicht stimmt
        SM5ABC ruft Y41ZL | Roger / verstanden / empfangen | sehr gut / ausgezeichnet | kopiere / verstanden | MOST
        SRI | SOME | LETTERS | MISSED
        Eddie Riedel | STILL | NOT | UNDERSTOOD | kommen / Antwort erbeten
        # TU Dresden bleibt betont locker
        Y41ZL ruft SM5ABC | Roger / verstanden / empfangen | Roger / verstanden / empfangen | danke
        nichts / keine | IMP
        danke | für | PATIENCE
        Funkverbindung / Kontakt | sehr gut / ausgezeichnet | nur die angesprochene Station soll antworten
        # Schwede gibt am Ende offen zu, dass ihm nicht alles klar war
        SM5ABC ruft Y41ZL | Roger / verstanden / empfangen
        danke | Funkverbindung / Kontakt
        SRI | NOT | kopiere / verstanden | ALL
        beste Grüße | kommen / Antwort erbeten
        # Dresdner bedankt sich entspannt und macht zu
        Y41ZL ruft SM5ABC | Roger / verstanden / empfangen | danke | danke
        NO | PROB
        danke | für | Anruf
        beste Grüße | Ende der Verbindung
        # Schweden verabschiedet sich
        SM5ABC ruft Y41ZL | beste Grüße | Ende der Verbindung
    - label: Eddies erste Antwort über Helsinki
      value: |-
        # Direkter Anruf aus Helsinki an die Dresdner Station.
        # Kein CQ mehr, weil der Finne Y41ZL gezielt erreichen will.
        OH2ABC ruft Y41ZL | Rufzeichen OH2ABC | kommen / Antwort erbeten
        # Dresden antwortet knapp und normal.
        Y41ZL ruft OH2ABC | RST 559: Lesbarkeit mittel lesbar, Signalstärke ziemlich gut, Ton vollkommen rein | Standort: DRESDEN | DRESDEN | kommen / Antwort erbeten
        # Der Finne meldet Helsinki zurück und setzt früh das verabredete Signal.
        # "QTH QER" fällt absichtlich auf: Die Dresdner sollen kurz stutzen.
        OH2ABC ruft Y41ZL | Roger / verstanden / empfangen | RST 579: Lesbarkeit mittel lesbar, Signalstärke kräftig, Ton vollkommen rein | Standort: HELSINKI | Standort / Aufenthaltsort der Station | Eddie Riedel | kommen / Antwort erbeten
        # Dresden stolpert hörbar über das seltsame QER, bleibt aber höflich.
        Y41ZL ruft OH2ABC | Roger / verstanden / empfangen
        sorry / Entschuldigung | QER? | kopiere / verstanden | Standort: HELSINKIVK
        # Der Finne geht locker darüber hinweg und schiebt die eigentliche Nachricht direkt nach.
        # Nicht zerlegt, nicht in Alltagsfloskeln versteckt, sondern blockhaft.
        OH2ABC ruft Y41ZL | Roger / verstanden / empfangen | Standort / Aufenthaltsort der Station | Eddie Riedel | GANUBFHN | kommen / Antwort erbeten
        # In Dresden merkt man: Das ist kein normales Funkstück.
        # Gerade deshalb reagieren sie zurückhaltend und nicht zu glatt.
        Y41ZL ruft OH2ABC | Roger / verstanden / empfangen | sorry / Entschuldigung | NOT | ALL | kopiere / verstanden | Nachricht | STRANGE | danke | kommen / Antwort erbeten
        # Der Finne tut so, als sei das nichts Besonderes.
        OH2ABC ruft Y41ZL | Roger / verstanden / empfangen | Roger / verstanden / empfangen | danke | beste Grüße | kommen / Antwort erbeten
        # Die Dresdner brechen betont korrekt und unauffällig ab.
        Y41ZL ruft OH2ABC | Roger / verstanden / empfangen | danke | beste Grüße | Ende der Verbindung
        # Formeller Schluss aus Helsinki.
        OH2ABC ruft Y41ZL | beste Grüße | Ende der Verbindung           
    - label: Klassische Verbindung
      value: |-
        # Anruf aus Dresden
        Y41ZL ruft SM5ABC | danke | Signalbericht 559 | Standort: DRESDEN
        # Stationsdaten
