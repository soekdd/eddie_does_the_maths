bookPart:
  introText: "Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua. At vero eos et accusam et justo duo dolores et ea rebum. Stet clita kasd gubergren, no sea takimata sanctus est Lorem ipsum dolor sit amet. Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam voluptua. At vero eos et accusam et justo duo dolores et ea rebum. Stet clita kasd gubergren, no sea takimata sanctus est Lorem ipsum dolor sit amet."
description:
  formulas:
    example7Value: "42{,}9"
    example14Value: "21{,}4"
    band40Label: 40-m-Band
    band20Label: 20-m-Band
  sections:
    frequenzen:
      title: Frequenzen, Bänder und Zahlenfamilien
      p1: "Als ich die Zahlen am Funkgerät sah, wirkten sie erst zufällig: 3,5&nbsp;MHz. 7&nbsp;MHz. 14&nbsp;MHz. 21&nbsp;MHz. 28&nbsp;MHz. Aber dann war klar: Das ist keine lose Sammlung. Das ist fast eine Familie."
      lead: "Die Grundidee ist einfach: Frequenz und Wellenlänge beschreiben dieselbe Sache nur in zwei verschiedenen Sprachen."
      p2: "Weil elektromagnetische Wellen sich fast mit Lichtgeschwindigkeit ausbreiten, kann man im Funk mit einer praktischen Näherung rechnen:"
      p3: "<strong>Wellenlänge in Metern</strong> ist ungefähr <strong>300 geteilt durch die Frequenz in Megahertz</strong>."
    bandnamen:
      title: "1. Warum heißen die Bänder so?"
      p1: "Der Bandname ist meistens nur die <strong>gerundete Wellenlänge</strong>. Darum ist das 7-MHz-Band das „40-Meter-Band“, obwohl die Rechnung genauer knapp 42,9 Meter ergibt."
      p2: "Funker reden also mal in <strong>MHz</strong> und mal in <strong>Metern</strong>. Gemeint ist dasselbe Band, nur aus zwei Blickwinkeln."
    zahlenfamilie:
      title: "2. Die alte Zahlenfamilie"
      p1: "Die klassische Kurzwellenfamilie sieht fast wie eine Verdopplungsreihe aus:"
      chips:
        - 3,5 MHz → 80 m
        - 7 MHz → 40 m
        - 14 MHz → 20 m
        - 21 MHz → 15 m
        - 28 MHz → 10 m
      p2: Verdoppelt man die Frequenz, halbiert sich die Wellenlänge. Genau deshalb fühlen sich 80&nbsp;m, 40&nbsp;m, 20&nbsp;m und 10&nbsp;m wie Verwandte an. 15&nbsp;m passt nicht perfekt in das alte Verdopplungsschema, ergänzt die Familie aber sehr sinnvoll.
    banduebersicht:
      title: "3. Die wichtigsten Bänder auf einen Blick"
      table:
        band: Band
        frequency: Typische Mittenfrequenz
        lambda: Rechnerische Wellenlänge
        note: Gedanke dahinter
      bands:
        - name: 80 m
          frequency: 3,5 MHz
          lambda: "≈ 85,7 m"
          note: Tiefe Kurzwelle, klassisches Nacht- und Nahbereichsband
        - name: 40 m
          frequency: 7 MHz
          lambda: "≈ 42,9 m"
          note: Sehr vielseitig, guter Übergang zwischen Nähe und Weite
        - name: 30 m
          frequency: 10,1 MHz
          lambda: "≈ 29,7 m"
          note: Brücke zwischen 40 m und 20 m
        - name: 20 m
          frequency: 14 MHz
          lambda: "≈ 21,4 m"
          note: Das klassische internationale DX-Band
        - name: 17 m
          frequency: 18,068 MHz
          lambda: "≈ 16,6 m"
          note: Ruhigere Alternative zu 20 m
        - name: 15 m
          frequency: 21 MHz
          lambda: "≈ 14,3 m"
          note: Stark bei Tageslicht und guter Sonnenaktivität
        - name: 12 m
          frequency: 24,89 MHz
          lambda: "≈ 12,1 m"
          note: Ergänzt die hohen Kurzwellenbänder
        - name: 10 m
          frequency: 28 MHz
          lambda: "≈ 10,7 m"
          note: Hohe Kurzwelle, spannend bei starker Öffnung
    bandlogik:
      title: "4. Warum hat man die Bänder so gewählt?"
      p1: "Historisch wollte man nicht bloß ein paar willkürliche Inseln im Spektrum, sondern <strong>brauchbare, gut merkbare und technisch unterschiedliche Bereiche</strong>. Die alte Kernfamilie ist deshalb so elegant, weil man mit verwandten Zahlen sehr verschiedene Funkwelten bekommt."
      cards:
        - title: a) Leicht zu merken
          text: 3,5 → 7 → 14 → 28 ist fast schon Musik. Wer das Muster kennt, versteht sofort die Bandnamen.
        - title: b) Unterschiedliche Ausbreitung
          text: Tiefe Bänder funktionieren anders als hohe. So bekommt man für Tag, Nacht, Nähe und Weite verschiedene Werkzeuge.
        - title: c) Praktisch für Antennen
          text: Mit der Wellenlänge ändert sich auch die Größe sinnvoller Antennen. Das macht die Unterschiede nicht nur hörbar, sondern buchstäblich messbar.
    weitereBaender:
      title: "5. Und warum kamen später noch weitere Bänder dazu?"
      p1: "Weil die alte Familie schön ist, aber nicht alle Lücken füllt. Manche späteren Bänder sind wie Brücken oder Ausweichstreifen:"
      items:
        - label: 30 m
          text: Liegt zwischen 40 m und 20 m und ist deshalb ein echtes Zwischenband.
        - label: 17 m
          text: Dient oft als ruhigeres Gegenstück zum stark genutzten 20-m-Band.
        - label: 12 m
          text: Ergänzt 15 m und 10 m in einem Bereich, der besonders tagsüber spannend sein kann.
      p2: Die späteren Ergänzungen zerstören also das alte System nicht. Sie machen es nur feiner und alltagstauglicher.
    schluss:
      title: Schluss
      quote: Erst dachte ich, Funker geben ihren Bändern bloß Namen. Dann sah ich die Reihe. Nicht Chaos. Nicht Gewohnheit. Fast eine Zahlenfamilie. Und plötzlich wirkte das Unsichtbare, als hätte es jemand sauber sortiert.
encoder:
  editorTitle: Natürliche Sprache
  editorHint: Klicke Sprachbausteine in den Editor oder schreibe eigene Aussagen. Trenne mehrere Aussagen mit |.
  examplesLabel: Beispiele
  placeholder: "Y41ZL ruft SM5ABC | danke | Standort: Dresden"
  sampleSequence: "Y41ZL ruft SM5ABC | danke | Anruf | Signalbericht 559 | Standort: DRESDEN | Sendeleistung: 100W | Antenne: DIPOLE | Wetter: FINE | Nur die angesprochene Station soll antworten"
  examples:
    - label: Der seltsame Ruf aus der DDR
      value: |-
        # Ruf von der TU-Dresden
        Allgemeiner Anruf an SM | Allgemeiner Anruf an SM | von / hier ist | Rufzeichen Y41ZL | Rufzeichen Y41ZL | kommen / Antwort erbeten
        Allgemeiner Anruf an OH | Allgemeiner Anruf an OH | von / hier ist | Rufzeichen Y41ZL | Rufzeichen Y41ZL | kommen / Antwort erbeten
        # Antwort aus Schweden
        SM5ABC ruft Y41ZL | kommen / Antwort erbeten
        # TU Dresden fragt nach Eddie
        Y41ZL ruft SM5ABC | RST 559: Lesbarkeit mittel lesbar, Signalstärke ziemlich gut, Ton vollkommen rein | Standort: QER? | Standort: DRESDEN | kommen / Antwort erbeten
        # Schweden antwortet
        SM5ABC ruft Y41ZL | Roger / verstanden / empfangen | RST 579: Lesbarkeit mittel lesbar, Signalstärke kräftig, Ton vollkommen rein | Standort / Aufenthaltsort der Station | Nummer oder nahe / mehrdeutig: NYKOPING
        QER? | SRI | NO | kopiere / verstanden | Eddie Riedel | kommen / Antwort erbeten
        # TU Dresden startet mit dem Payload DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ 
        Y41ZL ruft SM5ABC | D | Funkgerät / Ausrüstung: JENA85 | NXA | Sendeleistung: 10W | G
        E | Antenne: DIPOLE | HT | Wetter: FINE | WN
        Störung durch andere Stationen | nichts / keine | AUJ | atmosphärische Störungen / Rauschen | Wert 2 | U | Schwund / Fading | wenig / leicht | T
        CN | Temperatur: 24 | N | Ausbreitungsbedingungen: FAIR | FJ
        B | danke | X | für | TLJ | Funkverbindung / Kontakt | nur die angesprochene Station soll antworten
        # Schwede merkt, dass da etwas nicht stimmt
        SM5ABC ruft Y41ZL | Roger / verstanden / empfangen | sehr gut / ausgezeichnet | kopiere / verstanden | MOST
        SRI | SOME | LETTERS | MISSED
        Eddie Riedel | STILL | NOT | UNDERSTOOD | kommen / Antwort erbeten
        # TU Dresden bleibt betont locker
        Y41ZL ruft SM5ABC | Roger / verstanden / empfangen | Roger / verstanden / empfangen | danke
        nichts / keine | IMP
        danke | für | PATIENCE
        Funkverbindung / Kontakt | sehr gut / ausgezeichnet | nur die angesprochene Station soll antworten
        # Schwede gibt am Ende offen zu, dass ihm nicht alles klar war
        SM5ABC ruft Y41ZL | Roger / verstanden / empfangen
        danke | Funkverbindung / Kontakt
        SRI | NOT | kopiere / verstanden | ALL
        beste Grüße | kommen / Antwort erbeten
        # Dresdner bedankt sich entspannt und macht zu
        Y41ZL ruft SM5ABC | Roger / verstanden / empfangen | danke | danke
        NO | PROB
        danke | für | Anruf
        beste Grüße | Ende der Verbindung
        # Schweden verabschiedet sich
        SM5ABC ruft Y41ZL | beste Grüße | Ende der Verbindung
    - label: Klassische Verbindung
      value: |-
        # Anruf aus Dresden
        Y41ZL ruft SM5ABC | danke | Signalbericht 559 | Standort: DRESDEN
        # Stationsdaten
        Sendeleistung: 100W | Antenne: DIPOLE | Wetter: FINE
        # Abschluss
        Nur die angesprochene Station soll antworten
    - label: Allgemeiner CQ-Anruf
      value: |-
        # Allgemeiner Rundruf
        Allgemeiner Anruf
        # Freundlicher Abschluss
        beste Grüße
    - label: CQ-Anruf an DL
      value: |-
        # Rundruf an Deutschland
        Allgemeiner Anruf an DL
        # Kurzer Abschluss
        beste Grüße
    - label: Eddie auf Sendung
      value: |-
        # Eddie meldet sich aus Dresden
        Eddie Riedel | Standort: DRESDEN | Wetter: FINE
        # Eddie grüßt in die Runde
        beste Grüße
    - label: Technik und Bedingungen
      value: |-
        # Technische Daten
        Anruf | Signalbericht 599 | Funkgerät: FT-857
        # Aufbau und Bedingungen
        Antenne: VERTICAL | Ausbreitungsbedingungen: GOOD
        # Abschluss
        danke
