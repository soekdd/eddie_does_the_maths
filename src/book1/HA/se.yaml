description:
  formulas:
    example7Value: "42.9"
    example14Value: "21.4"
    band40Label: "40-metersbandet"
    band20Label: "20-metersbandet"
  sections:
    frequenzen:
      title: "Frekvenser, band och talfamiljer"
      p1: "När jag först såg siffrorna på radion verkade de slumpmässiga: 3.5&nbsp;MHz. 7&nbsp;MHz. 14&nbsp;MHz. 21&nbsp;MHz. 28&nbsp;MHz. Men sedan blev det tydligt: det här är inte en lös samling. Det är nästan en familj."
      lead: "Grundidén är enkel. Frekvens och våglängd beskriver samma sak, bara på två olika språk."
      p2: "Eftersom elektromagnetiska vågor färdas nästan med ljusets hastighet kan radioamatörer använda en praktisk approximation:"
      p3: "<strong>Våglängden i meter</strong> är ungefär <strong>300 dividerat med frekvensen i megahertz</strong>."
    bandnamen:
      title: "1. Varför heter banden så?"
      p1: "Ett bandnamn är vanligtvis bara den <strong>avrundade våglängden</strong>. Därför kallas 7 MHz-bandet för ”40-metersbandet”, även om beräkningen mer exakt ger ungefär 42.9 meter."
      p2: "Därför talar amatörer ibland i <strong>MHz</strong> och ibland i <strong>meter</strong>. Det är samma band, bara sett ur två olika vinklar."
    zahlenfamilie:
      title: "2. Den klassiska talfamiljen"
      p1: "Den klassiska kortvågsfamiljen ser nästan ut som en fördubblingsserie:"
      chips:
        - "3.5 MHz → 80 m"
        - "7 MHz → 40 m"
        - "14 MHz → 20 m"
        - "21 MHz → 15 m"
        - "28 MHz → 10 m"
      p2: "Fördubblar man frekvensen halveras våglängden. Det är precis därför 80&nbsp;m, 40&nbsp;m, 20&nbsp;m och 10&nbsp;m känns besläktade. 15&nbsp;m passar inte perfekt in i det gamla fördubblingsmönstret, men kompletterar familjen mycket väl."
    banduebersicht:
      title: "3. De viktigaste banden i överblick"
      table:
        band: "Band"
        frequency: "Typisk mittfrekvens"
        lambda: "Beräknad våglängd"
        note: "Huvudidé"
      bands:
        - name: "80 m"
          frequency: "3.5 MHz"
          lambda: "≈ 85.7 m"
          note: "Låg kortvåg, klassiskt natt- och regionband"
        - name: "40 m"
          frequency: "7 MHz"
          lambda: "≈ 42.9 m"
          note: "Mycket mångsidigt, en bra brygga mellan nära och långt"
        - name: "30 m"
          frequency: "10.1 MHz"
          lambda: "≈ 29.7 m"
          note: "En brygga mellan 40 m och 20 m"
        - name: "20 m"
          frequency: "14 MHz"
          lambda: "≈ 21.4 m"
          note: "Det klassiska internationella DX-bandet"
        - name: "17 m"
          frequency: "18.068 MHz"
          lambda: "≈ 16.6 m"
          note: "Ett lugnare alternativ till 20 m"
        - name: "15 m"
          frequency: "21 MHz"
          lambda: "≈ 14.3 m"
          note: "Starkt i dagsljus och vid god solaktivitet"
        - name: "12 m"
          frequency: "24.89 MHz"
          lambda: "≈ 12.1 m"
          note: "Kompletterar de högre kortvågsbanden"
        - name: "10 m"
          frequency: "28 MHz"
          lambda: "≈ 10.7 m"
          note: "Hög kortvåg, spännande vid starka öppningar"
    bandlogik:
      title: "4. Varför valdes banden så här?"
      p1: "Historiskt ville man inte bara ha några godtyckliga öar i spektrumet. Man ville ha <strong>användbara, minnesvänliga och tekniskt tydligt olika områden</strong>. Den gamla kärnfamiljen är så elegant därför att besläktade tal skapar mycket olika radiovärldar."
      cards:
        - title: "a) Lätta att minnas"
          text: "3.5 → 7 → 14 → 28 låter nästan musikaliskt. När man väl känner igen mönstret blir bandnamnen genast begripliga."
        - title: "b) Olika konditioner"
          text: "Låga band beter sig annorlunda än höga. Det ger olika verktyg för dag, natt, lokala kontakter och långdistans."
        - title: "c) Praktiskt för antenner"
          text: "När våglängden förändras ändras också storleken på användbara antenner. Därför är skillnaderna inte bara hörbara, utan bokstavligen mätbara."
    weitereBaender:
      title: "5. Och varför lades fler band till senare?"
      p1: "Därför att den gamla familjen är elegant, men inte fyller varje lucka. Några senare band fungerar som bryggor eller sidospår:"
      items:
        - label: "30 m"
          text: "Det ligger mellan 40 m och 20 m och är därför verkligen ett mellanband."
        - label: "17 m"
          text: "Det fungerar ofta som en lugnare motsvarighet till det hårt använda 20 m-bandet."
        - label: "12 m"
          text: "Det kompletterar 15 m och 10 m i ett område som kan vara särskilt intressant under dagen."
      p2: "Dessa senare tillägg förstör inte det gamla systemet. De gör det bara finare och mer användbart i praktiken."
    schluss:
      title: "Slutsats"
      quote: "Först trodde jag att radioamatörerna bara gav sina band namn. Sedan såg jag mönstret. Inte kaos. Inte vana. Nästan en familj av tal. Och plötsligt kändes det osynliga som om någon hade sorterat det prydligt."

encoder:
  editorTitle: "Klarspråk"
  editorHint: "Klicka in fraser i editorn eller skriv egna formuleringar. Separera flera delar med |."
  examplesLabel: "Exempel"
  placeholder: "Y41ZL anropar SM5ABC | tack | QTH: Dresden"
  sampleSequence: "Y41ZL anropar SM5ABC | tack | anrop | signalrapport 559 | QTH: DRESDEN | PWR: 100W | ANT: DIPOLE | WX: FINE | endast anropad station svarar"
  examples:
    - label: "Det märkliga anropet från Östtyskland"
      value: |-
        # Anrop från TU Dresden
        General call to SM | General call to SM | from / this is | callsign Y41ZL | callsign Y41ZL | go ahead / response invited
        General call to OH | General call to OH | from / this is | callsign Y41ZL | callsign Y41ZL | go ahead / response invited
        # Svar från Sverige
        SM5ABC calls Y41ZL | go ahead / response invited
        # TU Dresden frågar efter Eddie
        Y41ZL calls SM5ABC | RST 559: readability perfectly readable, signal strength fairly good, tone perfectly pure tone | Location: QER? | Location: DRESDEN | go ahead / response invited
        # Sverige svarar
        SM5ABC calls Y41ZL | roger / copied | RST 579: readability perfectly readable, signal strength moderately strong, tone perfectly pure tone | station location / operating position | number or near / ambiguous: NYKOPING
        QER? | SRI | NO | copy / understood | Eddie Riedel | go ahead / response invited
        # TU Dresden börjar med nyttolasten DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ
        Y41ZL calls SM5ABC | D | radio / equipment: JENA85 | NXA | Transmit power: 10W | G
        E | Antenna: DIPOLE | HT | Weather: FINE | WN
        interference from other stations | nothing / none | AUJ | static / atmospheric noise | value 2 | U | fading | little / small | T
        CN | Temperature: 24 | N | Propagation: FAIR | FJ
        B | thanks | X | for | TLJ | radio contact / QSO | only the addressed station should answer
        # Svensken märker att något inte stämmer
        SM5ABC calls Y41ZL | roger / copied | very good | copy / understood | MOST
        SRI | SOME | LETTERS | MISSED
        Eddie Riedel | STILL | NOT | UNDERSTOOD | go ahead / response invited
        # TU Dresden håller sig medvetet avslappnad
        Y41ZL calls SM5ABC | roger / copied | roger / copied | thanks
        nothing / none | IMP
        thanks | for | PATIENCE
        radio contact / QSO | very good | only the addressed station should answer
        # Till slut erkänner svensken öppet att allt inte var tydligt
        SM5ABC calls Y41ZL | roger / copied
        thanks | radio contact / QSO
        SRI | NOT | copy / understood | ALL
        best regards | go ahead / response invited
        # Stationen i Dresden tackar lugnt och loggar ut
        Y41ZL calls SM5ABC | roger / copied | thank you | thank you
        NO | PROB
        thanks | for | call
        best regards | end of contact
        # Sverige säger adjö
        SM5ABC calls Y41ZL | best regards | end of contact
    - label: "Eddies första svar via Helsingfors"
      value: |-
        # Direktanrop från Helsingfors till stationen i Dresden.
        # Ingen CQ den här gången, eftersom finländaren vill nå Y41ZL direkt.
        OH2ABC calls Y41ZL | callsign OH2ABC | go ahead / response invited
        # Dresden svarar kort och normalt.
        Y41ZL calls OH2ABC | RST 559: readability perfectly readable, signal strength fairly good, tone perfectly pure tone | Location: DRESDEN | DRESDEN | go ahead / response invited
        # Finländaren rapporterar tillbaka från Helsingfors och lägger in den överenskomna signalen tidigt.
        # "QTH QER" är tänkt att sticka ut: människorna i Dresden ska tveka ett ögonblick.
        OH2ABC calls Y41ZL | roger / copied | RST 579: readability perfectly readable, signal strength moderately strong, tone perfectly pure tone | Location: HELSINKI | station location / operating position | Eddie Riedel | go ahead / response invited
        # Dresden snubblar hörbart över det märkliga QER, men förblir artigt.
        Y41ZL calls OH2ABC | roger / copied
        sorry | QER? | copy / understood | Location: HELSINKIvK
        # Finländaren viftar bort det och trycker genast fram det verkliga meddelandet därefter.
        # Inte uppdelat, inte gömt i vardagliga fraser, utan sänt som ett enda block.
        OH2ABC calls Y41ZL | roger / copied | station location / operating position | Eddie Riedel | GANUBFHN | go ahead / response invited
        # I Dresden märker man: det här är inte ett normalt radioutbyte.
        # Just därför svarar de försiktigt och inte alltför smidigt.
        Y41ZL calls OH2ABC | roger / copied | sorry | NOT | ALL | copy / understood | message | STRANGE | thanks | go ahead / response invited
        # Finländaren låtsas att det inte är något ovanligt.
        OH2ABC calls Y41ZL | roger / copied | roger / copied | thanks | best regards | go ahead / response invited
        # Stationen i Dresden avslutar utbytet med avsiktlig korrekthet och utan väsen.
        Y41ZL calls OH2ABC | roger / copied | thank you | best regards | end of contact
        # Formell avslutning från Helsingfors.
        OH2ABC calls Y41ZL | best regards | end of contact
    - label: "Klassisk kontakt"
      value: |-
        # Anrop från Dresden
        Y41ZL calls SM5ABC | thanks | signal report 559 | Location: DRESDEN
        # Stationsdata
        Transmit power: 100W | Antenna: DIPOLE | Weather: FINE
        # Avslutning
        only the addressed station should answer
    - label: "Allmänt CQ-anrop"
      value: |-
        # Allmänt anrop
        General call
        # Vänlig avslutning
        best regards
    - label: "CQ-anrop till DL"
      value: |-
        # Anrop till Tyskland
        General call to DL
        # Kort avslutning
        best regards
    - label: "Rigg och konditioner"
      value: |-
        # Tekniska detaljer
        call | signal report 599 | Radio: FT-857
        # Rigg och konditioner
        Antenna: VERTICAL | Propagation: GOOD
        # Avslutning
        thanks
