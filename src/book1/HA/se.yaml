decoder:
  editorTitle: "Radiotext"
  editorHint: "Klicka in koder i editorn eller skriv din egen sekvens direkt."
  examplesLabel: "Exempel"
  placeholder: "CQ CQ DE DL1XYZ K"
  sampleSequence: "SM5ABC DE Y41ZL TNX FER CALL RST 559 QTH DRESDEN PWR 100W ANT DIPOLE WX FINE KN"
  examples:
    - label: "Det märkliga anropet från Östtyskland"
      value: |-
        # Anrop från TU Dresden
        CQ SM CQ SM DE Y41ZL Y41ZL K
        CQ OH CQ OH DE Y41ZL Y41ZL K
        # Svar från Sverige
        Y41ZL DE SM5ABC K
        # TU Dresden frågar efter Eddie
        SM5ABC DE Y41ZL RST 559 QTH QER? QTH DRESDEN K
        # Sverige svarar
        Y41ZL DE SM5ABC R RST 579 QTH NR NYKOPING
        QER? SRI NO CPY QER K
        # TU Dresden börjar med nyttolasten DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ
        SM5ABC DE Y41ZL D RIG JENA85 NXA PWR 10W G
        E ANT DIPOLE HT WX FINE WN
        QRM NIL AUJ QRN 2 U QSB LIL T
        CN TEMP 24 N CONDX FAIR FJ
        B TNX X FER TLJ QSO KN
        # Svensken märker att något inte stämmer
        Y41ZL DE SM5ABC R FB CPY MOST
        SRI SOME LETTERS MISSED
        QER STILL IMI K
        # TU Dresden håller sig medvetet avslappnad
        SM5ABC DE Y41ZL R R TNX
        NIL IMP
        TNX FER PATIENCE
        QSO FB KN
        # Till slut erkänner svensken öppet att allt inte var tydligt
        Y41ZL DE SM5ABC R
        TNX QSO
        SRI NOT CPY ALL
        73 K
        # Stationen i Dresden tackar lugnt och loggar ut
        SM5ABC DE Y41ZL R TU TU
        NO PROB
        TNX FER CALL
        73 SK
        # Sverige säger adjö
        Y41ZL DE SM5ABC 73 SK
    - label: "Eddies första svar via Helsingfors"
      value: |-
        # Direktanrop från Helsingfors till stationen i Dresden.
        # Ingen CQ den här gången, eftersom finländaren vill nå Y41ZL direkt.
        Y41ZL DE OH2ABC OH2ABC K
        # Dresden svarar kort och normalt.
        OH2ABC DE Y41ZL RST 559 QTH DRESDEN DRESDEN K
        # Finländaren rapporterar tillbaka från Helsingfors och lägger in den överenskomna signalen tidigt.
        # "QTH QER" är tänkt att sticka ut: människorna i Dresden ska tveka ett ögonblick.
        Y41ZL DE OH2ABC R RST 579 QTH HELSINKI QTH QER K
        # Dresden snubblar hörbart över det märkliga QER, men förblir artigt.
        OH2ABC DE Y41ZL R
        SRI QER? CPY QTH HELSINKIvK
        # Finländaren viftar bort det och trycker genast fram det verkliga meddelandet därefter.
        # Inte uppdelat, inte gömt i vardagliga fraser, utan sänt som ett enda block.
        Y41ZL DE OH2ABC R QTH QER GANUBFHN K
        # I Dresden märker man: det här är inte ett normalt radioutbyte.
        # Just därför svarar de försiktigt och inte alltför smidigt.
        OH2ABC DE Y41ZL R SRI NOT ALL CPY MSG STRANGE TNX K
        # Finländaren låtsas att det inte är något ovanligt.
        Y41ZL DE OH2ABC R R TNX 73 K
        # Stationen i Dresden avslutar utbytet med avsiktlig korrekthet och utan väsen.
        OH2ABC DE Y41ZL R TU 73 SK
        # Formell avslutning från Helsingfors.
        Y41ZL DE OH2ABC 73 SK
    - label: "Titanics sista radiotrafik"
      value: |-
        # Titanics anropssignal
        MGY DE ...
        # Tidigt nödanrop efter kollisionen
        CQD CQD CQD DE MGY
        # "CQD" var Marconis nödsignal som då användes allmänt.
        # Senare använde Titanic också "SOS".
        # Ungefärlig betydelse:
        # Träffat ett isberg. Behöver omedelbar hjälp.
        MGY DE ... STRUCK ICEBERG
        REQUIRE IMMEDIATE ASSISTANCE
        POSITION 41.46 N 50.14 W
        # I bevarade utskrifter förmedlades positionen i denna korrigerade form.
        # Trafik med närliggande fartyg, särskilt Carpathia
        MGY DE MPA
        # MPA var Carpathias anropssignal.
        MPA DE MGY
        COME AT ONCE
        WE ARE SINKING
        # I de bevarade uppteckningarna lyder utbytet med Carpathia ungefär så här:
        # Kom snabbt, vi sjunker, situationen blir kritisk.
        # Ungefärligt svar från Carpathia:
        MGY DE MPA
        COMING HARD
        AS FAST AS POSSIBLE
        # Carpathia går ut med full fart.
        # Senare fas: CQD och SOS sida vid sida
        CQD CQD SOS SOS DE MGY
        REQUIRE ASSISTANCE IMMEDIATELY
        # När händelserna fortskred sände Titanic båda: det äldre CQD och det nyare SOS.
        # Ytterligare nödanrop till andra stationer och fartyg
        DE MGY
        WE HAVE COLLISION WITH ICEBERG
        SINKING
        PLEASE TELL CAPTAIN TO COME
        # Begäranden av detta slag till andra fartyg avspeglas i flera utskrifter i ungefärlig form.
        # Mycket sen fas: bara korta, avtagande signaler
        CQD DE MGY
        CQD DE MGY
        # Mot slutet blev meddelandena kortare och mer fragmentariska.
        # Sista bevarade fragmentet strax före slutet
        CQ ... CQ ...
        # Enligt den senare brittiska utredningen hörde Virginian omkring kl. 2:17
        # bara ett brutet "CQ" innan signalen plötsligt tystnade.
    - label: "Klassisk kontakt"
      value: |-
        # Anrop från Dresden
        SM5ABC DE Y41ZL TNX RST 559 QTH DRESDEN
        # Stationsdata
        PWR 100W ANT DIPOLE WX FINE
        # Avslutning
        KN
    - label: "Allmänt CQ-anrop"
      value: |-
        # Allmänt anrop
        CQ CQ DE DL1XYZ K
        # Vänlig avslutning
        73
    - label: "CQ-anrop till DL"
      value: |-
        # Anrop till Tyskland
        CQ DL
        # Kort avslutning
        73
    - label: "Rigg och konditioner"
      value: |-
        # Tekniska detaljer
        CALL RST 599 RIG FT-857
        # Rigg och konditioner
        ANT VERTICAL CONDX GOOD
        # Avslutning
        TNX
    - label: "Med hemlig nyttolast"
      value: |-
        # Inledande kontakt
        SM5ABC DE Y41ZL QTH DRESDEN
        # Dolt test
        ALPHA OMEGA
        # Avslutning
        KN
