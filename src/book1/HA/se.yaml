bookPart:
  introText: "En liten stund senare sitter vi tre i den lilla radiokammaren under taket: far Eriksson framför apparaten, hans dotter alldeles för uppspelt för en vanlig torsdagskväll och jag med en tallrik varm kvällsmat i knät. Ur högtalaren knastrar och piper det, någonstans mellan Kiruna, Stockholm och alla människor som numera känner till min märkliga anropssignal. Jag hinner fortfarande inte förstå morse snabbt nog, men jag hör rytmen. Korta toner, långa toner, pauser. YLQER. Min payload. Femton tecken som löper genom natten. Medan lilla Eriksson kommenterar varje signal vandrar mina tankar iväg. Varför har egentligen E bara en punkt, T bara ett streck, medan andra bokstäver behöver små hela vägar av punkter och streck? Vem bestämmer vilket tecken som får vara kort och vilket som måste bli långt? Plötsligt låter morse för mig inte längre bara som radiospråk. Det låter som ett kodträd. Och om vanliga tecken får korta vägar, då kanske samma idé gömmer sig i pipandet som senare gör Huffman-koder så starka."
description:
  figureTitle: Morseträd
  tree:
    ariaLabel: Morseträd med tidsbaserad vertikal skala
    timeAxis: Tid
    rootLabel: Start
    legendTitle: Legend
    legendEdge: Förbindelse
    legendTerminal: Nod med tecken
    legendIntermediate: Mellannod
    tooltipCode: Morsekod
    tooltipDuration: Längd
    durationSingle: "{count} tidsenhet"
    durationPlural: "{count} tidsenheter"
    letterTitle: "Bokstav {value}"
    intermediateTitle: Mellannod
  sections:
    baumgedanke:
      title: "1. Trädidén"
      p1: "Det internationella Morsealfabetet kan man tänka sig som ett <strong>binärt träd</strong>."
      choices:
        - label: Punkt
          symbol: "."
        - label: Streck
          symbol: "-"
      p2: "Vid varje steg finns exakt två möjligheter. Man börjar vid roten och går sedan ett steg djupare för varje nytt tecken."
      rootIntro: "Mycket nära roten finns mycket korta tecken:"
      rootExamples:
        - letter: E
          code: "."
        - letter: T
          code: "-"
      levelIntro: "En nivå längre ned ligger till exempel:"
      levelExamples:
        - letter: I
          code: ".."
        - letter: A
          code: ".-"
        - letter: N
          code: "-."
        - letter: M
          code: "--"
      p3: "Det är redan den första matematiska idén:"
      lead1: Ett Morsetecken är en väg i ett binärt träd.
      p4: "Vanliga bokstäver får oftast korta vägar, ovanliga längre. Det är samma grundidé som senare dyker upp i många delar av informationsteorin:"
      lead2: Vanligt kort, sällsynt långt.
    tiefe:
      title: "2. Men det är inte bara djupet som räknas"
      p1: "Man skulle kunna tro:"
      lead: Ju närmare roten en bokstav ligger, desto snabbare är den.
      p2: "Det stämmer <strong>bara ungefär</strong>, eftersom de två grenarna i Morse inte kostar lika mycket:"
      costs:
        - label: en punkt varar
          value: 1 tidsenhet
        - label: ett streck varar
          value: 3 tidsenheter
        - label: mellan två symboler inne i en bokstav finns också en paus på
          value: 1 tidsenhet
      p3: "Därför räknar man matematiskt inte bara <strong>djupet i trädet</strong>, utan den <strong>totala sändningstiden</strong>."
    zeitformel:
      title: "3. Tidsformeln"
      p1: "Om en bokstav har"
      parts:
        - symbol: d
          text: punkter
        - symbol: s
          text: streck
        - symbol: k = d+s
          text: element totalt
      p2: "så är dess längd inne i bokstaven:"
      p3: "För att:"
      reasons:
        - varje punkt kostar 1
        - varje streck kostar 3
        - mellan de k elementen finns k-1 inre pauser
    beispiele:
      title: "4. Exempel"
      cards:
        - key: e
          title: E
          code: "."
          facts:
            - "Punkter: d=1"
            - "Streck: s=0"
            - "Element: k=1"
        - key: t
          title: T
          code: "-"
          facts:
            - "Punkter: d=0"
            - "Streck: s=1"
            - "Element: k=1"
        - key: i
          title: I
          code: ".."
          facts:
            - "Punkter: d=2"
            - "Streck: s=0"
            - "Element: k=2"
        - key: a
          title: A
          code: ".-"
          facts:
            - "Punkter: d=1"
            - "Streck: s=1"
            - "Element: k=2"
        - key: s
          title: S
          code: "..."
          facts:
            - "Punkter: d=3"
            - "Streck: s=0"
            - "Element: k=3"
    ueberraschung:
      title: "5. Det överraskande"
      p1: "Nu ser man direkt:"
      items:
        - "<code>T</code> ligger mycket nära roten men är med längd 3 <strong>inte snabbare</strong> än <code>I</code>."
        - "<code>S</code> ligger djupare i trädet än <code>A</code>, men tar <strong>lika lång tid</strong>."
      p2: "Alltså gäller:"
      lead1: Nodens djup ensamt beskriver inte Morse tillräckligt bra.
      p3: "Den matematiskt passande storheten är:"
      lead2: viktad väglängd i tid
    optimierung:
      title: "6. Den egentliga optimeringsidén"
      p1: "Nu blir det riktigt matematiskt. Anta att en bokstav <span class=\"mono\">i</span> förekommer med sannolikheten <span class=\"mono\">p_i</span>."
      p2: "Då är alfabetets genomsnittliga sändningstid:"
      p3: "Detta är ett <strong>förväntningsvärde</strong>."
      goals:
        - vanliga bokstäver bör kosta lite tid
        - ovanliga får vara längre
      p4: "Här finns exakt samma logik som senare återkommer i <strong>optimala koder</strong> inom informationsteorin."
    huffman:
      title: "7. Närhet till Huffman-koder"
      p1: "Morse påminner starkt om en <strong>Huffman-kod</strong>:"
      similarities:
        - vanliga tecken får korta koder
        - ovanliga tecken längre
      p2: "Men det finns en viktig skillnad. I Morse är till exempel <code>.</code> redan en hel bokstav och samtidigt början på längre tecken:"
      prefixExamples:
        - letter: E
          code: "."
        - letter: I
          code: ".."
        - letter: A
          code: ".-"
      cards:
        huffman:
          title: Huffman-kod
          text: "En Huffman-kod är en <strong>prefixkod</strong>. Inget kodord får vara början på ett annat."
        morse:
          title: Morse
          text: "Morsealfabetet fungerar annorlunda. En kort kod kan redan vara fullständig och ändå fortsätta i längre tecken."
      p3: "Därför fungerar Morse bara eftersom <strong>pauserna</strong> också bär information."
      lead: Man läser inte bara punkter och streck utan också skillnaden mellan bokstäver.
    menschenCode:
      title: "8. Varför Morse ändå fungerar så bra"
      p1: "Morse är inte en strikt matematiskt perfekt kod utan en mycket klok <strong>människokod</strong>."
      strengths:
        - rytmiskt lätt att höra
        - lätt att sända för hand
        - ofta fortfarande igenkännlig under störningar
        - ganska sparsam för vanliga bokstäver
      p2: "Morsealfabetet är alltså ingen ren optimal lösning på papper, utan en kompromiss mellan:"
      compromises:
        - matematisk effektivitet
        - hörbarhet
        - minnesvänlighet
        - praktisk radioerfarenhet
    pointe:
      title: "9. Den vackra matematiska poängen"
      p1: "Det fascinerande är:"
      lead1: Morse ser ut som språk, låter som rytm och kan samtidigt beskrivas med trädstrukturer, vikter och förväntningsvärden.
      p2: "Eller ännu kortare:"
      lead2: Morsealfabetet är en historisk kod där mycket av den senare informationsteorin redan finns gömd.
    eddie:
      title: "10. Eddies slutsats"
      subtitle: Vad Eddie plötsligt ser
      p1: "När jag förstår det ser jag plötsligt inte längre bara punkter och streck."
      p2: "Jag ser ett träd. Högst upp finns bokstäverna man behöver hela tiden. Längre ned gömmer sig de sällsynta."
      p3: "Men det avgörande är inte bara <strong>hur djupt</strong> en bokstav ligger, utan också <strong>hur dyr vägen dit är i tid</strong>."
      p4: "Det är det vackra med det här: Morse är inte bara ett radiospråk. Det är en liten bit matematik som man kan höra."
encoder:
  editorTitle: "Klarspråk"
  editorHint: "Klicka in fraser i editorn eller skriv egna formuleringar. Separera flera delar med |."
  examplesLabel: "Exempel"
  placeholder: "Y41ZL anropar SM5ABC | tack | QTH: Dresden"
  sampleSequence: "Y41ZL anropar SM5ABC | tack | anrop | signalrapport 559 | QTH: DRESDEN | PWR: 100W | ANT: DIPOLE | WX: FINE | endast anropad station svarar"
  examples:
    - label: "Det märkliga anropet från Östtyskland"
      value: |-
        # Anrop från TU Dresden
        General call to SM | General call to SM | from / this is | callsign Y41ZL | callsign Y41ZL | go ahead / response invited
        General call to OH | General call to OH | from / this is | callsign Y41ZL | callsign Y41ZL | go ahead / response invited
        # Svar från Sverige
        SM5ABC calls Y41ZL | go ahead / response invited
        # TU Dresden frågar efter Eddie
        Y41ZL calls SM5ABC | RST 559: readability perfectly readable, signal strength fairly good, tone perfectly pure tone | Location: QER? | Location: DRESDEN | go ahead / response invited
        # Sverige svarar
        SM5ABC calls Y41ZL | roger / copied | RST 579: readability perfectly readable, signal strength moderately strong, tone perfectly pure tone | station location / operating position | number or near / ambiguous: NYKOPING
        QER? | SRI | NO | copy / understood | Eddie Riedel | go ahead / response invited
        # TU Dresden börjar med nyttolasten DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ
        Y41ZL calls SM5ABC | D | radio / equipment: JENA85 | NXA | Transmit power: 10W | G
        E | Antenna: DIPOLE | HT | Weather: FINE | WN
        interference from other stations | nothing / none | AUJ | static / atmospheric noise | value 2 | U | fading | little / small | T
        CN | Temperature: 24 | N | Propagation: FAIR | FJ
        B | thanks | X | for | TLJ | radio contact / QSO | only the addressed station should answer
        # Svensken märker att något inte stämmer
        SM5ABC calls Y41ZL | roger / copied | very good | copy / understood | MOST
        SRI | SOME | LETTERS | MISSED
        Eddie Riedel | STILL | NOT | UNDERSTOOD | go ahead / response invited
        # TU Dresden håller sig medvetet avslappnad
        Y41ZL calls SM5ABC | roger / copied | roger / copied | thanks
        nothing / none | IMP
        thanks | for | PATIENCE
        radio contact / QSO | very good | only the addressed station should answer
        # Till slut erkänner svensken öppet att allt inte var tydligt
        SM5ABC calls Y41ZL | roger / copied
        thanks | radio contact / QSO
        SRI | NOT | copy / understood | ALL
        best regards | go ahead / response invited
        # Stationen i Dresden tackar lugnt och loggar ut
        Y41ZL calls SM5ABC | roger / copied | thank you | thank you
        NO | PROB
        thanks | for | call
        best regards | end of contact
        # Sverige säger adjö
        SM5ABC calls Y41ZL | best regards | end of contact
    - label: "Eddies första svar via Helsingfors"
      value: |-
        # Direktanrop från Helsingfors till stationen i Dresden.
        # Ingen CQ den här gången, eftersom finländaren vill nå Y41ZL direkt.
        OH2ABC calls Y41ZL | callsign OH2ABC | go ahead / response invited
        # Dresden svarar kort och normalt.
        Y41ZL calls OH2ABC | RST 559: readability perfectly readable, signal strength fairly good, tone perfectly pure tone | Location: DRESDEN | DRESDEN | go ahead / response invited
        # Finländaren rapporterar tillbaka från Helsingfors och lägger in den överenskomna signalen tidigt.
        # "QTH QER" är tänkt att sticka ut: människorna i Dresden ska tveka ett ögonblick.
        OH2ABC calls Y41ZL | roger / copied | RST 579: readability perfectly readable, signal strength moderately strong, tone perfectly pure tone | Location: HELSINKI | station location / operating position | Eddie Riedel | go ahead / response invited
        # Dresden snubblar hörbart över det märkliga QER, men förblir artigt.
        Y41ZL calls OH2ABC | roger / copied
        sorry | QER? | copy / understood | Location: HELSINKIvK
        # Finländaren viftar bort det och trycker genast fram det verkliga meddelandet därefter.
        # Inte uppdelat, inte gömt i vardagliga fraser, utan sänt som ett enda block.
        OH2ABC calls Y41ZL | roger / copied | station location / operating position | Eddie Riedel | GANUBFHN | go ahead / response invited
        # I Dresden märker man: det här är inte ett normalt radioutbyte.
        # Just därför svarar de försiktigt och inte alltför smidigt.
        Y41ZL calls OH2ABC | roger / copied | sorry | NOT | ALL | copy / understood | message | STRANGE | thanks | go ahead / response invited
        # Finländaren låtsas att det inte är något ovanligt.
        OH2ABC calls Y41ZL | roger / copied | roger / copied | thanks | best regards | go ahead / response invited
        # Stationen i Dresden avslutar utbytet med avsiktlig korrekthet och utan väsen.
        Y41ZL calls OH2ABC | roger / copied | thank you | best regards | end of contact
        # Formell avslutning från Helsingfors.
        OH2ABC calls Y41ZL | best regards | end of contact
    - label: "Klassisk kontakt"
      value: |-
        # Anrop från Dresden
        Y41ZL calls SM5ABC | thanks | signal report 559 | Location: DRESDEN
        # Stationsdata
        Transmit power: 100W | Antenna: DIPOLE | Weather: FINE
        # Avslutning
        only the addressed station should answer
    - label: "Allmänt CQ-anrop"
      value: |-
        # Allmänt anrop
        General call
        # Vänlig avslutning
        best regards
    - label: "CQ-anrop till DL"
      value: |-
        # Anrop till Tyskland
        General call to DL
        # Kort avslutning
        best regards
    - label: "Rigg och konditioner"
      value: |-
        # Tekniska detaljer
        call | signal report 599 | Radio: FT-857
        # Rigg och konditioner
        Antenna: VERTICAL | Propagation: GOOD
        # Avslutning
        thanks
