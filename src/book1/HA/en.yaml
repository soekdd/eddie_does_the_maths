description:
  figureTitle: Morse tree
  tree:
    ariaLabel: Morse tree with time-based vertical spacing
    timeAxis: Time
    rootLabel: Start
    legendTitle: Legend
    legendEdge: Connection
    legendTerminal: Node with character
    legendIntermediate: Intermediate node
    tooltipCode: Morse code
    tooltipDuration: Duration
    durationSingle: "{count} time unit"
    durationPlural: "{count} time units"
    letterTitle: "Letter {value}"
    intermediateTitle: Intermediate node
  sections:
    baumgedanke:
      title: "1. The Tree Idea"
      p1: "The international Morse alphabet can be understood as a <strong>binary tree</strong>."
      choices:
        - label: Dot
          symbol: "."
        - label: Dash
          symbol: "-"
      p2: "At each step there are exactly two choices. You start at the root and then move one level deeper for every additional symbol."
      rootIntro: "Very close to the root are very short signs:"
      rootExamples:
        - letter: E
          code: "."
        - letter: T
          code: "-"
      levelIntro: "One level lower, for example, you find:"
      levelExamples:
        - letter: I
          code: ".."
        - letter: A
          code: ".-"
        - letter: N
          code: "-."
        - letter: M
          code: "--"
      p3: "That already gives the first mathematical idea:"
      lead1: A Morse character is a path in a binary tree.
      p4: "Frequent letters usually get short paths, rarer ones longer paths. That is the same basic idea that later appears in many methods of information theory:"
      lead2: Frequent short, rare long.
    tiefe:
      title: "2. But Depth Alone Is Not Enough"
      p1: "One might think:"
      lead: The closer a letter is to the root, the faster it is.
      p2: "That is <strong>only approximately</strong> true, because in Morse the two branches do not cost the same:"
      costs:
        - label: a dot lasts
          value: 1 time unit
        - label: a dash lasts
          value: 3 time units
        - label: between two symbols inside one letter there is also a pause of
          value: 1 time unit
      p3: "So mathematically, what matters is not just the <strong>depth in the tree</strong>, but the <strong>total transmission time</strong>."
    zeitformel:
      title: "3. The Time Formula"
      p1: "If a letter has"
      parts:
        - symbol: d
          text: dots
        - symbol: s
          text: dashes
        - symbol: k = d+s
          text: elements in total
      p2: "then its duration inside the letter is:"
      p3: "Because:"
      reasons:
        - each dot costs 1
        - each dash costs 3
        - between the k elements there are k-1 internal pauses
    beispiele:
      title: "4. Examples"
      cards:
        - key: e
          title: E
          code: "."
          facts:
            - "Dots: d=1"
            - "Dashes: s=0"
            - "Elements: k=1"
        - key: t
          title: T
          code: "-"
          facts:
            - "Dots: d=0"
            - "Dashes: s=1"
            - "Elements: k=1"
        - key: i
          title: I
          code: ".."
          facts:
            - "Dots: d=2"
            - "Dashes: s=0"
            - "Elements: k=2"
        - key: a
          title: A
          code: ".-"
          facts:
            - "Dots: d=1"
            - "Dashes: s=1"
            - "Elements: k=2"
        - key: s
          title: S
          code: "..."
          facts:
            - "Dots: d=3"
            - "Dashes: s=0"
            - "Elements: k=3"
    ueberraschung:
      title: "5. What Is Surprising About This"
      p1: "Now you can see immediately:"
      items:
        - "<code>T</code> sits very close to the root, but with duration 3 it is <strong>not faster</strong> than <code>I</code>."
        - "<code>S</code> lies deeper in the tree than <code>A</code>, but takes <strong>exactly the same time</strong>."
      p2: "So the real lesson is:"
      lead1: The depth of the node alone does not describe Morse well enough.
      p3: "The mathematically fitting quantity is:"
      lead2: weighted path length in time
    optimierung:
      title: "6. The Actual Optimization Idea"
      p1: "Now it becomes truly mathematical. Suppose a letter <span class=\"mono\">i</span> occurs with probability <span class=\"mono\">p_i</span>."
      p2: "Then the average transmission time of an alphabet is:"
      p3: "That is an <strong>expected value</strong>."
      goals:
        - frequent letters should cost little time
        - rare letters may take longer
      p4: "This is exactly the same logic that later appears in <strong>optimal codes</strong> in information theory."
    huffman:
      title: "7. Close to Huffman Codes"
      p1: "Morse strongly resembles a <strong>Huffman code</strong>:"
      similarities:
        - frequent symbols get short codes
        - rare symbols get longer ones
      p2: "But there is an important difference. In Morse, for example, <code>.</code> is already a full letter and at the same time the beginning of longer signs:"
      prefixExamples:
        - letter: E
          code: "."
        - letter: I
          code: ".."
        - letter: A
          code: ".-"
      cards:
        huffman:
          title: Huffman code
          text: "A Huffman code is a <strong>prefix code</strong>. No codeword may be the beginning of another."
        morse:
          title: Morse
          text: "The Morse alphabet works differently. A short code can already be complete and still continue into longer characters."
      p3: "That is why Morse only works because the <strong>pauses</strong> also carry information."
      lead: You do not read only dots and dashes, but also the separation between letters.
    menschenCode:
      title: "8. Why Morse Still Works So Well"
      p1: "Morse is not a strictly perfect mathematical code, but a very clever <strong>human code</strong>."
      strengths:
        - rhythmically easy to hear
        - easy to send by hand
        - often still recognizable under interference
        - quite economical for frequent letters
      p2: "So the Morse alphabet is not a pure optimum on paper, but a compromise between:"
      compromises:
        - mathematical efficiency
        - audibility
        - memorability
        - practical radio experience
    pointe:
      title: "9. The Beautiful Mathematical Point"
      p1: "What makes it fascinating is:"
      lead1: Morse looks like language, sounds like rhythm, and at the same time can be described with tree structures, weights, and expected values.
      p2: "Or even shorter:"
      lead2: The Morse alphabet is a historical code in which a lot of later information theory is already hiding.
    eddie:
      title: "10. Eddie's Conclusion"
      subtitle: What Eddie suddenly sees
      p1: "Once I understand it, I suddenly no longer see only dots and dashes."
      p2: "I see a tree. At the very top are the letters you need all the time. Further down the rare ones are hidden."
      p3: "But what matters is not only <strong>how deep</strong> a letter lies, but also <strong>how expensive the path to it is in time</strong>."
      p4: "That is the really beautiful part of it: Morse is not just a radio language. It is a small piece of mathematics that you can hear."
encoder:
  editorTitle: Natural language
  editorHint: Click phrase snippets into the editor or write your own statements. Separate multiple statements with |.
  examplesLabel: Examples
  placeholder: "Y41ZL calls SM5ABC | thanks | Location: Dresden"
  sampleSequence: "Y41ZL calls SM5ABC | thanks | call | signal report 559 | Location: DRESDEN | Transmit power: 100W | Antenna: DIPOLE | Weather: FINE | only the addressed station should answer"
  examples:
    - label: The strange call from East Germany
      value: |-
        # Call from TU Dresden
        General call to SM | General call to SM | from / this is | callsign Y41ZL | callsign Y41ZL | go ahead / response invited
        General call to OH | General call to OH | from / this is | callsign Y41ZL | callsign Y41ZL | go ahead / response invited
        # Reply from Sweden
        SM5ABC calls Y41ZL | go ahead / response invited
        # TU Dresden asks about Eddie
        Y41ZL calls SM5ABC | RST 559: readability perfectly readable, signal strength fairly good, tone perfectly pure tone | Location: QER? | Location: DRESDEN | go ahead / response invited
        # Sweden replies
        SM5ABC calls Y41ZL | roger / copied | RST 579: readability perfectly readable, signal strength moderately strong, tone perfectly pure tone | station location / operating position | number or near / ambiguous: NYKOPING
        QER? | SRI | NO | copy / understood | Eddie Riedel | go ahead / response invited
        # TU Dresden starts with the payload DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ
        Y41ZL calls SM5ABC | D | radio / equipment: JENA85 | NXA | Transmit power: 10W | G
        E | Antenna: DIPOLE | HT | Weather: FINE | WN
        interference from other stations | nothing / none | AUJ | static / atmospheric noise | value 2 | U | fading | little / small | T
        CN | Temperature: 24 | N | Propagation: FAIR | FJ
        B | thanks | X | for | TLJ | radio contact / QSO | only the addressed station should answer
        # The Swede notices that something is off
        SM5ABC calls Y41ZL | roger / copied | very good | copy / understood | MOST
        SRI | SOME | LETTERS | MISSED
        Eddie Riedel | STILL | NOT | UNDERSTOOD | go ahead / response invited
        # TU Dresden deliberately stays relaxed
        Y41ZL calls SM5ABC | roger / copied | roger / copied | thanks
        nothing / none | IMP
        thanks | for | PATIENCE
        radio contact / QSO | very good | only the addressed station should answer
        # In the end, the Swede openly admits that not everything was clear
        SM5ABC calls Y41ZL | roger / copied
        thanks | radio contact / QSO
        SRI | NOT | copy / understood | ALL
        best regards | go ahead / response invited
        # The station from Dresden gives relaxed thanks and signs off
        Y41ZL calls SM5ABC | roger / copied | thank you | thank you
        NO | PROB
        thanks | for | call
        best regards | end of contact
        # Sweden says goodbye
        SM5ABC calls Y41ZL | best regards | end of contact
    - label: Eddie's first reply via Helsinki
      value: |-
        # Direct call from Helsinki to the station in Dresden.
        # No CQ this time, because the Finn wants to reach Y41ZL directly.
        OH2ABC calls Y41ZL | callsign OH2ABC | go ahead / response invited
        # Dresden replies briefly and normally.
        Y41ZL calls OH2ABC | RST 559: readability perfectly readable, signal strength fairly good, tone perfectly pure tone | Location: DRESDEN | DRESDEN | go ahead / response invited
        # The Finn reports back from Helsinki and inserts the agreed signal early.
        # "QTH QER" is meant to stand out: the people in Dresden should hesitate for a moment.
        OH2ABC calls Y41ZL | roger / copied | RST 579: readability perfectly readable, signal strength moderately strong, tone perfectly pure tone | Location: HELSINKI | station location / operating position | Eddie Riedel | go ahead / response invited
        # Dresden audibly stumbles over the strange QER, but stays polite.
        Y41ZL calls OH2ABC | roger / copied
        sorry | QER? | copy / understood | Location: HELSINKIvK
        # The Finn brushes it off and immediately pushes the real message next.
        # Not split up, not hidden in casual phrases, but sent as one block.
        OH2ABC calls Y41ZL | roger / copied | station location / operating position | Eddie Riedel | GANUBFHN | go ahead / response invited
        # In Dresden they notice: this is not a normal radio exchange.
        # That is exactly why they respond cautiously and not too smoothly.
        Y41ZL calls OH2ABC | roger / copied | sorry | NOT | ALL | copy / understood | message | STRANGE | thanks | go ahead / response invited
        # The Finn pretends it is nothing unusual.
        OH2ABC calls Y41ZL | roger / copied | roger / copied | thanks | best regards | go ahead / response invited
        # The station in Dresden ends the exchange with deliberate correctness and no fuss.
        Y41ZL calls OH2ABC | roger / copied | thank you | best regards | end of contact
        # Formal sign-off from Helsinki.
        OH2ABC calls Y41ZL | best regards | end of contact 
    - label: Classic contact
      value: |-
        # Call from Dresden
        Y41ZL calls SM5ABC | thanks | signal report 559 | Location: DRESDEN
        # Station details
        Transmit power: 100W | Antenna: DIPOLE | Weather: FINE
        # Closing
        only the addressed station should answer
    - label: General CQ call
      value: |-
        # General call
        General call
        # Friendly closing
        best regards
    - label: CQ call to DL
      value: |-
        # Call to Germany
        General call to DL
        # Short closing
        best regards
    - label: Gear and conditions
      value: |-
        # Technical details
        call | signal report 599 | Radio: FT-857
        # Setup and conditions
        Antenna: VERTICAL | Propagation: GOOD
        # Closing
        thanks
