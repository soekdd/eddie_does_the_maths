decoder:
  editorTitle: Radio text
  editorHint: Click codes into the editor or type your own sequence directly.
  examplesLabel: Examples
  placeholder: CQ CQ DE DL1XYZ K
  sampleSequence: SM5ABC DE Y41ZL TNX FER CALL RST 559 QTH DRESDEN PWR 100W ANT DIPOLE WX FINE KN
  examples:
    - label: The strange call from East Germany
      value: |-
        # Call from TU Dresden
        CQ SM CQ SM DE Y41ZL Y41ZL K
        CQ OH CQ OH DE Y41ZL Y41ZL K
        # Reply from Sweden
        Y41ZL DE SM5ABC K
        # TU Dresden asks about Eddie
        SM5ABC DE Y41ZL RST 559 QTH QER? QTH DRESDEN K
        # Sweden replies
        Y41ZL DE SM5ABC R RST 579 QTH NR NYKOPING
        QER? SRI NO CPY QER K
        # TU Dresden starts with the payload DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ
        SM5ABC DE Y41ZL D RIG JENA85 NXA PWR 10W G
        E ANT DIPOLE HT WX FINE WN
        QRM NIL AUJ QRN 2 U QSB LIL T
        CN TEMP 24 N CONDX FAIR FJ
        B TNX X FER TLJ QSO KN
        # The Swede notices that something is off
        Y41ZL DE SM5ABC R FB CPY MOST
        SRI SOME LETTERS MISSED
        QER STILL IMI K
        # TU Dresden deliberately stays relaxed
        SM5ABC DE Y41ZL R R TNX
        NIL IMP
        TNX FER PATIENCE
        QSO FB KN
        # In the end, the Swede openly admits that not everything was clear
        Y41ZL DE SM5ABC R
        TNX QSO
        SRI NOT CPY ALL
        73 K
        # The station from Dresden gives relaxed thanks and signs off
        SM5ABC DE Y41ZL R TU TU
        NO PROB
        TNX FER CALL
        73 SK
        # Sweden says goodbye
        Y41ZL DE SM5ABC 73 SK
    - label: Eddie's first reply via Helsinki
      value: |-
        # Direct call from Helsinki to the station in Dresden.
        # No CQ this time, because the Finn wants to reach Y41ZL directly.
        Y41ZL DE OH2ABC OH2ABC K
        # Dresden replies briefly and normally.
        OH2ABC DE Y41ZL RST 559 QTH DRESDEN DRESDEN K
        # The Finn reports back from Helsinki and inserts the agreed signal early.
        # "QTH QER" is meant to stand out: the people in Dresden should hesitate for a moment.
        Y41ZL DE OH2ABC R RST 579 QTH HELSINKI QTH QER K
        # Dresden audibly stumbles over the strange QER, but stays polite.
        OH2ABC DE Y41ZL R
        SRI QER? CPY QTH HELSINKIvK
        # The Finn brushes it off and immediately pushes the real message next.
        # Not split up, not hidden in casual phrases, but sent as one block.
        Y41ZL DE OH2ABC R QTH QER GANUBFHN K
        # In Dresden they notice: this is not a normal radio exchange.
        # That is exactly why they respond cautiously and not too smoothly.
        OH2ABC DE Y41ZL R SRI NOT ALL CPY MSG STRANGE TNX K
        # The Finn pretends it is nothing unusual.
        Y41ZL DE OH2ABC R R TNX 73 K
        # The station in Dresden ends the exchange with deliberate correctness and no fuss.
        OH2ABC DE Y41ZL R TU 73 SK
        # Formal sign-off from Helsinki.
        Y41ZL DE OH2ABC 73 SK
    - label: The Titanic's final radio traffic
      value: |-
        # Titanic's callsign
        MGY DE ...
        # Early distress call after the collision
        CQD CQD CQD DE MGY
        # "CQD" was the Marconi distress signal in common use at the time.
        # Later on, the Titanic also used "SOS".
        # Approximate meaning:
        # Struck an iceberg. Need immediate help.
        MGY DE ... STRUCK ICEBERG
        REQUIRE IMMEDIATE ASSISTANCE
        POSITION 41.46 N 50.14 W
        # In surviving transcripts, the position was passed on in this corrected form.
        # Traffic with nearby ships, especially Carpathia
        MGY DE MPA
        # MPA was Carpathia's callsign.
        MPA DE MGY
        COME AT ONCE
        WE ARE SINKING
        # In the surviving records, the exchange with Carpathia reads roughly like this:
        # Come quickly, we are sinking, the situation is becoming critical.
        # Approximate reply from Carpathia:
        MGY DE MPA
        COMING HARD
        AS FAST AS POSSIBLE
        # Carpathia heads out at full speed.
        # Later phase: CQD and SOS side by side
        CQD CQD SOS SOS DE MGY
        REQUIRE ASSISTANCE IMMEDIATELY
        # As events progressed, Titanic transmitted both: the older CQD and the newer SOS.
        # Further calls for help to other stations and ships
        DE MGY
        WE HAVE COLLISION WITH ICEBERG
        SINKING
        PLEASE TELL CAPTAIN TO COME
        # Requests of this kind to other ships are reflected in several transcripts in approximate form.
        # Very late phase: only short, weakening signals
        CQD DE MGY
        CQD DE MGY
        # Towards the end, the messages became shorter and more fragmentary.
        # Last surviving fragment shortly before the end
        CQ ... CQ ...
        # According to the later British inquiry, Virginian was hearing, around 2:17 a.m.,
        # only a broken "CQ" before the signal suddenly cut off.           
    - label: Classic contact
      value: |-
        # Call from Dresden
        SM5ABC DE Y41ZL TNX RST 559 QTH DRESDEN
        # Station details
        PWR 100W ANT DIPOLE WX FINE
        # Closing
        KN
    - label: General CQ call
      value: |-
        # General call
        CQ CQ DE DL1XYZ K
        # Friendly closing
        73
    - label: CQ call to DL
      value: |-
        # Call to Germany
        CQ DL
        # Short closing
        73
    - label: Gear and conditions
      value: |-
        # Technical details
        CALL RST 599 RIG FT-857
        # Setup and conditions
        ANT VERTICAL CONDX GOOD
        # Closing
        TNX
    - label: With secret payload
      value: |-
        # Opening contact
        SM5ABC DE Y41ZL QTH DRESDEN
        # Hidden test
        ALPHA OMEGA
        # Closing
        KN
