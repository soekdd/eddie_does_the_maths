description:
  formulas:
    example7Value: "42.9"
    example14Value: "21.4"
    band40Label: 40 meter band
    band20Label: 20 meter band
  sections:
    frequenzen:
      title: Frequencies, Bands, and Number Families
      p1: "When I first saw the numbers on the radio, they looked random: 3.5&nbsp;MHz. 7&nbsp;MHz. 14&nbsp;MHz. 21&nbsp;MHz. 28&nbsp;MHz. But then it became clear: this is not a loose collection. It is almost a family."
      lead: "The core idea is simple. Frequency and wavelength describe the same thing, just in two different languages."
      p2: "Because electromagnetic waves travel at almost the speed of light, radio operators can work with a practical approximation:"
      p3: "<strong>Wavelength in meters</strong> is approximately <strong>300 divided by the frequency in megahertz</strong>."
    bandnamen:
      title: "1. Why are the bands named that way?"
      p1: "A band name is usually just the <strong>rounded wavelength</strong>. That is why the 7 MHz band is called the “40 meter band” even though the calculation is more precisely about 42.9 meters."
      p2: "So operators sometimes talk in <strong>MHz</strong> and sometimes in <strong>meters</strong>. It is the same band, just viewed from two angles."
    zahlenfamilie:
      title: "2. The old number family"
      p1: "The classic shortwave family almost looks like a doubling sequence:"
      chips:
        - 3.5 MHz → 80 m
        - 7 MHz → 40 m
        - 14 MHz → 20 m
        - 21 MHz → 15 m
        - 28 MHz → 10 m
      p2: Double the frequency and the wavelength is cut in half. That is exactly why 80&nbsp;m, 40&nbsp;m, 20&nbsp;m, and 10&nbsp;m feel related. 15&nbsp;m does not fit the old doubling pattern perfectly, but it complements the family very well.
    banduebersicht:
      title: "3. The most important bands at a glance"
      table:
        band: Band
        frequency: Typical center frequency
        lambda: Calculated wavelength
        note: Main idea
      bands:
        - name: 80 m
          frequency: 3.5 MHz
          lambda: "≈ 85.7 m"
          note: Low shortwave, classic night-time and regional band
        - name: 40 m
          frequency: 7 MHz
          lambda: "≈ 42.9 m"
          note: Very versatile, a good bridge between near and far
        - name: 30 m
          frequency: 10.1 MHz
          lambda: "≈ 29.7 m"
          note: A bridge between 40 m and 20 m
        - name: 20 m
          frequency: 14 MHz
          lambda: "≈ 21.4 m"
          note: The classic international DX band
        - name: 17 m
          frequency: 18.068 MHz
          lambda: "≈ 16.6 m"
          note: A calmer alternative to 20 m
        - name: 15 m
          frequency: 21 MHz
          lambda: "≈ 14.3 m"
          note: Strong in daylight and during good solar activity
        - name: 12 m
          frequency: 24.89 MHz
          lambda: "≈ 12.1 m"
          note: Complements the higher shortwave bands
        - name: 10 m
          frequency: 28 MHz
          lambda: "≈ 10.7 m"
          note: High shortwave, exciting during strong openings
    bandlogik:
      title: "4. Why were the bands chosen like this?"
      p1: "Historically, people did not want just a few arbitrary islands in the spectrum. They wanted <strong>useful, memorable, and technically distinct ranges</strong>. The old core family is so elegant because related numbers create very different radio worlds."
      cards:
        - title: a) Easy to remember
          text: 3.5 → 7 → 14 → 28 almost sounds musical. Once you know the pattern, the band names make immediate sense.
        - title: b) Different propagation
          text: Low bands behave differently from high ones. That gives you different tools for day, night, local work, and long distance.
        - title: c) Practical for antennas
          text: As wavelength changes, the size of useful antennas changes too. That makes the differences not only audible, but literally measurable.
    weitereBaender:
      title: "5. And why were more bands added later?"
      p1: "Because the old family is elegant, but it does not fill every gap. Some later bands act like bridges or side lanes:"
      items:
        - label: 30 m
          text: It sits between 40 m and 20 m and therefore really is an intermediate band.
        - label: 17 m
          text: It often serves as a quieter counterpart to the heavily used 20 m band.
        - label: 12 m
          text: It complements 15 m and 10 m in a range that can be especially interesting during the day.
      p2: These later additions do not destroy the old system. They simply make it finer and more useful in everyday practice.
    schluss:
      title: conclusion
      quote: At first I thought operators were just giving their bands names. Then I saw the pattern. Not chaos. Not habit. Almost a family of numbers. And suddenly the invisible felt as if someone had sorted it neatly.
encoder:
  editorTitle: Natural language
  editorHint: Click phrase snippets into the editor or write your own statements. Separate multiple statements with |.
  examplesLabel: Examples
  placeholder: "Y41ZL calls SM5ABC | thanks | Location: Dresden"
  sampleSequence: "Y41ZL calls SM5ABC | thanks | call | signal report 559 | Location: DRESDEN | Transmit power: 100W | Antenna: DIPOLE | Weather: FINE | only the addressed station should answer"
  examples:
    - label: The strange call from East Germany
      value: |-
        # Call from TU Dresden
        General call to SM | General call to SM | from / this is | callsign Y41ZL | callsign Y41ZL | go ahead / response invited
        General call to OH | General call to OH | from / this is | callsign Y41ZL | callsign Y41ZL | go ahead / response invited
        # Reply from Sweden
        SM5ABC calls Y41ZL | go ahead / response invited
        # TU Dresden asks about Eddie
        Y41ZL calls SM5ABC | RST 559: readability perfectly readable, signal strength fairly good, tone perfectly pure tone | Location: QER? | Location: DRESDEN | go ahead / response invited
        # Sweden replies
        SM5ABC calls Y41ZL | roger / copied | RST 579: readability perfectly readable, signal strength moderately strong, tone perfectly pure tone | station location / operating position | number or near / ambiguous: NYKOPING
        QER? | SRI | NO | copy / understood | Eddie Riedel | go ahead / response invited
        # TU Dresden starts with the payload DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ
        Y41ZL calls SM5ABC | D | radio / equipment: JENA85 | NXA | Transmit power: 10W | G
        E | Antenna: DIPOLE | HT | Weather: FINE | WN
        interference from other stations | nothing / none | AUJ | static / atmospheric noise | value 2 | U | fading | little / small | T
        CN | Temperature: 24 | N | Propagation: FAIR | FJ
        B | thanks | X | for | TLJ | radio contact / QSO | only the addressed station should answer
        # The Swede notices that something is off
        SM5ABC calls Y41ZL | roger / copied | very good | copy / understood | MOST
        SRI | SOME | LETTERS | MISSED
        Eddie Riedel | STILL | NOT | UNDERSTOOD | go ahead / response invited
        # TU Dresden deliberately stays relaxed
        Y41ZL calls SM5ABC | roger / copied | roger / copied | thanks
        nothing / none | IMP
        thanks | for | PATIENCE
        radio contact / QSO | very good | only the addressed station should answer
        # In the end, the Swede openly admits that not everything was clear
        SM5ABC calls Y41ZL | roger / copied
        thanks | radio contact / QSO
        SRI | NOT | copy / understood | ALL
        best regards | go ahead / response invited
        # The station from Dresden gives relaxed thanks and signs off
        Y41ZL calls SM5ABC | roger / copied | thank you | thank you
        NO | PROB
        thanks | for | call
        best regards | end of contact
        # Sweden says goodbye
        SM5ABC calls Y41ZL | best regards | end of contact
    - label: Classic contact
      value: |-
        # Call from Dresden
        Y41ZL calls SM5ABC | thanks | signal report 559 | Location: DRESDEN
        # Station details
        Transmit power: 100W | Antenna: DIPOLE | Weather: FINE
        # Closing
        only the addressed station should answer
    - label: General CQ call
      value: |-
        # General call
        General call
        # Friendly closing
        best regards
    - label: CQ call to DL
      value: |-
        # Call to Germany
        General call to DL
        # Short closing
        best regards
    - label: Eddie on air
      value: |-
        # Eddie is on the air from Dresden
        Eddie Riedel | Location: DRESDEN | Weather: FINE
        # Eddie sends his regards
        best regards
    - label: Gear and conditions
      value: |-
        # Technical details
        call | signal report 599 | Radio: FT-857
        # Setup and conditions
        Antenna: VERTICAL | Propagation: GOOD
        # Closing
        thanks
