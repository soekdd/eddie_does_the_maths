decoder:
  editorTitle: Radio text
  editorHint: Click codes into the editor or type your own sequence directly.
  examplesLabel: Examples
  placeholder: CQ CQ DE DL1XYZ K
  sampleSequence: SM5ABC DE Y41ZL TNX FER CALL RST 559 QTH DRESDEN PWR 100W ANT DIPOLE WX FINE KN
  examples:
    - label: The strange call from East Germany
      value: |-
        # Call from TU Dresden
        CQ SM CQ SM DE Y41ZL Y41ZL K
        CQ OH CQ OH DE Y41ZL Y41ZL K
        # Reply from Sweden
        Y41ZL DE SM5ABC K
        # TU Dresden asks about Eddie
        SM5ABC DE Y41ZL RST 559 QTH QER? QTH DRESDEN K
        # Sweden replies
        Y41ZL DE SM5ABC R RST 579 QTH NR NYKOPING
        QER? SRI NO CPY QER K
        # TU Dresden starts with the payload DNXAG.EHTWN.AOJUT.CNNFJ.BXTLJ
        SM5ABC DE Y41ZL D RIG JENA85 NXA PWR 10W G
        E ANT DIPOLE HT WX FINE WN
        QRM NIL AUJ QRN 2 U QSB LIL T
        CN TEMP 24 N CONDX FAIR FJ
        B TNX X FER TLJ QSO KN
        # The Swede notices that something is off
        Y41ZL DE SM5ABC R FB CPY MOST
        SRI SOME LETTERS MISSED
        QER STILL NOT UNDERSTOOD K
        # TU Dresden deliberately stays relaxed
        SM5ABC DE Y41ZL R R TNX
        NIL IMP
        TNX FER PATIENCE
        QSO FB KN
        # In the end, the Swede openly admits that not everything was clear
        Y41ZL DE SM5ABC R
        TNX QSO
        SRI NOT CPY ALL
        73 K
        # The station from Dresden gives relaxed thanks and signs off
        SM5ABC DE Y41ZL R TU TU
        NO PROB
        TNX FER CALL
        73 SK
        # Sweden says goodbye
        Y41ZL DE SM5ABC 73 SK
    - label: Classic contact
      value: |-
        # Call from Dresden
        SM5ABC DE Y41ZL TNX RST 559 QTH DRESDEN
        # Station details
        PWR 100W ANT DIPOLE WX FINE
        # Closing
        KN
    - label: General CQ call
      value: |-
        # General call
        CQ CQ DE DL1XYZ K
        # Friendly closing
        73
    - label: CQ call to DL
      value: |-
        # Call to Germany
        CQ DL
        # Short closing
        73
    - label: Eddie with QER
      value: |-
        # Eddie is on the air from Dresden
        QER QTH DRESDEN WX FINE
        # Eddie sends his regards
        73
    - label: Gear and conditions
      value: |-
        # Technical details
        CALL RST 599 RIG FT-857
        # Setup and conditions
        ANT VERTICAL CONDX GOOD
        # Closing
        TNX
    - label: With secret payload
      value: |-
        # Opening contact
        SM5ABC DE Y41ZL QTH DRESDEN
        # Hidden test
        ALPHA OMEGA
        # Closing
        KN
