dg:
  title: "Eddie Does The Maths: Linear Diophantine Equation"
  imageTitle: "Eddie at the market square in Tampere"
  introDate: "Joutsenlampi, July 5, 1985"
  subChapter:
    einleitung: "Introduction"
    einfuhrungsbeispiel: "Introductory example"
    erklarung: "Explanation"
    rechner: "Calculator"
  book:
    p1: "The Volvo bus rattles over Finnish potholes, and I am sitting in the back as if on glowing coals. Fischer scribbles calmly in my math notebook, of all notebooks the one where my whole life sits between the pages. I smile in the Edmilla way, harmless on the outside, racing heart on the inside. Up front Mielke is already lurking in my thoughts: “Edda…” and I know every wrong glance is a risk."
    p2: "Fischer is talking about these peasant problems: money, cows, pigs. Everybody groans. Then he flips the pages. Thicker. Too thick. For a moment the seal flashes up, and I go ice-cold."
    p3: "But what he has just scribbled in the margin is exactly my thing: how do you find all solutions when only integers are allowed? Here I show how to crack such an equation, how to turn one solution into many, and how to tell whether there is any solution at all."
  sections:
    part1:
      title: "Part 1 — Simple example"
      p1: "Let's start with a simple example. A classic like one I already saw once at the district math olympiad:"
      p2: "A farmer goes to the market with <b>200 talers</b> and wants to spend all his money on <b>cows</b> and <b>pigs</b>. One cow costs <b>17</b> talers, one pig <b>6</b>."
      p3: "Set <b>k</b> = number of cows, <b>s</b> = number of pigs. Then this is exactly the Diophantine equation:"
      p4: "Because <code>\\gcd(17,6)=1</code> and <code>1\\mid 200</code> hold, integer solutions exist. From <code>17k\\equiv 200\\pmod 6</code> it follows that <code>k\\equiv 4\\pmod 6</code>, so <code>k=4+6t</code>. Then <code>s=\\frac{200-17k}{6}=22-17t</code>."
      cows: "Cows k"
      pigs: "Pigs s"
      check: "Check"
      hint: "Tip: simply enter <code>a=17</code>, <code>b=6</code>, <code>c=200</code> below and you will see the same solution including the step-by-step breakdown."
    part2:
      title: "Part 2 — Eddie explains it"
      graphTitle: "Graph: {a}k + {b}s = {c}"
      xLabel: "Cows (k)"
      yLabel: "Pigs (s)"
      p1: "We are talking about <b>linear Diophantine equations</b>: <code>ax + by = c</code>. And now comes the twist: <b>x and y are supposed to be integers</b>. No decimals. No excuses."
      p2: "The most important move is the <b>gcd</b> (greatest common divisor). I write it as <code>\\gcd(a,b)</code>. The equation has integer solutions if and only if <code>\\gcd(a,b)\\mid c</code>. So the gcd of a and b must divide c cleanly. If not: game over, no integer solution."
      p3: "Why? Because <code>\\gcd(a,b)</code> divides everything you can build from <code>a</code> and <code>b</code> by the combination <code>ax+by</code>. If <code>c</code> does not fit into that, then it simply does not fit. Mathematics can be cold sometimes."
      p4: "If it does fit, we can even find one solution. The trick is called the <b>extended Euclidean algorithm</b>: it gives numbers <code>u,v</code> with <code>au + bv = \\gcd(a,b)</code>. Then we scale that to <code>c</code>:"
      p5: "where <code>g=\\gcd(a,b)</code>."
      p6: "And because math likes turning things into series, all solutions come as a family:"
      p7: "So you may choose <code>t</code> freely (but as an integer), and you get infinitely many solutions."
      commentTitle: "What does “Diophantine” mean?"
      commentBody: "At heart it means: “We are playing this in the realm of integers.” Named after Diophantus. Yes, the ancients already enjoyed making life difficult for themselves."
    part3:
      title: "Part 3 — Calculator: <code>ax + by = c</code>"
      calc: "Calculate"
      random: "Random"
      reset: "Reset"
      mini: "Integers only. Negative values are okay. But <code>a=b=0</code> is… uh… an “existence question.”"
      graphInput: "Graph for your inputs"
      graphTitle: "Graph: {a}x + {b}y = {c}"
      graphHint: "Shows the positive integer solutions (only if a and b have the same sign)."
