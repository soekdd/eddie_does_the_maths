dg:
  title: "Lineare diophantische Gleichung"
  imageTitle: "Eddie auf dem Marktplatz in Tampere"
  introDate: "Joutsenlampi, 5. Juli 1985"
  subChapter:
    einleitung: "Einleitung"
    einfuhrungsbeispiel: "Einführungsbeispiel"
    erklarung: "Erklärung"
    rechner: "Rechner"
  book:
    p1: "Der Volvo-Bus ruckelt über finnische Schlaglöcher, und ich sitze hinten wie auf glühenden Kohlen. Fischer kritzelt seelenruhig in meinem Matheblock, ausgerechnet in dem Block, in dem mein ganzes Leben zwischen den Seiten steckt. Ich lächle Edmilla-mäßig, außen harmlos, innen Herzrasen. Vorne lauert Mielke schon in meinen Gedanken: „Edda…“ und ich weiß, jeder falsche Blick ist ein Risiko."
    p2: "Fischer redet von diesen Bauernaufgaben: Geld, Kühe, Schweine. Alle stöhnen. Und dann schnipst er die Seiten. Dicker. Zu dick. Für einen Moment blitzt das Siegel auf, und mir wird eiskalt."
    p3: "Was er gerade an die Seite gekritzelt hat, ist aber genau mein Ding: Wie findet man alle Lösungen, wenn nur ganze Zahlen erlaubt sind? Hier zeige ich, wie man so eine Gleichung knackt, wie man aus einer Lösung viele macht und woran man merkt, ob es überhaupt eine gibt."
  sections:
    part1:
      title: "Teil 1 — Einfaches Beispiel"
      p1: "Fangen wir mit einen einfachen Beispiel an. Ein Klassiker, wie er mir schon mal bei der Mathe Kreisolympiade begegnet ist:"
      p2: "Ein Bauer geht mit <b>200 Talern</b> auf den Markt und will sein ganzes Geld für <b>Kühe</b> und <b>Schweine</b> ausgeben. Eine Kuh kostet <b>17</b> Taler, ein Schwein <b>6</b>."
      p3: "Setze <b>k</b> = Anzahl Kühe, <b>s</b> = Anzahl Schweine. Dann ist das genau die diophantische Gleichung:"
      p4: "Weil <code>\\gcd(17,6)=1</code> und <code>1\\mid 200</code> gilt, existieren ganzzahlige Lösungen. Aus <code>17k\\equiv 200\\pmod 6</code> folgt <code>k\\equiv 4\\pmod 6</code>, also <code>k=4+6t</code>. Dann wird <code>s=\\frac{200-17k}{6}=22-17t</code>."
      cows: "Kühe k"
      pigs: "Schweine s"
      check: "Check"
      hint: "Tipp: Trag unten einfach <code>a=17</code>, <code>b=6</code>, <code>c=200</code> ein, dann siehst du die gleiche Lösung inkl. Schritt-für-Schritt."
    part2:
      title: "Teil 2 — Eddie erklärt's"
      graphTitle: "Grafik: {a}k + {b}s = {c}"
      xLabel: "Kühe (k)"
      yLabel: "Schweine (s)"
      p1: "Wir reden über <b>lineare diophantische Gleichungen</b>: <code>ax + by = c</code>. Und jetzt kommt der Twist: <b>x und y sollen ganze Zahlen sein</b>. Keine Kommas. Keine Ausreden."
      p2: "Der wichtigste Move ist der <b>ggT</b> (größter gemeinsamer Teiler). Schreib ich kurz als <code>\\gcd(a,b)</code>. Denn: Die Gleichung hat genau dann Lösungen in ganzen Zahlen, wenn <code>\\gcd(a,b)\\mid c</code> gilt. Also: Der ggT von a und b muss c sauber teilen. Wenn nicht: Game over, keine ganzzahlige Lösung."
      p3: "Warum? Weil <code>\\gcd(a,b)</code> alles teilt, was du aus <code>a</code> und <code>b</code> per Kombination <code>ax+by</code> bauen kannst. Wenn <code>c</code> da nicht reinpasst, passt's halt nicht. Mathematik ist manchmal kalt."
      p4: "Wenn's passt, finden wir sogar eine Lösung. Der Trick heißt <b>erweiterter Euklid</b>: Er liefert Zahlen <code>u,v</code> mit <code>au + bv = \\gcd(a,b)</code>. Und dann skalieren wir das auf <code>c</code>:"
      p5: "wobei <code>g=\\gcd(a,b)</code>."
      p6: "Und weil Mathe gern Serien draus macht, kommen alle Lösungen als Familie:"
      p7: "Du darfst also <code>t</code> frei wählen (aber ganzzahlig!), und bekommst endlos viele Lösungen."
      commentTitle: "Was heißt „diophantisch“?"
      commentBody: "Heißt im Kern: „Wir spielen das Ganze im Reich der ganzen Zahlen.“ Benannt nach Diophantos. Ja, die Alten hatten auch schon Spaß daran, sich das Leben schwer zu machen."
    part3:
      title: "Teil 3 — Rechner: <code>ax + by = c</code>"
      calc: "Rechnen"
      random: "Zufall"
      reset: "Reset"
      mini: "Ganze Zahlen only. Negative sind okay. Aber <code>a=b=0</code> ist… äh… „Existenzfrage“."
      graphInput: "Grafik zu deinen Eingaben"
      graphTitle: "Grafik: {a}x + {b}y = {c}"
