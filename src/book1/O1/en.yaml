title: "Eddie Does The Maths: IMO 1985 Problem A1"
imageTitle: "Eddie thinks about IMO 85 problem A1"
imageAlt: "Eddie thinks about IMO 85 problem A1"
introDate: "Joutsa, July 4, 1985"
subChapter:
  einleitung: "Introduction"
  geometrie: "Geometry"
  tangenten: "Tangents"
  zyklisch: "Cyclic"
  kongruenz: "Congruence"
book:
  p1: "The room smells of paper, wood, and that thin coffee the proctor is secretly sipping. I sit upright, pen ready, with that cheeky feeling: <em>Today I'll calculate every last one of them into the wall.</em>"
  p2: "On the paper there is a drawing that looks like harmless geometry doodling until you realize it is a trap. It is about a quadrilateral whose vertices lie on a circle. On one side sits the center of a second circle, and that circle just barely brushes the other three sides, like touching them with a fingertip."
  p3: "The problem wants me to prove that certain segment lengths in this quadrilateral are forced to fit together, as if the figure had a hidden balance sheet that always closes."
  p4: "Here I walk you through it: what you have to actually \"see\" in the drawing, with no magic tricks, just careful observation."
sections:
  part1:
    title: "Part 1 - Statement of the problem"
    p1: "We have a <b>cyclic quadrilateral</b> <katex tex=\"ABCD\" />. That means the points <katex tex=\"A,B,C,D\" /> lie on one common circle (the circumcircle)."
    p2: "On side <katex tex=\"AB\" /> there is a point <katex tex=\"O\" />. Around <katex tex=\"O\" /> there is a circle (the \"inner circle\") tangent to the three sides <katex tex=\"BC,\\quad CD,\\quad DA\" />."
    prove: "We have to prove the length formula"
  part2:
    title: "Part 2 - Mental picture and notation"
    intro: "The inner circle touches"
    l1: "side <katex tex=\"AD\" /> at point <katex tex=\"L\" />, "
    l2: "side <katex tex=\"CD\" /> at point <katex tex=\"M\" />, "
    l3: "side <katex tex=\"BC\" /> at point <katex tex=\"N\" />."
    p1: "Its center is <katex tex=\"O\" /> and it lies on <katex tex=\"AB\" />."
    note: "You can picture it like this: the inner circle is wedged between the three sides <katex tex=\"AD,CD,BC\" />, and its center lands exactly on <katex tex=\"AB\" />."
  part3:
    title: "Part 3 - Three key facts (that we keep using)"
    rule1Title: "(1) A radius is perpendicular to the tangent"
    rule1Text: "If a line is tangent to a circle, then the radius at the tangency point is perpendicular to it:"
    rule2Title: "(2) Tangents from one point have equal length"
    rule2Text: "From the same external point, the two tangents to the same circle have equal length:"
    rule2Item1: "From <katex tex=\"C\" />, the tangents go along <katex tex=\"BC\" /> (touching at <katex tex=\"N\" />) and <katex tex=\"CD\" /> (touching at <katex tex=\"M\" />): <katex tex=\"CN=CM\" />."
    rule2Item2: "From <katex tex=\"D\" />, the tangents go along <katex tex=\"DA\" /> (touching at <katex tex=\"L\" />) and <katex tex=\"DC\" /> (touching at <katex tex=\"M\" />): <katex tex=\"DL=DM \\Rightarrow MD=DL\" />."
    rule3Title: "(3) Cyclic means opposite angles add up to <katex tex=\"180^\\circ\" />"
  part4:
    title: "Part 4 - The plan (bookkeeping with segments)"
    p1: "In the end we want to split <katex tex=\"AB\" />:"
    p2: "If we can show <katex tex=\"AO=AL+MC\" /> and <katex tex=\"OB=BN+MD\" />, then it immediately follows that"
    p3: "And then we replace using tangent equalities:"
    p4: "Then we automatically get:"
    p5: "So the only thing left is to prove the two decompositions of <katex tex=\"AO\" /> and <katex tex=\"OB\" />."
  part5:
    title: "Part 5 - Decomposing <katex tex=\"AO\" />: we build a suitable right triangle"
    s1Title: "Step 5.1 - Construct point <katex tex=\"X\" />"
    s1Text: "Choose a point <katex tex=\"X\" /> on the line <katex tex=\"AD\" /> beyond <katex tex=\"D\" /> such that <katex tex=\"AX=AO\" />. Then <katex tex=\"\\triangle AOX\" /> is isosceles."
    s2Title: "Step 5.2 - An angle from the isosceles triangle"
    s2p1: "In triangle <katex tex=\"AOX\" />, the angle at <katex tex=\"A\" /> is <katex tex=\"\\angle XAO = \\angle DAO = \\angle DAB\" />, because <katex tex=\"X\" /> lies on <katex tex=\"AD\" /> and <katex tex=\"O\" /> lies on <katex tex=\"AB\" />."
    s2p2: "Since <katex tex=\"\\triangle AOX\" /> is isosceles, the base angles at <katex tex=\"O\" /> and <katex tex=\"X\" /> are equal:"
    s2p3: "Important: <katex tex=\"A,L,D,X\" /> are collinear, so <katex tex=\"\\angle OXL=\\angle OXA\" />."
    s3Title: "Step 5.3 - An angle from cyclic geometry and the angle bisector"
    s3p1: "Because the inner circle is tangent to <katex tex=\"BC\" /> and <katex tex=\"CD\" />, the center <katex tex=\"O\" /> has the same distance from both lines. Therefore <katex tex=\"O\" /> lies on the angle bisector at <katex tex=\"C\" />. So <katex tex=\"CO\" /> bisects <katex tex=\"\\angle DCB\" />, and we get:"
    s3p2: "(because <katex tex=\"CM\" /> lies on <katex tex=\"CD\" />)"
    s3p3: "From cyclicity (fact (3)) it follows that"
    s3p4: "So we have <katex tex=\"\\angle OCM = 90^\\circ-\\frac{\\angle DAB}{2} = \\angle OXL\" />."
    s4Title: "Step 5.4 - Congruence of two right triangles"
    s4p1: "Consider the triangles <katex tex=\"\\triangle OLX\" /> and <katex tex=\"\\triangle OMC\" />."
    s4l1: "<katex tex=\"\\angle OLX=90^\\circ\" /> because <katex tex=\"OL\\perp AD\" /> and <katex tex=\"X\\in AD\" />, "
    s4l2: "<katex tex=\"\\angle OMC=90^\\circ\" /> because <katex tex=\"OM\\perp CD\" />, "
    s4l3: "<katex tex=\"OL=OM\" /> because both are radii of the inner circle, "
    s4l4: "<katex tex=\"\\angle OXL=\\angle OCM\" /> as just shown."
    s4p2: "Therefore the triangles are congruent: in two right triangles, one leg and one acute angle are enough. So:"
    s5Title: "Step 5.5 - Now book the lengths"
    s5p1: "On the line <katex tex=\"AD\" /> we have, because <katex tex=\"A-L-X\" /> lie in that order:"
    s5p2: "Using <katex tex=\"AX=AO\" /> and <katex tex=\"LX=MC\" />, it follows that"
  part6:
    title: "Part 6 - Decomposing <katex tex=\"OB\" />: the same game on the other side"
    s1Title: "Step 6.1 - Construct point <katex tex=\"Y\" />"
    s1Text: "Choose a point <katex tex=\"Y\" /> on the line <katex tex=\"BC\" /> beyond <katex tex=\"C\" /> such that <katex tex=\"BY=BO\" />. Then <katex tex=\"\\triangle BOY\" /> is isosceles."
    s2Title: "Step 6.2 - The angle at <katex tex=\"Y\" /> from the isosceles triangle"
    s2p1: "The angle at <katex tex=\"B\" /> in triangle <katex tex=\"BOY\" /> is <katex tex=\"\\angle YBO = \\angle CBO = \\angle ABC\" />, because <katex tex=\"Y\" /> lies on <katex tex=\"BC\" /> and <katex tex=\"O\" /> lies on <katex tex=\"BA\" />."
    s2p2: "Therefore the base angles at <katex tex=\"O\" /> and <katex tex=\"Y\" /> are:"
    s2p3: "Since <katex tex=\"Y,N,B\" /> are collinear, we have <katex tex=\"\\angle OYN = \\angle OYB\" />."
    s3Title: "Step 6.3 - The angle at <katex tex=\"D\" /> via the angle bisector and cyclicity"
    s3p1: "Because the inner circle is tangent to <katex tex=\"DA\" /> and <katex tex=\"DC\" />, the point <katex tex=\"O\" /> lies on the angle bisector at <katex tex=\"D\" />. So:"
    s3p2: "(because <katex tex=\"DM\" /> lies on <katex tex=\"DC\" />)"
    s3p3: "From cyclicity we get:"
    s3p4: "Hence:"
    s4Title: "Step 6.4 - Congruence and length bookkeeping"
    s4p1: "Consider <katex tex=\"\\triangle ONY\" /> and <katex tex=\"\\triangle OMD\" />:"
    s4l1: "<katex tex=\"\\angle ONY=90^\\circ\" /> because <katex tex=\"ON\\perp BC\" />, "
    s4l2: "<katex tex=\"\\angle OMD=90^\\circ\" /> because <katex tex=\"OM\\perp CD\" />, "
    s4l3: "<katex tex=\"ON=OM\" /> because both are radii, "
    s4l4: "<katex tex=\"\\angle OYN=\\angle ODM\" /> as just shown."
    s4p2: "So the triangles are congruent, hence:"
    s4p3: "On the line <katex tex=\"BC\" /> we have, in the order <katex tex=\"B-N-C-Y\" />:"
    s4p4: "With <katex tex=\"BY=BO\" /> and <katex tex=\"NY=MD\" />, it follows that"
  part7:
    title: "Part 7 - Final calculation (now we just substitute)"
    p1: "From parts 5 and 6:"
    p2: "Using the tangent equalities (fact (2)):"
    commentTitle: "At first this looks like magic, but really it is just:"
    commentItems:
      - "Tangents give equal segments (<katex tex=\"CN=CM,\\ DL=DM\" />)."
      - "Cyclicity gives fixed angle relations (opposite angles are supplementary)."
      - "With two well-chosen points <katex tex=\"X\" /> and <katex tex=\"Y\" />, you build two congruences that relabel exactly the missing segments."
      - "After that it is just bookkeeping."
