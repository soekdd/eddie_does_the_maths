title: "Eddie rechnet: IMO 1985 Aufgabe A1"
imageTitle: "Eddie denkt über die Aufgabe A1 der IMO 85 nach"
imageAlt: "Eddie denkt über die Aufgabe A1 der IMO 85 nach"
introDate: "Joutsa, 4. Juli 1985"
subChapter:
  einleitung: "Einleitung"
  geometrie: "Geometrie"
  tangenten: "Tangenten"
  zyklisch: "Zyklisch"
  kongruenz: "Kongruenz"
book:
  p1: "Der Raum riecht nach Papier, Holz und diesem dünnen Kaffee, den die Aufsicht heimlich schlürft. Ich sitze gerade, Stift bereit, und ich hab dieses freche Gefühl: <em>Heute rechne ich sie alle an die Wand.</em>"
  p2: "Auf dem Blatt wartet eine Zeichnung, die aussieht wie \"harmloses Geometrie-Gekritzel\", bis man merkt, dass sie eine Falle ist. Es geht um ein Viereck, dessen Ecken auf einem Kreis liegen. Auf einer Seite sitzt der Mittelpunkt eines zweiten Kreises, und dieser Kreis streift die anderen drei Seiten nur ganz leicht, wie mit der Fingerspitze."
  p3: "Die Aufgabe will, dass ich zeige: Bestimmte Streckenlängen an diesem Viereck hängen zwingend zusammen, als hätte die Figur eine versteckte Bilanz, die immer aufgeht."
  p4: "Hier nehme ich dich an die Hand: Was man in der Zeichnung \"sehen\" muss, ohne Zaubertricks, nur sauber hinschauen."
sections:
  part1:
    title: "Teil 1 - Aufgabenstellung"
    p1: "Wir haben ein <b>zyklisches Viereck</b> <katex tex=\"ABCD\" />. Das bedeutet: Die Punkte <katex tex=\"A,B,C,D\" /> liegen auf einem gemeinsamen Kreis (Umkreis)."
    p2: "Auf der Seite <katex tex=\"AB\" /> liegt ein Punkt <katex tex=\"O\" />. Um <katex tex=\"O\" /> liegt ein Kreis (der \"Innenkreis\"), der die drei Seiten <katex tex=\"BC,\\quad CD,\\quad DA\" /> berührt (also an jeder dieser Geraden tangential ist)."
    prove: "Zu zeigen ist die Längenformel"
  part2:
    title: "Teil 2 - Bild im Kopf und Notation"
    intro: "Der Innenkreis berührt"
    l1: "die Seite <katex tex=\"AD\" /> im Punkt <katex tex=\"L\" />, "
    l2: "die Seite <katex tex=\"CD\" /> im Punkt <katex tex=\"M\" />, "
    l3: "die Seite <katex tex=\"BC\" /> im Punkt <katex tex=\"N\" />."
    p1: "Sein Mittelpunkt ist <katex tex=\"O\" /> und liegt auf <katex tex=\"AB\" />."
    note: "Man kann sich das so vorstellen: Der Innenkreis \"klemmt\" zwischen den drei Seiten <katex tex=\"AD,CD,BC\" />, und sein Mittelpunkt landet genau auf <katex tex=\"AB\" />."
  part3:
    title: "Teil 3 - Drei Merksätze (die wir ständig benutzen)"
    rule1Title: "(1) Radius steht senkrecht auf Tangente"
    rule1Text: "Wenn eine Gerade eine Kreis-Tangente ist, dann steht der Radius im Berührpunkt senkrecht darauf:"
    rule2Title: "(2) Tangenten von einem Punkt sind gleich lang"
    rule2Text: "Von einem gemeinsamen Außenpunkt sind die beiden Tangenten an denselben Kreis gleich lang:"
    rule2Item1: "Von <katex tex=\"C\" /> aus gehen die Tangenten über <katex tex=\"BC\" /> (Berührpunkt <katex tex=\"N\" />) und <katex tex=\"CD\" /> (Berührpunkt <katex tex=\"M\" />): <katex tex=\"CN=CM\" />."
    rule2Item2: "Von <katex tex=\"D\" /> aus gehen die Tangenten über <katex tex=\"DA\" /> (Berührpunkt <katex tex=\"L\" />) und <katex tex=\"DC\" /> (Berührpunkt <katex tex=\"M\" />): <katex tex=\"DL=DM \\Rightarrow MD=DL\" />."
    rule3Title: "(3) Zyklisch heißt: Gegenwinkel ergänzen sich zu <katex tex=\"180^\\circ\" />"
  part4:
    title: "Teil 4 - Der Plan (Buchhaltung mit Strecken)"
    p1: "Wir wollen am Ende <katex tex=\"AB\" /> zerlegen:"
    p2: "Wenn wir zeigen können <katex tex=\"AO=AL+MC\" /> und <katex tex=\"OB=BN+MD\" />, dann folgt sofort"
    p3: "Und dann ersetzen wir mit Tangenten-Gleichheiten:"
    p4: "Dann steht automatisch da:"
    p5: "Es bleibt also nur noch, die beiden Zerlegungen von <katex tex=\"AO\" /> und <katex tex=\"OB\" /> zu beweisen."
  part5:
    title: "Teil 5 - Zerlegung von <katex tex=\"AO\" />: Wir bauen ein passendes rechtwinkliges Dreieck"
    s1Title: "Schritt 5.1 - Punkt <katex tex=\"X\" /> konstruieren"
    s1Text: "Wir wählen auf der Geraden <katex tex=\"AD\" /> hinter <katex tex=\"D\" /> einen Punkt <katex tex=\"X\" /> so, dass <katex tex=\"AX=AO\" />. Dann ist <katex tex=\"\\triangle AOX\" /> gleichschenklig mit <katex tex=\"AO=AX\" />."
    s2Title: "Schritt 5.2 - Ein Winkel aus dem gleichschenkligen Dreieck"
    s2p1: "Im Dreieck <katex tex=\"AOX\" /> ist der Winkel bei <katex tex=\"A\" />: <katex tex=\"\\angle XAO = \\angle DAO = \\angle DAB\" /> (weil <katex tex=\"X\" /> auf der Geraden <katex tex=\"AD\" /> liegt und <katex tex=\"O\" /> auf <katex tex=\"AB\" />)."
    s2p2: "Da <katex tex=\"\\triangle AOX\" /> gleichschenklig ist, sind die Basiswinkel bei <katex tex=\"O\" /> und <katex tex=\"X\" /> gleich:"
    s2p3: "Wichtig: <katex tex=\"A,L,D,X\" /> liegen auf einer Geraden, also ist <katex tex=\"\\angle OXL=\\angle OXA\" />."
    s3Title: "Schritt 5.3 - Ein Winkel aus dem zyklischen Viereck und der Winkelhalbierenden"
    s3p1: "Weil der Innenkreis die Geraden <katex tex=\"BC\" /> und <katex tex=\"CD\" /> berührt, hat der Mittelpunkt <katex tex=\"O\" /> zu beiden Geraden denselben Abstand (nämlich den Radius). Deshalb liegt <katex tex=\"O\" /> auf der Winkelhalbierenden bei <katex tex=\"C\" />. Also halbiert <katex tex=\"CO\" /> den Winkel <katex tex=\"\\angle DCB\" />, und damit gilt:"
    s3p2: "(denn <katex tex=\"CM\" /> liegt auf <katex tex=\"CD\" />)"
    s3p3: "Aus der Zyklik (Merksatz (3)) folgt:"
    s3p4: "Also haben wir <katex tex=\"\\angle OCM = 90^\\circ-\\frac{\\angle DAB}{2} = \\angle OXL\" />."
    s4Title: "Schritt 5.4 - Kongruenz zweier rechtwinkliger Dreiecke"
    s4p1: "Betrachte die Dreiecke <katex tex=\"\\triangle OLX\" /> und <katex tex=\"\\triangle OMC\" />."
    s4l1: "<katex tex=\"\\angle OLX=90^\\circ\" /> (weil <katex tex=\"OL\\perp AD\" /> und <katex tex=\"X\\in AD\" />),"
    s4l2: "<katex tex=\"\\angle OMC=90^\\circ\" /> (weil <katex tex=\"OM\\perp CD\" />),"
    s4l3: "<katex tex=\"OL=OM\" /> (beides Radien des Innenkreises),"
    s4l4: "<katex tex=\"\\angle OXL=\\angle OCM\" /> (gerade gezeigt)."
    s4p2: "Damit sind die Dreiecke kongruent (deckungsgleich; entsprechende Seiten sind gleich lang), denn in zwei rechtwinkligen Dreiecken genügen eine Kathete und ein spitzer Winkel. Also:"
    s5Title: "Schritt 5.5 - Jetzt die Längen buchen"
    s5p1: "Auf der Geraden <katex tex=\"AD\" /> gilt (weil <katex tex=\"A-L-X\" /> in dieser Reihenfolge liegen):"
    s5p2: "Mit <katex tex=\"AX=AO\" /> und <katex tex=\"LX=MC\" /> folgt:"
  part6:
    title: "Teil 6 - Zerlegung von <katex tex=\"OB\" />: dasselbe Spiel auf der anderen Seite"
    s1Title: "Schritt 6.1 - Punkt <katex tex=\"Y\" /> konstruieren"
    s1Text: "Wir wählen auf der Geraden <katex tex=\"BC\" /> hinter <katex tex=\"C\" /> einen Punkt <katex tex=\"Y\" /> so, dass <katex tex=\"BY=BO\" />. Dann ist <katex tex=\"\\triangle BOY\" /> gleichschenklig."
    s2Title: "Schritt 6.2 - Winkel bei <katex tex=\"Y\" /> aus dem gleichschenkligen Dreieck"
    s2p1: "Der Winkel bei <katex tex=\"B\" /> im Dreieck <katex tex=\"BOY\" /> ist <katex tex=\"\\angle YBO = \\angle CBO = \\angle ABC\" /> (weil <katex tex=\"Y\" /> auf <katex tex=\"BC\" /> liegt und <katex tex=\"O\" /> auf <katex tex=\"BA\" />)."
    s2p2: "Daher sind die Basiswinkel bei <katex tex=\"O\" /> und <katex tex=\"Y\" />:"
    s2p3: "Da <katex tex=\"Y,N,B\" /> auf einer Geraden liegen, ist <katex tex=\"\\angle OYN = \\angle OYB\" />."
    s3Title: "Schritt 6.3 - Winkel bei <katex tex=\"D\" /> über Winkelhalbierende und Zyklik"
    s3p1: "Weil der Innenkreis die Geraden <katex tex=\"DA\" /> und <katex tex=\"DC\" /> berührt, liegt <katex tex=\"O\" /> auf der Winkelhalbierenden bei <katex tex=\"D\" />. Also:"
    s3p2: "(denn <katex tex=\"DM\" /> liegt auf <katex tex=\"DC\" />)"
    s3p3: "Aus der Zyklik gilt:"
    s3p4: "Damit:"
    s4Title: "Schritt 6.4 - Kongruenz und Längenbuchhaltung"
    s4p1: "Betrachte <katex tex=\"\\triangle ONY\" /> und <katex tex=\"\\triangle OMD\" />:"
    s4l1: "<katex tex=\"\\angle ONY=90^\\circ\" /> (weil <katex tex=\"ON\\perp BC\" />),"
    s4l2: "<katex tex=\"\\angle OMD=90^\\circ\" /> (weil <katex tex=\"OM\\perp CD\" />),"
    s4l3: "<katex tex=\"ON=OM\" /> (Radien),"
    s4l4: "<katex tex=\"\\angle OYN=\\angle ODM\" /> (gerade gezeigt)."
    s4p2: "Also sind die Dreiecke kongruent, somit:"
    s4p3: "Auf der Geraden <katex tex=\"BC\" /> gilt (Reihenfolge <katex tex=\"B-N-C-Y\" />):"
    s4p4: "Mit <katex tex=\"BY=BO\" /> und <katex tex=\"NY=MD\" /> folgt:"
  part7:
    title: "Teil 7 - Finale Rechnung (jetzt nur noch einsetzen)"
    p1: "Aus Teil 5 und 6:"
    p2: "Mit den Tangenten-Gleichheiten (Merksatz (2)):"
    commentTitle: "Das sieht erst nach Magie aus, ist aber eigentlich nur:"
    commentItems:
      - "Tangenten geben Streckengleichheiten (<katex tex=\"CN=CM,\\ DL=DM\" />)."
      - "Zyklisch liefert feste Winkelbeziehungen (Gegenwinkel ergänzen sich)."
      - "Mit zwei gut gewählten Punkten <katex tex=\"X\" /> und <katex tex=\"Y\" /> baut man zwei Kongruenzen, die genau die fehlenden Strecken umetikettieren."
      - "Dann ist es nur noch Buchhaltung."
