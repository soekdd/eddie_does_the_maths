fs:
  title: "Frühstückszettel #1 Fischpopulation"
  imageTitle: "Eddie rechnet zur Fischpopulation"
  imageAlt: "Illustration zu Eddies Frühstückszettel über eine Fischpopulation"
  introDate: "Vaasa, 8. August 1985"
  subChapter:
    einleitung: "Einleitung"
    aufgabe: "Aufgabe"
    loesung: "Lösung"
    zusammenfassung: "Zusammenfassung"
    simulation: "Simulation"
  book:
    p1: "Ich sitze barfuß in Sinis Küche, die Beine hoch auf dem Stuhl, und tue so, als wären meine Füße nur beleidigt und nicht kaputt. Vor mir liegt dieser erste Frühstückszettel, süß ausgeschnitten, als wäre Mathe ein Keks. „Fischsee“, steht da, und ich muss grinsen: hundert Altfische am Anfang, jedes Jahr kommen Junge dazu, am Ende sterben viele von den Alten, und die Jungen rutschen nach. Das klingt nach Naturfilm, ist aber eigentlich ein Rhythmus, wie Atmen: mehr, weniger, mehr, weniger. Und ich merke, wie schnell mein Kopf das Muster findet, während mein Körper noch hinterherhumpelt."
    p2: "Hier zeige ich dir, wie man bei so einem See Schritt für Schritt mitzählt, wann das Ganze explodiert, wann es sich beruhigt und warum es am Ende eher nach „Sättigung“ aussieht als nach „Endlosparty“."
  sections:
    task:
      title: "Teil 1 - Aufgabe: Entwicklung eines Fischbestandes"
      p1: "In einem abgeschlossenen See lebt eine Fischpopulation. Zu Beginn eines Jahres t gibt es N_t fortpflanzungsfähige Fische."
      p2: "Für die Entwicklung des Bestands von Jahr zu Jahr gelten folgende Regeln:"
      r1: "Jeder erwachsene Fisch erzeugt im Laufe eines Jahres im Mittel b > 0 Jungfische."
      r2: "Nicht alle Jungfische überleben bis zum nächsten Jahr. Die Überlebenswahrscheinlichkeit beträgt:"
      r2b: "mit c > 0 als Maß für begrenzte Nahrung und begrenzten Lebensraum."
      r3: "Alle überlebenden Jungfische sind im nächsten Jahr fortpflanzungsfähig."
      r4: "Fischfang, Zu- oder Abwanderung werden vernachlässigt."
      p3: "Untersuche dazu:"
      q1: "Stelle die Rekursionsgleichung für N_{t+1} in Abhängigkeit von N_t auf."
      q2: "Bestimme die Gleichgewichte der Rekursion."
      q3: "Beschreibe das langfristige Verhalten abhängig von b: Aussterben, unbegrenztes Wachstum oder Einpendeln auf einen festen Wert."
    solution:
      title: "Teil 2 - Lösung"
      step21: "Schritt 2.1 - Rekursionsgleichung"
      p21: "Im Jahr t gibt es N_t fortpflanzungsfähige Fische. Diese erzeugen im Mittel bN_t Jungfische. Jeder Jungfisch überlebt mit Wahrscheinlichkeit 1/(1+cN_t)."
      p22: "Damit lautet die Rekursion:"
      step22: "Schritt 2.2 - Gleichgewichte"
      p23: "Ein Gleichgewicht erfüllt N_{t+1}=N_t=N^*."
      extinctionTitle: "Aussterbe-Gleichgewicht"
      p24: "Diese Lösung existiert immer."
      positiveTitle: "Positives Gleichgewicht"
      p25: "Für N^*>0 kann durch N^* geteilt werden:"
      p26: "Ein positives Gleichgewicht existiert nur für b > 1."
      step23: "Schritt 2.3 - Langfristiges Verhalten"
      case1: "Fall 1:"
      case1a: "Jeder Fisch erzeugt im Mittel höchstens einen überlebenden Nachkommen."
      case1b: "Die Population kann sich nicht selbst erhalten."
      case1c: "Die Population nimmt langfristig ab."
      case1d: "Grenzwert: N^*=0 (Aussterben)."
      case2: "Fall 2:"
      case2a: "Die Population wächst zunächst."
      case2b: "Mit wachsender Dichte sinkt die Überlebenswahrscheinlichkeit der Jungfische."
      case2c: "Unabhängig von der Anfangsgröße pendelt sich die Folge auf N^*=(b-1)/c ein."
      p27: "Unbegrenztes Wachstum tritt in diesem Modell nicht auf."
    summary:
      title: "Teil 3 - Zusammenfassung"
      s1: "Für b ≤ 1 stirbt die Population aus."
      s2: "Für b > 1 stabilisiert sich die Population bei N^*=(b-1)/c."
      s3: "Die dichteabhängige Überlebenswahrscheinlichkeit verhindert unbegrenztes Wachstum."
      p1: "Das ist typisch für Modelle mit dichteabhängiger Regulation."
  interactive:
    title: "Interaktive Simulation"
    p1: "Variiere N_0, b, c und den Zeithorizont. Die Kurve zeigt den Verlauf N_t; die gestrichelte Linie markiert N^*."
    n0: "N0 (Startpopulation)"
    b: "b (Reproduktionsfaktor)"
    c: "c (Konkurrenzfaktor)"
    horizon: "Zeithorizont t (Jahre)"
    extinctionTex: "b\\le 1\\Rightarrow N^* &=0\\ (Aussterbe-Gleichgewicht)"
    afterYears: "Nach {years} Jahren: N = {value}."
  calculation:
    title: "Rechnung mit einem Beispielsatz"
    extinctionTex: "b\\le 1\\Rightarrow N^* &=0\\ (Aussterbe-Gleichgewicht)"
    note: "Man sieht: Die Population nähert sich dem stabilen Gleichgewicht schnell und ohne Oszillation."
  graph:
    aria: "Zeitverlauf der Fischpopulation im Beverton-Holt-Modell"
    xTitle: "Zeit t (Jahre)"
    yTitle: "Population N(t)"
    curve: "Population N(t)"
    eq: "Gleichgewicht N*"
