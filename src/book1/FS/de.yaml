title: "Frühstücks\u00ADzettel\u00A0#1 Fisch\u00ADpopulation"
fs:
  imageTitle: "Eddie rechnet zur Fischpopulation"
  imageAlt: "Illustration zu Eddies Frühstückszettel über eine Fischpopulation"
  introDate: "Vaasa, 8. August 1985"
  subChapter:
    einleitung: "Einleitung"
    aufgabe: "Aufgabe"
    loesung: "Lösung"
    zusammenfassung: "Zusammenfassung"
    simulation: "Simulation"
  book:
    p1: "Ich sitze barfuß in Sinis Küche, die Beine hoch auf dem Stuhl, und tue so, als wären meine Füße nur beleidigt und nicht kaputt. Vor mir liegt dieser erste Frühstückszettel, süß ausgeschnitten, als wäre Mathe ein Keks. „Fischsee“, steht da, und ich muss grinsen: hundert fortpflanzungsfähige Fische am Anfang, im Mittel mehr als ein Jungfisch pro Altfisch, danach verschwindet die alte Generation, und nur ein dichteabhängiger Anteil der Jungfische schafft es ins nächste Jahr. Das klingt nach Naturfilm, ist aber eigentlich ein Rhythmus, wie Atmen: mehr, weniger, mehr, weniger. Und ich merke, wie schnell mein Kopf das Muster findet, während mein Körper noch hinterherhumpelt."
    p2: "Hier zeige ich dir, wie man bei so einem See Schritt für Schritt mitzählt, warum das Ganze nicht einfach endlos explodiert und weshalb es am Ende eher nach „Sättigung“ aussieht als nach „Endlosparty“."
  sections:
    task:
      title: "Teil 1 - Aufgabe: Entwicklung eines Fischbestandes"
      p1: "In einem abgeschlossenen See lebt eine Fischpopulation. Zu Beginn eines Jahres <katex tex=\"t\" /> gibt es <katex tex=\"N_t\" /> fortpflanzungsfähige Fische. Im Rechenbeispiel unten verwenden wir <katex tex=\"N_0=100\" />, <katex tex=\"b=2{,}0\" />, <katex tex=\"c=0{,}02\" /> und <katex tex=\"t=12\" />."
      p2: "Für die Entwicklung des Bestands von Jahr zu Jahr gelten folgende Regeln:"
      r1: "Jeder erwachsene Fisch erzeugt im Laufe eines Jahres im Mittel <katex tex=\"b>0\" /> Jungfische."
      r2: "Nicht alle Jungfische überleben bis zum nächsten Jahr. Die Überlebenswahrscheinlichkeit ist dichteabhängig und beträgt:"
      r2b: "mit <katex tex=\"c>0\" /> als Maß für begrenzte Nahrung und begrenzten Lebensraum."
      r3: "Alle überlebenden Jungfische sind im nächsten Jahr fortpflanzungsfähig."
      r4: "Die fortpflanzungsfähigen Fische des Jahres <katex tex=\"t\" /> sterben nach ihrer Fortpflanzungsperiode und werden in <katex tex=\"N_{t+1}\" /> nicht mehr mitgezählt."
      r5: "Fischfang, Zu- oder Abwanderung werden vernachlässigt."
      p3: "Untersuche dazu:"
      q1: "Stelle die Rekursionsgleichung für <katex tex=\"N_{t+1}\" /> in Abhängigkeit von <katex tex=\"N_t\" /> auf."
      q2: "Bestimme die Gleichgewichte der Rekursion."
      q3: "Beschreibe das langfristige Verhalten abhängig von <katex tex=\"b\" />: Aussterben oder Einpendeln auf einen festen Wert, und warum unbegrenztes Wachstum ausbleibt."
    solution:
      title: "Teil 2 - Lösung"
      step21: "Schritt 2.1 - Rekursionsgleichung"
      p21: "Im Jahr <katex tex=\"t\" /> gibt es <katex tex=\"N_t\" /> fortpflanzungsfähige Fische. Diese erzeugen im Mittel <katex tex=\"bN_t\" /> Jungfische. Jeder Jungfisch überlebt mit Wahrscheinlichkeit <katex tex=\"1/(1+cN_t)\" />. Die Altfische selbst zählen danach nicht mehr; nur die überlebenden Jungfische bilden <katex tex=\"N_{t+1}\" />."
      p22: "Damit lautet die Rekursion:"
      step22: "Schritt 2.2 - Gleichgewichte"
      p23: "Ein Gleichgewicht erfüllt <katex tex=\"N_{t+1}=N_t=N^*\" />."
      extinctionTitle: "Aussterbe-Gleichgewicht"
      p24: "Diese Lösung existiert immer."
      positiveTitle: "Positives Gleichgewicht"
      p25: "Für <katex tex=\"N^*>0\" /> kann durch <katex tex=\"N^*\" /> geteilt werden:"
      p26: "Ein positives Gleichgewicht existiert nur für <katex tex=\"b>1\" />."
      step23: "Schritt 2.3 - Langfristiges Verhalten"
      case1: "Fall 1:"
      case1a: "Jeder Fisch erzeugt im Mittel höchstens einen überlebenden Nachkommen."
      case1b: "Die Population kann sich nicht selbst erhalten."
      case1c: "Die Population nimmt langfristig ab."
      case1d: "Grenzwert: <katex tex=\"N^*=0\" /> (Aussterben)."
      case2: "Fall 2:"
      case2a: "Die Population wächst zunächst."
      case2b: "Mit wachsender Dichte sinkt die Überlebenswahrscheinlichkeit der Jungfische."
      case2c: "Unabhängig von der Anfangsgröße pendelt sich die Folge auf <katex tex=\"N^*=(b-1)/c\" /> ein."
      p27: "Unbegrenztes Wachstum tritt in diesem Modell nicht auf."
    summary:
      title: "Teil 3 - Zusammenfassung"
      s1: "Für <katex tex=\"b\\le 1\" /> stirbt die Population aus."
      s2: "Für <katex tex=\"b>1\" /> stabilisiert sich die Population bei <katex tex=\"N^*=(b-1)/c\" />."
      s3: "Die dichteabhängige Überlebenswahrscheinlichkeit verhindert unbegrenztes Wachstum."
      p1: "Das ist typisch für Modelle mit dichteabhängiger Regulation."
  interactive:
    title: "Interaktive Simulation"
    p1: "Variiere <katex tex=\"N_0\" />, <katex tex=\"b\" />, <katex tex=\"c\" /> und den Zeithorizont. Die Kurve zeigt den Verlauf <katex tex=\"N_t\" />; die gestrichelte Linie markiert <katex tex=\"N^*\" />."
    n0: "N₀ (Startpopulation)"
    b: "b (Reproduktionsfaktor)"
    c: "c (Konkurrenzfaktor)"
    horizon: "Zeithorizont t (Jahre)"
    extinctionTex: "b\\le 1\\Rightarrow N^* &=0\\ (Aussterbe-Gleichgewicht)"
    afterYears: "Nach {years} Jahren: Bestand = {value}."
  calculation:
    title: "Rechnung mit einem Beispielsatz"
    extinctionTex: "b\\le 1\\Rightarrow N^* &=0\\ (Aussterbe-Gleichgewicht)"
    note: "Man sieht: Die Population nähert sich dem stabilen Gleichgewicht schnell und ohne Oszillation."
