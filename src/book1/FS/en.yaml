  title: "Eddie Does The Maths: Breakfast Note #1 Fish Population"
  imageTitle: "Eddie works on the fish population"
  imageAlt: "Illustration for Eddie's breakfast note about a fish population"
  introDate: "Vaasa, August 8, 1985"
  subChapter:
    einleitung: "Introduction"
    aufgabe: "Task"
    loesung: "Solution"
    zusammenfassung: "Summary"
    simulation: "Simulation"
  book:
    p1: "I am sitting barefoot in Sini's kitchen, legs tucked up on the chair, pretending my feet are just offended and not actually broken. In front of me lies this first breakfast note, cut out so sweetly that mathematics looks like a biscuit. It says “fish lake”, and I have to grin: a hundred adult fish at the start, young fish added every year, many of the old ones dying at the end, and the young ones sliding up. It sounds like a nature documentary, but really it is a rhythm, like breathing: more, less, more, less. And I can feel how quickly my head catches the pattern while my body is still limping behind."
    p2: "Here I show you how to count along step by step for a lake like this, when the whole thing blows up, when it settles down, and why in the end it looks more like “saturation” than an “endless party”."
  sections:
    task:
      title: "Part 1 - Task: Development of a Fish Population"
      p1: "A fish population lives in a closed lake. At the beginning of year t there are N_t fish capable of reproduction."
      p2: "The following rules govern how the population develops from year to year:"
      r1: "Each adult fish produces on average b > 0 juvenile fish during one year."
      r2: "Not all juvenile fish survive until the following year. The survival probability is:"
      r2b: "where c > 0 measures limited food and limited habitat."
      r3: "All surviving juvenile fish are capable of reproduction in the next year."
      r4: "Fishing and migration in or out of the lake are neglected."
      p3: "Investigate the following:"
      q1: "Set up the recursion formula for N_{t+1} as a function of N_t."
      q2: "Determine the equilibria of the recursion."
      q3: "Describe the long-term behavior depending on b: extinction, unlimited growth, or convergence to a fixed value."
    solution:
      title: "Part 2 - Solution"
      step21: "Step 2.1 - Recursion Formula"
      p21: "In year t there are N_t fish capable of reproduction. On average they produce bN_t juvenile fish. Each juvenile fish survives with probability 1/(1+cN_t)."
      p22: "So the recursion is:"
      step22: "Step 2.2 - Equilibria"
      p23: "An equilibrium satisfies N_{t+1}=N_t=N^*."
      extinctionTitle: "Extinction Equilibrium"
      p24: "This solution always exists."
      positiveTitle: "Positive Equilibrium"
      p25: "For N^*>0 we may divide by N^*:"
      p26: "A positive equilibrium exists only for b > 1."
      step23: "Step 2.3 - Long-Term Behavior"
      case1: "Case 1:"
      case1a: "On average, each fish produces at most one surviving offspring."
      case1b: "The population cannot sustain itself."
      case1c: "The population decreases in the long run."
      case1d: "Limit: N^*=0 (extinction)."
      case2: "Case 2:"
      case2a: "The population grows at first."
      case2b: "As density increases, the survival probability of juvenile fish decreases."
      case2c: "Regardless of the initial size, the sequence settles at N^*=(b-1)/c."
      p27: "Unlimited growth does not occur in this model."
    summary:
      title: "Part 3 - Summary"
      s1: "For b ≤ 1, the population dies out."
      s2: "For b > 1, the population stabilizes at N^*=(b-1)/c."
      s3: "Density-dependent survival prevents unlimited growth."
      p1: "This is typical for models with density-dependent regulation."
  interactive:
    title: "Interactive Simulation"
    p1: "Vary N_0, b, c, and the time horizon. The curve shows the evolution of N_t; the dashed line marks N^*."
    n0: "N0 (initial population)"
    b: "b (reproduction factor)"
    c: "c (competition factor)"
    horizon: "Time horizon t (years)"
    extinctionTex: "b\\le 1\\Rightarrow N^* &=0\\ (extinction\\ equilibrium)"
    afterYears: "After {years} years: N = {value}."
  calculation:
    title: "Worked Example"
    extinctionTex: "b\\le 1\\Rightarrow N^* &=0\\ (extinction\\ equilibrium)"
    note: "You can see that the population approaches the stable equilibrium quickly and without oscillation."
