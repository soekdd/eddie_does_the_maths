  book:
    p1: "I am sitting barefoot in Sini's kitchen, legs tucked up on the chair, pretending my feet are just offended and not actually broken. In front of me lies this first breakfast note, cut out so sweetly that mathematics looks like a biscuit. It says “fish lake”, and I have to grin: a hundred reproductive fish at the start, on average more than one juvenile per adult, then the old generation disappears, and only a density-dependent fraction of the juveniles makes it into the next year. It sounds like a nature documentary, but really it is a rhythm, like breathing: more, less, more, less. And I can feel how quickly my head catches the pattern while my body is still limping behind."
    p2: "Here I show you how to count along step by step for a lake like this, why the whole thing does not simply explode forever, and why in the end it looks more like “saturation” than an “endless party”."
  sections:
    task:
      title: "Part 1 - Task: Development of a Fish Population"
      p1: "A fish population lives in a closed lake. At the beginning of year <katex tex=\"t\" /> there are <katex tex=\"N_t\" /> fish capable of reproduction. In the worked example below we use <katex tex=\"N_0=100\" />, <katex tex=\"b=2.0\" />, <katex tex=\"c=0.02\" />, and <katex tex=\"t=12\" />."
      p2: "The following rules govern how the population develops from year to year:"
      r1: "Each adult fish produces on average <katex tex=\"b>0\" /> juvenile fish during one year."
      r2: "Not all juvenile fish survive until the following year. The survival probability is density-dependent and equals:"
      r2b: "where <katex tex=\"c>0\" /> measures limited food and limited habitat."
      r3: "All surviving juvenile fish are capable of reproduction in the next year."
      r4: "The reproductive fish of year <katex tex=\"t\" /> die after their reproductive period and are not counted in <katex tex=\"N_{t+1}\" />."
      r5: "Fishing and migration in or out of the lake are neglected."
      p3: "Investigate the following:"
      q1: "Set up the recursion formula for <katex tex=\"N_{t+1}\" /> as a function of <katex tex=\"N_t\" />."
      q2: "Determine the equilibria of the recursion."
      q3: "Describe the long-term behavior depending on <katex tex=\"b\" />: extinction or convergence to a fixed value, and why unlimited growth does not occur."
    solution:
      title: "Part 2 - Solution"
      step21: "Step 2.1 - Recursion Formula"
      p21: "In year <katex tex=\"t\" /> there are <katex tex=\"N_t\" /> fish capable of reproduction. On average they produce <katex tex=\"bN_t\" /> juvenile fish. Each juvenile fish survives with probability <katex tex=\"1/(1+cN_t)\" />. The adult fish themselves are no longer counted afterwards; only the surviving juveniles form <katex tex=\"N_{t+1}\" />."
      p22: "So the recursion is:"
      step22: "Step 2.2 - Equilibria"
      p23: "An equilibrium satisfies <katex tex=\"N_{t+1}=N_t=N^*\" />."
      extinctionTitle: "Extinction Equilibrium"
      p24: "This solution always exists."
      positiveTitle: "Positive Equilibrium"
      p25: "For <katex tex=\"N^*>0\" /> we may divide by <katex tex=\"N^*\" />:"
      p26: "A positive equilibrium exists only for <katex tex=\"b>1\" />."
      step23: "Step 2.3 - Long-Term Behavior"
      case1: "Case 1:"
      case1a: "On average, each fish produces at most one surviving offspring."
      case1b: "The population cannot sustain itself."
      case1c: "The population decreases in the long run."
      case1d: "Limit: <katex tex=\"N^*=0\" /> (extinction)."
      case2: "Case 2:"
      case2a: "The population grows at first."
      case2b: "As density increases, the survival probability of juvenile fish decreases."
      case2c: "Regardless of the initial size, the sequence settles at <katex tex=\"N^*=(b-1)/c\" />."
      p27: "Unlimited growth does not occur in this model."
    summary:
      title: "Part 3 - Summary"
      s1: "For <katex tex=\"b\\le 1\" />, the population dies out."
      s2: "For <katex tex=\"b>1\" />, the population stabilizes at <katex tex=\"N^*=(b-1)/c\" />."
      s3: "Density-dependent survival prevents unlimited growth."
      p1: "This is typical for models with density-dependent regulation."
  interactive:
    title: "Interactive Simulation"
    p1: "Vary <katex tex=\"N_0\" />, <katex tex=\"b\" />, <katex tex=\"c\" />, and the time horizon. The curve shows the evolution of <katex tex=\"N_t\" />; the dashed line marks <katex tex=\"N^*\" />."
    n0: "N₀ (initial population)"
    b: "b (reproduction factor)"
    c: "c (competition factor)"
    horizon: "Time horizon t (years)"
    extinctionTex: "b\\le 1\\Rightarrow N^* &=0\\ (extinction\\ equilibrium)"
    afterYears: "After {years} years: population = {value}."
