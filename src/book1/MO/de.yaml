title: "Eddie rechnet: IMO 1985 Aufgaben Übersicht"
imageTitle: "Eddie am zweiten Wettkampftag"
imageAlt: "Eddie am zweiten Wettkampftag der IMO 1985"
introDate1: "Joutsa, 4. Juli 1985"
introDate2: "Joutsa, 5. Juli 1985"
book:
  day1p1: "Joutsa, Klassenzimmer, alles geschniegelt: Tische in Reih und Glied, Uhren ticken viel zu laut, und ich sitze da wie ein gespannter Flitzebogen. Heute bin ich noch voll im Film. Ich will nicht nur gut sein – ich will zeigen, dass ich <em>die</em> Eddie bin. Drei Aufgaben, drei Chancen, die Welt kurz auf Pause zu drücken und nur noch logisch zu atmen."
  day1p2: "Die erste ist so eine Geometrie-Falle: Kreise, ein Viereck, und irgendwo steckt eine Beziehung, die man “sehen” muss, sonst rennt man im Kreis. Die zweite tut harmlos mit Farben und Zahlen, aber die Regeln kleben alles zusammen, bis du kaum noch frei entscheiden kannst. Und die dritte ist wie ein Rechen-Zaubertrick: Du baust etwas aus Bausteinen zusammen und musst beweisen, dass eine bestimmte Eigenschaft nicht einfach verschwindet, nur weil man addiert."
  day1p3: "Ich bin wach, frech, überzeugt: Das hier ist mein Terrain."
  day2p1: "Gleicher Raum, gleiche Geräusche – aber ich bin nicht mehr dieselbe. Mein Kopf ist schon halb draußen, bei Türen, Wegen, Blicken. Ich versuche zu lesen, doch die Gedanken rutschen weg wie Seife. Alles in mir zählt nicht mehr Punkte, sondern Sekunden."
  day2p2: "Die Aufgaben fühlen sich plötzlich schwer an, obwohl sie es nicht “dürfen”. Erst geht’s um viele Zahlen, die nur aus kleinen Prim-Bausteinen bestehen, und irgendwo soll man garantiert vier finden, die zusammen etwas “perfekt Ganzes” ergeben. Dann wieder Geometrie: Dreieck, Kreise, Schnittpunkte und am Ende muss eine Ecke genau rechtwinklig sein, als würde die Zeichnung das heimlich erzwingen. Und zuletzt eine Zahlenfolge: Startest du falsch, kippt alles. Es soll genau <em>einen</em> Anfang geben, der die Folge brav zwischen null und eins hält und trotzdem wachsen lässt."
  day2p3: "Ich weiß, wie man das angeht, aber ich fühle, wie mir die Klarheit durch die Finger rinnt."
sections:
  title: "IMO 1985 - Aufgaben"
  meta: "Nur die Aufgaben (keine Lösungen). Quelle:"
tasks:
  a1:
    heading: "Schritt 1.1 - A1"
    link: "Zur Aufgabe A1"
    p1: "Ein Kreis hat seinen Mittelpunkt auf der Seite AB des Sehnenvierecks ABCD. Die drei anderen Seiten berühren den Kreis (sind Tangenten an ihn). Beweise: AD + BC = AB."
  a2:
    heading: "Schritt 1.2 - A2"
    link: "Zur Aufgabe A2"
    p1: "Seien n und k teilerfremde positive ganze Zahlen mit k<n. Jede Zahl aus der Menge M={1,2,3,\\dots,n-1} wird entweder blau oder weiß gefärbt."
    l1: "Für jedes i∈M haben i und n-i dieselbe Farbe."
    l2: "Für jedes i∈M mit i≠k haben i und |i-k| dieselbe Farbe."
    p2: "Beweise, dass alle Zahlen in M dieselbe Farbe haben müssen."
  a3:
    heading: "Schritt 1.3 - A3"
    link: "Zur Aufgabe A3"
    p1: "Für ein Polynom P(x)=a_0+a_1x+\\dots+a_kx^k mit ganzzahligen Koeffizienten bezeichne o(P) die Anzahl der ungeraden Koeffizienten von P. Für i=0,1,2,\\dots sei Q_i(x)=(1+x)^i."
    p2: "Beweise: Sind i_1,i_2,\\dots,i_n ganze Zahlen mit 0\\le i_1<i_2<\\dots<i_n, dann gilt"
  b1:
    heading: "Schritt 1.4 - B1"
    link: "Zur Aufgabe B1"
    p1: "Gegeben ist eine Menge M aus 1985 paarweise verschiedenen positiven ganzen Zahlen, von denen keine einen Primteiler größer als 23 besitzt."
    p2: "Beweise, dass M eine Teilmenge aus 4 Elementen enthält, deren Produkt eine vierte Potenz einer ganzen Zahl ist."
  b2:
    heading: "Schritt 1.5 - B2"
    link: "Zur Aufgabe B2"
    p1: "Ein Kreis mit Mittelpunkt O geht durch die Eckpunkte A und C des Dreiecks ABC und schneidet die Strecken AB bzw. BC ein zweites Mal in den (verschiedenen) Punkten K bzw. N."
    p2: "Die Umkreise der Dreiecke ABC und KBN schneiden sich in genau zwei verschiedenen Punkten B und M. Beweise, dass der Winkel ∠OMB ein rechter Winkel ist, also ∠OMB = 90^\\circ."
  b3:
    heading: "Schritt 1.6 - B3"
    link: "Zur Aufgabe B3"
    p1: "Für jede reelle Zahl x_1 wird eine Folge x_1,x_2,\\dots definiert durch"
    p2: "Beweise, dass es genau einen Startwert x_1 gibt, für den für alle n gilt: 0<x_n<x_{n+1}<1."
footer: "Quellen (zum Nachlesen): AoPS Wiki (IMO 1985 Problem 1-6) und die offiziellen ISL-Solutions (prase.cz)."
