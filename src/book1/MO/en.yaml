title: "IMO 1985 Problem Overview"
imageTitle: "Eddie on the second competition day"
imageAlt: "Eddie on the second competition day of IMO 1985"
introDate1: "Joutsa, July 4, 1985"
introDate2: "Joutsa, July 5, 1985"
book:
  day1p1: "Joutsa, classroom, everything tidy: desks in neat rows, clocks ticking far too loudly, and I am sitting there like a drawn bow. Today I am still completely in the zone. I do not just want to be good. I want to show that I am <em>the</em> Eddie. Three problems, three chances to press pause on the world for a moment and breathe only logic."
  day1p2: "The first one is a geometry trap: circles, a quadrilateral, and somewhere inside there is a relation you have to “see”, or else you run in circles. The second one looks harmless with colors and numbers, but the rules glue everything together until you can barely make any free choice. And the third is like an arithmetic magic trick: you build something out of blocks and must prove that a certain property does not simply disappear just because you add things together."
  day1p3: "I am awake, cheeky, convinced: this is my terrain."
  day2p1: "Same room, same sounds, but I am no longer the same. My head is already half outside, with doors, routes, glances. I try to read, but the thoughts keep slipping away like soap. Everything inside me is no longer counting points, only seconds."
  day2p2: "The problems suddenly feel heavy, even though they are not supposed to. First there are many numbers built only from small prime blocks, and somewhere you are guaranteed to find four whose product becomes something “perfectly whole”. Then geometry again: triangle, circles, intersection points, and in the end one angle has to be exactly right, as if the drawing secretly forces it. And finally a sequence: if you start wrong, everything collapses. There should be exactly <em>one</em> starting value that keeps the sequence neatly between zero and one while still making it grow."
  day2p3: "I know how to approach it, but I can feel the clarity slipping through my fingers."
