title: "Four colors and a computer proof"
imageTitle: "Eddie and the Four-Colour Problem"
imageAlt: "Eddie and the Four-Colour Problem"
introDate: "Stockholm, December 22, 1985"
subChapter:
  introduce: "Introduction"
  problem: "The problem"
  idea: "Appel and Haken's idea"
  computer: "Why a computer was needed"
  interactive: "Interactive"
book:
  p1: "I now have a notebook that does not get dog-eared just by looking at it. Linen. Squared. Thick paper. And this new mechanical pencil with the fine lead. A magic device. Click the top and there is a sharp tip again. No carving. No splinters. No black thumb. The pencil simply never becomes blunt. This must be what wealth feels like."
  p2: "I open the first page and wait a moment before writing the first symbol. In the past I often had soaked pages on which numbers looked like exhausted refugees. Now the empty page itself demands order. So I write more neatly. And because I write more neatly, I think more neatly. Probably an illusion. But a useful one."
  p3: "Somewhere I read that two mathematicians, Kenneth Appel and Wolfgang Haken, proved the four-color theorem with the help of a computer. A machine checked something people had struggled with for more than a hundred years. I immediately understand why this fascinates me. A map, four colors, no neighboring region equal – it sounds like colored pencils and then like a trap."
  p4: "So I start calculating. Not the entire proof — I am not crazy and I do not have a mainframe in the cupboard. But I want to follow the thoughts. How do you go from infinitely many maps to finitely many cases? How do you force a complicated map to contain a small pattern? And how do you show that this pattern cannot occur in a minimal counterexample?"
  p5: "I draw regions, turn them into graphs, number vertices, cross out, start again. The new paper endures it. The new pencil too. The longer I write, the less I think about Stockholm and borders. Instead I think about local configurations and unavoidable patterns."
  p6: "Perhaps that is the comforting thing about mathematics: something complicated is not conquered all at once but by looking closely at the right place."
sections:
  problem:
    title: "The problem"
    europe85: "Europe 1985"
    p1: "The Four Color Theorem states that every map in the plane can be colored with at most four colors in such a way that adjacent regions never have the same color. Here, “adjacent” means sharing a common border, not merely touching at a single point."
    p2: "To study this, mathematicians translate maps into <strong>planar graphs</strong>. Each region becomes a vertex, and shared borders become edges. The question then becomes: can the vertices of every planar graph be colored with at most four colors so that no two connected vertices carry the same color?"
  idea:
    title: "Appel and Haken's idea"
    p1: "Appel and Haken took up the classical idea of a <strong>minimal counterexample</strong>. So one assumes that the theorem is false and considers a smallest map that <em>cannot</em> be colored with four colors. This smallest map would have to have very special properties, because every still smaller submap would suddenly be four-colorable again."
    p2: "The proof consists of two major steps:"
    l1: "One shows that every sufficiently complicated planar map must contain <strong>at least one configuration from a finite list</strong>."
    l2: "One shows for each configuration on that list that it <strong>cannot occur</strong> in a minimal counterexample, because it is reducible."
    p3: "If every map has to contain a configuration from the list, but none of those configurations may occur in a minimal counterexample, then such a counterexample cannot exist. So the Four Color Theorem is true."
  computer:
    title: "Why a computer was needed"
    p1: "The basic idea is human and conceptually elegant. The laborious part is the sheer number of cases. The list of unavoidable configurations was large, and for every single one it had to be shown that it was reducible. That systematic case checking is exactly the part the computer took over."
    p2: "That was the real shock of the result: the computer did not have the idea, but it carried part of the burden of proof. Human beings determined the strategy, formulated the rules, and reduced the infinite problem to finitely many local patterns, and the machine then checked thousands of details that would hardly have been possible to work through reliably by hand."
    p3: "In 1985 that was still new enough to feel philosophical. What counts as a proof if no human being reads every single case check line by line? Appel and Haken did not merely prove a theorem. They also showed that mathematics changes once computers no longer merely calculate, but begin to participate in proving things."
  interactive:
    title: "Interactive configurations"
    intro: "Appel and Haken eventually arrived at <strong>1936 different unavoidable configurations</strong>. But that set could not simply be generated by a clean algorithm, so I cannot simply derive it here line by line from a few clear computational rules. <a href=\"https://www.researchgate.net/publication/259914175_Reducibility_in_the_Four-Color_Theorem\">Robertson, Sanders, Seymour and Thomas</a> later worked out the computer-assisted part of the proof more systematically. So here I am looking at configurations as they appear in their version, even if there are a few more of them there (2822)."
    graphTitle: "Unavoidable configurations"
    europeSummary: "{countryCount} countries · {edgeCount} border relations · 4 colors"
