sqrt:
  title: "Ada Cards: Kvadratrot"
  subtitle: "Heron/Newton-iteration med kort för <b>DIV, ADD, DIV</b>."
  formulaTitle: "Formel (Heron/Newton)"
  intro:
    result: "Efter {iterations} iterationer:"
    empty: "Välj <code>N</code>, startvärdet <code>x_0</code> och antalet iterationer."
  inputs:
    n: "N (heltal, >0)"
    iterations: "Iterationer"
    x0: "Startvärde x0 (bråk tillåtet, t.ex. 1 eller 3/2)"
  warning: "Iterationsformel: <code>x_{k+1}=\\frac{1}{2}\\left(x_k+\\frac{N}{x_k}\\right)</code>."
  formulaNote: "Vid varje varv kommer <code>x_k</code> närmare <code>\\sqrt{N}</code>."
  result:
    approximation: "Approximation"
    decimalError: "Decimalform & fel"
    error: "Fel: {value}"
    decimalNote: "(avrundat till 6 decimaler)"
    iterations: "Iterationer: {count}"
    cards: "Kort: {count}"
  store:
    approximation: "Approximation"
    sum: "Summa"
    loopCounter: "Loopräknare"
    info: "En iterationscykel är exakt: <code>DIV</code> -> <code>ADD</code> -> <code>DIV</code>."
  errors:
    denominatorZero: "{label}: nämnaren får inte vara 0."
    ratFormat: "{label}: endast ett heltal eller ett bråk a/b är tillåtet."
    positiveN: "N måste vara större än 0."
    iterationsRange: "Välj mellan 1 och 20 iterationer."
    x0Zero: "x0 får inte vara 0."
  deck:
    initX: "x:=x0"
    initIter: "iter:=0"
    div: "[{step}] t:=N/x"
    add: "[{step}] s:=x+t"
    halve: "[{step}] xn:=s/2"
    next: "[{step}] x:=xn"
    iter: "[{step}] iter++"
    output: "utdata x"
    square: "x^2"
    delta: "x^2-N"