al:
  title: "Kortspel med Ada Lovelace"
  imageTitle: "Eddie och Ada Lovelace"
  introDate: "Vasa, 16 september 1985"
  subChapter:
    analytical-engine: "Den analytiska maskinen"
    bernoulli-zahlen: "Bernoullital"
    gcd: "sgd"
    babbage: "Babbages maskin"
  programSelect: "Välj ett program"
  programs:
    bernoulli: "Bernoullital (Not G)"
    reduceFractions: "Förkorta bråk (sgd)"
    horner: "Polynom (Horners schema)"
    sqrt: "Kvadratrot (Heron/Newton)"
    primeTest: "Primalitetstest (provdivision)"
  bookPart:
    p1: "Jag sitter bredvid Sini på bänken, fortfarande varm av hennes skratt, fortfarande mjuk av den där kramen där jag för ett ögonblick glömmer att mitt liv består av avgångstider och flyktvägar. Och så slinker den där meningen ur mig: att min pappa egentligen ville kalla mig ”Ada”. Sini säger genast: ”Ada? Som Ada Lovelace? Jag är inte lika nördig som du, men jag har hört talas om henne!”"
    p2: "Ada Lovelace är så berömd därför att hon gjorde något fullständigt vilt: hon föreställde sig program trots att datorer ännu inte fanns. Hon tittar på Charles Babbages räknemaskin, den där enorma idén av kugghjul, och skriver inte bara ”intressant”, utan: <em>Man kan planera steg med den. Upprepa dem. Variera dem.</em> Och hon ser längre än alla andra: att en sådan maskin senare inte bara skulle behandla tal, utan också musik, texter och mönster."
    p3: "I det här kapitlet tar jag dig rakt in i den världen: vem Ada var, vad hon faktiskt ”programmerade”, och hur du kan starta Babbages maskin online och prova själv."
  sections:
    part1:
      title: "Del 1 - Kortspel med Ada"
      p1: "I dag räknar jag som Ada. Ada ville använda Charles Babbages räknemaskin för att beräkna en följd av så kallade Bernoullital."
    part2:
      title: "Del 2 - Vad är Adas ”dator”?"
      p1: "Adas maskin kallas <b>Analytical Engine</b>. Historiskt byggdes den aldrig färdigt, men modellen är kristallklar: en universell räknemaskin."
      item1Prefix: "Store (minne):"
      item1Suffix: "numrerade fack för värden, till exempel"
      item2Prefix: "Mill:"
      item2Suffix: "den aritmetiska enheten för addition, subtraktion, multiplikation och division."
      cardsLead: "Maskinen styrs med hålkort:"
      cards1: "Operationskort (addera, subtrahera, multiplicera, dividera)"
      cards2: "Talkort (konstanter)"
      cards3Prefix: "Variabelkort (läs/skriv"
      cards3Suffix: ")"
      muted: "Programlogik med loopar och förgreningar är redan möjlig."
    part3:
      title: "Del 3 - Vad är Bernoullital?"
      p1Prefix: "Bernoullital"
      p1Middle: "är en speciell talföljd som dyker upp i många summationsformler, särskilt i potenssummor som"
      p1Suffix: "De är alltså en sorts ”byggstenar” för kompakta slutna formler."
      p2: "Ett klassiskt exempel är Faulhabers formel:"
      p3Prefix: "Med den konvention som vanligen används i matematiken"
      p3Suffix: "börjar följden så här:"
      convention: "och med denna konvention har vi:"
      p4Prefix: "Emulatorn nedan räknar medvetet i <i>Not G-stil</i> med begynnelsevärdena"
      p4Middle: "och den mekaniska formen"
      p4Suffix: "Detta är en historisk, didaktisk rekonstruktion av kortsekvensen."
      p5Prefix: "Exempel från emulatorn för"
      p5Suffix: ":"
    part4:
      title: "Del 4 - Jag ”programmerar” Ada: B0, B1, B2"
      step0Title: "Steg 0 - Begynnelsevärde"
      step0: "Talkort <b>1</b>, sedan variabelkort <b>-&gt; V[0]</b>. Detta ger"
      step1Title: "Steg 1 - B1"
      step1LeadPrefix: "För"
      step1LeadSuffix: "får vi:"
      step1Result: "Minnet innehåller sedan:"
      step2Title: "Steg 2 - B2"
      step2LeadPrefix: "För"
      step2LeadSuffix: ":"
      step2Result: "Minnet innehåller sedan:"
    part5:
      title: "Del 5 - Historiskt tryckfel: den första buggen?"
      p1: "I Adas tryckta <i>Not G</i> finns en välkänd omkastad division. Den brukar berättas som ett av de tidigaste dokumenterade programmeringsfelen: en kvot trycktes upp och ner."
      p2: "tryckt (bugg)"
      p3: "korrekt"
    part6:
      title: "Del 6 - Varför detta är mer än lek med tal"
      p1Prefix: "Bernoullital förekommer i summationsformler som"
      p1Middle: "eller"
      p1Suffix: "."
      p2: "Den centrala idén är viktig: kort skapar inte bara tal, utan mönster."
    part7:
      title: "Del 7 - Den ultrakorta sammanfattningen"
      item1Prefix: "Store:"
      item1Suffix: "numrerade fack"
      item2Prefix: "Mill:"
      item2Suffix: "räknar med de värden som har lästs in"
      item3Prefix: "Hålkort:"
      item3Suffix: "operation, tal, variabel"
      item4Prefix: "Program:"
      item4Suffix: "kortsekvens = beräkningssekvens, inklusive loopar/förgreningar"
      item5Prefix: "Begynnelsevärden:"
    part8:
      title: "Del 8 - Eddie förkortar bråk med Ada"
      p1: "Att förkorta bråk fungerar via största gemensamma delare:"
      p2: "eftersom"
    part9:
      title: "Del 9 - Algoritmen med ord"
      step1Prefix: "Ta två tal"
      step1Middle: "och"
      step1Suffix: "."
      step2Prefix: "Så länge"
      step2Suffix: ":"
      step2aPrefix: "dividera"
      step2aMiddle: "med"
      step2aSuffix: "."
      step2bPrefix: "behåll bara resten"
      step2bSuffix: "."
      step2cPrefix: "sätt"
      step3Prefix: "Till slut"
      step3Suffix: "."
    part10:
      title: "Del 10 - Nu som kort: sgd(48,18)"
      step1Title: "Steg 10.1 - Start"
      step1: "Talkort <b>48</b> till <b>V[a]</b>, talkort <b>18</b> till <b>V[b]</b>."
      step2Title: "Steg 10.2 - Loop 1"
      step3Title: "Steg 10.3 - Loop 2"
      step4Title: "Steg 10.4 - Loop 3"
      step5Title: "Steg 10.5 - Slut"
      step5Prefix: "Eftersom"
      step5Middle: "får vi:"
    part11:
      title: "Del 11 - Vad vi lärde oss"
      item1: "Hålkort kan representera loopar."
      item2: "Analytical Engine kan använda rester (modulo)."
      item3: "Det gör att den systematiskt kan förkorta bråk."
      item4: "Modellen är mekanisk, men redan fullt programmerbar."
  interactiveTitle: "Babbages maskin"

