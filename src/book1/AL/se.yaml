    cards: "Kort: {count}"
  store:
    const0: "Konstant 0"
    accumulator: "Horner-ackumulator y"
    px: "p(x)"
    info: "Varje koefficientkort genererar exakt två operationer i mill: <code>MUL</code>, sedan <code>ADD</code>."
  errors:
