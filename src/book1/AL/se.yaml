bernoulli:
  title: "Ada Cards (Not G)-emulator"
  subtitle: "Strikt Ada: <b>Data / Working / Result</b>-kolumner och en loop för avsnitt <b>13...23</b>."
  formulaTitle: "Formel (Not G-stil)"
  intro:
    resultPrefix: "Den aktuella körningen ger"
    resultMiddle: "(det vill säga"
    resultSuffix: ")."
    empty: "Kör emulatorn för att se resultatet för <code>n</code>."
  inputs:
    n: "n (för B(2n-1); Not G-demo: n=4 -> B7)"
    startValuesTitle: "Bernoulli-startvärden (för Not G-demon)"
    b1: "B1 (som bråk)"
    b3: "B3 (som bråk)"
    b5: "B5 (som bråk)"
    warning: "För att beräkna riktiga <code>B_{2n-1}</code>-värden behöver du alla tidigare udda Bernoullital. Detta gränssnitt ligger medvetet nära Not G: det beräknar ett illustrativt exempel med <code>B_1,B_3,B_5</code>."
  formulaNote: "Här är <code>A_0, A_1, A_3, A_5</code> de ”mekaniska” koefficienterna som fås genom produkter och divisioner, exakt på det sätt korten kan utföra dem."
  result:
    fraction: "Utdata (bråk)"
    decimal: "Decimalform (endast visning)"
    decimalNote: "(beräknat exakt; avrundat till 6 decimaler)"
    corrected: "Korrigerat"
    cards: "Kort: {count}"
  store:
    const1: "Konstant 1"
    const2: "Konstant 2"
    factorA: "Faktor A"
    factorB: "Faktor B"
    currentA: "A_k (aktuell)"
    term: "Term (A_k·B_k)"
    denominator1: "Nämnardel 1"
    denominator2: "Nämnardel 2"
    denominatorProduct: "Nämnarprodukt"
    kCounter: "k-räknare"
    sum: "S (delsumma)"
    info: "Minneslayouten följer nu Data/Working/Result; avsnitt 13...23 genereras som en loop."
  deck:
    l1: "2*n -> V4,V5,V6"
    l2: "V4=2n-1"
    l3: "V5=2n+1"
    l4: "V11=(2n-1)/(2n+1)"
    l5: "V11/=2"
    l6: "A0=-V11"
    l7: "S+=A0"
    l8: "A1=(2n)/2"
    l9: "k=1"
    l10: "term=A1*B1"
    l11: "S+=term"
    l12: "k+=2"
    l13: "V7=2n-{value}"
    l14: "V8=2n-{value}"
    l15: "A*=V7"
    l16: "A*=V8"
    l17: "V14={value}"
    l18: "V15={value}"
    l19: "V16=V14*V15"
    l20: "A/=V16"
    l21: "term=A*{value}"
    l22: "S+=term"
    l23: "k+=2"
    l24: "B=-S"

reduceFractions:
  title: "Ada Cards: Förkorta bråk"
  subtitle: "Strikt Ada: <b>Data / Working / Result</b>-kolumner och en euklidisk loop."
  formulaTitle: "Program (euklidisk stil)"
  deckLineTitle: "Not G"
  intro:
    resultPrefix: "Resultat för"
    resultMiddle: "med"
    empty: "Ange täljare och nämnare och kör kortprogrammet."
  inputs:
    numerator: "Täljare z (heltal)"
    denominator: "Nämnare n (heltal)"
  warning: "Nämnaren <code>n</code> får inte vara <code>0</code>. Om den är negativ flyttas tecknet uppåt så att <code>n&gt;0</code> förblir sant."
  formulaNote: "Kortprogrammet beräknar först <code>g=\\gcd(z,n)</code> och dividerar sedan <code>z'=\\frac{z}{g},\\;n'=\\frac{n}{g}</code>."
  result:
    fraction: "Förkortat bråk"
    gcdDecimal: "sgd och decimalvärde"
    decimalNote: "(avrundat till 6 decimaler)"
    loops: "Loopar: {count}"
    cards: "Kort: {count}"
  store:
    normalizedNumerator: "z (normaliserad)"
    positiveDenominator: "n (>0)"
    absNumerator: "|z|"
    absDenominator: "|n|"
    loopCounter: "Loopräknare"
    gcd: "sgd g"
    info: "Programmet använder den euklidiska loopen (L4...L9); därefter divideras täljare och nämnare med sgd."
  errors:
    denominatorZero: "Nämnaren får inte vara 0."
    loopGuard: "För många loopvarv i den euklidiska loopen."
  deck:
    initA: "a:=|z|"
    initB: "b:=|n|"
    initIter: "iter:=0"
    q: "[{step}] q:=a/b"
    t: "[{step}] t:=q*b"
    r: "[{step}] r:=a-t"
    a: "[{step}] a:=b"
    b: "[{step}] b:=r"
    iter: "[{step}] iter++"
    outputG: "g:=a"
    outputZ: "z':=z/g"
    outputN: "n':=n/g"

