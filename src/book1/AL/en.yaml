    startValuesTitle: "Bernoulli start values (for the Note G demo)"
    b1: "B1 (as a fraction)"
    b3: "B3 (as a fraction)"
    b5: "B5 (as a fraction)"
    warning: "To compute real <code>B_{2n-1}</code> values, you need all previous odd Bernoulli numbers. This GUI intentionally stays close to Note G: it computes an illustrative example with <code>B_1,B_3,B_5</code>."
  formulaNote: "Here <code>A_0, A_1, A_3, A_5</code> are the “mechanical” coefficients obtained from products and divisions, exactly the way the cards can execute them."
  result:
    fraction: "Output (fraction)"
    decimal: "Decimal (display only)"
    decimalNote: "(computed exactly; rounded to 6 decimal places)"
    corrected: "Corrected"
    cards: "Cards: {count}"
  store:
    const1: "Constant 1"
    const2: "Constant 2"
    factorA: "Factor A"
    factorB: "Factor B"
    currentA: "A_k (current)"
    term: "Term (A_k·B_k)"
    denominator1: "Denominator part 1"
    denominator2: "Denominator part 2"
    denominatorProduct: "Denominator product"
    kCounter: "k counter"
    sum: "S (partial sum)"
    info: "The store layout now follows Data/Working/Result; section 13...23 is generated as a loop."
  deck:
    l1: "2*n -> V4,V5,V6"
    l2: "V4=2n-1"
    l3: "V5=2n+1"
    l4: "V11=(2n-1)/(2n+1)"
    l5: "V11/=2"
    l6: "A0=-V11"
    l7: "S+=A0"
    l8: "A1=(2n)/2"
    l9: "k=1"
    l10: "term=A1*B1"
    l11: "S+=term"
    l12: "k+=2"
    l13: "V7=2n-{value}"
    l14: "V8=2n-{value}"
    l15: "A*=V7"
    l16: "A*=V8"
    l17: "V14={value}"
    l18: "V15={value}"
    l19: "V16=V14*V15"
    l20: "A/=V16"
    l21: "term=A*{value}"
    l22: "S+=term"
    l23: "k+=2"
    l24: "B=-S"

reduceFractions:
  title: "Ada Cards: Reduce fractions"
  subtitle: "Strictly Ada: <b>Data / Working / Result</b> columns and a Euclidean loop."
  formulaTitle: "Program (Euclidean style)"
  deckLineTitle: "Note G"
  intro:
    resultPrefix: "Result for"
    resultMiddle: "with"
    empty: "Enter numerator and denominator and run the card program."
  inputs:
    numerator: "Numerator z (integer)"
    denominator: "Denominator n (integer)"
  warning: "The denominator <code>n</code> must not be <code>0</code>. If it is negative, the sign is moved upward so that <code>n&gt;0</code> remains true."
  formulaNote: "The card program first computes <code>g=\\gcd(z,n)</code> and then divides <code>z'=\\frac{z}{g},\\;n'=\\frac{n}{g}</code>."
  result:
    fraction: "Reduced fraction"
    gcdDecimal: "gcd and decimal value"
    decimalNote: "(rounded to 6 decimal places)"
    loops: "Loops: {count}"
    cards: "Cards: {count}"
  store:
    normalizedNumerator: "z (normalized)"
    positiveDenominator: "n (>0)"
    absNumerator: "|z|"
    absDenominator: "|n|"
    loopCounter: "Loop counter"
    gcd: "gcd g"
    info: "The program uses the Euclidean loop (L4...L9); afterwards numerator and denominator are divided by the gcd."
  errors:
    denominatorZero: "The denominator must not be 0."
    loopGuard: "Too many loop iterations in the Euclidean loop."
  deck:
    initA: "a:=|z|"
    initB: "b:=|n|"
    initIter: "iter:=0"
    q: "[{step}] q:=a/b"
    t: "[{step}] t:=q*b"
    r: "[{step}] r:=a-t"
    a: "[{step}] a:=b"
    b: "[{step}] b:=r"
    iter: "[{step}] iter++"
    outputG: "g:=a"
    outputZ: "z':=z/g"
    outputN: "n':=n/g"

horner:
  title: "Ada Cards: Polynomial with Horner"
  subtitle: "Card sequence for <b>MUL/ADD</b> in a Horner loop."
  formulaTitle: "Formula (Horner)"
  intro:
    empty: "Enter coefficients and a value for <code>x</code>."
  inputs:
    coefficients: "Coefficients (highest degree -> constant)"
    x: "x (integer)"
  warning: "Example: <code>2,-3,0,5</code> means <code>p(x)=2x^3-3x^2+0x+5</code>."
  formulaNote: "Instead of forming powers directly, the card program uses only multiplication and addition."
  result:
    value: "Polynomial value"
    details: "Details"
    degree: "Degree: {value}"
    x: "x = {value}"
    coefficients: "Coefficients: {value}"
    steps: "Horner steps: {count}"
    cards: "Cards: {count}"
  store:
    const0: "Constant 0"
    accumulator: "Horner accumulator y"
    px: "p(x)"
    info: "Each coefficient card generates exactly two mill operations: <code>MUL</code>, then <code>ADD</code>."
  errors:
    coefficientsEmpty: "Coefficients: please enter at least one value."
    coefficientInteger: "Coefficient #{index}: please enter an integer."
  deck:
    init: "init y:=a_m"
    mul: "[{step}] y:=y*x"
    add: "[{step}] y:=y+a_{index}"
    output: "output p(x)"

primeTest:
  title: "Ada Cards: Primality test"
  subtitle: "Trial division via remainder computation with <b>DIV/MUL/SUB</b>."
  formulaTitle: "Formula (remainder test)"
  intro:
    prime: "<code>{n}</code> is <b>prime</b>."
    composite: "<code>{n}</code> is <b>not prime</b>; smallest divisor: <b>{divisor}</b>."
    empty: "Enter an integer <code>n≥2</code>."
  inputs:
    n: "n (integer)"
  warning: "Divisors tested are <code>d=2,3,...,⌊√n⌋</code>."
  formulaNote: "A divisor exists if the remainder <code>r</code> is 0."
  result:
    classification: "Classification"
    prime: "Prime"
    composite: "Composite"
    details: "Check details"
    checks: "Divisors checked: {value}"
    bound: "Bound: {value}"
    divisor: "First divisor: {value}"
    checksChip: "Checks: {count}"
    cards: "Cards: {count}"
    primeDescription: "No divisor between 2 and {bound} was found."
    compositeDescription: "{divisor} divides {n} with no remainder."
  store:
    primeFlag: "Prime flag (1/0)"
    divisor: "Divisor"
    checks: "Checks"
    info: "The remainder is computed as in Euclid: <code>r = n - floor(n/d)*d</code>."
  errors:
    minN: "n must be at least 2."
  deck:
    initD: "d:=2"
    initPrime: "isPrime:=1"
    initDivisor: "divisor:=0"
    initChecks: "checks:=0"
    square: "[d={value}] d2"
    quotient: "[d={value}] q:=n/d"
    product: "[d={value}] t:=q*d"
    remainder: "[d={value}] r:=n-t"
    checks: "[d={value}] checks++"
    divisor: "[d={value}] divisor:=d"
    composite: "[d={value}] isPrime:=0"
    increment: "[d={value}] d++"

sqrt:
  title: "Ada Cards: Square root"
  subtitle: "Heron/Newton iteration with cards for <b>DIV, ADD, DIV</b>."
  formulaTitle: "Formula (Heron/Newton)"
  intro:
    result: "After {iterations} iterations:"
    empty: "Choose <code>N</code>, the starting value <code>x_0</code>, and the number of iterations."
  inputs:
    n: "N (integer, >0)"
    iterations: "Iterations"
    x0: "Starting value x0 (fraction allowed, e.g. 1 or 3/2)"
  warning: "Iteration formula: <code>x_{k+1}=\\frac{1}{2}\\left(x_k+\\frac{N}{x_k}\\right)</code>."
  formulaNote: "With each pass, <code>x_k</code> gets closer to <code>\\sqrt{N}</code>."
  result:
    approximation: "Approximation"
    decimalError: "Decimal & error"
    error: "Error: {value}"
    decimalNote: "(rounded to 6 decimal places)"
    iterations: "Iterations: {count}"
    cards: "Cards: {count}"
  store:
    approximation: "Approximation"
    sum: "Sum"
    loopCounter: "Loop counter"
    info: "One iteration cycle is exactly: <code>DIV</code> -> <code>ADD</code> -> <code>DIV</code>."
  errors:
    denominatorZero: "{label}: denominator must not be 0."
    ratFormat: "{label}: only an integer or a fraction a/b is allowed."
    positiveN: "N must be greater than 0."
    iterationsRange: "Please choose between 1 and 20 iterations."
    x0Zero: "x0 must not be 0."
  deck:
    initX: "x:=x0"
    initIter: "iter:=0"
    div: "[{step}] t:=N/x"
    add: "[{step}] s:=x+t"
    halve: "[{step}] xn:=s/2"
    next: "[{step}] x:=xn"
    iter: "[{step}] iter++"
    output: "output x"
    square: "x^2"
    delta: "x^2-N"
