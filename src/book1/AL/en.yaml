al:
  title: "Card Games with Ada Lovelace"
  imageTitle: "Eddie and Ada Lovelace"
  introDate: "Vaasa, September 16, 1985"
  subChapter:
    analytical-engine: "Analytical Engine"
    bernoulli-zahlen: "Bernoulli numbers"
    gcd: "gcd"
    babbage: "Babbage's machine"
  programSelect: "Choose a program"
  programs:
    bernoulli: "Bernoulli numbers (Note G)"
    reduceFractions: "Reduce fractions (gcd)"
    horner: "Polynomial (Horner scheme)"
    sqrt: "Square root (Heron/Newton)"
    primeTest: "Primality test (trial division)"
  bookPart:
    p1: "I am sitting next to Sini on the bench, still warm from her laughter, still soft from that hug in which I briefly forget that my life is made of departure times and escape routes. And then this sentence slips out: that my father actually wanted to call me “Ada”. Sini immediately says: “Ada? As in Ada Lovelace? I'm not as nerdy as you, but I've heard of her!”"
    p2: "Ada Lovelace is so famous because she did something outrageous: she imagined programs even though computers did not exist yet. She looks at Charles Babbage's calculating machine, this huge idea made of gears, and writes not only “interesting”, but: <em>You can plan steps with it. Repeat them. Vary them.</em> And she sees further than everyone else: that such a machine would later process not only numbers, but also music, texts, and patterns."
    p3: "In this chapter I take you right into that world: who Ada was, what she actually “programmed”, and how you can start Babbage's machine online and try it yourself."
  sections:
    part1:
      title: "Part 1 - Card game with Ada"
      p1: "Today I calculate like Ada. Ada wanted to use Charles Babbage's calculating machine to compute a sequence of so-called Bernoulli numbers."
    part2:
      title: "Part 2 - What is Ada's “computer”?"
      p1: "Ada's machine is called the <b>Analytical Engine</b>. Historically it was never fully built, but the model is crystal clear: a universal calculating machine."
      item1Prefix: "Store (memory):"
      item1Suffix: "numbered slots for values, for example"
      item2Prefix: "Mill:"
      item2Suffix: "the arithmetic unit for addition, subtraction, multiplication, and division."
      cardsLead: "The machine is controlled by punched cards:"
      cards1: "Operation cards (add, subtract, multiply, divide)"
      cards2: "Number cards (constants)"
      cards3Prefix: "Variable cards (read/write"
      cards3Suffix: ")"
      muted: "Program logic with loops and branches is already possible."
    part3:
      title: "Part 3 - What are Bernoulli numbers?"
      p1Prefix: "Bernoulli numbers"
      p1Middle: "are a special sequence of numbers that appears in many summation formulas, especially in power sums such as"
      p1Suffix: "So they are a kind of “building blocks” for compact closed formulas."
      p2: "A classical example is Faulhaber's formula:"
      p3Prefix: "With the convention commonly used in mathematics,"
      p3Suffix: "the sequence begins like this:"
      convention: "and with this convention we have:"
      p4Prefix: "The emulator below deliberately computes in <i>Note G style</i> with the initial values"
      p4Middle: "and the mechanical form"
      p4Suffix: "This is a historical, didactic reconstruction of the card sequence."
      p5Prefix: "Example from the emulator for"
      p5Suffix: ":"
    part4:
      title: "Part 4 - I “program” Ada: B0, B1, B2"
      step0Title: "Step 0 - Initial value"
      step0: "Number card <b>1</b>, then variable card <b>-&gt; V[0]</b>. This gives"
      step1Title: "Step 1 - B1"
      step1LeadPrefix: "For"
      step1LeadSuffix: "we get:"
      step1Result: "The store then contains:"
      step2Title: "Step 2 - B2"
      step2LeadPrefix: "For"
      step2LeadSuffix: ":"
      step2Result: "The store then contains:"
    part5:
      title: "Part 5 - Historical typo: the first bug?"
      p1: "In Ada's printed <i>Note G</i> there is a well-known swapped division. It is often told as one of the earliest documented programming errors: a quotient was printed upside down."
    part6:
      title: "Part 6 - Why this is more than number play"
      p1Prefix: "Bernoulli numbers appear in summation formulas such as"
      p1Middle: "or"
      p1Suffix: "."
      p2: "That central idea matters: cards do not generate only numbers, but patterns."
    part7:
      title: "Part 7 - The ultra-short recap"
      item1Prefix: "Store:"
      item1Suffix: "numbered slots"
      item2Prefix: "Mill:"
      item2Suffix: "computes with the values that were read"
      item3Prefix: "Punched cards:"
      item3Suffix: "operation, number, variable"
      item4Prefix: "Program:"
      item4Suffix: "card sequence = computation sequence, including loops/branches"
      item5Prefix: "Initial values:"
    part8:
      title: "Part 8 - Eddie reduces fractions with Ada"
      p1: "Reducing fractions works via the greatest common divisor:"
    part9:
      title: "Part 9 - The algorithm in words"
      step1Prefix: "Take two numbers"
      step1Middle: "and"
      step1Suffix: "."
      step2Prefix: "As long as"
      step2Suffix: ":"
      step2aPrefix: "divide"
      step2aMiddle: "by"
      step2aSuffix: "."
      step2bPrefix: "keep only the remainder"
      step2bSuffix: "."
      step2cPrefix: "set"
      step3Prefix: "At the end,"
      step3Suffix: "."
    part10:
      title: "Part 10 - Now as cards: gcd(48,18)"
      step1Title: "Step 10.1 - Start"
      step1: "Number card <b>48</b> into <b>V[a]</b>, number card <b>18</b> into <b>V[b]</b>."
      step2Title: "Step 10.2 - Loop 1"
      step3Title: "Step 10.3 - Loop 2"
      step4Title: "Step 10.4 - Loop 3"
      step5Title: "Step 10.5 - End"
      step5Prefix: "Since"
      step5Middle: "we get:"
    part11:
      title: "Part 11 - What we learned"
      item1: "Punched cards can represent loops."
      item2: "The Analytical Engine can use remainders (modulo)."
      item3: "That lets it reduce fractions systematically."
      item4: "The model is mechanical, but already fully programmable."
  interactiveTitle: "Babbage's machine"

