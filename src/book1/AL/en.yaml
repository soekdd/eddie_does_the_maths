bernoulli:
  title: "Ada Cards (Note G) Emulator"
  subtitle: "Strictly Ada: <b>Data / Working / Result</b> columns and a loop for section <b>13...23</b>."
  formulaTitle: "Formula (Note G style)"
  intro:
    resultPrefix: "The current run produces"
    resultMiddle: "(that is"
    resultSuffix: ")."
    empty: "Run the emulator to see the result for <code>n</code>."
  inputs:
