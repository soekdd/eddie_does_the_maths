bernoulli:
  title: "Ada-Karten (Note G) Emulator"
  subtitle: "Ada-streng: <b>Data / Working / Result</b>-Spalten und Loop für Sektion <b>13…23</b>."
  formulaTitle: "Formel (Note-G-Stil)"
  intro:
    resultPrefix: "Aktuelle Ausführung liefert für"
    resultMiddle: "(also"
    resultSuffix: ")."
    empty: "Führe den Emulator aus, um das Ergebnis für <code>n</code> zu sehen."
  inputs:
    n: "n (für B(2n-1); Note-G-Demo: n=4 → B7)"
    startValuesTitle: "Bernoulli-Startwerte (für Note-G-Demo)"
    b1: "B1 (als Bruch)"
    b3: "B3 (als Bruch)"
    b5: "B5 (als Bruch)"
    warning: "Für echte <code>B_{2n-1}</code> braucht man alle vorherigen ungeraden Bernoulli-Zahlen. Diese GUI ist absichtlich „Note-G-nah“: sie rechnet exemplarisch mit <code>B_1,B_3,B_5</code>."
  formulaNote: "Dabei sind <code>A_0, A_1, A_3, A_5</code> die „mechanischen“ Koeffizienten aus Produkten/Divisionen, so wie es die Karten sauber abspulen können."
  result:
    fraction: "Ausgabe (Bruch)"
    decimal: "Dezimal (nur Anzeige)"
    decimalNote: "(exakt gerechnet; auf 6 Nachkommastellen gerundet)"
    corrected: "Korrigiert"
    cards: "Karten: {count}"
  store:
    const1: "Konstante 1"
    const2: "Konstante 2"
    factorA: "Faktor A"
    factorB: "Faktor B"
    currentA: "A_k (aktuell)"
    term: "Term (A_k·B_k)"
    denominator1: "Nennerteil 1"
    denominator2: "Nennerteil 2"
    denominatorProduct: "Nennerprodukt"
    kCounter: "k-Zaehler"
    sum: "S (Zwischensumme)"
    info: "Das Store-Layout folgt nun Data/Working/Result; die Sektion 13…23 wird als Schleife erzeugt."
  deck:
    l1: "2*n → V4,V5,V6"
    l2: "V4=2n-1"
    l3: "V5=2n+1"
    l4: "V11=(2n-1)/(2n+1)"
    l5: "V11/=2"
    l6: "A0=-V11"
    l7: "S+=A0"
    l8: "A1=(2n)/2"
    l9: "k=1"
    l10: "term=A1*B1"
    l11: "S+=term"
    l12: "k+=2"
    l13: "V7=2n-{value}"
    l14: "V8=2n-{value}"
    l15: "A*=V7"
    l16: "A*=V8"
    l17: "V14={value}"
    l18: "V15={value}"
    l19: "V16=V14*V15"
    l20: "A/=V16"
    l21: "term=A*{value}"
    l22: "S+=term"
    l23: "k+=2"
    l24: "B=-S"

reduceFractions:
  title: "Ada-Karten: Brüche kürzen"
  subtitle: "Ada-streng: <b>Data / Working / Result</b>-Spalten und Euklid-Loop."
  formulaTitle: "Programm (Euklid-Stil)"
  deckLineTitle: "Note-G"
  intro:
    resultPrefix: "Ergebnis für"
    resultMiddle: "mit"
    empty: "Gib Zähler und Nenner ein und führe das Kartenprogramm aus."
  inputs:
    numerator: "Zähler z (ganzzahlig)"
    denominator: "Nenner n (ganzzahlig)"
  warning: "Nenner <code>n</code> darf nicht <code>0</code> sein. Bei negativem Nenner wird das Vorzeichen nach oben gezogen, damit <code>n&gt;0</code> bleibt."
  formulaNote: "Das Kartenprogramm berechnet erst <code>g=\\gcd(z,n)</code> und teilt dann <code>z'=\\frac{z}{g},\\;n'=\\frac{n}{g}</code>."
  result:
    fraction: "Gekürzter Bruch"
    gcdDecimal: "ggT und Dezimalwert"
    decimalNote: "(auf 6 Nachkommastellen gerundet)"
    loops: "Loops: {count}"
    cards: "Karten: {count}"
  store:
    normalizedNumerator: "z (normalisiert)"
    positiveDenominator: "n (>0)"
    absNumerator: "|z|"
    absDenominator: "|n|"
    loopCounter: "Loopzähler"
    gcd: "ggT g"
    info: "Das Programm nutzt den Euklid-Loop (L4…L9), danach werden Zähler und Nenner durch den ggT geteilt."
  errors:
    denominatorZero: "Nenner darf nicht 0 sein."
    loopGuard: "Zu viele Schleifendurchläufe im Euklid-Loop."
  deck:
    initA: "a:=|z|"
    initB: "b:=|n|"
    initIter: "iter:=0"
    q: "[{step}] q:=a/b"
    t: "[{step}] t:=q*b"
    r: "[{step}] r:=a-t"
    a: "[{step}] a:=b"
    b: "[{step}] b:=r"
    iter: "[{step}] iter++"
    outputG: "g:=a"
    outputZ: "z':=z/g"
    outputN: "n':=n/g"

horner:
  title: "Ada-Karten: Polynom mit Horner"
  subtitle: "Kartenfolge für <b>MUL/ADD</b> in einer Horner-Schleife."
  formulaTitle: "Formel (Horner)"
  intro:
    empty: "Gib Koeffizienten und einen Wert für <code>x</code> ein."
  inputs:
    coefficients: "Koeffizienten (höchster Grad → konstant)"
    x: "x (ganzzahlig)"
  warning: "Beispiel: <code>2,-3,0,5</code> bedeutet <code>p(x)=2x^3-3x^2+0x+5</code>."
  formulaNote: "Statt Potenzen direkt zu bilden, verwendet das Kartenprogramm nur Multiplikation und Addition."
  result:
    value: "Polynomwert"
    details: "Details"
    degree: "Grad: {value}"
    x: "x = {value}"
    coefficients: "Koeffizienten: {value}"
    steps: "Horner-Schritte: {count}"
    cards: "Karten: {count}"
  store:
    const0: "Konstante 0"
    accumulator: "Horner-Akkumulator y"
    px: "p(x)"
    info: "Jede Koeffizientenkarte erzeugt genau zwei Mill-Operationen: <code>MUL</code>, dann <code>ADD</code>."
  errors:
    coefficientsEmpty: "Koeffizienten: Bitte mindestens einen Wert eingeben."
    coefficientInteger: "Koeffizient #{index}: bitte ganze Zahl angeben."
  deck:
    init: "init y:=a_m"
    mul: "[{step}] y:=y*x"
    add: "[{step}] y:=y+a_{index}"
    output: "output p(x)"

primeTest:
  title: "Ada-Karten: Primzahltest"
  subtitle: "Trial Division über Restbildung mit <b>DIV/MUL/SUB</b>."
  formulaTitle: "Formel (Resttest)"
  intro:
    prime: "<code>{n}</code> ist <b>prim</b>."
    composite: "<code>{n}</code> ist <b>nicht prim</b>; kleinster Teiler: <b>{divisor}</b>."
    empty: "Gib eine ganze Zahl <code>n≥2</code> ein."
  inputs:
    n: "n (ganzzahlig)"
  warning: "Geprüft werden Teiler <code>d=2,3,...,⌊√n⌋</code>."
  formulaNote: "Ein Teiler liegt vor, wenn der Rest <code>r</code> gleich 0 ist."
  result:
    classification: "Klassifikation"
    prime: "Prim"
    composite: "Komposit"
    details: "Prüfdetails"
    checks: "Geprüfte Teiler: {value}"
    bound: "Grenze: {value}"
    divisor: "Erster Teiler: {value}"
    checksChip: "Checks: {count}"
    cards: "Karten: {count}"
    primeDescription: "Kein Teiler zwischen 2 und {bound} gefunden."
    compositeDescription: "{divisor} teilt {n} ohne Rest."
  store:
    primeFlag: "Primflag (1/0)"
    divisor: "Teiler"
    checks: "Checks"
    info: "Rest wird wie bei Euklid berechnet: <code>r = n - floor(n/d)*d</code>."
  errors:
    minN: "n muss mindestens 2 sein."
  deck:
    initD: "d:=2"
    initPrime: "isPrime:=1"
    initDivisor: "divisor:=0"
    initChecks: "checks:=0"
    square: "[d={value}] d2"
    quotient: "[d={value}] q:=n/d"
    product: "[d={value}] t:=q*d"
    remainder: "[d={value}] r:=n-t"
    checks: "[d={value}] checks++"
    divisor: "[d={value}] divisor:=d"
    composite: "[d={value}] isPrime:=0"
    increment: "[d={value}] d++"

sqrt:
  title: "Ada-Karten: Quadratwurzel"
  subtitle: "Heron/Newton-Iteration mit Karten für <b>DIV, ADD, DIV</b>."
  formulaTitle: "Formel (Heron/Newton)"
  intro:
    result: "Nach {iterations} Iterationen:"
    empty: "Wähle <code>N</code>, Startwert <code>x_0</code> und Iterationszahl."
  inputs:
    n: "N (ganzzahlig, >0)"
    iterations: "Iterationen"
    x0: "Startwert x0 (Bruch erlaubt, z.B. 1 oder 3/2)"
  warning: "Iterationsformel: <code>x_{k+1}=\\frac{1}{2}\\left(x_k+\\frac{N}{x_k}\\right)</code>."
  formulaNote: "Mit jedem Durchlauf nähert sich <code>x_k</code> der Wurzel <code>\\sqrt{N}</code> an."
  result:
    approximation: "Näherung"
    decimalError: "Dezimal & Fehler"
    error: "Fehler: {value}"
    decimalNote: "(auf 6 Nachkommastellen gerundet)"
    iterations: "Iterationen: {count}"
    cards: "Karten: {count}"
  store:
    approximation: "Näherung"
    sum: "Summe"
    loopCounter: "Loopzähler"
    info: "Ein Iterationszyklus ist exakt: <code>DIV</code> → <code>ADD</code> → <code>DIV</code>."
  errors:
    denominatorZero: "{label}: Nenner darf nicht 0 sein."
    ratFormat: "{label}: Nur ganze Zahl oder Bruch a/b erlaubt."
    positiveN: "N muss größer als 0 sein."
    iterationsRange: "Iterationen bitte zwischen 1 und 20."
    x0Zero: "x0 darf nicht 0 sein."
  deck:
    initX: "x:=x0"
    initIter: "iter:=0"
    div: "[{step}] t:=N/x"
    add: "[{step}] s:=x+t"
    halve: "[{step}] xn:=s/2"
    next: "[{step}] x:=xn"
    iter: "[{step}] iter++"
    output: "output x"
    square: "x^2"
    delta: "x^2-N"
