al:
  title: "Kartenspiele mit Ada Lovelace"
  imageTitle: "Eddie und Ada Lovelace"
  introDate: "Vaasa, 16. September 1985"
  subChapter:
    analytical-engine: "Analytical Engine"
    bernoulli-zahlen: "Bernoulli-Zahlen"
    gcd: "ggT"
    babbage: "Babbages Maschine"
  programSelect: "Programm auswählen"
  programs:
    bernoulli: "Bernoulli-Zahlen (Note G)"
    reduceFractions: "Brüche kürzen (ggT)"
    horner: "Polynom (Horner-Schema)"
    sqrt: "Quadratwurzel (Heron/Newton)"
    primeTest: "Primzahltest (Trial Division)"
  bookPart:
    p1: "Ich sitze neben Sini auf der Bank, noch warm von ihrem Lachen, noch weich von dieser Umarmung, bei der ich kurz vergesse, dass mein Leben aus Abfahrtszeiten und Fluchtwegen besteht. Und dann rutscht mir dieser Satz raus: Dass mein Vater mich eigentlich „Ada“ nennen wollte. Sini ruft sofort: „Ada? Nach Ada Lovelace? Ich bin kein Nerd wie du, aber von ihr habe ich schon gehört!“"
    p2: "Ada Lovelace ist so berühmt, weil sie etwas Unverschämtes gemacht hat: Sie denkt sich Programme aus, obwohl es noch gar keinen Computer gibt. Sie schaut auf Charles Babbages Rechenmaschine, diese riesige Idee aus Zahnrädern, und schreibt nicht nur „spannend“, sondern: <em>Damit kann man Schritte planen. Wiederholen. Variieren.</em> Und sie sieht weiter als alle: Dass so eine Maschine später nicht nur Zahlen frisst, sondern auch Musik, Texte, Muster."
    p3: "In diesem Kapitel nehme ich dich genau da mit rein: Wer Ada war, was sie wirklich „programmiert“ hat und wie du Babbages Maschine online selbst anwerfen und ausprobieren kannst."
  sections:
    part1:
      title: "Teil 1 - Kartenspiel mit Ada"
      p1: "Heute rechne ich wie Ada. Ada wollte mit Hilfe von Charles Babbages Rechenmaschine eine Reihe sogenannter Bernoulli-Zahlen berechnen."
    part2:
      title: "Teil 2 - Was ist Adas „Computer“?"
      p1: "Adas Maschine heisst <b>Analytical Engine</b>. Sie wurde historisch nie vollständig gebaut, aber das Modell ist glasklar: eine universelle Rechenmaschine."
      item1Prefix: "Store (Speicher):"
      item1Suffix: "nummerierte Fächer für Zahlen, z.B."
      item2Prefix: "Mill (Mühle):"
      item2Suffix: "Rechenwerk für Plus, Minus, Mal, Geteilt."
      cardsLead: "Gesteuert wird die Maschine über Lochkarten:"
      cards1: "Operationskarten (Addiere, Subtrahiere, Multipliziere, Dividiere)"
      cards2: "Zahlkarten (Konstanten)"
      cards3Prefix: "Variablenkarten (lies/schreibe"
      cards3Suffix: ")"
      muted: "Programmlogik mit Schleifen und Abzweigungen ist damit bereits möglich."
    part3:
      title: "Teil 3 - Was sind Bernoulli-Zahlen?"
      p1Prefix: "Bernoulli-Zahlen"
      p1Middle: "sind eine spezielle Zahlenfolge, die in vielen Summenformeln auftaucht, besonders bei Potenzsummen wie"
      p1Suffix: "Sie sind also eine Art „Bausteine“ für kompakte geschlossene Formeln."
      p2: "Ein klassisches Beispiel ist die Faulhaber-Formel:"
      p3Prefix: "Mit der in der Mathematik üblichen Konvention"
      p3Suffix: "beginnt die Folge z.B. so:"
      convention: "und für diese Konvention gilt:"
      p4Prefix: "Unser Emulator darunter rechnet bewusst im <i>Note-G-Stil</i> mit den Startwerten"
      p4Middle: "und der mechanischen Form"
      p4Suffix: "Das ist eine historische, didaktische Nachbildung des Kartenablaufs."
      p5Prefix: "Beispiel aus dem Emulator für"
      p5Suffix: ":"
    part4:
      title: "Teil 4 - Ich „programmiere“ Ada: B0, B1, B2"
      step0Title: "Schritt 0 - Startwert"
      step0: "Zahlkarte <b>1</b>, dann Variablenkarte <b>-&gt; V[0]</b>. Damit gilt"
      step1Title: "Schritt 1 - B1"
      step1LeadPrefix: "Für"
      step1LeadSuffix: "gilt:"
      step1Result: "Im Store steht danach:"
      step2Title: "Schritt 2 - B2"
      step2LeadPrefix: "Für"
      step2LeadSuffix: ":"
      step2Result: "Im Store steht danach:"
    part5:
      title: "Teil 5 - Historischer Druckfehler: der erste Bug?"
      p1: "In Adas gedruckter <i>Note G</i> gibt es eine bekannte vertauschte Division. Sie wird oft als einer der frühesten dokumentierten Programmierfehler erzählt: ein Quotient steht auf dem Kopf."
      p2: "gedruckt (Bug)"
      p3: "korrekt"
    part6:
      title: "Teil 6 - Warum das mehr ist als Zahlenspielerei"
      p1Prefix: "Bernoulli-Zahlen stecken in Summenformeln wie"
      p1Middle: "oder"
      p1Suffix: "."
      p2: "Die Idee ist zentral: Karten erzeugen nicht nur Zahlen, sondern Muster."
    part7:
      title: "Teil 7 - Noch mal in superkurz"
      item1Prefix: "Store:"
      item1Suffix: "nummerierte Fächer"
      item2Prefix: "Mill:"
      item2Suffix: "rechnet mit ausgelesenen Werten"
      item3Prefix: "Lochkarten:"
      item3Suffix: "Operation, Zahl, Variable"
      item4Prefix: "Programm:"
      item4Suffix: "Kartenfolge = Rechenfolge, inkl. Schleifen/Abzweigungen"
      item5Prefix: "Startwerte:"
    part8:
      title: "Teil 8 - Eddie kürzt Brüche mit Ada"
      p1: "Brüche kürzen geht über den grössten gemeinsamen Teiler:"
      p2: "weil"
    part9:
      title: "Teil 9 - Algorithmus in Worten"
      step1Prefix: "Nimm zwei Zahlen"
      step1Middle: "und"
      step1Suffix: "."
      step2Prefix: "Solange"
      step2Suffix: ":"
      step2aPrefix: "teile"
      step2aMiddle: "durch"
      step2aSuffix: "."
      step2bPrefix: "behalte nur den Rest"
      step2bSuffix: "."
      step2cPrefix: "setze"
      step3Prefix: "Am Ende ist"
      step3Suffix: "."
    part10:
      title: "Teil 10 - Jetzt in Karten: gcd(48,18)"
      step1Title: "Schritt 10.1 - Start"
      step1: "Zahlkarte <b>48</b> in <b>V[a]</b>, Zahlkarte <b>18</b> in <b>V[b]</b>."
      step2Title: "Schritt 10.2 - Schleife 1"
      step3Title: "Schritt 10.3 - Schleife 2"
      step4Title: "Schritt 10.4 - Schleife 3"
      step5Title: "Schritt 10.5 - Ende"
      step5Prefix: "Da"
      step5Middle: "gilt:"
    part11:
      title: "Teil 11 - Was wir gelernt haben"
      item1: "Lochkarten können Schleifen abbilden."
      item2: "Die Analytical Engine kann Restbildung (Modulo) verwenden."
      item3: "Damit kann sie Brüche systematisch kürzen."
      item4: "Das Modell ist mechanisch, aber bereits voll programmatisch."
  interactiveTitle: "Babbages Maschine"

