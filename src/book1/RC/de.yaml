title: "Die verborgenen Regeln des Zauberwürfels"
imageTitle: "Eddie entdeckt die Regeln des Zauberwürfels"
imageAlt: "Eddie hält im Weihnachtslicht einen bunten Zauberwürfel in den Händen"
introDate: "Stockholm, 24. Dezember 1985"
