book:
  p1: "Vidar legt mir das kleine quadratische Päckchen auf die Knie. Das Papier ist an den Kanten so schief gefaltet, dass er es eindeutig selbst eingepackt hat. Darunter kommt ein Würfel hervor: sechs Farben, kleine Quadrate, ein bisschen schwarzes Plastik. Ich drehe die obere Reihe. Die Steine rasten mit einem satten Klicken ein, und die eben noch ordentliche Fläche ist sofort zerstört."
  p2: "<b>Ein Zauberwürfel.</b> 1985 sind diese Dinger noch ziemlich neu. In Europa kennt man sie erst seit wenigen Jahren, und selbst die Mathematik beschäftigt sich noch nicht lange ernsthaft mit ihnen. Das gefällt mir. Vidar hat mir kein fertig erklärtes Rätsel geschenkt, sondern eines, an dessen Rand noch gearbeitet wird."
  p3: "Ich halte ihn dichter ans Kerzenlicht und drehe noch eine Seite. Die Mittelsteine wechseln ihre Plätze nicht. Weiß bleibt die Mitte der weißen Seite, Rot die Mitte der roten. Die Zentren sind das Koordinatensystem; alle anderen Steine bewegen sich darum herum. Der Würfel tut so, als wären seine Farben frei. Aber das stimmt nicht."
  p4: "„Und?“, fragt Vidar. „Magst du ihn?“ Ich nicke. Natürlich mag ich ihn. Er ist klein, frech und voller Regeln, die er nicht zugibt."
  p5: "Nach ein paar Drehungen habe ich eine rote Seite. Vidar grinst, als hätte ich einen Zaubertrick vorgeführt. Ich sehe dagegen schon das nächste Problem: Eine fertige Seite kann den Rest des Würfels trotzdem ruinieren. Jede Bewegung nimmt andere Steine mit. Die Reihenfolge ist nicht bloß wichtig. Sie ist ein Gedächtnis."
  p6: "Ich ziehe mein Heft heran und zeichne Ecken, Kanten und Pfeile. Das hier ist kein Farbspiel. Es ist eine Maschine für Permutationen. Und sie kann erstaunlich viel, aber eben nicht alles."
sections:
  part1:
    title: "1. Der Würfel sieht aus wie ein Spielzeug"
    p1: "Auf sechs Seiten liegen je neun sichtbare Farbflächen. Man könnte deshalb glauben, der Würfel bestehe aus 54 unabhängigen Aufklebern. Für seine Bewegungen ist das die falsche Zählweise. Die Flächen gehören zu Steinen:"
    l1: "8 Ecksteine mit jeweils 3 sichtbaren Farben"
    l2: "12 Kantensteine mit jeweils 2 sichtbaren Farben"
    l3: "6 Mittelsteine mit jeweils 1 sichtbarer Farbe"
    p2: "Die sechs Mittelsteine tauschen beim normalen 3×3×3-Würfel ihre Plätze nicht. Sie legen fest, was oben, unten, vorn, hinten, links und rechts bedeutet. Wir müssen daher nicht einzelne Farben zählen, sondern <b>Steine, Plätze und Orientierungen</b>."
  part2:
    title: "2. In Wahrheit ist er eine Permutationsmaschine"
    p1: "Zuerst zählen wir absichtlich zu großzügig. Wir tun so, als ließen sich alle Steine unabhängig voneinander verteilen und ausrichten:"
    l1Before: "Die 8 Ecken können auf 8 Plätzen stehen"
    l2Before: "Jede Ecke hat 3 mögliche Orientierungen"
    l3Before: "Die 12 Kanten können auf 12 Plätzen stehen"
    l4Before: "Jede Kante hat 2 mögliche Orientierungen"
    p2: "Das Produkt ist eine gute erste Vermutung, aber zu groß. Es zählt auch Würfel, die man nur durch Auseinanderbauen und falsches Zusammensetzen erzeugen könnte. Legale Drehungen gehorchen drei Erhaltungsgesetzen."
  part3:
    title: "3. Nicht alle sichtbaren Zustände sind erreichbar"
    p1: "Der Würfel ist strenger als seine Oberfläche. Drei Einschränkungen streichen fast alle scheinbar möglichen Anordnungen aus unserer ersten Rechnung."
    cornersTitle: "Eckenverdrehung"
    cornersP1: "Eine einzelne Ecke kann durch legale Züge niemals allein verdreht werden. Kodieren wir ihre drei Orientierungen mit 0, 1 und 2, dann bleibt die Summe modulo 3 gleich null. Die Orientierung der achten Ecke ist deshalb durch die ersten sieben festgelegt."
    edgesTitle: "Kantenkippung"
    edgesP1: "Auch eine einzelne Kante kann nicht allein gekippt werden. Die Summe der Kantenorientierungen bleibt gerade. Sobald elf Kanten festliegen, ist die zwölfte bestimmt."
    parityTitle: "Parität der Permutationen"
    parityP1: "Zuletzt müssen die Vorzeichen der Eckenpermutation und der Kantenpermutation übereinstimmen. Zwei Ecken allein zu vertauschen ist ebenso unmöglich wie zwei Kanten allein zu vertauschen. Diese Kopplung kostet noch einmal einen Faktor 2."
    p2: "Damit bleiben genau folgende legal erreichbare Stellungen:"
    p3: "Mehr als 43 Trillionen Möglichkeiten, aber längst nicht jede Anordnung, die äußerlich denkbar wäre. <b>Nicht alles, was man sehen kann, kann man durch Drehen erreichen.</b>"
  part4:
    title: "4. Bewegungen vertauschen sich nicht"
    p1: "Beim Addieren ist die Reihenfolge egal. Beim Würfel fast nie. Wir nennen eine Vierteldrehung der rechten Seite R und eine Vierteldrehung der oberen Seite U. Erst R und dann U führt im Allgemeinen zu einem anderen Zustand als erst U und dann R."
    p2: "Das lässt sich mit den Händen prüfen: Merke dir die Ausgangslage, führe R und U aus und mache beides rückgängig. Vergleiche danach mit U gefolgt von R. Der Würfel ist <b>nicht kommutativ</b>. Die Reihenfolge gehört zur Handlung selbst."
    p3: "Eddie: „Der Würfel merkt sich nicht meine Absicht. Er merkt sich die Reihenfolge.“"
  part5:
    title: "5. Aus Nichtvertauschbarkeit entstehen Kommutatoren"
    p1: "Die Abweichung zwischen zwei Bewegungen kann man gezielt isolieren. Dafür verwendet die Gruppentheorie einen Kommutator. Wir lesen die Zugfolge hier von links nach rechts:"
    l1: "Führe A aus."
    l2: "Führe B aus."
    l3: "Mache A rückgängig."
    l4: "Mache B rückgängig."
    p2: "Würden A und B vertauschen, bliebe nichts übrig. Beim Zauberwürfel bleibt häufig eine kleine, gezielte Veränderung zurück, während viele andere Steine an ihre Plätze zurückkehren. Darum sind Kommutatoren beim Lösen so wertvoll: Sie ersetzen großflächiges Verwüsten durch kontrollierte Wirkung."
    p3: "Eddie: „Ich nehme beide Bewegungen zurück, und übrig bleibt nur ihre Wechselwirkung.“"
  part6:
    title: "6. Konjugation trägt denselben Trick an einen anderen Ort"
    p1: "Angenommen, eine bekannte Zugfolge A wirkt an der richtigen Stelle, das zu lösende Stück liegt aber woanders. Dann bringt X das Stück zum Arbeitsort, A führt den Trick aus und die inverse Bewegung bringt den Aufbau zurück."
    p2: "So muss man nicht für jede Position einen neuen Algorithmus auswendig lernen. Man versteht ein Werkzeug und versetzt seinen Wirkungsort. Mathematisch heißt dieses Einrahmen von A durch X und seine Umkehrung <b>Konjugation</b>."
    p3: "Eddie: „Ich brauche nicht für jede Stelle einen neuen Trick. Ich muss den alten Trick richtig hinstellen.“"
  part7:
    title: "7. Was man 1985 über die kürzeste Lösung weiß"
    p1: "Wie viele Züge braucht die schwierigste Stellung mindestens, wenn jeder Zug optimal gewählt wird? Eine untere Schranke entsteht durch Zählen: Gibt es bis zu einer Tiefe d weniger verschiedene kurze Zugfolgen als Würfelstellungen, dann können diese Folgen unmöglich jede Stellung erreichen. Dabei steht S für die Menge solcher kurzen Folgen und N für die Zahl der legalen Stellungen."
    p2: "Der Wissensstand zu Eddies Zeit hat noch eine große Lücke:"
    l1: "Zählargumente zeigen, dass manche Stellungen <b>mindestens 18 Züge</b> benötigen."
    l2: "Thistlethwaites Verfahren von 1981 löst jede Stellung in <b>höchstens 52 Zügen</b>."
    l3: "Welche kleinste obere Grenze wirklich für alle Stellungen genügt, ist <b>1985 noch offen</b>."
    p3: "Die heute bekannte exakte Grenze gehört deshalb nicht in Eddies Rechnung. Für sie ist der Würfel zugleich Spielzeug, Gruppe und noch nicht abgeschlossenes Forschungsproblem."
  interactive:
    title: "Mischen und lösen"
    p1: "Mische den Würfel oder wähle einen Lösungsweg. Während die Lösung läuft, dreht sich der Würfel und zählt die ausgeführten Züge. Die Methoden verfolgen unterschiedliche Ideen und liefern deshalb unterschiedlich lange Wege."
    solveTitle: "Lösungsmethode"
  cube:
    title: "Den Würfel selbst bewegen"
  godsNumber:
    title: "Später bewiesen: God’s Number"
    p1Before: "Bezeichnet D die größte Zahl optimaler Züge, die eine Stellung benötigt, gilt heute"
    p1After: "Dabei zählt eine Viertel- oder Halbdrehung einer Seite als ein Zug; manche Stellungen benötigen tatsächlich alle 20 Züge."
    p2Before: "Bewiesen wurde das erst 2010. Eddie kann diese Zahl 1985 noch nicht kennen; ihr damaliger Wissensstand ist"
solutionMethods:
  history:
    title: "Die Zugfolge rückwärts"
    p1: "Diese Variante analysiert nicht die sichtbare Stellung. Der Würfel speichert alle Züge seit dem letzten Mischen und führt ihre inversen Züge in umgekehrter Reihenfolge aus. Aus R U wird also U⁻¹ R⁻¹."
    p2: "Das ist garantiert erfolgreich, solange die vollständige Vorgeschichte bekannt ist. Es ist aber kein allgemeines Lösungsverfahren für einen unbekannt gemischten Würfel und erst recht keine kürzeste Lösung."
  beginner:
    title: "Einsteiger-Methode: Schicht für Schicht"
    p1: "Die Einsteiger-Methode baut zuerst ein Kreuz, setzt dann die Ecken der ersten und die Kanten der zweiten Schicht ein und löst zuletzt die obere Schicht in mehreren überschaubaren Etappen."
    p2: "Sie braucht nur wenige wiederkehrende Zugfolgen und ist deshalb gut nachvollziehbar. Dafür zerstört und repariert sie häufiger bereits geordnete Teile und benötigt meist mehr Züge als fortgeschrittene Methoden."
  cfop:
    title: "CFOP: Cross, F2L, OLL, PLL"
    p1: "CFOP löst zunächst ein Kreuz. Danach werden bei F2L jeweils eine Ecke und die passende Kante gemeinsam in die ersten beiden Schichten eingesetzt. OLL orientiert und PLL permutiert anschließend die letzte Schicht."
    p2: "Die Methode ist im Speedcubing verbreitet, weil die Schritte schnell erkannt und ausgeführt werden können. Gute Ergebnisse verlangen allerdings eine größere Sammlung gelernter Fälle und Algorithmen."
  roux:
    title: "Roux: Blöcke statt Schichten"
    p1: "Roux baut links und rechts zwei 1×2×3-Blöcke. Danach löst CMLL die verbleibenden Ecken; zum Schluss ordnet LSE die letzten sechs Kanten vor allem mit Drehungen der oberen und mittleren Schicht."
    p2: "Blockbildung lässt mehr Freiheit als eine starre Schichtfolge und kann mit wenigen Zügen auskommen. Dafür verlangt sie räumliche Planung und einen sicheren Umgang mit Mittelschichtzügen."
  thistlethwaite:
    title: "Thistlethwaite: Schrittweise weniger erlaubte Züge"
    p1: "Thistlethwaites Verfahren führt den Würfel durch vier immer kleinere Untergruppen. In jeder Phase werden bestimmte Orientierungen oder Teilmengen geordnet und zugleich die erlaubten Drehungen eingeschränkt, bis nur noch halbe Drehungen nötig sind."
    p2: "Die historische Stärke ist die beweisbare Obergrenze von 52 Zügen für jede Stellung. Das Verfahren ist eher ein gruppentheoretischer Existenzbeweis und Computerweg als eine Methode für schnelles Lösen mit den Händen."
