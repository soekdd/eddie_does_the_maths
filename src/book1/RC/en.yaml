title: "The Hidden Rules of Rubik's Cube"
imageTitle: "Eddie discovers the rules of Rubik's Cube"
imageAlt: "Eddie holds a colorful Rubik's Cube in the Christmas candlelight"
introDate: "Stockholm, December 24, 1985"
subChapter:
  einleitung: "Introduction"
  spielzeug: "The Cube as a Toy"
  permutationsmaschine: "Permutation Machine"
  unmoegliche-zustaende: "Impossible States"
  kommutatoren: "Commutators"
  konjugation: "Conjugation"
  interaktiv: "Interactive Cube"
book:
  p1: "Vidar puts the small square package on my knees. The paper is folded so crookedly at the edges that he clearly wrapped it himself. Underneath is a cube: six colors, little squares, a bit of black plastic. I turn the top row. The pieces click firmly into place, and the surface that was orderly a moment ago is immediately destroyed."
  p2: "<b>A Rubik's Cube.</b> In 1985 these things are still fairly new. Europe has known them for only a few years, and even mathematicians have not been studying them seriously for long. I like that. Vidar has not given me a puzzle that has already been fully explained, but one whose boundaries are still being explored."
  p3: "I hold it closer to the candlelight and turn another face. The center pieces do not change places. White remains the center of the white face, red the center of the red one. The centers are the coordinate system; every other piece moves around them. The cube pretends that its colors are free. But that is not true."
  p4: "“Well?” Vidar asks. “Do you like it?” I nod. Of course I like it. It is small, cheeky, and full of rules it refuses to admit."
  p5: "After a few turns I have made one red face. Vidar grins as if I have performed a magic trick. I can already see the next problem instead: a completed face can still ruin the rest of the cube. Every move carries other pieces along with it. Order is not merely important. It is a memory."
  p6: "I pull my notebook closer and draw corners, edges, and arrows. This is not a game of colors. It is a machine for permutations. And it can do an astonishing amount, but not everything."
sections:
  part1:
    title: "1. The cube looks like a toy"
    p1: "Each of the six faces has nine visible colored squares. It is tempting to think that the cube consists of 54 independent stickers. That is the wrong way to count its movements. The squares belong to pieces:"
    l1: "8 corner pieces with 3 visible colors each"
    l2: "12 edge pieces with 2 visible colors each"
    l3: "6 center pieces with 1 visible color each"
    p2: "On an ordinary 3×3×3 cube, the six centers never exchange places. They define up, down, front, back, left, and right. So we do not need to count individual colors, but <b>pieces, positions, and orientations</b>."
  part2:
    title: "2. In reality, it is a permutation machine"
    p1: "First we deliberately overcount. We pretend that every piece can be positioned and oriented independently:"
    l1Before: "The 8 corners can occupy 8 positions"
    l2Before: "Each corner has 3 possible orientations"
    l3Before: "The 12 edges can occupy 12 positions"
    l4Before: "Each edge has 2 possible orientations"
    p2: "This product is a useful first guess, but it is too large. It also counts cubes that could only be produced by taking one apart and reassembling it incorrectly. Legal turns obey three invariants."
  part3:
    title: "3. Not every visible state is reachable"
    p1: "The cube is stricter than its surface suggests. Three constraints eliminate nearly all the apparently possible arrangements in our first count."
    cornersTitle: "Corner twist"
    cornersP1: "A single corner can never be twisted on its own by legal moves. If we encode its three orientations as 0, 1, and 2, their sum remains zero modulo 3. The orientation of the eighth corner is therefore fixed by the first seven."
    edgesTitle: "Edge flip"
    edgesP1: "A single edge cannot be flipped on its own either. The sum of all edge orientations remains even. Once eleven edges are fixed, the twelfth is determined."
    parityTitle: "Permutation parity"
    parityP1: "Finally, the signs of the corner and edge permutations must agree. Swapping only two corners is just as impossible as swapping only two edges. This coupling removes one more factor of 2."
    p2: "That leaves exactly this many legally reachable positions:"
    p3: "More than 43 quintillion possibilities, yet far from every arrangement one could build. <b>Not everything one can see can be reached by turning.</b>"
  part4:
    title: "4. Moves do not commute"
    p1: "When adding numbers, order does not matter. On the cube it almost always does. Let R mean a quarter turn of the right face and U a quarter turn of the upper face. R followed by U generally produces a different state from U followed by R."
    p2: "You can test this with your hands: remember the initial state, perform R and U, and undo both. Then compare it with U followed by R. The cube is <b>non-commutative</b>. Order is part of the action itself."
    p3: "Eddie: “The cube does not remember my intention. It remembers the order.”"
  part5:
    title: "5. Non-commutativity creates commutators"
    p1: "We can isolate the difference between two moves. Group theory uses a commutator for this. Here we read the sequence from left to right:"
    l1: "Perform A."
    l2: "Perform B."
    l3: "Undo A."
    l4: "Undo B."
    p2: "If A and B commuted, nothing would remain. On Rubik's Cube, a small, targeted change often remains while many other pieces return to their places. That is why commutators are so valuable for solving: they replace widespread destruction with controlled effects."
    p3: "Eddie: “I undo both moves, and only their interaction remains.”"
  part6:
    title: "6. Conjugation carries the same trick elsewhere"
    p1: "Suppose a known sequence A works in the correct location, but the piece we need to solve is somewhere else. Then X brings the piece to the work area, A performs the trick, and the inverse move restores the setup."
    p2: "This means we do not have to memorize a new algorithm for every position. We understand one tool and move its place of action. In mathematics, framing A with X and its inverse is called <b>conjugation</b>."
    p3: "Eddie: “I do not need a new trick for every place. I need to put the old trick in the right place.”"
  part7:
    title: "7. What was known about the shortest solution in 1985"
    p1: "At least how many moves does the hardest position require if every move is chosen optimally? Counting gives a lower bound: if there are fewer distinct short move sequences up to depth d than cube positions, those sequences cannot possibly reach every position. Here S is the set of these short sequences and N is the number of legal positions."
    p2: "There was still a wide gap in Eddie's time:"
    l1: "Counting arguments showed that some positions need <b>at least 18 moves</b>."
    l2: "Thistlethwaite's 1981 method solves every position in <b>at most 52 moves</b>."
    l3: "The smallest upper limit that really works for every position was <b>still unknown in 1985</b>."
    p3: "The exact limit known today therefore has no place in Eddie's calculation. To her, the cube is a toy, a group, and a research problem that has not yet been completed."
  interactive:
    title: "Scramble and solve"
    p1: "Scramble the cube or choose a solution path. While the solution runs, the cube rotates and counts the moves it performs. Each method follows a different idea and therefore produces a path of a different length."
    solveTitle: "Solving method"
  cube:
    title: "Move the cube yourself"
  godsNumber:
    title: "Proved later: God’s Number"
    p1Before: "If D denotes the greatest number of optimal moves required by any position, we now know that"
    p1After: "A quarter or half turn of one face counts as one move; some positions really do require all 20 moves."
    p2Before: "This was not proved until 2010. Eddie cannot know the number in 1985; the bounds available in her time are"
solutionMethods:
  history:
    title: "Reverse the move sequence"
    p1: "This option does not analyze the visible position. The cube records every move since the last scramble and performs the inverse moves in reverse order. R U therefore becomes U⁻¹ R⁻¹."
    p2: "This is guaranteed to work as long as the complete history is known. It is not a general solving method for an unfamiliar scrambled cube, let alone a shortest solution."
  beginner:
    title: "Beginner method: layer by layer"
    p1: "The beginner method first builds a cross, then inserts the first-layer corners and second-layer edges, and finally solves the upper layer in several manageable stages."
    p2: "It uses only a few recurring sequences and is therefore easy to follow. In return, it destroys and restores solved pieces more often and usually takes more moves than advanced methods."
  cfop:
    title: "CFOP: Cross, F2L, OLL, PLL"
    p1: "CFOP starts with a cross. During F2L, a corner and its matching edge are inserted together into the first two layers. OLL then orients the last layer, and PLL permutes it."
    p2: "The method is common in speedcubing because its cases can be recognized and executed quickly. Good results, however, require learning a larger collection of cases and algorithms."
  roux:
    title: "Roux: blocks instead of layers"
    p1: "Roux constructs two 1×2×3 blocks on the left and right. CMLL then solves the remaining corners; finally, LSE arranges the last six edges mainly through turns of the upper and middle layers."
    p2: "Block building offers more freedom than a rigid layer sequence and can use relatively few moves. It demands spatial planning and confidence with middle-slice turns."
  thistlethwaite:
    title: "Thistlethwaite: progressively fewer allowed moves"
    p1: "Thistlethwaite's method takes the cube through four progressively smaller subgroups. Each phase fixes particular orientations or subsets while restricting the allowed turns, until only half turns remain necessary."
    p2: "Its historical strength is the provable upper bound of 52 moves for every position. It is closer to a group-theoretic existence proof and computer procedure than a method for fast solving by hand."
