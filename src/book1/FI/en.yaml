fi:
  title: "Map Geometry"
  imageTitle: "Eddie"
  introDate: "Dresden, September 9, 1984"
  subChapter:
    einleitung: "Introduction"
    beschreibung: "Description"
    ausprobieren: "Try it yourself"
    karten: "Normal maps"
  book:
    p1: "Maps do not lie, they just never say everything. My father's voice comes back to me: <em>“If you are not allowed to show something, do not change the content, change the form</em>"
    p2: "Holomorphic maps are exactly that. No invisibility cloak, no eraser. More like a translator."
    p3: "Such a map bends the world without breaking it. Angles remain angles. Directions remain readable. Only the surroundings slide to different places. To someone who only looks, the result appears abstract: curves, nets, numbers. To someone who understands, the geometry remains completely intact."
    p4: "That is its essence:"
    p5: "Nothing disappears.<br>But only someone who knows the key knows <b>where</b> it is."
    p6: "And sometimes that is enough."
  sections:
    title: "In 4 steps to the hidden map"
    step1Figure: "Step 1: Base map"
    step11: "Step 1.1 - Base representation to scale"
    p11: "We start with a normal schematic map to scale: cities as nodes, connections as lines. The line style is decisive, because even here it already encodes the type of connection:"
    s111: "<b>Thick line</b>: road and rail exist in parallel"
    s112: "<b>Thin line</b>: road only"
    s113: "<b>Dashed line</b>: rail only"
    step2Figure: "Step 2: Abbreviation code"
    step12: "Step 1.2 - Replace names with a fixed code"
    p12: "Next, we remove plain-text names and instead use a two-letter code per city. The code is not random; it follows a fixed, understandable rule. In case of collisions, priority goes by size: larger cities may keep their nearby initials more easily than smaller ones, similar to the logic of vehicle registration plates."
    p13: "That immediately reduces readability for outsiders, but remains reproducible and verifiable for insiders."
    step3Figure: "Step 3: Holomorphically distorted map"
    step13: "Step 1.3 - Holomorphic transformation"
    p14: "Now comes the actual geometric key: we transform all nodes in the complex plane by a holomorphic mapping. The big advantage is that angles remain preserved locally (conformality), so directional relationships remain interpretable even though the overall image is visually altered quite strongly."
    p15: "In practice, this runs in four clear steps: (1) normalize geocoordinates into a complex plane, (2) choose a mapping <code>f(z)</code>, for example <code>expScaled</code> or <code>weierstrass</code>, (3) send all nodes through <code>f(z)</code>, (4) project the transformed points back into SVG and redraw the edges as straight lines."
    p16: "The result is a map that appears alien to uninvolved observers but internally remains computationally consistent. With the coordinate system shown, the transformation can also be followed analytically."
    step4Figure: "Step 4: Holomorphically distorted map with distraction"
    step14: "Step 1.4 - Distraction"
    p17: "At that point it does not hurt to add a little distraction. Fill in a few triangles, construct a circle through the 3 largest cities, and add a few (almost) right angles."
    commentTitle: "And the map is gone and the geometry exercise is finished."
    comment1: "The trick is not magic, but geometry with a clear announcement: the holomorphic map remains locally angle-preserving (conformal), so crossing angles and directions stay interpretable."
    comment2: "At the same time, the map is allowed to rotate and scale locally. To outsiders it looks chaotic, but internally the structure remains consistent and mathematically traceable."
  summary:
    title1: "Try it yourself:"
    title2: "What works for vector graphics also works for normal maps"
