  karten: "Normale Karten"
book:
  p1: "Karten lügen nicht, sie sagen nur nie alles. Papas Stimme kommt mir wieder in den Sinn: <em>„Wenn du etwas nicht zeigen darfst, ändere nicht den Inhalt, sondern die Form</em>"
  p2: "Holomorphe Abbildungen sind genau das. Keine Tarnkappe, kein Radiergummi. Eher ein Übersetzer."
  p3: "Eine solche Abbildung verbiegt die Welt, ohne sie zu zerbrechen. Winkel bleiben Winkel. Richtungen bleiben lesbar. Nur das Drumherum rutscht an andere Stellen. Für jemanden, der nur hinschaut, sieht das Ergebnis abstrakt aus: Kurven, Netze, Zahlen. Für jemanden, der versteht, bleibt die Geometrie vollständig erhalten."
  p4: "Das ist ihr Wesen:"
  p5: "Nichts verschwindet.<br>Aber nur wer den Schlüssel kennt, weiß, <b>wo</b> es ist."
  p6: "Und manchmal ist das genug."
sections:
  title: "In 4 Schritten zur versteckten Karte"
  step1Figure: "Schritt 1: Grundkarte"
  step11: "Schritt 1 - Maßstabgerechte Grunddarstellung"
  p11: "Wir starten mit einer normalen, maßstabgerechten Netzwerk-Karte: Städte als Knotenpunkte, Verbindungen als Linien. Entscheidend ist der Linienstil, denn er codiert schon hier die Art der Verbindung:"
  s111: "<b>Dicke Linie</b>: Straße und Bahn existieren parallel"
  s112: "<b>Dünne Linie</b>: nur Straße"
  s113: "<b>Gestrichelte Linie</b>: nur Bahn"
  step2Figure: "Schritt 2: Abkürzungscode"
  step12: "Schritt 2 - Namen durch festen Code ersetzen"
  p12: "Als Nächstes entfernen wir Klartext-Namen und nutzen stattdessen einen zweibuchstabigen Code pro Stadt. Der Code ist nicht zufällig, sondern folgt einer festen, nachvollziehbaren Regel. Bei Kollisionen gilt Priorität nach Größe: größere Städte dürfen ihre naheliegenden Anfangsbuchstaben eher behalten als kleinere, ähnlich der Logik von Kfz-Kennzeichen."
  p13: "Das reduziert sofort die Lesbarkeit für Außenstehende, bleibt aber für Eingeweihte reproduzierbar und prüfbar."
  step3Figure: "Schritt 3: Holomorph verzerrte Karte"
  step13: "Schritt 3 - Holomorphe Transformation"
  p14: "Jetzt kommt der eigentliche geometrische Schlüssel: Wir transformieren alle Knoten in der komplexen Ebene durch eine holomorphe Abbildung. Der große Vorteil: lokal bleiben Winkel erhalten (Konformität), also bleiben Richtungsbeziehungen interpretierbar, obwohl das Gesamtbild visuell stark verändert wird."
  p15: "Praktisch läuft das in vier klaren Schritten: (1) Geokoordinaten in eine komplexe Ebene normieren, (2) Abbildung <code>f(z)</code> wählen, z. B. <code>expScaled</code> oder <code>weierstrass</code>, (3) alle Knoten durch <code>f(z)</code> schicken, (4) die transformierten Punkte wieder ins SVG projizieren und die Edges als gerade Linien neu einzeichnen."
  p16: "Das Ergebnis ist eine Karte, die für Unbeteiligte fremd wirkt, intern aber weiter rechnerisch konsistent bleibt. Mit eingeblendetem Koordinatensystem kann man die Transformation zusätzlich analytisch nachvollziehen."
  exampleBox: '\text{Beispiel:}\quad f(z)=\exp(0.85\,z)'
  step4Figure: "Schritt 4: Holomorph verzerrte Karte mit Ablenkung"
  step14: "Schritt 4 - Ablenkung"
  p17: "Nun schadet es nicht, noch ein wenig für Ablenkung zu sorgen. Ein paar Dreiecke ausfüllen, einen Kreis durch die 3 größten Städte konstruieren und ein paar (fast) rechte Winkel einzeichnen."
  commentTitle: "Und verschwunden ist die Karte und fertig ist die Geometrieaufgabe."
  comment1: "Der Trick ist nicht Zauberei, sondern Geometrie mit Ansage: Die holomorphe Abbildung bleibt lokal winkeltreu (konform), also bleiben Kreuzungswinkel und Richtungen interpretierbar."
  comment2: "Gleichzeitig darf die Abbildung lokal drehen und skalieren. Für Außenstehende sieht das chaotisch aus, intern bleibt die Struktur aber konsistent und rechnerisch nachvollziehbar."
