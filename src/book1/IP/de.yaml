book:
  p1: "Vidar kommt mit zwei Skateboards unter dem Arm auf mich zu, was meiner Erfahrung nach bedeutet, dass gleich etwas total Unvernünftiges passiert. Der Asphalt am Mälaren glänzt noch vom Regen, Smutsen beschnuppert eines der Bretter und entscheidet sich dann sehr klug für Sicherheitsabstand. Ich dagegen stehe davor wie vor einer kleinen fahrbaren Kriegserklärung."
  p2: "„Heute lernst du skaten“, sagt Vidar. Ich erkläre ihm, dass Gehen seit Millionen Jahren funktioniert und ein Brett mit Rollen ungefähr so vertrauenswürdig ist wie eine Gleichung, die mitten im Term plötzlich die Richtung wechselt. Vidar grinst nur. Das tut er immer, wenn die Physik gerade auf seiner Seite ist."
  p3: "Drei Sekunden später stehe ich auf dem Brett. Fünf Sekunden später fährt das Brett nach links, meine Arme rudern nach rechts, und mein Schwerpunkt hält eine spontane Abstimmung gegen mich ab. Ich falle nicht dramatisch, aber eindeutig genug, dass meine Würde neben mir auf dem nassen Asphalt liegen bleibt. Smutsen sieht aus, als hätte er das Ergebnis vorhergesagt."
  p4: "Genau deshalb rechnen wir das jetzt ordentlich aus. Ein Mensch auf einem Skateboard ist, wenn man genug Schmerz und Haare weglässt, ein <b>inverses Pendel auf einem beweglichen Schlitten</b>: oben schwer, unten rollend, dazwischen sehr viele schlechte Entscheidungen. Der Trick ist ein Regler, der schneller merkt, wohin alles kippt, als ich „Aua“ sagen kann."
