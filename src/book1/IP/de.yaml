sections:
  model:
    title: "Modellidee und Größen"
    p1: "Ein Mensch auf einem rollenden Brett lässt sich stark vereinfacht als <b>inverses Pendel auf einem beweglichen Schlitten</b> modellieren."
    p2: "Das System besteht aus diesen Größen:"
    uprightBefore: "Die aufrechte Lage entspricht"
  nonlinear:
    title: "Teil 2 - Nichtlineares Modell"
    p1: "Jetzt beschreiben wir, wie sich Schlitten und Pendel ohne Regelung bewegen. Für das reibungsfreie inverse Pendel auf einem Schlitten erhält man die Bewegungsgleichungen:"
    p2: "Die erste Gleichung beschreibt die horizontale Bewegung des Schlittens."
    p3: "Die zweite Gleichung beschreibt die Winkelbewegung des Pendels."
    p4: "Dieser Term ist ein nichtlinearer Zentrifugalterm. Für kleine Winkel und kleine Winkelgeschwindigkeiten kann er vernachlässigt werden."
  linearization:
    title: "Teil 3 - Linearisierung um die aufrechte Lage"
    p1Before: "Linearisieren heißt: Wir ersetzen komplizierte Terme durch Näherungen, die in der Nähe der aufrechten Lage gut passen. Wir betrachten kleine Auslenkungen um"
    p2: "Dann gelten die Näherungen:"
    p3: "Dadurch verschwinden die nichtlinearen Terme, und die Gleichungen werden zu:"
  acceleration:
    title: "Teil 4 - Auflösen nach den Beschleunigungen"
    p1: "Aus der zweiten Gleichung folgt:"
    p2: "In die erste Gleichung eingesetzt:"
    p3: "Also:"
    p4: "Für die horizontale Beschleunigung erhält man:"
    p5: "Damit lautet das linearisierte Modell:"
  stateSpace:
    title: "Teil 5 - Zustandsraumdarstellung"
    p1: "Die vier Größen aus der Regelidee fassen wir nun formal zum Zustandsvektor zusammen:"
    p2: "Damit kann das linearisierte Modell kompakt mit zwei Matrizen geschrieben werden:"
    p3: "Die Matrix A beschreibt die natürliche Dynamik, B beschreibt, wie die Stellkraft u in das System eingeht. Ohne Regelung ist diese Dynamik instabil: Schon eine kleine Auslenkung wächst an, statt von selbst zu verschwinden."
  controller:
    title: "Teil 6 - Stabilisierender Zustandsregler"
    p1: "Die Regleridee aus Teil 1 lässt sich jetzt kurz schreiben als:"
    p2: "Dabei ist K der Zeilenvektor der vier Reglerverstärkungen:"
    p3: "Ausmultipliziert ist das genau die Gegenkraft, die jede Zustandsgröße gewichtet:"
    p4: "Die Strecke ist das physikalische System, also Schlitten plus Pendel. Setzt man die Reglerkraft in das Zustandsmodell ein, entsteht die geschlossene Regelstrecke:"
    loopFigureTitle: "Regelkreis: Zustandsrückführung"
    loopAria: "Klassischer Regelkreis mit Zustandsrückführung für das inverse Pendel"
    loopSum: "Vergleich"
    loopController: "Regler"
    loopPlant: "Strecke"
    loopForce: "Kraft"
    loopMeasurement: "Messung"
    loopDisturbance: "Störung"
    loopP1Before: "Rückführung bedeutet hier: Wir messen den aktuellen Zustand "
    loopP1Middle: " relativ zur gewünschten aufrechten Ruhelage. Aus dieser Abweichung berechnet der Regler die Kraft "
    loopP1After: ". Das Minuszeichen ist entscheidend: Kippt das Pendel nach rechts, erzeugt die Rückführung eine Gegenbewegung, statt die Auslenkung weiter zu verstärken."
    loopP2Before: "Ohne Rückführung folgt das linearisierte System "
    loopP2Middle: ". Mit dem eingesetzten Regler wird daraus "
    loopP2After: ". Damit verändert K die Eigenwerte der Systemmatrix. Diese Eigenwerte beschreiben, ob kleine Abweichungen anwachsen oder abklingen. Wählt man K so, dass alle Eigenwerte negative Realteile haben, klingen kleine Störungen ab; die instabile aufrechte Lage wird lokal stabil."
    p5Before: "Der Regler ist stabilisierend, wenn die Eigenwerte von"
    p5After: "alle einen negativen Realteil besitzen."
  terms:
    title: "Teil 1 - Zustand und Regleridee"
    p1: "Bevor wir rechnen, klären wir, was der Regler überhaupt wissen muss. Ein Zustand ist eine Momentaufnahme des Systems: Ort, Geschwindigkeit, Winkel und Winkelgeschwindigkeit. Der Punkt über einer Größe bedeutet zeitliche Änderung."
    p2: "Ein linearer Zustandsregler bewertet jede dieser Größen mit einer einstellbaren Reglerverstärkung. In der Formel heißen diese Verstärkungen k1 bis k4; daraus entsteht die horizontale Gegenkraft:"
    p3: "Die Vorzeichen und Größen dieser Verstärkungen bestimmen, wie stark der Schlitten auf Position, Geschwindigkeit, Winkel und Kippgeschwindigkeit reagiert. Für das Balancieren sind besonders wichtig:"
    items:
      angle: "Wie stark ist das System aus der Balance?"
      angularVelocity: "Wie schnell verliert es gerade die Balance?"
    p4: "Diese anschauliche Idee bleibt während der Herleitung im Hintergrund: Das Modell liefert die Gleichungen, mit denen wir passende Werte für die Reglerverstärkungen bestimmen können."
  interactive:
    title: "Interaktiv - Regelkreis"
    intro: "Gib dem inversen Pendel einen Schubs. Die Simulation integriert das nichtlineare Pendelmodell und berechnet in jedem Zeitschritt die Stellkraft <katex tex=\"u=-Kz\" />."
