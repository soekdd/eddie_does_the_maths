book:
  p1: "Vidar walks toward me with two skateboards under his arm, which in my experience never means that something sensible is about to happen. The asphalt by Lake Malaren is still dark from the rain, Smutsen sniffs one of the boards and then very wisely chooses a safe distance. I, meanwhile, stand in front of it as if it were a small rolling declaration of war."
  p2: "“Today you learn to skate,” Vidar says. I explain that walking has worked for millions of years, and that a board with wheels is about as trustworthy as an equation that suddenly changes direction halfway through the term. Vidar only grins. He always does that when physics is temporarily on his side."
  p3: "Three seconds later I am standing on the board. Five seconds later the board travels left, my arms paddle right, and my center of mass holds a spontaneous vote against me. I do not fall dramatically, but clearly enough that my dignity stays behind on the wet asphalt. Smutsen looks as if he had predicted the result."
  p4: "That is why we are going to calculate it properly. A person on a skateboard is, if you leave out enough pain and hair, an <b>inverted pendulum on a moving cart</b>: heavy at the top, rolling at the bottom, with far too many bad decisions in between. The trick is a controller that notices where everything is tipping faster than I can say “ow”."
