    loopP1Before: "Feedback means the following here: we measure the current state "
    loopP1Middle: " relative to the desired upright rest position. From that deviation, the controller computes the force "
    loopP1After: ". The minus sign is essential: if the pendulum tips to the right, the feedback creates a counter-motion instead of amplifying the deflection further."
    loopP2Before: "Without feedback, the linearized system follows "
    loopP2Middle: ". After inserting the controller, it becomes "
    loopP2After: ". Thus K changes the eigenvalues of the system matrix. These eigenvalues describe whether small deviations grow or decay. If K is chosen so that all eigenvalues have negative real parts, small disturbances decay; the unstable upright position becomes locally stable."
    p5Before: "The controller is stabilizing if all eigenvalues of"
    p5After: "have negative real parts."
  terms:
    title: "Part 1 - State and Control Idea"
    p1: "Before calculating, we clarify what the controller needs to know. A state is a snapshot of the system: position, velocity, angle, and angular velocity. A dot above a quantity means change over time."
    p2: "A linear state feedback controller weights each of these quantities with an adjustable controller gain. In the formula these gains are called k1 through k4; together they form a horizontal counter-force:"
    p3: "The signs and sizes of these gains determine how strongly the cart reacts to position, velocity, angle, and tipping velocity. For balancing, the most important terms are:"
    items:
      angle: "How far is the system out of balance?"
      angularVelocity: "How quickly is it currently losing balance?"
    p4: "This intuitive idea stays in the background throughout the derivation: the model provides the equations we need to choose suitable values for the controller gains."
  interactive:
    title: "Interactive - Control Loop"
    intro: "Give the inverted pendulum a shove. The simulation integrates the nonlinear pendulum model and computes the control force <katex tex=\"u=-Kz\" /> at every time step."
