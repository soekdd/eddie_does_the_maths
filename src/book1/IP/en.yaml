book:
  p1: "Vidar surprises me with two skateboards under his arm. I do not expect anything good, because even if this may look supercool at first glance, humiliation and pain are clearly waiting for me. The asphalt in Rålambshovsparken is still shining from the rain, Smutsen sniffs one of the boards and then very wisely chooses a safe distance. I, meanwhile, stand in front of it as if it were a small rolling declaration of war."
  p2: "“Today you learn to skate,” Vidar says. I explain that walking has worked for millions of years, and that a board with wheels is about as trustworthy as an underdetermined system of equations. Vidar only grins. He always does that when physics is temporarily on his side."
  p3: "Three seconds later I am standing on the board. Five seconds later the board travels left, my arms paddle right, and my center of mass holds a spontaneous vote against me. I do not fall dramatically, but clearly enough that my dignity stays behind on the wet asphalt. Smutsen looks as if he had predicted the result."
  p4: "That is why we are going to calculate it properly. A person on a skateboard is, if you leave out the whining and flailing, an <b>inverted pendulum on a moving cart</b>: heavy at the top, rolling at the bottom, with far too many bad decisions in between. Once you get the hang of it, the cerebellum behaves like a controller that notices where everything is tipping faster than I can say “ow”."
