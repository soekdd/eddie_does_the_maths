book:
  p1: "Ich höre jeden Atemzug im Raum. Sogar das Umblättern klingt wie ein Signal. Mein Blick springt ständig vom Blatt zur Tür, als würde sie gleich aufgehen."
  p2: "Die Aufgabe ist Geometrie, aber nicht die freundliche Sorte. Es geht um ein Dreieck, und durch zwei seiner Ecken läuft ein Kreis mit einem Mittelpunkt, der extra genannt wird. Dieser Kreis schneidet zwei Seiten des Dreiecks noch einmal in zwei neuen Punkten. Dann werden zwei weitere Kreise gebaut, jeweils durch drei Punkte, und diese beiden Kreise treffen sich (natürlich) in genau zwei Stellen. Eine davon ist eine Ecke des Dreiecks. Die andere ist der \"mysteriöse\" Punkt, um den es geht."
  p3: "Und die ganze Aufgabe läuft auf eine einfache Aussage hinaus: Ein bestimmter Winkel muss genau ein rechter Winkel sein. Also wie eine perfekte Ecke."
  p4: "Normalerweise liebe ich solche \"Das muss 90 Grad sein!\"-Momente. Heute fühlt es sich an, als müsste ich mich zwingen, überhaupt in der Zeichnung zu bleiben."
  p5: "Hier führe ich dich durch die Idee und die Formeln: Welche Kreise hier \"zusammenarbeiten\" und warum am Ende eine rechte Ecke rausfällt."
