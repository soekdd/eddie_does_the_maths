book:
  p1: "I can hear every breath in the room. Even turning a page sounds like a signal. My eyes keep jumping from the paper to the door, as if it might open any second."
  p2: "The problem is geometry, but not the friendly kind. There is a triangle, and through two of its vertices runs a circle whose center is explicitly named. That circle cuts two sides of the triangle again at two new points. Then two more circles are built, each through three points, and those two circles meet, naturally, in exactly two points. One of them is a vertex of the triangle. The other is the \"mysterious\" point the whole problem is about."
  p3: "And the entire problem boils down to one simple statement: a certain angle has to be a right angle. Like a perfectly sharp corner."
  p4: "Normally I love these \"This has to be 90 degrees!\" moments. Today it feels as if I have to force myself just to stay inside the figure."
  p5: "Here I walk you through the idea and the formulas: which circles are \"working together\" here, and why a right angle drops out at the end."
