    trivial: "Trivialfall: <code>i_n = 0</code>, also nur <code>Q_0 = 1</code>."
    caseA: "Fall <katex tex=\"i_1\\ge m\" />. Reduzierte Exponenten <katex tex=\"i_j-m\" />:"
    caseALine: "o(A) = {value} ⇒ o((1+x)^mA) = 2·o(A) = {doubleValue}."
