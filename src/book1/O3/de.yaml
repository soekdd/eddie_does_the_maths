book:
  p1: "Ich grinse, als ich das Wort „Polynom“ sehe. Das ist wie ein alter Bekannter. Ich fühle mich wach, schnell, fast übermütig – als könnte ich mit einem Blick erkennen, wo der Trick liegt."
  p2: "Die Aufgabe ist eigentlich eine Frage nach „gerade oder ungerade“, aber versteckt in einer ganzen Familie von Ausdrücken. Stell dir vor, du hast Rechenausdrücke, die aus vielen Zahlen bestehen, die an verschiedene „Stellen“ gehören. Manche dieser Zahlen sind gerade, manche ungerade. Jetzt nimmst du ein paar ganz besondere Ausdrücke, die alle nach dem gleichen Bauplan entstehen (so wie beim Aufklappen von Klammern), und addierst sie."
  p3: "Was soll passieren? Du sollst beweisen, dass beim Addieren etwas nicht „weggezaubert“ werden kann: Die Anzahl der ungeraden Zahlen in dieser Liste wird nicht kleiner, als sie am Anfang schon war."
  p4: "Hier übersetze ich das in Bilder im Kopf: Muster, Schichten, und warum sich „ungerade“ nicht so leicht verstecken lässt."
sections:
  part1:
    title: "Teil 1 — Aufgabenstellung"
    p1: "Für ein Polynom <katex tex=\"P(x)=a_0+a_1x+\\dots+a_kx^k\" /> mit ganzzahligen Koeffizienten bezeichne <katex tex=\"o(P)\" /> die Anzahl der <b>ungeraden</b> Koeffizienten. Für <katex tex=\"i=0,1,2,\\dots\" /> sei <katex tex=\"Q_i(x)=(1+x)^i\" />."
    p2: "Zu zeigen ist: Für ganze Zahlen <katex tex=\"0\\le i_1 < i_2 < \\dots < i_n\" /> gilt"
    p3: "In Worten: Wenn wir mehrere dieser Polynome addieren, hat die Summe mindestens so viele ungerade Koeffizienten wie schon der erste Summand <katex tex=\"Q_{i_1}\" /> allein."
  part2:
    title: "Teil 2 — Kernidee (nur „ungerade/gerade“ zählt)"
    p1: "Wir interessieren uns <b>nur</b> dafür, ob ein Koeffizient ungerade oder gerade ist. Dafür reicht es, alles modulo 2 zu betrachten."
    l1: "ungerade <katex tex=\"\\equiv 1 \\pmod 2\" />"
    l2: "gerade <katex tex=\"\\equiv 0 \\pmod 2\" />"
    p2: "Beim Addieren gilt modulo 2: <katex tex=\"1+1\\equiv 0\" />, <katex tex=\"1+0\\equiv 1\" />. Das ist ein „entweder-oder“: Der Koeffizient der Summe ist genau dann ungerade, wenn genau einer der beiden Koeffizienten ungerade ist."
    graphTitle: "Sierpinski-Muster aus dem Pascalschen Dreieck modulo 2"
    graphHeading: "Ein Bild, das man kennen darf: Pascalsches Dreieck modulo 2"
    graphText1: "Die Binomialkoeffizienten erfüllen:"
    graphText2: "Modulo 2 heißt das: Ein Eintrag ist ungerade genau dann, wenn die beiden darüber verschiedene Parität haben. So entsteht ein auffälliges dreieckiges Muster (man sieht es gut, wenn man das Pascalsche Dreieck nur nach ungerade/gerade färbt)."
    rulesHeading: "Zwei Rechenregeln für <katex tex=\"(1+x)^i \\pmod 2\" />"
    lemma1: "Lemma 1 (Verdoppeln):"
    lemma1Text: "Warum? <katex tex=\"(1+x)^{2t}=\\bigl((1+x)^2\\bigr)^t\" /> und <katex tex=\"(1+x)^2=1+2x+x^2\\equiv 1+x^2\\pmod 2\" />."
    lemma2: "Lemma 2 (Verdoppeln + 1):"
    countHeading: "Damit kann man <katex tex=\"o(Q_i)\" /> ohne Spezialwissen bestimmen"
    countText1: "Schreibe <katex tex=\"i\" /> in Binärdarstellung und sei <katex tex=\"s_2(i)\" /> die Anzahl der Einsen. Dann gilt:"
    countL1: "Aus Lemma 1 folgt <katex tex=\"o(Q_{2t})=o(Q_t)\" />: Bei <katex tex=\"(1+x^2)^t\" /> bleiben nur Lücken in den Exponenten, die Anzahl ungerader Koeffizienten bleibt gleich."
    countL2: "Aus Lemma 2 folgt <katex tex=\"o(Q_{2t+1})=2\\,o(Q_t)\" />: Multiplikation mit <katex tex=\"(1+x)\" /> kopiert jeden ungeraden Koeffizienten einmal nach links und einmal nach rechts; hier überlappen sich die Kopien nicht, weil <katex tex=\"(1+x^2)^t\" /> nur gerade Exponenten hat und <katex tex=\"x\\,(1+x^2)^t\" /> nur ungerade Exponenten."
    countText2: "Liest man <katex tex=\"i\" /> binär von links nach rechts, bedeutet jede 0: Anzahl bleibt, jede 1: Anzahl verdoppelt sich. Also wird genau <katex tex=\"s_2(i)\" />-mal verdoppelt."
  part3:
    title: "Teil 3 — Beweisidee (Induktion mit einem „2er-Fenster“)"
    p1: "Wir beweisen die Aussage per Induktion über den größten Exponenten <katex tex=\"i_n\" />."
    step1Title: "Schritt 1 — Spezialfall: <katex tex=\"m\" /> ist eine Zweierpotenz"
    step1Text1: "Sei <katex tex=\"m=2^t\" />. Dann gilt modulo 2:"
    step1Text2: "Wenn <katex tex=\"A(x)\" /> nur Potenzen <katex tex=\"x^0,\\dots,x^{m-1}\" /> enthält (also <katex tex=\"\\deg A < m\" />), dann:"
    step1Text3: "Grund: <katex tex=\"A\" /> und <katex tex=\"x^mA\" /> liegen in verschiedenen Exponentenbereichen und können sich nicht gegenseitig auslöschen."
    step2Title: "Schritt 2 — Induktionsschritt: wähle ein Fenster <katex tex=\"[m,2m)\" />"
    step2Text: "Wähle eine Zweierpotenz <katex tex=\"m\" /> mit <katex tex=\"m\\le i_n < 2m\" /> (z.B. die größte Zweierpotenz, die nicht größer als <katex tex=\"i_n\" /> ist). Dann liegen alle Exponenten entweder unter <katex tex=\"m\" /> oder in <katex tex=\"[m,2m)\" />."
    caseATitle: "Fall A — <katex tex=\"i_1\\ge m\" />"
    caseAText1: "Setze <katex tex=\"A(x):=\\sum_{j=1}^n Q_{i_j-m}(x)\" />. Dann ist <katex tex=\"\\deg A<m\" /> und"
    caseAText2: "Damit folgt:"
    caseAText3: "Also reduziert sich alles auf <katex tex=\"o(A)\\ge o(Q_{i_1-m})\" />, wieder mit dem Faktor 2 aus zwei nicht überlappenden Exponentenbereichen, und das ist die Induktionsannahme."
    caseBTitle: "Fall B — <katex tex=\"i_1<m\" />"
    caseBText1: "Splitte:"
    caseBText2: "Dann:"
    caseBText3: "Mit <katex tex=\"(1+x)^m\\equiv 1+x^m\\pmod 2\" /> gilt:"
    caseBText4: "Damit kann man direkt zählen:"
    caseBText5: "Außerdem gilt <katex tex=\"o(A+B)+o(B)\\ge o(A)\" />: Betrachte einen Exponenten <katex tex=\"r<m\" /> mit Koeffizienten <katex tex=\"a_r\" /> in <katex tex=\"A\" /> und <katex tex=\"b_r\" /> in <katex tex=\"B\" />. Modulo 2 gilt <katex tex=\"a_r \\equiv (a_r+b_r)+b_r\" />. Ist <katex tex=\"a_r\" /> ungerade, dann ist mindestens einer der beiden Koeffizienten in <katex tex=\"A+B\" /> oder <katex tex=\"B\" /> ungerade; daher deckt <katex tex=\"o(A+B)+o(B)\" /> alle ungeraden Koeffizienten von <katex tex=\"A\" /> ab. Damit:"
    caseBText6: "Also insgesamt:"
    commentTitle: "Was wurde „schwer“ gemacht und was nicht?"
    commentText: "Die Schwierigkeit steckt hier nicht in einem Spezialtheorem, sondern in zwei gut erklärbaren Ideen:"
    commentItems:
      - "Modulo 2 denken (ungerade/gerade statt Zahlenwerte)."
      - "Zweierpotenzen als Trennlinie: <katex tex=\"(1+x)^{2^t}\\equiv 1+x^{2^t}\\pmod 2\" /> erzeugt eine saubere Zerlegung in zwei nicht überlappende Blöcke."
    commentEnd: "Alles andere sind Induktion und direkte Paritäts-Logik."
