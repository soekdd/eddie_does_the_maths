book:
  p1: "I grin when I see the word 'polynomial'. That is like meeting an old acquaintance. I feel awake, quick, almost cocky, as if one glance should be enough to spot the trick."
  p2: "The problem is really about 'even or odd', but hidden inside a whole family of expressions. Imagine expressions made from many numbers sitting in different positions. Some are even, some are odd. Now take a few very special expressions, all built from the same pattern, like when you expand parentheses, and add them."
  p3: "What is supposed to happen? You must prove that something cannot be magically canceled away in the sum: the number of odd entries in the list does not become smaller than it was at the start."
  p4: "Here I translate that into mental pictures: patterns, layers, and why 'odd' cannot hide so easily."
sections:
  part1:
    title: "Part 1 — Problem statement"
    p1: "For a polynomial <katex tex=\"P(x)=a_0+a_1x+\\dots+a_kx^k\" /> with integer coefficients, let <katex tex=\"o(P)\" /> denote the number of <b>odd</b> coefficients. For <katex tex=\"i=0,1,2,\\dots\" />, let <katex tex=\"Q_i(x)=(1+x)^i\" />."
    p2: "We want to show: for integers <katex tex=\"0\\le i_1 < i_2 < \\dots < i_n\" />, one has"
    p3: "In words: if we add several of these polynomials, the sum has at least as many odd coefficients as the first summand <katex tex=\"Q_{i_1}\" /> already had on its own."
  part2:
    title: "Part 2 — Core idea (only 'odd/even' matters)"
    p1: "We care <b>only</b> about whether a coefficient is odd or even. For that it is enough to work modulo 2."
    l1: "odd <katex tex=\"\\equiv 1 \\pmod 2\" />"
    l2: "even <katex tex=\"\\equiv 0 \\pmod 2\" />"
    p2: "When adding modulo 2, we have <katex tex=\"1+1\\equiv 0\" /> and <katex tex=\"1+0\\equiv 1\" />. It is an either-or: the coefficient of the sum is odd exactly when exactly one of the contributing coefficients is odd."
    graphTitle: "Sierpinski pattern from Pascal's triangle modulo 2"
    graphHeading: "A picture worth knowing: Pascal's triangle modulo 2"
    graphText1: "The binomial coefficients satisfy"
    graphText2: "Modulo 2 this means: an entry is odd exactly when the two entries above it have different parity. This creates a striking triangular pattern."
    rulesHeading: "Two rules for <katex tex=\"(1+x)^i \\pmod 2\" />"
    lemma1: "Lemma 1 (doubling):"
    lemma1Text: "Why? <katex tex=\"(1+x)^{2t}=\\bigl((1+x)^2\\bigr)^t\" /> and <katex tex=\"(1+x)^2=1+2x+x^2\\equiv 1+x^2\\pmod 2\" />."
    lemma2: "Lemma 2 (doubling + 1):"
    countHeading: "This lets us determine <katex tex=\"o(Q_i)\" /> without special machinery"
    countText1: "Write <katex tex=\"i\" /> in binary and let <katex tex=\"s_2(i)\" /> be the number of ones. Then"
    countL1: "Lemma 1 gives <katex tex=\"o(Q_{2t})=o(Q_t)\" />: in <katex tex=\"(1+x^2)^t\" /> only gaps in the exponents appear, the number of odd coefficients stays the same."
    countL2: "Lemma 2 gives <katex tex=\"o(Q_{2t+1})=2\\,o(Q_t)\" />: multiplying by <katex tex=\"(1+x)\" /> copies every odd coefficient once to the left and once to the right; the copies do not overlap."
    countText2: "Reading the binary digits of <katex tex=\"i\" /> from left to right, every 0 means the count stays the same, every 1 means it doubles. So it is doubled exactly <katex tex=\"s_2(i)\" /> times."
  part3:
    title: "Part 3 — Proof idea (induction with a 'power-of-two window')"
    p1: "We prove the statement by induction on the largest exponent <katex tex=\"i_n\" />."
    step1Title: "Step 1 — Special case: <katex tex=\"m\" /> is a power of two"
    step1Text1: "Let <katex tex=\"m=2^t\" />. Then modulo 2 we have"
    step1Text2: "If <katex tex=\"A(x)\" /> contains only powers <katex tex=\"x^0,\\dots,x^{m-1}\" /> (so <katex tex=\"\\deg A < m\" />), then"
    step1Text3: "Reason: <katex tex=\"A\" /> and <katex tex=\"x^mA\" /> lie in different exponent ranges and cannot cancel each other."
    step2Title: "Step 2 — Induction step: choose a window <katex tex=\"[m,2m)\" />"
    step2Text: "Choose a power of two <katex tex=\"m\" /> with <katex tex=\"m\\le i_n < 2m\" />. Then all exponents lie either below <katex tex=\"m\" /> or inside <katex tex=\"[m,2m)\" />."
    caseATitle: "Case A — <katex tex=\"i_1\\ge m\" />"
    caseAText1: "Set <katex tex=\"A(x):=\\sum_{j=1}^n Q_{i_j-m}(x)\" />. Then <katex tex=\"\\deg A<m\" /> and"
    caseAText2: "Hence"
    caseAText3: "So everything reduces to <katex tex=\"o(A)\\ge o(Q_{i_1-m})\" />, which is the induction hypothesis."
    caseBTitle: "Case B — <katex tex=\"i_1<m\" />"
    caseBText1: "Split"
    caseBText2: "Then"
    caseBText3: "Using <katex tex=\"(1+x)^m\\equiv 1+x^m\\pmod 2\" />, we get"
    caseBText4: "So we can count directly:"
    caseBText5: "Moreover <katex tex=\"o(A+B)+o(B)\\ge o(A)\" />. Looking coefficientwise modulo 2 shows that every odd coefficient of <katex tex=\"A\" /> is seen either in <katex tex=\"A+B\" /> or in <katex tex=\"B\" />."
    caseBText6: "So in total"
    commentTitle: "What was made 'hard', and what was not?"
    commentText: "The difficulty here is not some special theorem, but two explainable ideas:"
    commentItems:
      - "Think modulo 2 (odd/even instead of actual values)."
      - "Use powers of two as a dividing line: <katex tex=\"(1+x)^{2^t}\\equiv 1+x^{2^t}\\pmod 2\" /> creates a clean split into two non-overlapping blocks."
    commentEnd: "Everything else is induction and direct parity logic."
