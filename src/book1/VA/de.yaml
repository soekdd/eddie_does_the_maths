title: "Warum die Vasa sinken musste"
imageTitle: "Vidar zeigt Eddie die Vasa"
imageAlt: "Vidar zeigt Eddie die Vasa"
introDate: "Stockholm, 26. Oktober 1985"
simulationTitle: "Segelschiff Simulation"
