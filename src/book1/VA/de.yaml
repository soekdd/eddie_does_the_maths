book:
  p1: "Ich stehe vor der <b>Vasa</b> und kann mich nicht entscheiden, ob ich wütend sein soll oder einfach nur traurig. Vidar erzählt mir die Geschichte, und je mehr ich höre, desto klarer wird: Das war kein „Unglück“. Das war ein Unfall mit Ansage. Ein Schiff, gebaut als schwimmendes Machtwort, höher, schwerer bewaffnet, beeindruckender als alles, was vorher da war, weil ein König es so wollte."
  p2: "Und dann kommt dieser Teil, der mir den Magen zusammenzieht: <b>1628</b> ist sie nicht mal richtig losgefahren. Sie ist noch im Hafen gesunken. Ein paar hundert Meter, ein Windstoß, ein bisschen Welle – und aus dem Stolz wird ein Klotz, der einfach umkippt. Vidar erzählt von Tests, bei denen man sie absichtlich zum Schwanken bringt, und alle sehen dabei, wie instabil sie ist. Kanonen, die schon bei der Probe gefährlich nah ans Wasser rutschen. Blicke, die sagen: <em>Das wird schiefgehen.</em> Nur: Niemand stoppt es. Niemand will der Erste sein, der „Stopp“ sagt. Zu viel Prestige, zu viel Angst, zu viel Arbeit, die schon drinsteckt. Und genau das macht die Vasa für mich so brutal: Sie ist ein Denkmal dafür, wie ein System lieber untergeht, als einen Fehler einzugestehen."
  p3: "Hier schaue ich mir dann an, was hier eigentlich passiert: wie man erkennt, ob ein Schiff „sicher“ im Wasser liegt, und warum manche Rümpfe bei der kleinsten Gelegenheit kippen. Unten kannst du es in einer Simulation selbst ausprobieren und verschiedene Schiffsrümpfe auf ihre Stabilität testen."
sections:
  part1:
    title: "Teil 1 - Gleichgewicht: Der erste Satz, der alles entscheidet"
    p1Before: "Die <b>Vasa</b> war ein schwimmender Palast und sank trotzdem nach etwa "
    p1After: " Das wirkt wie Pech, ist aber vor allem Geometrie plus Physik."
    p2: "Ein Schiff schwimmt, wenn Gewicht und Auftrieb gleich groß sind:"
    p3: "Für die Vasa sind folgende Größenordnungen bekannt:"
    table:
      symbol: "Symbol"
      meaning: "Bedeutung"
      value: "Wert"
    rows:
      - id: "displacement"
        symbol: "\\Delta"
        label: "Verdrängung"
        value: "\\approx 1210\\,\\mathrm{t}"
      - id: "length"
        symbol: "L"
        label: "Länge"
        value: "\\approx 69\\,\\mathrm{m}"
      - id: "beam"
        symbol: "B"
        label: "Breite"
        value: "\\approx 11{,}7\\,\\mathrm{m}"
      - id: "height"
        symbol: "H"
        label: "Höhe"
        value: "\\approx 52{,}5\\,\\mathrm{m}"
      - id: "volume"
        symbol: "V"
        label: "Verdrängtes Volumen"
        value: "\\approx 1210\\,\\mathrm{m^3}"
  part2:
    title: "Teil 2 - Schwerpunkt, Auftriebspunkt, Metazentrum"
    imageTitle: "Schwerpunkt, Auftriebspunkt, Metazentrum"
    g: "Schwerpunkt"
    b: "Auftriebsschwerpunkt"
    and: "und"
    m: "Metazentrum"
    p1Before: "Entscheidend sind die Punkte "
    bullets:
      g: "ist der <b>Schwerpunkt des gesamten Schiffs</b> (Rumpf, Kanonen, Masten, Ballast, Ladung). In diesem Punkt kann man sich die Gewichtskraft <katex tex=\"W=\\Delta g\" /> angreifend denken. Liegt viel Masse hoch, steigt <katex tex=\"KG\" /> und das Schiff wird kippempfindlicher."
      b: "ist der <b>Schwerpunkt des verdrängten Wasservolumens</b>. Dort greift die Auftriebskraft <katex tex=\"A\" /> an. Anders als <katex tex=\"G\" /> ist <katex tex=\"B\" /> nicht fest am Schiff: Bei Krängung ändert sich die Form des untergetauchten Volumens, dadurch wandert <katex tex=\"B\" /> zur tieferen Seite."
      m: "ist das <b>Metazentrum</b>, also der Schnittpunkt der Auftriebslinien für sehr kleine Krängungswinkel. Es ist ein geometrischer Referenzpunkt für die Anfangsstabilität: Liegt <katex tex=\"M\" /> über <katex tex=\"G\" />, entsteht ein aufrichtendes Moment; liegt <katex tex=\"M\" /> darunter, kippt das System weiter."
    p2Before: "Die zentrale Kenngröße ist der Abstand "
    p2After: ", die metazentrische Höhe. Für kleine Krängung gilt:"
    p3Before: "Wenn "
    p3Middle: ", richtet sich das Schiff anfangs selbst auf. Kleines "
    p3After: " bedeutet aber: wenig Stabilitätsreserve. Großes "
    p3End: " (viel Masse oben) verschlechtert das direkt."
    p4Before: "Breite an der Wasserlinie hilft stark, weil "
    p4After: " mit der Breite stark wächst."
  part3:
    title: "Teil 3 - Windmoment gegen Rückstellmoment"
    p1Before: "Bei Krängungswinkel "
    p1After: " wirkt der Rückstellhebelarm näherungsweise wie:"
    p2Before: "Der <b>Krängungswinkel</b> "
    p2Middle: " ist der seitliche Neigungswinkel des Schiffs um seine Längsachse. Er misst also, wie weit das Schiff aus der aufrechten Ruhelage gekippt ist: "
    p2After: " bedeutet „gerade“, größere Werte bedeuten stärkere Schräglage zur Backbord- oder Steuerbordseite."
    p3Before: "Für die Stabilitätsrechnung ist wichtig: Im kleinen Winkelbereich, typisch einige Grad bis grob "
    p3After: ", kann man mit den Kleinwinkel-Formeln gut arbeiten. Bei größeren Winkeln wird die Geometrie des untergetauchten Rumpfs stark nichtlinear, dann reicht die einfache Näherung nicht mehr."
    p4: "Das Windmoment kann man grob mit"
    p5Before: "abschätzen. Kritisch wird es, wenn "
    p6: "Die Proportionen der Vasa zeigen das Problem:"
    p7Before: "Hoher Aufbau treibt "
    p7After: " nach oben, große Segelfläche erhöht das Windmoment."
  part4:
    title: "Teil 4 - Downflooding und freie Wasseroberfläche"
    p1: "Sobald bei Krängung untere Öffnungen unter Wasser geraten, läuft Wasser ein. Dann sinkt die effektive Stabilität zusätzlich durch den freien Oberflächeneffekt:"
    p2Before: "Mehr Wasser auf einem breiten Deck bedeutet: größeres "
    p2Middle: ", kleineres "
    p2After: ", noch mehr Krängung."
    p3: "Die bekannte Belastungsprobe mit laufenden Matrosen deutete genau darauf hin: zu kleine Anfangsstabilität."
    p4: "Auch die Rollperiode zeigt die Empfindlichkeit:"
  part5:
    title: "Teil 5 - Was die Mathe vorgeschlagen hätte"
    p1: "Mathematisch sind die Stellschrauben klar:"
    items:
      kg: "nach unten: Gewicht tiefer, oben leichter."
      iw: "nach oben: mehr Breite an der Wasserlinie."
      downflooding: "Downflooding verhindern: tiefe Stückpforten erst spät öffnen."
    p2: "Nebenbei zählt auch Unsymmetrie beim Bau, etwa unterschiedliche Maßsysteme links und rechts, weil eine Anfangsschlagseite die Reserve weiter verringert."
    note: "Kurzform: Die Vasa ist weniger an einer einzelnen Böe gescheitert, sondern an einer zu kleinen Stabilitätsmarge im Gesamtdesign."
