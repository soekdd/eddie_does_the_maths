book:
  p1: "I stand in front of the <b>Vasa</b> and cannot decide whether I should be angry or simply sad. Vidar tells me the story, and the more I hear, the clearer it becomes: this was no \"accident.\" It was a disaster announced in advance. A ship built as a floating statement of power, taller, more heavily armed, more impressive than anything before it, because a king wanted it that way."
  p2: "And then comes the part that knots my stomach: in <b>1628</b> she did not even really get going. She sank while still in the harbor. A few hundred meters, a gust of wind, a bit of swell, and pride turns into a block that simply tips over. Vidar tells me about tests where they deliberately made her roll, and everyone could see how unstable she was. Cannons already sliding dangerously close to the water during the trial. Looks that say: <em>This is going to go wrong.</em> Only nobody stops it. Nobody wants to be the first to say \"stop.\" Too much prestige, too much fear, too much work already invested. That is what makes the Vasa so brutal to me: she is a monument to how a system would rather go under than admit a mistake."
  p3: "Here I look at what actually happened: how to tell whether a ship sits safely in the water, and why some hulls tip at the slightest opportunity. Below you can try it yourself in a simulation and test different hull shapes for stability."
sections:
  part1:
    title: "Part 1 - Equilibrium: the first sentence that decides everything"
    p1Before: "The Vasa was a floating palace and still sank after about "
    p1After: " It looks like bad luck, but above all it was geometry plus physics."
    p2: "A ship floats when weight and buoyancy are equal:"
    p3: "For the Vasa, the following orders of magnitude are known:"
