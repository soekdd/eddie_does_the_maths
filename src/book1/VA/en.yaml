      - id: "volume"
        symbol: "V"
        label: "Displaced volume"
        value: "\\approx 1210\\,\\mathrm{m^3}"
  part2:
    title: "Part 2 - Center of gravity, center of buoyancy, metacenter"
    imageTitle: "Center of gravity, center of buoyancy, metacenter"
    g: "center of gravity"
    b: "center of buoyancy"
    and: "and"
    m: "metacenter"
    p1Before: "The decisive points are "
    bullets:
      g: "is the <b>center of gravity of the whole ship</b> (hull, cannons, masts, ballast, cargo). We can imagine the weight force <katex tex=\"W=\\Delta g\" /> acting there. If a lot of mass sits high up, <katex tex=\"KG\" /> rises and the ship becomes more prone to tipping."
      b: "is the <b>center of the displaced water volume</b>. The buoyancy force <katex tex=\"A\" /> acts there. Unlike <katex tex=\"G\" />, <katex tex=\"B\" /> is not fixed to the ship: when the ship heels, the shape of the submerged volume changes, so <katex tex=\"B\" /> moves toward the lower side."
      m: "is the <b>metacenter</b>, the intersection point of the buoyancy lines for very small heel angles. It is a geometric reference point for initial stability: if <katex tex=\"M\" /> lies above <katex tex=\"G\" />, a righting moment arises; if <katex tex=\"M\" /> lies below it, the system keeps tipping."
    p2Before: "The key quantity is the distance "
    p2After: ", the metacentric height. For small heel angles we have:"
    p3Before: "If "
    p3Middle: ", the ship initially rights itself. But a small "
    p3After: " means little stability reserve. A large "
    p3End: " caused by too much mass high up makes this directly worse."
    p4Before: "Beam at the waterline helps a lot because "
    p4After: " grows strongly with beam."
  part3:
    title: "Part 3 - Wind moment versus righting moment"
    p1Before: "At a heel angle "
    p1After: ", the righting lever arm is approximately:"
    p2Before: "The <b>heel angle</b> "
    p2Middle: " is the lateral angle of inclination of the ship about its longitudinal axis. It measures how far the ship has tilted away from upright rest: "
    p2After: " means upright, larger values mean a stronger list to port or starboard."
    p3Before: "For stability calculations, this matters: in the small-angle range, typically a few degrees up to roughly "
    p3After: ", the small-angle formulas work well. At larger angles, the geometry of the submerged hull becomes strongly nonlinear, so the simple approximation is no longer enough."
    p4: "The wind moment can be estimated roughly by"
    p5Before: "It becomes critical when "
    p6: "The proportions of the Vasa show the problem:"
    p7Before: "A high superstructure pushes "
    p7After: " upward, while a large sail area increases the wind moment."
  part4:
    title: "Part 4 - Downflooding and free-surface effect"
    p1: "As soon as lower openings dip below the water during heel, water flows in. Then the effective stability drops further because of the free-surface effect:"
    p2Before: "More water on a wide deck means larger "
    p2Middle: ", smaller "
    p2After: ", and therefore even more heel."
    p3: "The famous running-sailors test pointed exactly to this: too little initial stability."
    p4: "The roll period also shows the sensitivity:"
  part5:
    title: "Part 5 - What the math would have suggested"
    p1: "Mathematically, the design levers are clear:"
    items:
      kg: "downward: put weight lower, make the upper structure lighter."
      iw: "upward: more beam at the waterline."
      downflooding: "prevent downflooding: open low gun ports only late."
    p2: "Incidentally, asymmetry in construction also matters, for example different measuring systems on left and right, because an initial list further reduces the reserve."
    note: "In short: the Vasa did not fail because of one single gust, but because the overall design had too little stability margin."
