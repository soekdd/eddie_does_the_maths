  book:
    p1: "I lean back by the window seat while outside the city keeps breathing through Sunday. In the rotunda, though, time seems to move in rings: soft footsteps, the smell of paper, the dull click of book covers. Right here, numbers do not feel like school material. They feel like stories someone started before me. I like that. Stories can be continued. You can even rewrite them."
    p2: "And Diophantus is exactly the kind of person who catches me forgetting, for a moment, who I am supposed to be right now. Not Eddie on the run, not Edmilla in costume, not the girl with the dog digging through snow in the park. Just me with a pen, a notebook, and that annoying longing for order in everything that is currently disorderly."
    p3: "The inscription reads like something from an old riddle booklet, except that here nobody prints “solution on page 84” underneath it. So I do what I always do when something feels too large: I break it into pieces until it fits back into my hand."
  sections:
    part1:
      title: "Part 1 - Diophantus' Tombstone Riddle"
      p1: "The original version of the epitaph:"
      plateLead: "Diophantus"
      plateLeadSub: "Epitaph"
      epitaph: "This tomb covers Diophantus, wondrous to behold:<br>through his art the stone reveals his age.<br>A sixth of his life the god granted him as a boy;<br>adding a twelfth, he let his beard appear.<br>After another seventh came the torch of marriage,<br>and five years later a little son was given to him.<br>Alas, unhappy child, so loved! Having reached half his father's age,<br>grim Hades took him much too soon.<br>For four more years he soothed his grief through knowledge of numbers,<br>and then he too reached the end of his life."
      p2: "If you strip away the pathos and keep only the algebra, it says:"
      s1: "1/6 of his lifetime for childhood."
      s2: "another 1/12 until beard growth."
      s3: "another 1/7 until marriage."
      s4: "5 years later he has a son."
      s5: "The son lives 1/2 as long as the father (measured against the father's lifetime)."
      s6: "4 years after the son's death, Diophantus dies."
    part2:
      title: "Part 2 - Translate into Formulas"
      p1: "x as the total lifetime of Diophantus in years."
    part3:
      title: "Part 3 - Solve"
      p1: "First combine the fractions. A common denominator is 84 (which nearly gives the solution already):"
      p2: "So Diophantus lived to be 84 years old."
    part4:
      title: "Part 4 - Bonus: The Stages as Concrete Ages"
      s1: "End of childhood:"
      s2: "Beard growth:"
      s3: "Marriage:"
      s4: "Birth of the son:"
      s5: "for the son:"
      s5b: "years, so Diophantus is"
      s5c: "years old when the son dies."
      s6: "for Diophantus' death:"
    part5:
      title: "Part 5 - My Own “Milestone Calculation”"
      plateLead: "Eddie"
      plateLeadSub: "Milestone Calculation"
      poem: "One third toddler,<br>four ninths schoolchild,<br>one sixth numbers nerd,<br>two thirds of that disguised as Edmilla.<br>Two moons free.<br>The rest on the run."
      p1: "I interpret this as a partition of my lifetime T up to my 18th birthday."
      p2: "I treat the Edmilla period as a subsection of the numbers phase, not as an additional main section."
      p3: "Then I calculate the rest spent fleeing like this:"
      p4: "So I have translated my text cleanly into a system of equations. Unlike Diophantus, T is not fixed here by the text itself. If my age is given, I can compute the fleeing section immediately."
    part6:
      title: "Part 6 - Solution"
      p1: "If I set T=18, the fleeing time becomes:"
      p2: "That fits. It took me 10 months to reach West Germany."
  interactive:
    title: "4) Create Your Own Tombstone Riddle"
    p1: "Set up your life stages as terms. The equation is built automatically, and the ages for each stage are calculated in the style of a tombstone inscription."
