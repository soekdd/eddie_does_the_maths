  book:
    p1: "Ich lehne mich am Fensterplatz zurück, während draußen die Stadt den Sonntag weiteratmet. In der Rotunde ist es dagegen, als würde die Zeit in Ringen laufen: leise Schritte, Papiergeruch, das dumpfe Klacken von Buchdeckeln. Genau hier fühlen sich Zahlen nicht wie Schulstoff an, sondern wie Geschichten, die jemand vor mir begonnen hat. Ich mag das. Geschichten kann man weiterführen. Man kann sie sogar umschreiben."
    p2: "Und Diophantos ist so einer, der mich dabei erwischt, wie ich kurz vergesse, wer ich gerade sein muss. Nicht Eddie auf der Flucht, nicht Edmilla im Kostüm, nicht das Mädchen mit dem Hund, der im Park den Schnee umgräbt. Sondern einfach ich mit einem Stift, einem Block und dieser nervigen Sehnsucht nach Ordnung in allem, was gerade unordentlich ist."
    p3: "Die Inschrift wirkt wie ein Spruch aus einem alten Rätselheft, nur dass hier niemand „Lösung auf Seite 84“ drunterdruckt. Also mache ich das, was ich immer mache, wenn mir etwas zu groß vorkommt: Ich zerlege es in Teile, bis es wieder in meine Hand passt."
  sections:
    part1:
      title: "Teil 1 - Das Grabplatten-Rätsel des Diophantos"
      p1: "Die Originalfassung des Epitaphs:"
      plateLead: "Diophantos"
      plateLeadSub: "Epitaph"
      epitaph: "Hier das Grabmal deckt Diophantos, ein Wunder zu schauen:<br>Durch des Entschlafenen Kunst lehrt dich sein Alter der Stein.<br>Knabe zu bleiben verlieh ein Sechstel des Lebens ein Gott ihm;<br>Fügend das Zwölftel hinzu, ließ er ihm sprossen die Wang.<br>Steckte ihm drauf auch nach dem Siebtel die Fackel der Hochzeit,<br>Und fünf Jahre nachher teilt' er ein Söhnlein ihm zu.<br>Weh! unglückliches Kind, so geliebt! Halb hatt' es des Vaters<br>Alter erreicht, da nahm's Hades, der schaurige, allzufrüh.<br>Noch vier Jahre den Schmerz durch Kunde der Zahlen besänftigend,<br>Langte am Ziele des Seins endlich er selber auch an."
      p2: "Nimmt man den Pathos heraus und behält nur die Algebra, steht da:"
      s1: "1/6 seiner Lebenszeit für die Kindheit."
      s2: "weitere 1/12 bis zum Bartwuchs."
      s3: "weitere 1/7 bis zur Hochzeit."
      s4: "5 Jahre später bekommt er einen Sohn."
      s5: "Der Sohn lebt 1/2 so lang wie der Vater (bezogen auf die Lebenszeit des Vaters)."
      s6: "4 Jahre nach dem Tod des Sohnes stirbt Diophantos."
    part2:
      title: "Teil 2 - In Formeln überführen"
      p1: "x als gesamte Lebensdauer von Diophantos in Jahren."
    part3:
      title: "Teil 3 - Lösen"
      p1: "Zuerst die Brüche zusammenfassen. Ein gemeinsamer Nenner ist 84 (damit ist die Lösung fast schon da):"
      p2: "Diophantos wurde also 84 Jahre alt."
    part4:
      title: "Teil 4 - Bonus: Die Stationen als konkrete Alterszahlen"
      s1: "Ende der Kindheit:"
      s2: "Bartwuchs:"
      s3: "Hochzeit:"
      s4: "Geburt des Sohnes:"
      s5: "für den Sohn:"
      s5b: "Jahre, also ist Diophantos beim Tod des Sohnes"
      s5c: "Jahre alt."
      s6: "für Diophantos' Tod auf:"
    part5:
      title: "Teil 5 - Meine eigene „Meilenstein-Rechnung“"
      plateLead: "Eddie"
      plateLeadSub: "Meilenstein-Rechnung"
      poem: "Ein Drittel Kleinkind,<br>vier Neuntel bin ich Schulkind,<br>ein Sechstel bin ich Spezi der Zahlen,<br>davon zwei Drittel als Edmilla getarnt.<br>Zwei Monde bin ich frei.<br>Den Rest auf der Flucht."
      p1: "Ich interpretiere das als Aufteilung meiner Lebenszeit T bis zu meinem 18. Geburtstag."
      p2: "Ich behandle die Edmilla-Zeit als Unterabschnitt der Zahlen-Phase, nicht als zusätzlichen Hauptabschnitt."
      p3: "Den Rest auf der Flucht rechne ich dann so:"
      p4: "Damit habe ich meinen Text als Gleichungssystem sauber übersetzt. Anders als bei Diophantos ist T hier nicht durch den Text selbst festgelegt. Wenn mein Alter gegeben ist, kann ich den Flucht-Abschnitt sofort konkret berechnen."
    part6:
      title: "Teil 6 - Lösung"
      p1: "Wenn ich T=18 setze, folgt eine Fluchtzeit von:"
      p2: "Das passt. 10 Monate habe ich gebraucht, um Westdeutschland zu erreichen."
  interactive:
    title: "4) Erstelle dein eigenes Grabplatten-Rätsel"
    p1: "Lege deine Lebensstationen als Terme an. Die Gleichung wird automatisch aufgebaut und die Alterswerte zu jeder Station werden im Stil einer Grabplatte berechnet."
