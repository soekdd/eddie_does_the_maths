book:
  p1: "Am dritten Tag sitzt Sini mir gegenüber, Kaffee dampft, und ich merke plötzlich: Meine Füße sind fast still. Dafür fängt mein Kopf wieder an zu hüpfen. Der Zettel ist wellig ausgeschnitten wie eine Wasserlinie, und die Frage ist so finnisch, dass sie eigentlich nach Wald riecht: Wie wahrscheinlich ist es, dass ein zufälliger Punkt höchstens einen Kilometer vom Seeufer entfernt liegt? Also: Wie \"wassernah\" ist dieses Land wirklich, nicht gefühlt, sondern grob geschätzt?"
  p2: "Ich kritzle Finnland auf Küchenrolle, mache blaue Tupfer wie kleine Seen, und dann stelle ich mir vor, ich würde jedem Ufer einen dicken Rand ausbreiten, wie eine Jacke, die man um Wasser legt. Wenn der Rand groß genug ist, frisst er plötzlich riesige Flächen. Und genau da steckt die Idee."
  p3: "Hier zeige ich dir, wie man mit Flächen und Uferlängen abschätzt, ohne sich in Details zu verlieren. Unten kannst du die \"Ufer-Aufdickung\" interaktiv selbst verschieben und sehen, wie schnell Finnland zur Wasserkarte wird."
sections:
  part1:
    title: "Teil 1 - Wie wahrscheinlich ist \"maximal 100 m bis zum nächsten See\"?"
    p1Before: "Wir wählen zufällig einen Punkt auf der Landfläche (ohne Seen). Gesucht ist die Wahrscheinlichkeit, dass der Punkt höchstens "
    p1After: " vom nächsten Seeufer entfernt ist."
    p2Before: "Dazu vergleichen wir "
    p2Middle: " mit der gesamten Landfläche "
    shoreAreaVar: 'A_{\text{Ufer}}(h)'
    landAreaVar: 'A_{\text{Land}}'
  part2:
    title: "Teil 2 - Formel für die Uferfläche"
    p1Before: "Bezeichne mit "
    p1Middle: " die gesamte Uferlänge und mit "
    p1After: " die Uferbreite. Für einen einzelnen See (eine geschlossene Uferlinie) gilt:"
    shoreAreaBox: 'A_{\text{Ufer}}(h)=h\cdot d+\pi h^2'
    p2Before: "Der erste Term ist die Summe aller Kantenrechtecke: "
    p3Before: "Der zweite Term ist die gesamte Eckkorrektur (konvexe Tortenstücke minus konkave Tortenstücke) und ergibt genau "
    p4Before: "Bei "
    p4Middle: " getrennten Seen addiert sich dieser Eckterm im additiven Modell zu "
    shoreAreaAddBox: 'A_{\text{Ufer,add}}(h)=h\cdot d+n\pi h^2'
    note: "Die reale Uferfläche ist die Vereinigungsfläche aller Uferzonen und damit wegen Überlappung nie größer als diese additive Summe."
  part3:
    title: "Teil 3 - Warum konkav/konvex egal ist"
    p1Before: "Sei "
    p1Middle: " der signierte Außendrehwinkel an Ecke "
    p1After: " (konvex positiv, konkav negativ). Die Sektorfläche an dieser Ecke ist "
    cornersBox: 'A_{\text{Ecken}} &= \frac{h^2}{2}\sum_i \varphi_i \\ \sum_i \varphi_i &= 2\pi \;\Longrightarrow\; A_{\text{Ecken}}=\pi h^2'
    p2Before: "Für "
    p2Middle: " getrennte Seen gilt entsprechend "
    p2After: " und damit im additiven Modell "
    cornersAddVar: 'A_{\text{Ecken,add}}=n\pi h^2'
    note: "Darum bleibt die Formel unabhängig von der Polygonauflösung und auch bei konkaven Teilen gültig."
    distanceProbBox: 'P(\mathrm{Distanz}\le h)\approx \frac{A_{\text{Ufer}}(h)}{A_{\text{Land}}}'
  part4:
    title: "Teil 4 - Zweistufige Betrachtung"
    stage1Title: "Schritt 4.1 - Stufe 1: Additive Näherung"
    stage1Text: "Im ersten Schritt addieren wir alle lokalen Beiträge unabhängig voneinander: Rechteckanteile entlang der Ufer plus Eckanteile. Für viele getrennte Seen ergibt das eine einfache, gut interpretierbare Startformel."
    stage1Box: 'A_{\text{add}}(h) &= h\cdot d+n\pi h^2 \\ P_1(h) &\approx\frac{A_{\text{add}}(h)}{A_{\text{Land}}}'
    stage1NoteBefore: "Diese Stufe zählt Überlappungen mehrfach. Darum ist sie für kleine "
    stage1NoteMiddle: " oft brauchbar, kann für größere "
    stage1NoteAfter: " aber unplausibel werden."
    stage2Title: "Schritt 4.2 - Stufe 2: Minkowski-orientierte Korrektur"
    stage2TextBefore: "Mathematisch ist die gesuchte Uferfläche die Vereinigungsfläche einer Aufdickung aller Wasserflächen um den Radius "
    stage2TextAfter: ", abzüglich der Wasserflächen selbst und auf Land begrenzt."
    stage2ActualBox: 'A_{\text{wahr}}(h) &= \left|\left((W\oplus B_h)\setminus W\right)\cap L\right| \\ P(h) &= \frac{A_{\text{wahr}}(h)}{A_{\text{Land}}}'
    stage2ApproxBefore: "Wenn nur aggregierte Daten vorliegen ("
    stage2ApproxAfter: "), nutzen wir als pragmatische zweite Stufe eine Überlappungs-Korrektur:"
    aggregateVars: 'n,d,A_{\text{Land}}'
    stage2PoissonBox: 'P_2(h) &= 1-\exp\!\left(-\frac{A_{\text{add}}(h)}{A_{\text{Land}}}\right) \\ A_2(h) &= A_{\text{Land}}\cdot P_2(h)'
    stage2IdeaBefore: "Die Idee dahinter: Setze "
    lambdaBox: '\lambda(h)=\frac{A_{\text{add}}(h)}{A_{\text{Land}}}'
    stage2IdeaMiddle: " Dann ist "
    stage2IdeaAfter: " die additive mittlere Trefferzahl an einem zufälligen Landpunkt. Unter einer zufälligen Überdeckungsannahme ist die Nicht-Treffer-Wahrscheinlichkeit etwa "
    stage2IdeaEnd: ", also "
    stage2SmallBefore: "Für kleine "
    stage2SmallMiddle: " gilt "
    stage2SmallAfter: " Die Korrektur ist dann klein. Für große "
    stage2SmallEnd: " sättigt "
    stage2SmallTail: " automatisch bei "
    stage2DisclaimerBefore: "Minkowski liefert die exakte Geometrie über die Vereinigungsfläche "
    stage2DisclaimerMiddle: ". Unser Korrekturfaktor ist nicht selbst ein Minkowski-Satz, sondern eine Näherung für Überlappungen, wenn nur Summenwerte ("
    stage2DisclaimerAfter: ") und keine vollständigen Geometrien vorliegen."
