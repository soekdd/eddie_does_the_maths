title: "Structural Analysis #3 Dynamic Loads"
bz:
  imageTitle: "Eddie compares calm and crashing loads"
  imageAlt: "Eddie explains dynamic loads"
  introDate: "Stockholm, October 28, 1985"
  subChapter:
    einleitung: "Introduction"
    impuls: "Impulse vs. k"
    idee: "Idea"
    rechenweg: "Procedure"
    beispiel: "Mini example"
    fazit: "Conclusion"
  book:
    p1: "The translator has found further differences between TGL and DIN and asked me to calculate them cleanly for him. I nod as if that were a normal request. As if I were not currently living off people throwing coins at me so that I can bring order into numbers. On paper everything looks equally well-behaved: a load is a load. But as soon as something gets <em>into motion</em>, the world starts ticking differently."
    p2: "I imagine it very simply: a heavy man slowly sinks into a sofa. That is heavy, yes, but it happens comfortably, almost like a sigh. And then a child doing a cannonball jump - not onto the sofa, but onto the floor. Much lighter, much smaller ... and yet it bangs as if someone briefly turned gravity up. <b>Same mass</b> does not mean <b>same effect</b> once velocity and stopping suddenly get a say."
    p3: "This is exactly where we start: for such dynamic loads, <em>TGL</em> distinguishes more precisely and treats “slowly sinking down” differently from “hard impact.” At this point <em>DIN</em> is coarser and often treats both the same. You can discover the difference yourself in the interactive part below."
    p4: "Vidar is already waiting for me outside. Today I am going to pay in the café, I tell myself stubbornly, as if that were the easiest calculation in the world."
  sections:
    part1:
      title: "Part 1 - Strictly speaking, dynamic loads should be calculated via impulse"
      p1: "In an impact, the load is not only “weight,” but above all a time-dependent force history. Strictly speaking, the calculation runs via impulse:"
      p2: "This immediately shows: a short braking time <code>\\Delta t</code> means large force peaks. How high the peak really becomes additionally depends on stiffness, damping, and contact history."
      p3: "In everyday design work, engineers often make life easier here and replace the full impact calculation with a surcharge factor:"
      p4: "The factor <code>k</code> is therefore a substitute for “everything dynamic”: velocity, braking time, vibration behavior, and uncertainties."
    part2:
      title: "Part 2 - Dynamic loads thought of intuitively (TGL vs. DIN back then)"
      imageIdea: "The idea in one picture"
      slow: "<strong>Slow:</strong> A heavy man sits down on the sofa. Heavy, but rather calm."
      fast: "<strong>Fast and hard:</strong> A child jumps from the sofa onto the floor. Lighter, but a short bang."
      p1: "For the calculation, we use a didactic mental model:"
      baseLoad: "Base load: <code>F_k</code>"
      surcharge: "Surcharge: <code>k</code>"
      designLoad: "Design load: <code>F_d</code>"
      note: "Important: this is intentionally simplified and not an exact quotation of the standards. It only shows what is meant by “differentiated by load character.”"
    part3:
      title: "Part 3 - Common inputs for all calculation paths"
      step31: "Step 3.1 - Procedure and numerical example"
      col1: "TGL: heavy man (sits down, calm)"
      col2: "TGL: child (jumps, bangs)"
      col3: "DIN (around 1985): lumped"
      step1: "1) Base load"
      cell1Note: "without distinguishing “sits down” and “jumps”"
      step2: "2) Surcharge"
      cell2Left: "smaller surcharge for calm load"
      cell2Mid: "larger surcharge for banging load"
      cell2Right: "the same, regardless of how the load occurs"
      step3: "3) Design load"
      step4: "4) Takeaway"
      max1: "Heavy, but cozy."
      max2: "Light, but briefly brutal."
      max3: "One surcharge for everything."
      summaryLead: "What this shows:"
      summary1: "Under TGL, a light jump can be almost as severe as a heavy person sitting down."
      summary2: "Under DIN (back then), the jump automatically remains small because it gets the same surcharge."
    part4:
      title: "Part 4 - Conclusion"
      f1: "<strong>TGL way of thinking:</strong> not only “how heavy,” but also “how does it happen?”"
      f2: "<strong>DIN (back then):</strong> one surcharge for everything, robust and simple"
      p1: "In short: TGL appears finer (<code>\\text{sits down}\\neq \\text{jumps}</code>), DIN (back then) coarser, but easier to apply. Today DIN also distinguishes according to load character."
