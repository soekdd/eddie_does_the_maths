bz:
  title: "Eddie rechnet: Baustatik #3 Dynamische Lasten"
  imageTitle: "Eddie vergleicht ruhige und knallige Lasten"
  imageAlt: "Eddie erklärt dynamische Lasten"
  introDate: "Stockholm, 28. Oktober 1985"
  subChapter:
    einleitung: "Einleitung"
    impuls: "Impuls vs. k"
    idee: "Idee"
    rechenweg: "Rechenweg"
    beispiel: "Mini-Beispiel"
    fazit: "Fazit"
  book:
    p1: "Der Übersetzer hat weitere Abweichungen zwischen TGL und DIN gefunden und mich gebeten, sie für ihn sauber durchzurechnen. Ich nicke, als wäre das eine normale Bitte. Als würde ich nicht gerade davon leben, dass jemand mir Münzen hinwirft und ich dafür Ordnung in Zahlen bringe. Auf dem Papier sieht alles gleich brav aus: eine Last ist eine Last. Aber sobald etwas <em>in Bewegung</em> gerät, fängt die Welt an, anders zu ticken."
    p2: "Ich stelle mir das ganz einfach vor: Ein dicker Mann lässt sich langsam in ein Sofa sinken. Das ist schwer, ja, aber es passiert gemütlich, fast wie ein Seufzen. Und dann ein Kind, das eine Arschbombe macht - nicht aufs Sofa, sondern auf den Fußboden. Viel leichter, viel kleiner ... und trotzdem knallt es, als hätte jemand kurz die Schwerkraft aufgedreht. <b>Gleiche Masse</b> heißt eben nicht <b>gleiche Wirkung</b>, wenn Geschwindigkeit und Stopp plötzlich mitreden."
    p3: "Genau hier setzen wir an: Die <em>TGL</em> unterscheidet bei solchen dynamischen Lasten genauer und behandelt „langsam einsinken“ anders als „hart aufschlagen“. Die <em>DIN</em> ist an der Stelle grober und setzt beides oft gleich. Unten kannst du den Unterschied im interaktiven Teil selbst entdecken."
    p4: "Draußen wartet schon Vidar auf mich. Heute werde ich im Café bezahlen, sage ich mir trotzig, als wäre das die einfachste Rechnung der Welt."
  sections:
    part1:
      title: "Teil 1 - Eigentlich müsste man dynamische Lasten über Impuls rechnen"
      p1: "Bei einem Stoß ist die Last nicht nur „Gewicht“, sondern vor allem ein zeitlicher Kraftverlauf. Streng genommen läuft die Rechnung über den Impuls:"
      p2: "Damit sieht man sofort: kurze Abbremszeit <code>\\Delta t</code> bedeutet große Kraftspitzen. Wie hoch die Spitze wirklich wird, hängt zusätzlich von Steifigkeit, Dämpfung und Kontaktverlauf ab."
      p3: "Im Entwurfsalltag machen es sich Ingenieure hier gern leicht und ersetzen die vollständige Stoßrechnung durch einen Zuschlagfaktor:"
      p4: "Der Faktor <code>k</code> ist also ein Ersatz für „alles Dynamische“: Geschwindigkeit, Abbremszeit, Schwingungsverhalten und Unsicherheiten."
    part2:
      title: "Teil 2 - Dynamische Lasten - anschaulich gedacht (TGL vs. DIN damals)"
      imageIdea: "Idee in einem Bild"
      slow: "<strong>Langsam:</strong> Ein dicker Mann setzt sich aufs Sofa. Schwer, aber eher ruhig."
      fast: "<strong>Schnell und hart:</strong> Ein Kind springt vom Sofa auf den Boden. Leichter, aber kurzer Knall."
      p1: "Für die Rechnung nutzen wir ein didaktisches Denkmodell:"
      baseLoad: "Grundlast: <code>F_k</code>"
      surcharge: "Zuschlag: <code>k</code>"
      designLoad: "Bemessungslast: <code>F_d</code>"
      note: "Wichtig: Das ist bewusst einfach gehalten und keine exakte Normabschrift. Es zeigt nur, was mit „differenziert nach Lastcharakter“ gemeint ist."
    part3:
      title: "Teil 3 - Gemeinsame Eingaben für alle Rechenwege"
      step31: "Schritt 3.1 - Rechenweg und Zahlenbeispiel"
      col1: "TGL: dicker Mann (setzt sich, ruhig)"
      col2: "TGL: Kind (springt, knallt)"
      col3: "DIN (um 1985): pauschal"
      step1: "1) Grundlast"
      cell1Note: "ohne Trennung von „setzt“ und „springt“"
      step2: "2) Zuschlag"
      cell2Left: "kleiner Zuschlag für ruhige Last"
      cell2Mid: "groesserer Zuschlag für knallige Last"
      cell2Right: "gleich, egal wie die Last entsteht"
      step3: "3) Bemessungslast"
      step4: "4) Merksatz"
      max1: "Schwer, aber gemütlich."
      max2: "Leicht, aber kurz brutal."
      max3: "Ein Zuschlag für alles."
      summaryLead: "Was man daran sieht:"
      summary1: "Bei TGL kann ein leichter Sprung fast so schlimm sein wie ein schweres Hinsetzen."
      summary2: "Bei DIN (damals) bleibt der Sprung automatisch klein, weil er denselben Zuschlag bekommt."
    part4:
      title: "Teil 4 - Fazit"
      f1: "<strong>TGL-Denke:</strong> nicht nur „wie schwer“, sondern auch „wie passiert es?“"
      f2: "<strong>DIN (damals):</strong> ein Zuschlag für alles, robust und einfach"
      p1: "Kurz gesagt: TGL wirkt feiner (<code>\\text{setzt sich}\\neq \\text{springt}</code>), DIN (damals) grober, dafür leichter anzuwenden. Heute unterscheidet auch die DIN nach Lastcharakter."
