title: "IMO 1985 Aufgabe A2"
imageTitle: "Eddie denkt über die Aufgabe A2 der IMO 85 nach"
imageAlt: "Eddie denkt über die Aufgabe A2 der IMO 85 nach"
introDate: "Joutsa, 4. Juli 1985"
subChapter:
  einleitung: "Einleitung"
  entscheidungsbaum: "Entscheidungsbaum"
  wahrscheinlichkeiten: "Wahrscheinlichkeiten"
  rechner: "Rechner"
book:
  p1: "Ich höre das Kratzen von dreißig Bleistiften gleichzeitig und finde es plötzlich beruhigend. Das ist mein Element: Regeln lesen, Muster finden, fertig."
  p2: "Hier geht’s nicht um Linien und Kreise, sondern um eine Reihe von Zahlen, die man in zwei Farben anstreicht. Klingt wie Kinderkram, aber die Aufgabe legt zwei fiese Regeln fest. Die erste sorgt dafür, dass Zahlen, die \"spiegelbildlich\" zueinander stehen, dieselbe Farbe haben müssen. Die zweite kettet noch mehr Zahlen zusammen: Sobald du eine Zahl anders färbst als eine ganz bestimmte Lieblingszahl, zwingt dich die Regel, andere mit ihr gleich zu färben."
  p3: "Und dann kommt der eigentliche Punch: Du sollst zeigen, dass diese Regeln am Ende alles einfärben, ohne dass du noch Wahlfreiheit hast. Egal wie du anfängst, du landest bei \"alle gleich\"."
  p4: "Hier zeige ich dir die einfache Logik dahinter, Schritt für Schritt, mit Formelkram."
sections:
  part1:
    title: "Teil 1 — Aufgabenstellung"
    meta: "IMO 1985 – Aufgabe A2: „Am Ende hat alles eine Farbe“"
    p1: "Seien <katex tex=\"n\\ \\text{und}\\ k\" /> teilerfremde positive ganze Zahlen mit <katex tex=\"k<n\" />. Die Menge"
    p2: "werde so gefärbt, dass jede Zahl entweder <b>blau</b> oder <b>weiß</b> ist."
    rule1: "<b>Regel 1 (Spiegel):</b> Für jedes <katex tex=\"i\\in M\" /> haben <katex tex=\"i\" /> und <katex tex=\"n-i\" /> dieselbe Farbe."
    rule2: "<b>Regel 2 (Abstand zu <katex tex=\"k\" />):</b> Für jedes <katex tex=\"i\\in M\" /> mit <katex tex=\"i\\neq k\" /> haben <katex tex=\"i\" /> und <katex tex=\"|i-k|\" /> dieselbe Farbe."
    prove: "<b>Zu zeigen:</b> Alle Zahlen in <katex tex=\"M\" /> müssen dieselbe Farbe haben."
  part2:
    title: "Teil 2 — Idee (ein Rundgang, der alle besucht)"
    p1: "Stell dir die Zahlen <katex tex=\"0,1,2,\\dots,n-1\" /> wie Punkte auf einer Uhr vor (Rechnen modulo <katex tex=\"n\" />):"
    l1: "Nach <katex tex=\"n-1\" /> kommt wieder <katex tex=\"0\" />."
    l2: "<katex tex=\"x\\bmod n\" /> bedeutet: Wir schauen nur auf den Rest beim Teilen durch <katex tex=\"n\" />."
    p2: "Jetzt machen wir einen Rundgang in Sprüngen der Länge <katex tex=\"k\" />:"
    p3: "Warum ist das spannend? Weil <katex tex=\"\\gcd(n,k)=1\" /> genau heißt, dass die Sprünge so günstig sind, dass man dabei alle Reste <katex tex=\"1,2,\\dots,n-1\" /> trifft (nur in anderer Reihenfolge)."
    p4: "Und wenn wir zeigen, dass jede zwei aufeinanderfolgenden besuchten Zahlen dieselbe Farbe haben, dann haben am Ende alle dieselbe Farbe."
  part3:
    title: "Teil 3 — Beweis in klaren Schritten"
    step1Title: "Schritt 1 — Die <katex tex=\"k\" />-Sprünge treffen alle Zahlen <katex tex=\"1,\\dots,n-1\" />"
    step1p1: "Behauptung: Die Reste"
    step1p2: "sind (bis auf Reihenfolge) genau die Zahlen <katex tex=\"1,2,\\dots,n-1\" />."
    step1p3: "<b>Begründung:</b> Angenommen, zwei Sprünge landen auf demselben Rest:"
    step1p4: "Dann gilt"
    step1p5: "also teilt <katex tex=\"n\" /> das Produkt <katex tex=\"(a-b)k\" />. Weil <katex tex=\"n\" /> und <katex tex=\"k\" /> teilerfremd sind, folgt"
    step1p6: "Für <katex tex=\"0\\le a,b\\le n-1\" /> bedeutet das <katex tex=\"a=b\" />. Also sind alle Reste verschieden — und damit eine Umordnung von <katex tex=\"1,\\dots,n-1\" />."
    step2Title: "Schritt 2 — Zwei aufeinanderfolgende Sprünge haben dieselbe Farbe"
    step2p1: "Für <katex tex=\"i=1,2,\\dots,n-1\" /> sei <katex tex=\"r_i\" /> der Rest von <katex tex=\"ik\" /> modulo <katex tex=\"n\" />, als Zahl in <katex tex=\"\\{0,1,\\dots,n-1\\}\" />. Aus Schritt 1 wissen wir: <katex tex=\"r_1,\\dots,r_{n-1}\" /> sind genau <katex tex=\"1,\\dots,n-1\" /> (kein <katex tex=\"0\" />)."
    step2p2: "Vergleiche zwei Nachbarn <katex tex=\"r_i\" /> und <katex tex=\"r_{i+1}\" />. Weil"
    step2p3: "gilt modulo <katex tex=\"n\" />:"
    step2p4: "Das heißt: entweder kein Überlauf oder Überlauf."
    caseATitle: "Fall A: Kein Überlauf"
    caseAp1: "Dann ist"
    caseAp2: "Also"
    caseAp3: "Da außerdem <katex tex=\"r_{i+1}\\neq k\" /> gilt (denn aus <katex tex=\"r_{i+1}=k\" /> würde <katex tex=\"(i+1)k\\equiv k\\pmod n\" /> folgen, also <katex tex=\"ik\\equiv 0\\pmod n\" />. Dann teilt <katex tex=\"n\" /> das Produkt <katex tex=\"ik\" />. Wegen <katex tex=\"\\gcd(n,k)=1\" /> muss daraus <katex tex=\"n\\mid i\" /> folgen – das ist für <katex tex=\"1\\le i\\le n-2\" /> unmöglich.), dürfen wir Regel 2 anwenden: <katex tex=\"r_{i+1}\" /> und <katex tex=\"|r_{i+1}-k|=r_i\" /> haben dieselbe Farbe."
    caseBTitle: "Fall B: Überlauf"
    caseBp1: "Dann ist"
    caseBp2: "Setze"
    caseBp3: "In diesem Fall ist <katex tex=\"r_{i+1}<k\" />, also <katex tex=\"t>0\" /> und <katex tex=\"|r_{i+1}-k|=k-r_{i+1}=t\" />."
    caseBp4: "Jetzt kommen die Regeln:"
    caseBl1: "Aus Regel 1 folgt: <katex tex=\"t\" /> und <katex tex=\"n-t\" /> haben dieselbe Farbe."
    caseBl2: "Aber <katex tex=\"n-t=n-(k-r_{i+1})=r_{i+1}+n-k=r_i\" />."
    caseBp5: "Also hat <katex tex=\"r_i\" /> dieselbe Farbe wie <katex tex=\"t\" />."
    caseBp6: "Und aus Regel 2 folgt (weil <katex tex=\"r_{i+1}\\neq k\" />): <katex tex=\"r_{i+1}\" /> hat dieselbe Farbe wie <katex tex=\"|r_{i+1}-k|=t\" />."
    caseBp7: "Damit sind sowohl <katex tex=\"r_i\" /> als auch <katex tex=\"r_{i+1}\" /> gleichfarbig zu <katex tex=\"t\" />, also auch zueinander gleichfarbig."
    step2p5: "<b>Zwischenergebnis:</b> Für alle <katex tex=\"i=1,2,\\dots,n-2\" /> haben <katex tex=\"r_i\" /> und <katex tex=\"r_{i+1}\" /> dieselbe Farbe."
    step3Title: "Schritt 3 — Dann sind alle Zahlen gleichfarbig"
    step3p1: "Die Folge <katex tex=\"r_1,r_2,\\dots,r_{n-1}\" /> enthält (aus Schritt 1) jede Zahl aus <katex tex=\"M=\\{1,\\dots,n-1\\}\" /> genau einmal."
    step3p2: "Aus Schritt 2 wissen wir: Jede Nachbarzahl hat dieselbe Farbe. Also hat die ganze Kette dieselbe Farbe — und damit haben alle Zahlen in <katex tex=\"M\" /> dieselbe Farbe."
    step3Box: '\boxed{\text{Alle Zahlen in }M\text{ sind gleichfarbig.}}'
    commentTitle: "Kurz gesagt"
    commentItems:
      - "Teilerfremd (<katex tex=\"\\gcd(n,k)=1\" />) sorgt dafür, dass die <katex tex=\"k\" />-Sprünge alle Zahlen besuchen."
      - "Die beiden Regeln sorgen dafür, dass bei jedem Sprung die Farbe gleich bleibt (direkt oder über den Spiegel)."
      - "Wenn alle auf einer Route miteinander verbunden sind, kann es am Ende nur eine Farbe geben."
  interactive:
    title: "Spielplatz: Prüfe es für konkrete n und k"
    intro: "Ich baue die „gleichfarbig“-Regeln als Graph: Kante bedeutet „muss gleiche Farbe haben“. Wenn der Graph zusammenhängend ist, erzwingt das eine einzige Farbe."
    labels:
      n: "n"
      k: "k"
      check: "Prüfen"
      random: "Zufällig teilerfremd"
      checkLabel: "Check:"
      gcd: "gcd(n,k) = {value}"
      components: "Komponenten = {value}"
      connected: "Zusammenhängend?"
      yes: "ja"
      no: "nein"
      componentSizes: "Komponentengrößen:"
    result:
      connected: "Der Graph ist zusammenhängend ⇒ eine Farbe reicht nicht nur „wahrscheinlich“, sie ist <strong>erzwingbar</strong>."
      disconnected: "Mehrere Komponenten ⇒ mit diesen Regeln <em>kann</em> man verschiedene Farben auf unterschiedliche Komponenten legen. (Das passiert typischerweise, wenn gcd(n,k) ≠ 1 ist.)"
    errors:
      integers: "Bitte n und k als ganze Zahlen eingeben."
      minN: "n muss mindestens 2 sein."
      rangeK: "Es muss gelten: 1 ≤ k < n."
  calc:
    title: "Die k-Sprung-Kette (mod n)"
    intro: "Hier siehst du die Permutation <katex tex=\"k,2k,\\dots,(n-1)k\\ (\\bmod n)\" />. Im Beweis zeigt man: Nachbarn in dieser Liste müssen dieselbe Farbe haben."
    orderTitle: "Sprung-Reihenfolge"
    sortedTitle: "Sortierte Sicht (blau = bereits besucht)"
    start: "Start"
    restart: "Neu starten"
    reset: "Zurücksetzen"
    steps: "{current}/{total} Schritte"
    current: "aktuell: {value}"
    detailsTitle: "Warum haben Nachbarn in der Kette dieselbe Farbe? (Details)"
    detailsIntro: "Für jedes <katex tex=\"i=1\\dots n-2\" /> vergleiche <katex tex=\"r=ik\\bmod n\" /> und <katex tex=\"s=(i+1)k\\bmod n\" />. Entweder ist <katex tex=\"s=r+k\" /> oder <katex tex=\"s=r+k-n\" />."
    transitionsTitle: "Übergänge (i → i+1)"
    transitions:
      caseA: "Fall A"
      caseB: "Fall B"
      explainA: "s = r + k ⇒ r = s − k = |s − k|, also zwingt die Abstand-Regel gleiche Farbe."
      explainB: "Überlauf: s = r + k − n ⇒ r = n − (k − s). Spiegel-Regel: r ~ (k − s). Abstand-Regel: s ~ |s − k| = (k − s)."
