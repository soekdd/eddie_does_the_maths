title: "Eddie Does The Maths: IMO 1985 Problem A2"
imageTitle: "Eddie thinks about IMO 85 problem A2"
imageAlt: "Eddie thinks about IMO 85 problem A2"
introDate: "Joutsa, July 4, 1985"
subChapter:
  einleitung: "Introduction"
  entscheidungsbaum: "Decision Tree"
  wahrscheinlichkeiten: "Probabilities"
  rechner: "Calculator"
book:
  p1: "I hear the scratching of thirty pencils at once and suddenly find it calming. This is my element: read the rules, find the pattern, done."
  p2: "This one is not about lines and circles but about a row of numbers colored in two colors. Sounds like children's stuff, but the problem sets two nasty rules. The first forces numbers that are mirror images of each other to have the same color. The second chains even more numbers together: as soon as you color one number differently from one very particular favorite number, the rule forces others to match it."
  p3: "And then comes the real punch: you have to show that in the end these rules color everything with no freedom left. No matter how you start, you land at 'all the same'."
  p4: "Here I show you the simple logic behind it, step by step, with formulas."
sections:
  part1:
    title: "Part 1 — Problem statement"
    meta: "IMO 1985 – Problem A2: 'In the End Everything Has One Color'"
    p1: "Let <katex tex=\"n\\ \\text{and}\\ k\" /> be coprime positive integers with <katex tex=\"k<n\" />. The set"
    p2: "is colored so that each number is either <b>blue</b> or <b>white</b>."
    rule1: "<b>Rule 1 (mirror):</b> For every <katex tex=\"i\\in M\" />, the numbers <katex tex=\"i\" /> and <katex tex=\"n-i\" /> have the same color."
    rule2: "<b>Rule 2 (distance to <katex tex=\"k\" />):</b> For every <katex tex=\"i\\in M\" /> with <katex tex=\"i\\neq k\" />, the numbers <katex tex=\"i\" /> and <katex tex=\"|i-k|\" /> have the same color."
    prove: "<b>To prove:</b> All numbers in <katex tex=\"M\" /> must have the same color."
  part2:
    title: "Part 2 — Idea (a walk that visits all of them)"
    p1: "Imagine the numbers <katex tex=\"0,1,2,\\dots,n-1\" /> as points on a clock (working modulo <katex tex=\"n\" />):"
    l1: "After <katex tex=\"n-1\" /> comes <katex tex=\"0\" /> again."
    l2: "<katex tex=\"x\\bmod n\" /> means: we only look at the remainder after division by <katex tex=\"n\" />."
    p2: "Now take a walk in jumps of length <katex tex=\"k\" />:"
    p3: "Why is that interesting? Because <katex tex=\"\\gcd(n,k)=1\" /> means exactly that these jumps are favorable enough to hit every residue <katex tex=\"1,2,\\dots,n-1\" /> (just in a different order)."
    p4: "And if we can show that every two consecutive visited numbers have the same color, then in the end all of them have the same color."
  part3:
    title: "Part 3 — Proof in clean steps"
    step1Title: "Step 1 — The <katex tex=\"k\" />-jumps hit all numbers <katex tex=\"1,\\dots,n-1\" />"
    step1p1: "Claim: The residues"
    step1p2: "are exactly the numbers <katex tex=\"1,2,\\dots,n-1\" /> up to order."
    step1p3: "<b>Reason:</b> Suppose two jumps land on the same residue:"
    step1p4: "Then"
    step1p5: "so <katex tex=\"n\" /> divides the product <katex tex=\"(a-b)k\" />. Since <katex tex=\"n\" /> and <katex tex=\"k\" /> are coprime, it follows that"
    step1p6: "For <katex tex=\"0\\le a,b\\le n-1\" />, this means <katex tex=\"a=b\" />. So all residues are distinct, hence a permutation of <katex tex=\"1,\\dots,n-1\" />."
    step2Title: "Step 2 — Two consecutive jumps have the same color"
    step2p1: "For <katex tex=\"i=1,2,\\dots,n-1\" />, let <katex tex=\"r_i\" /> be the residue of <katex tex=\"ik\" /> modulo <katex tex=\"n\" />, as a number in <katex tex=\"\\{0,1,\\dots,n-1\\}\" />. From Step 1 we know that <katex tex=\"r_1,\\dots,r_{n-1}\" /> are exactly <katex tex=\"1,\\dots,n-1\" />."
    step2p2: "Compare two neighbors <katex tex=\"r_i\" /> and <katex tex=\"r_{i+1}\" />. Since"
    step2p3: "we get modulo <katex tex=\"n\" />:"
    step2p4: "That means: either no wrap-around or wrap-around."
    caseATitle: "Case A: No wrap-around"
    caseAp1: "Then"
    caseAp2: "So"
    caseAp3: "Also <katex tex=\"r_{i+1}\\neq k\" />. Therefore we may apply Rule 2: <katex tex=\"r_{i+1}\" /> and <katex tex=\"|r_{i+1}-k|=r_i\" /> have the same color."
    caseBTitle: "Case B: Wrap-around"
    caseBp1: "Then"
    caseBp2: "Set"
    caseBp3: "In this case <katex tex=\"r_{i+1}<k\" />, so <katex tex=\"t>0\" /> and <katex tex=\"|r_{i+1}-k|=k-r_{i+1}=t\" />."
    caseBp4: "Now the rules enter:"
    caseBl1: "By Rule 1, <katex tex=\"t\" /> and <katex tex=\"n-t\" /> have the same color."
    caseBl2: "But <katex tex=\"n-t=n-(k-r_{i+1})=r_{i+1}+n-k=r_i\" />."
    caseBp5: "So <katex tex=\"r_i\" /> has the same color as <katex tex=\"t\" />."
    caseBp6: "And by Rule 2, since <katex tex=\"r_{i+1}\\neq k\" />, the number <katex tex=\"r_{i+1}\" /> has the same color as <katex tex=\"|r_{i+1}-k|=t\" />."
    caseBp7: "Thus both <katex tex=\"r_i\" /> and <katex tex=\"r_{i+1}\" /> have the same color as <katex tex=\"t\" />, hence also the same color as each other."
    step2p5: "<b>Intermediate result:</b> For all <katex tex=\"i=1,2,\\dots,n-2\" />, the numbers <katex tex=\"r_i\" /> and <katex tex=\"r_{i+1}\" /> have the same color."
    step3Title: "Step 3 — Therefore all numbers have the same color"
    step3p1: "The sequence <katex tex=\"r_1,r_2,\\dots,r_{n-1}\" /> contains every number in <katex tex=\"M=\\{1,\\dots,n-1\\}\" /> exactly once."
    step3p2: "From Step 2 we know that every neighboring pair has the same color. So the whole chain has one color, and therefore all numbers in <katex tex=\"M\" /> have the same color."
    commentTitle: "In short"
    commentItems:
      - "Coprime (<katex tex=\"\\gcd(n,k)=1\" />) guarantees that the <katex tex=\"k\" />-jumps visit all numbers."
      - "The two rules guarantee that the color stays the same at every jump, either directly or via the mirror."
      - "If all numbers are connected along one route, only one color can remain in the end."
  interactive:
    title: "Playground: Check it for concrete n and k"
    intro: "I turn the 'same color' rules into a graph: an edge means 'must have the same color'. If the graph is connected, it forces a single color."
    labels:
      n: "n"
      k: "k"
      check: "Check"
      random: "Random coprime pair"
      checkLabel: "Check:"
      gcd: "gcd(n,k) = {value}"
      components: "components = {value}"
      connected: "Connected?"
      yes: "yes"
      no: "no"
      componentSizes: "Component sizes:"
    result:
      connected: "The graph is connected, so a single color is not just 'likely', it is <strong>forced</strong>."
      disconnected: "Multiple components mean you <em>can</em> assign different colors to different components with these rules. (This typically happens when gcd(n,k) ≠ 1.)"
    errors:
      integers: "Please enter n and k as integers."
      minN: "n must be at least 2."
      rangeK: "You must have 1 ≤ k < n."
  calc:
    title: "The k-jump chain (mod n)"
    intro: "Here you see the permutation <katex tex=\"k,2k,\\dots,(n-1)k\\ (\\bmod n)\" />. In the proof one shows: neighbors in this list must have the same color."
    orderTitle: "Jump order"
    sortedTitle: "Sorted view (blue = already visited)"
    start: "Start"
    restart: "Restart"
    reset: "Reset"
    steps: "{current}/{total} steps"
    current: "current: {value}"
    detailsTitle: "Why do neighbors in the chain have the same color? (details)"
    detailsIntro: "For each <katex tex=\"i=1\\dots n-2\" />, compare <katex tex=\"r=ik\\bmod n\" /> and <katex tex=\"s=(i+1)k\\bmod n\" />. Either <katex tex=\"s=r+k\" /> or <katex tex=\"s=r+k-n\" />."
    transitionsTitle: "Transitions (i → i+1)"
    transitions:
      caseA: "Case A"
      caseB: "Case B"
      explainA: "s = r + k ⇒ r = s − k = |s − k|, so the distance rule forces the same color."
      explainB: "Wrap-around: s = r + k − n ⇒ r = n − (k − s). Mirror rule: r ~ (k − s). Distance rule: s ~ |s − k| = (k − s)."
