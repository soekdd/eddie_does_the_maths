    p4: "Der feste Zielpunkt ist ein Tor in der Mitte der oberen Hofkante, das leicht zu übersteigen ist:"
    p5Before: "Ziel"
    p6: "Die linke Hofkante ist durch das Terminalgebäude versperrt. Durch ein Fenster des Sicherheitsdiensts ist der Hof einsehbar, daher ist ein Weg direkt am Gebäude entlang unmöglich."
    p7Before: "Entlang der unteren Kante (bei "
    p7Middle: ") liegt Schatten (Terminal/Zaun). Eddie kann dort unauffällig schleichen. Irgendwo bei "
