book:
  p1: "Sini legt mir ihren Plan auf den Küchentisch wie eine Schatzkarte, nur dass der Schatz nicht Gold ist, sondern <em>ein Ausgang</em>. Ich bin noch halb Schlaf, halb Panik, aber sobald die Linien gerade sind, passiert was in mir: Das Zittern wird leiser. Chaos wird zu Geometrie."
  p2: "Da ist der Personalausgang. Da sind die Zäune. Da sind die Kameras, kleine Kreise, die mich anstarren, als hätten sie schon gewonnen. Und da ist dieser helle Streifen ohne Deckung, der sich anfühlt wie ein Scheinwerfer direkt auf meinem Namen. Sini sagt: <em>„Lauf doch einfach quer.“</em> Ich sage: <em>„Ja. Und werde gesehen.“</em> Also mache ich das, was ich immer mache, wenn mir die Luft zu knapp wird: Ich rechne mir Mut zusammen und denke mir Risikopunkte aus. Jeder Meter im Schatten zählt wenig Risikopunkte, jeder Meter im Licht zählt viel. Und plötzlich ist die Frage nicht mehr <em>„Wo lang?“</em>, sondern <b>„Wo ist das Minimum?“</b>"
  p3: "Hier zeige ich dir die genaue Wegoptimierung und unten kannst du den Punkt selbst ermitteln und ausprobieren, wie sich Risiko und Strecke gegeneinander aufwiegen."
