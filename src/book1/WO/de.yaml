    p2Middle: ", im konkreten Fall also "
  part4:
    title: "Teil 4 - Aufgabe"
    p1Before: "Finde den Wert "
    p1After: ", für den Eddie die Querung beginnt, sodass das Gesamtrisiko minimal wird."
  part5:
    title: "Teil 5 - Lösung"
    s1: "Schritt 5.1 - Gesamtrisiko als Funktion"
    s1p1Before: "Zunächst rein symbolisch mit"
    s1p2Before: "Schatten-Strecke:"
    s1p3Before: "Sprint-Strecke: Abstand von"
    s1p3Middle: "nach"
    s1p4: "Risiko:"
    s2: "Schritt 5.2 - Ableiten und Nullsetzen"
    s2p1Before: "Setze"
    s2p1Middle: "also"
    s3: "Schritt 5.3 - Quadrieren - Polynom 2. Ordnung"
    s3p1Before: "Zurück zu"
    s3Box: '\left(\frac{L}{2}-x\right)^2 &= \frac{a^2W^2}{b^2-a^2} \\ x^2-Lx+\left(\frac{L^2}{4}-\frac{a^2W^2}{b^2-a^2}\right) &= 0 \\ x^* &= \frac{L}{2}-\frac{aW}{\sqrt{b^2-a^2}} \\ \text{mit }r=\frac{b}{a}: \quad x^* &= \frac{L}{2}-\frac{W}{\sqrt{r^2-1}}'
    s4: "Schritt 5.4 - Jetzt mit konkreten Werten"
    s4p1Before: "Jetzt mit"
    s5: "Schritt 5.5 - Interpretation (für die Szene)"
    s5p1Before: "Eddie schleicht rund"
    s5p1After: "entlang der Containerkante und sprintet dann die letzte Diagonale."
    s5p2: "Dabei ist der horizontale Rest bis zum Tor:"
    s5p3: "und die Sprintstrecke:"
    s5p4: "Anschaulich: Sie bleibt so lange im Schatten, bis sie nur noch ungefähr 10,6 Meter seitlich versetzt zum Tor ist - dann lohnt sich der Sprint."
