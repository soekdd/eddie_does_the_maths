    p7PointBox: 'P=(x,0)\;\text{mit}\;0\le x\le \frac{L}{2}'
  part3:
    title: "Teil 3 - Risiko-Modell"
    l1: "Im Schatten: 1 Risikopunkt pro Meter"
    l2: "Quer über den Hof (offen): 3 Risikopunkte pro Meter"
    p1Before: "Für die Herleitung verwenden wir allgemein:"
    p1Middle: " und"
    p1After: " im Beispiel dann"
