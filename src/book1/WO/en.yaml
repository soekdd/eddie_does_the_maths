book:
  p1: "Sini lays her plan on my kitchen table like a treasure map, except the treasure is not gold but <em>an exit</em>. I am still half asleep, half panic, but as soon as the lines are straight, something happens inside me: the shaking quiets down. Chaos turns into geometry."
  p2: "There is the staff exit. There are the fences. There are the cameras, small circles staring at me as if they had already won. And there is that bright strip without cover, feeling like a spotlight aimed straight at my name. Sini says: <em>\"Why not just run across?\"</em> I say: <em>\"Sure. And get seen.\"</em> So I do what I always do when breathing gets too tight: I calculate myself some courage and invent risk points. Every meter in the shadow counts for little risk, every meter in the light counts for a lot. Suddenly the question is no longer <em>\"Which way?\"</em> but <b>\"Where is the minimum?\"</b>"
  p3: "Here I show you the exact path optimization, and below you can determine the point yourself and try out how risk and distance trade off against each other."
