book:
  p1: "The hall is already full when I walk in: wet coats, wool, muted murmuring. An usher raises a hand and waves me to the back: <em>\"Standing room there, if you stay quiet.\"</em> I nod, press myself against the side wall, and spend almost the entire event on tiptoe."
  p2: "At the front stands Klaus von Klitzing, chalk dust on his jacket, writing <katex tex=\"R_{\\mathrm K}=h/e^2\" />. He speaks calmly, almost like my old physics teacher. Above all I keep hearing one word: steps. Not \"some arbitrary curve\", but fixed steps that keep coming back."
  p3: "During questions I get brave and raise my hand. <em>If <katex tex=\"R_{\\mathrm K}\" /> is so universal, why do we not simply use it as the new ohm standard right away?</em> He smiles and says, roughly: physics can move fast, but metrology the science of measurement, not to be confused with meteorology is deliberately slow. A standard has to work equally well in many laboratories, not just in one perfect experiment."
sections:
  part1:
    title: "Part 1 - The Mathematics of the Plateaus"
    p1: "If the formula hits you like a brick: that is normal. Read it first like a legend on a map. In a strong magnetic field and at low temperatures, we have:"
    l1: "Hall resistance, the transversely measured resistance."
    l2a: "Hall voltage, measured across the sample"
    l2b: "current."
    l3: "Planck's constant, a physical constant from quantum theory."
    l4: "Elementary charge, the charge of an electron."
    l5: "pronounced \"nu\": filling factor, usually an integer 1, 2, 3, ..."
    l6: "von Klitzing constant, approximately"
    p2: "The key statement is: <b>not every value is allowed</b>. Instead, measurements land on plateaus at <katex tex=\"R_{\\mathrm K}/\\nu\" />. At the same time, the dissipative component along the current becomes very small:"
    p3: "The surprising part is that small disorder in the material does not immediately destroy the effect; in fact, it often helps sharpen the plateaus."
  part2:
    title: "Part 2 - Nobel Prize and the Ohm in Metrology"
    p1: "Klaus von Klitzing received the 1985 Nobel Prize in Physics for the discovery of the quantum Hall effect. For measurement science this was a turning point: resistance could be tied directly to natural constants rather than to a single reference component."
    p2: "Historically, from 1990 onward people used the conventional value <katex tex=\"R_{\\mathrm K\\text{-}90}=25\\,812.807\\ \\Omega\" />. Since the SI redefinition in 2019, <katex tex=\"h\" /> and <katex tex=\"e\" /> are fixed exactly. That makes <katex tex=\"R_{\\mathrm K}=h/e^2\" /> exactly determined as well. That is precisely why the quantum Hall effect fits the definition of the ohm so well."
  part3:
    title: "Part 3 - Eddie's Question About the \"Smallest Possible Resistance\""
    p1: "Here two independent key statements stand side by side: <b>Key statement A (basis for a standard):</b> <katex tex=\"R_{\\mathrm K}\" /> works as a reference because it follows from natural constants. <b>Key statement B (selection criterion):</b> a standard is not chosen because it is \"as small as possible\", but because it is <b>universal and reproducible</b>."
    l1: "Regarding A: <katex tex=\"R_{\\mathrm K}\" /> at about <katex tex=\"25{,}8\\ \\mathrm{k\\Omega}\" /> is not \"small\" and yet it is ideal for standards. Its size is not the criterion."
    l2: "Regarding A: in the quantum Hall effect, the standard structure is <katex tex=\"R_{xy}=R_{\\mathrm K}/\\nu\" /> or equivalently <katex tex=\"\\sigma_{xy}=\\nu e^2/h\" />. One works with stable plateaus, not with a single \"minimal ohm\" number."
    l3: "Regarding B: <katex tex=\"R_{xx}\\approx 0\" /> is a quality marker for a clean plateau, but not the definition of the ohm standard itself."
    p2: "In short: the <b>basis of the standard</b> is <katex tex=\"R_{\\mathrm K}\" /> from <katex tex=\"h\" /> and <katex tex=\"e\" />; the <b>selection criterion</b> is reproducibility of the plateaus, not \"minimal resistance\"."
  interactive:
    title: "Interactive - Plateau Check"
    intro: "Choose a filling factor <katex tex=\"\\nu\" /> nu, meaning 1, 2, 3 ..., enter a measured Hall resistance, and compare it to the target value <katex tex=\"R_{\\mathrm K}/\\nu\" />."
    fillFactor: "Filling factor"
    measuredRxy: "Measured Rxy [ohm]"
    measuredRxx: "Measured Rxx [mohm]"
    setIdeal: "Set ideal"
    addNoise: "realistic deviation"
    status:
      largeRxx: "Rxx is clearly larger than 0. This does not look like a clean Hall plateau."
      success: "Very close to the target value and small Rxx: a metrologically plausible plateau."
      near: "Close to a plateau, but still visibly offset from the target value."
      off: "Clearly away from the quantized target value. Probably not a stable plateau point."
  calculation:
    title: "Calculation Details"
    rk: "R_K = h/e^2"
    nu: "nu (filling factor)"
    targetRxy: "target Rxy = R_K/nu"
    measuredRxy: "measured Rxy"
    deltaR: "delta R"
    relative: "relative deviation"
    rxx: "Rxx"
    sigma: "sigma_xy = nu*e^2/h"
    interpretationTitle: "Interpretation"
    i1: "For metrology, one wants small <katex tex=\"|R_{xy}-R_{\\mathrm K}/\\nu|\" /> together with <katex tex=\"R_{xx}\\approx 0\" />."
    i2: "Large <katex tex=\"R_{xx}\" /> means no clean plateau, even if <katex tex=\"R_{xy}\" /> happens to lie close to the target."
    i3: "That is why the standard language is: plateau quality plus reproducibility, not \"minimal resistance\"."
