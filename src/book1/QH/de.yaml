introDate: "Stockholm, 9. Dezember 1985"
subChapter:
  vorlesung: "Stockholm 1985"
  quantisierung: "Quantisierung"
  metrologie: "Metrologie"
  interaktiv: "Interaktiv"
  ohmfrage: "Eddies Frage"
book:
  p1: "Der Saal ist schon voll, als ich reinkomme: nasse Mäntel, Wolle, gedämpftes Murmeln. Ein Ordner hebt die Hand und schiebt mich nach hinten: <em>„Stehplätze dort, wenn Sie leise sind.“</em> Ich nicke, drücke mich an die Seitenwand und verbringe fast die ganze Veranstaltung auf Zehenspitzen."
  p2: "Vorn steht Klaus von Klitzing, mit Kreidestaub am Jackett, und schreibt: <katex tex=\"R_{\\mathrm K}=h/e^2\" />. Er spricht ruhig, fast wie mein alter Physik-Lehrer. Ich höre vor allem ein Wort immer wieder: Stufen. Nicht „irgendein Verlauf“, sondern feste Stufen, die immer wiederkommen."
  p3: "Beim Frageteil bin ich mutig und strecke die Hand. <em>Wenn <katex tex=\"R_{\\mathrm K}\" /> so universell ist, warum nehmen wir das nicht gleich als neuen Ohm-Standard?</em> Er lächelt und sagt sinngemäß: Physik kann schnell sein, Metrologie also die Messwissenschaft, nicht verwechseln mit Meteorologie, der Wetterkunde ist absichtlich langsam. Ein Standard muss in vielen Laboren gleich gut funktionieren, nicht nur in einem perfekten Experiment."
sections:
  part1:
    title: "Teil 1 - Die Mathematik der Stufen"
    p1: "Wenn dich die Formel erschlägt: Das ist normal. Lies sie zuerst wie eine Legende zu einer Karte. Im starken Magnetfeld und bei tiefen Temperaturen gilt:"
    l1: "Hall-Widerstand, also der quer gemessene Widerstand."
    l2a: "Hall-Spannung (quer gemessene Spannung)"
    l2b: "Strom."
    l3: "Planck-Konstante (Naturkonstante aus der Quantenphysik)."
    l4: "Elementarladung, also die Ladung eines Elektrons."
    l5: "gesprochen „nü“: Füllfaktor, meist eine ganze Zahl 1, 2, 3, ..."
    l6: "von-Klitzing-Konstante, ungefähr"
    p2: "Die Kernaussage ist: <b>nicht jeder Wert ist erlaubt</b>. Stattdessen landen Messungen auf Plateaus bei <katex tex=\"R_{\\mathrm K}/\\nu\" />. Gleichzeitig wird die „Verlust-Komponente“ entlang des Stroms sehr klein:"
    p3: "Das Überraschende: kleine Unordnung im Material zerstört den Effekt nicht sofort, sondern hilft oft sogar, die Plateaus scharf zu machen."
  part2:
    title: "Teil 2 - Nobelpreis und Ohm in der Metrologie"
    p1: "Klaus von Klitzing erhielt 1985 den Nobelpreis für Physik für die Entdeckung des Quanten-Hall-Effekts. Für die Messtechnik war das ein Wendepunkt: Widerstand ließ sich direkt an Naturkonstanten koppeln statt an ein einzelnes Referenzbauteil."
    p2: "Historisch nutzte man ab 1990 den konventionellen Wert <katex tex=\"R_{\\mathrm K\\text{-}90}=25\\,812.807\\ \\Omega\" />. Seit der SI-Neudefinition 2019 sind <katex tex=\"h\" /> und <katex tex=\"e\" /> exakt festgelegt. Damit ist auch <katex tex=\"R_{\\mathrm K}=h/e^2\" /> exakt bestimmt. Genau deshalb passt der Quanten-Hall-Effekt so gut zur Definition von Ohm."
  part3:
    title: "Teil 3 - Eddies Frage nach dem \"kleinstmöglichen Widerstand\""
    p1: "Hier stehen zwei unabhängige Kernaussagen nebeneinander: <b>Kernaussage A (Standardbasis):</b> <katex tex=\"R_{\\mathrm K}\" /> taugt als Referenz, weil er aus Naturkonstanten folgt. <b>Kernaussage B (Auswahlkriterium):</b> Ein Standard wird nicht nach \"kleinstmöglich\", sondern nach <b>universell und reproduzierbar</b> ausgewählt."
    l1: "Zu A: <katex tex=\"R_{\\mathrm K}\" /> ist mit rund <katex tex=\"25{,}8\\ \\mathrm{k\\Omega}\" /> nicht \"klein\" und trotzdem ideal für Standards. Die Größe ist nicht das Kriterium."
    l2: "Zu A: Beim Quanten-Hall-Effekt ist die Standardstruktur <katex tex=\"R_{xy}=R_{\\mathrm K}/\\nu\" /> bzw. <katex tex=\"\\sigma_{xy}=\\nu e^2/h\" />. Man arbeitet mit stabilen Plateaus, nicht mit einer einzelnen \"Minimal-Ohm\"-Zahl."
    l3: "Zu B: <katex tex=\"R_{xx}\\approx 0\" /> ist ein Qualitätszeichen für ein sauberes Plateau, aber nicht die Definition des Ohm-Standards selbst."
    p2: "Kurz: <b>Standardbasis</b> ist <katex tex=\"R_{\\mathrm K}\" /> aus <katex tex=\"h\" /> und <katex tex=\"e\" />; <b>Auswahlkriterium</b> ist Reproduzierbarkeit der Plateaus, nicht \"minimaler Widerstand\"."
  interactive:
    title: "Interaktiv - Plateau-Check"
    intro: "Wähle einen Füllfaktor <katex tex=\"\\nu\" /> „nü“, also 1, 2, 3 ..., gib einen gemessenen Hall-Widerstand ein und vergleiche mit dem Sollwert <katex tex=\"R_{\\mathrm K}/\\nu\" />."
    fillFactor: "Füllfaktor"
    measuredRxy: "Gemessenes Rxy [Ohm]"
    measuredRxx: "Gemessenes Rxx [mOhm]"
    setIdeal: "Ideal setzen"
    addNoise: "realistische Abweichung"
    status:
      largeRxx: "Rxx ist deutlich größer als 0: Das sieht nicht wie ein sauberes Hall-Plateau aus."
      success: "Sehr nah am Sollwert und kleines Rxx: metrologisch plausibles Plateau."
      near: "In der Nähe eines Plateaus, aber noch sichtbar vom Sollwert entfernt."
      off: "Deutlich neben dem quantisierten Sollwert. Vermutlich kein stabiler Plateaupunkt."
  calculation:
    title: "Rechendetails"
    rk: "R_K = h/e^2"
    nu: "nu (Füllfaktor)"
    targetRxy: "Rxy,soll = R_K/nu"
    measuredRxy: "Rxy,gemessen"
    deltaR: "Delta R"
    relative: "relative Abweichung"
    rxx: "Rxx"
    sigma: "sigma_xy = nu*e^2/h"
    interpretationTitle: "Interpretation"
    i1: "Für Metrologie braucht man kleines <katex tex=\"|R_{xy}-R_{\\mathrm K}/\\nu|\" /> und zugleich <katex tex=\"R_{xx}\\approx 0\" />."
    i2: "Großes <katex tex=\"R_{xx}\" /> heißt: kein sauberes Plateau, auch wenn <katex tex=\"R_{xy}\" /> zufällig nah am Soll liegt."
    i3: "Die Standardsprache ist daher: Plateau-Qualität + Reproduzierbarkeit, nicht \"minimaler Widerstand\"."
