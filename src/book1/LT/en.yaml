book:
  p1: "<b>Place:</b> shared flat kitchen in Stockholm."
  p2: "On the table: coffee, squared paper, a stub of a pencil. Under the table a dog is snoring as if it fundamentally objected to every math discussion."
  p3: "I slide my sheet over to Zarah and tap on it as if this were a court hearing."
  p4: "<b>Me (Eddie):</b> “A first-order linear differential equation is solved classically in the time domain: separate, integrate, done.”"
  p5: "<b>Zarah:</b> “Or Laplace: go into the transform domain, solve algebraically, transform back. Fast and clean.”"
  p6: "<b>Me:</b> “You are just running away from integration.”"
  p7: "<b>Zarah:</b> “I replace <em>suffering</em> differential equations with <em>obedient</em> equations. Especially for circuits with jumps and impulses, that saves nerves.”"
  p8: "<b>Me:</b> “I want to understand <em>why</em> something happens, not just spit out a number.”"
  p9: "<b>Zarah:</b> “And I want it to work in the end. Elegance does not help if the motor still burns out.”"
  p10: "<b>Me:</b> “So: the time domain is handwork and intuition. Laplace is a toolbox and a shortcut.”"
  p11: "<b>Zarah:</b> “Exactly. Brilliant for linear systems. For nonlinearity you need different methods again.”"
  p12: "I pull the sheet back to me, take a sip of coffee, and pretend I am not a little impressed."
  p13: "<b>Me:</b> “Then let us do it properly: first classically in the time domain, afterwards your Laplace machine.”"
  p14: "<b>Zarah:</b> “Deal. And if you voluntarily do the inverse transform, you get two cookies.”"
  p15: "So peace is briefly restored. Because now we actually take a closer look. In the following discussion we go through the differences between solving classically in the time domain and the Laplace method step by step. And in the interactive part you can try the Laplace transform <em>forward</em> and <em>back</em> yourself so that “sounds clever” finally turns into “now I get it”."
sections:
  part1:
    title: "Part 1 - Differential Equations: Classical Method vs. Laplace Transform"
  part2:
    title: "Part 2 - Why Does Laplace (Almost) Always Work in Electrical Engineering?"
    p1: "In electrical engineering, you encounter almost exclusively <b>linear differential equations with constant coefficients</b>, for example:"
    s1: "RC elements"
    s2: "RL elements"
    s3: "RLC oscillators"
    s4: "control systems"
    p2: "Such systems are:"
    o1: "linear"
    o2: "time-invariant"
    o3: "uniquely determined by initial values"
    o4: "usually driven by piecewise continuous input signals"
    p3: "The Laplace transform has the decisive property:"
    p4: "That turns a differential equation into an <b>algebraic equation in the s-domain</b>."
    h1: "Why is that so powerful?"
    m1: "Derivatives become multiplications by s."
    m2: "Initial values appear automatically."
    m3: "Convolutions become multiplications."
    m4: "Transfer functions arise directly."
    m5: "Stability can be read off from the poles."
    h2: "Where are the limits?"
    p5: "Laplace works especially well for:"
    g1: "linear systems"
    g2: "constant coefficients"
    g3: "signals of exponential order"
    p6: "Difficulties arise with:"
    w1: "nonlinear systems"
    w2: "time-varying systems"
    w3: "chaotic dynamics"
    w4: "strongly numerical simulation of large networks"
    p7: "In those cases, numerical methods usually help."
  part3:
    title: "Part 3 - The Laplace Method Step by Step"
    p1: "Given an initial value problem:"
    s1Title: "Step 1: Transform"
    s1: "Translate the differential equation into the s-domain."
    s2Title: "Step 2: Solve Algebraically"
    s2: "Solve for Y(s)."
    s3Title: "Step 3: Partial Fraction Decomposition"
    s3: "If needed, in preparation for the inverse transform."
    s4Title: "Step 4: Inverse Transform"
    s4: "Use known transform pairs to return to the time domain."
  part4:
    title: "Part 4 - Worked Example"
    p1: "Given:"
    p2: "with"
    left:
      title: "Solution 1 - Classical Time-Domain Method (Eddie)"
      h1: "Homogeneous equation"
      h2: "Particular solution"
      p1: "Since the right-hand side is constant:"
      h3: "General solution"
      h4: "Final solution"
    right:
      title: "Solution 2 - Laplace Method (Zarah)"
      p1: "Starting equation:"
      p2: "Laplace transform:"
      h1: "Partial fraction decomposition"
      h2: "Inverse transform"
  part5:
    title: "Part 5 - Conclusion"
    p1: "Both methods lead to the same solution."
    table:
      h1: "Eddie"
      h2: "Zarah"
      r1c1: "Intuitive"
