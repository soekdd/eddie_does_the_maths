      r3c1: "Good for single equations"
      r3c2: "Ideal for systems"
      r4c1: "Feel for dynamics"
      r4c2: "Ideal for electrical engineering"
    p2: "<b>Eddie:</b> “I can see the solution grow.”"
    p3: "<b>Zarah:</b> “And I can see the poles.”"
    p4: "They both laugh."
