book:
  p1: "<b>Ort:</b> WG-Küche in Stockholm."
  p2: "Auf dem Tisch: Kaffee, kariertes Papier, ein Bleistiftstummel. Unter dem Tisch schnarcht ein Hund, als würde er jede Mathe-Diskussion grundsätzlich boykottieren."
  p3: "Ich schiebe Zarah meinen Zettel rüber und tippe drauf, als wäre das hier eine Gerichtsverhandlung."
  p4: "<b>Ich (Eddie):</b> „Eine lineare Differentialgleichung erster Ordnung löst man klassisch im Zeitbereich: trennen, integrieren, fertig.“"
  p5: "<b>Zarah:</b> „Oder Laplace: in den Bildbereich, algebraisch lösen, rücktransformieren. Schnell und sauber.“"
  p6: "<b>Ich:</b> „Du flüchtest doch nur vor dem Integrieren.“"
  p7: "<b>Zarah:</b> „Ich ersetze <em>leidende</em> Differentialgleichungen durch <em>gehorsame</em> Gleichungen. Vor allem bei Schaltungen mit Sprüngen und Impulsen spart das Nerven.“"
  p8: "<b>Ich:</b> „Ich will verstehen, <em>warum</em> etwas passiert, nicht nur eine Zahl ausspucken.“"
  p9: "<b>Zarah:</b> „Und ich will, dass es am Ende funktioniert. Eleganz hilft nicht, wenn der Motor trotzdem abbrennt.“"
  p10: "<b>Ich:</b> „Also: Zeitbereich ist Handarbeit und Intuition. Laplace ist Werkzeugkasten und Abkürzung.“"
  p11: "<b>Zarah:</b> „Genau. Für lineare Systeme genial. Bei Nichtlinearität braucht man wieder andere Methoden.“"
  p12: "Ich ziehe den Zettel zu mir zurück, trinke einen Schluck Kaffee und tue so, als wäre ich nicht ein bisschen beeindruckt."
  p13: "<b>Ich:</b> „Dann machen wir’s ordentlich: erst klassisch im Zeitbereich, danach deine Laplace-Maschine.“"
  p14: "<b>Zarah:</b> „Deal. Und wenn du freiwillig rücktransformierst, gibt’s zwei Kekse.“"
  p15: "Damit ist der Frieden kurz geschlossen. Denn jetzt schauen wir wirklich hin. In der folgenden Betrachtung gehen wir die Unterschiede zwischen dem klassischen Lösen im Zeitbereich und der Laplace-Methode Schritt für Schritt durch. Und im interaktiven Teil kannst du die Laplace-Transformation <em>hin</em> und <em>zurück</em> selbst ausprobieren, damit aus „klingt schlau“ endlich „hab ich verstanden“ wird."
