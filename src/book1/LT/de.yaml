    o2: "zeitinvariant"
    o3: "durch Anfangswerte eindeutig bestimmt"
    o4: "meist durch stückweise stetige Eingangssignale angeregt"
    p3: "Die Laplace-Transformation besitzt die entscheidende Eigenschaft:"
    p4: "Damit wird aus einer Differentialgleichung eine <b>algebraische Gleichung im s-Bereich</b>."
    h1: "Warum ist das so mächtig?"
    m1: "Ableitungen werden zu Multiplikationen mit s."
