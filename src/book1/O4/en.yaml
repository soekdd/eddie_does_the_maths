book:
  p1: "Joutsa, second contest day. The chair creaks as if it wants to betray me. My heart beats too loudly for such a quiet room. I stare at the problem and notice how my head is here <em>and</em> already somewhere else entirely. Doors, routes, timings. Escape plans."
  p2: "On paper this is about a large set of distinct numbers. All of them are assembled from small building blocks. They may only be divisible by certain small primes. And then comes the claim, sounding almost magical: in such a huge collection you are guaranteed to find four numbers whose product is 'perfect', so perfect that it is exactly a fourth power."
  p3: "I know what this really is: a sorting and pigeonhole problem. But today even sorting feels like fog."
  p4: "Here I turn it back into something tangible: count the building blocks, bundle the patterns, and see why 'four' is not an accident here."
sections:
  part1:
    title: "Part 1 — Problem statement"
    p1: "Let <katex tex=\"M\" /> be a set of <b>1985 distinct positive integers</b>. None of these numbers has a prime divisor larger than <katex tex=\"23\" />. So all prime factors lie in <katex tex=\"\\{2,3,5,7,11,13,17,19,23\\}\" />."
    p2: "We must show that in <katex tex=\"M\" /> there exist <b>four distinct numbers</b> <katex tex=\"a,b,c,d\" /> whose product is a fourth power:"
  part2:
    title: "Part 2 — Mini crash course: when a square? when a fourth power?"
    p1: "Let <katex tex=\"p_1,\\dots,p_n\" /> be the allowed primes. Here we have"
    p2: "Every number <katex tex=\"x\" /> can be written uniquely as"
    p3: "Then:"
    l1: "<katex tex=\"x\" /> is a square exactly when all exponents are even: <katex tex=\"e_j\\equiv 0 \\pmod 2\\ \\text{for all }j.\" />"
    l2: "<katex tex=\"x\" /> is a fourth power exactly when all exponents are divisible by <katex tex=\"4\" />: <katex tex=\"e_j\\equiv 0 \\pmod 4\\ \\text{for all }j.\" />"
    p4: "So the proof idea has two stages:"
    o1: "First make exponents even (square)."
    o2: "Then make the exponents of the square roots even again."
  part3:
    title: "Part 3 — Squarefree kernel and parity vector"
    p1: "For each <katex tex=\"x\" /> we only track which primes occur with odd exponent."
    aTitle: "(A) Squarefree kernel"
    aText1: "You can decompose <katex tex=\"x\" /> uniquely as"
    aText2: "where <katex tex=\"q\" /> is squarefree. Then <katex tex=\"q\" /> contains exactly the primes that occur an odd number of times in <katex tex=\"x\" />."
    bTitle: "(B) Parity vector"
    bText1: "Define"
    bText2: "This vector stores: exponent odd (=1) or even (=0)."
    bMemo: "Key fact:"
    bText3: "Then every exponent in <katex tex=\"xy\" /> is even. There are only <katex tex=\"2^n\" /> parity classes in total."
  part4:
    title: "Part 4 — Why 1985 is safely enough (a more general statement)"
    p1: "We prove the stronger statement:"
    p2: "Important: it is still the same set <katex tex=\"M\" /> as in the problem statement; from now on we only use the weaker information that <katex tex=\"|M|\\ge 3\\cdot 2^n+1\" />."
    p3: "Assume all numbers in <katex tex=\"M\" /> have their prime divisors in <katex tex=\"\\{p_1,\\dots,p_n\\}\" />. If"
    p4: "then there exist pairwise distinct <katex tex=\"a,b,c,d\\in M\" /> and some <katex tex=\"t\\in\\mathbb Z\" /> with"
    p5: "For our problem we have <katex tex=\"n=9\" />. So:"
    p6: "This gives the IMO result directly from the general statement."
    p7: "From here on we only use the bound <katex tex=\"|M|\\ge 3\\cdot 2^n+1\" />; the concrete number <katex tex=\"1985\" /> is only a special case."
  part5:
    title: "Part 5 — Derivation step by step (pigeonhole principle twice)"
    p1: "Pigeonhole principle: if you distribute more objects than there are boxes, then at least one box contains at least two objects."
    stageATitle: "Stage A — Build many disjoint square pairs"
    stageAText1: "Assign each number <katex tex=\"x\\in M\" /> to its parity vector <katex tex=\"\\varepsilon(x)\\in\\{0,1\\}^n\" />. Let <katex tex=\"c_v\" /> be the number of elements in class <katex tex=\"v\" />."
    stageAText2: "Within each class, pair them up (1st with 2nd, 3rd with 4th, ...). In class <katex tex=\"v\" /> this gives exactly <katex tex=\"\\left\\lfloor c_v/2\\right\\rfloor\" /> disjoint square pairs. Each such pair <katex tex=\"(a,b)\" /> has a square product because <katex tex=\"\\varepsilon(a)=\\varepsilon(b)\" />."
    stageAText3: "So in total:"
    stageAText4: "Using <katex tex=\"\\left\\lfloor c_v/2\\right\\rfloor\\ge (c_v-1)/2\" />, we get:"
    stageAText5: "Plugging in <katex tex=\"|M|\\ge 3\\cdot 2^n+1\" />, we obtain:"
    stageAText6: "Since <katex tex=\"P\" /> is an integer, this implies <katex tex=\"P\\ge 2^n+1\" />."
    stageAText7: "<b>Result of Stage A:</b> at least <katex tex=\"2^n+1\" /> disjoint pairs <katex tex=\"(a,b)\" /> with <katex tex=\"ab=u^2\" />."
    stageBTitle: "Stage B — Two suitable square pairs produce a fourth power"
    stageBText1: "Each pair gives a square <katex tex=\"ab=u^2\" />. For <katex tex=\"u\" /> write"
    stageBText2: "There are only <katex tex=\"2^n\" /> possible root parities, but at least <katex tex=\"P\\ge 2^n+1\" /> pairs. So there exist two different pairs <katex tex=\"(a,b)\\neq(c,d)\" /> with <katex tex=\"ab=u^2,\\ cd=v^2\" /> and <katex tex=\"\\varepsilon(u)=\\varepsilon(v)\" />."
    stageBText3: "Then by the key fact from Part 3, the product <katex tex=\"uv\" /> is a square, say <katex tex=\"uv=s^2\" />, and therefore"
    stageBText4: "Important: the pairs from Stage A are disjoint, so two different pairs share no element. Hence <katex tex=\"a,b,c,d\" /> are automatically four different elements."
    stageBText5: "This proves the claim."
