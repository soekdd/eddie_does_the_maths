book:
  p1: "Joutsa, zweiter Wettkampftag. Der Stuhl knarzt, als würde er mich verraten wollen. Mein Herz klopft zu laut für so einen stillen Raum. Ich starre auf die Aufgabe und merke, wie mein Kopf gleichzeitig hier <em>und</em> schon ganz woanders ist. Bei Türen, Wegen, Zeiten. Fluchtplänen."
  p2: "Auf dem Papier geht es um eine große Menge verschiedener Zahlen. Alle diese Zahlen sind aus kleinen Bausteinen zusammengesetzt. Sie dürfen nur durch bestimmte kleine Primzahlen teilbar sein. Und jetzt kommt die Behauptung, die wie ein Zaubersatz klingt: In so einer riesigen Sammlung findest du garantiert vier Zahlen, deren Produkt „perfekt“ ist, so perfekt, dass es genau zu einer vierten Potenz passt, also wie eine Zahl, die viermal mit sich selbst multipliziert wurde."
  p3: "Ich weiß: Das ist eigentlich ein Sortier- und Schubladenproblem. Aber heute fühlt sich sogar Sortieren an wie Nebel."
  p4: "Hier mache ich daraus wieder etwas Greifbares: Bausteine zählen, Muster bündeln, und warum „vier“ hier kein Zufall ist."
sections:
  part1:
    title: "Teil 1 — Aufgabenstellung"
    p1: "Gegeben sei eine Menge <katex tex=\"M\" /> aus <b>1985 verschiedenen positiven ganzen Zahlen</b>. Keine dieser Zahlen besitzt einen Primteiler größer als <katex tex=\"23\" />. Alle Primfaktoren liegen also in <katex tex=\"\\{2,3,5,7,11,13,17,19,23\\}\" />."
    p2: "Zu zeigen ist: In <katex tex=\"M\" /> gibt es <b>vier verschiedene Zahlen</b> <katex tex=\"a,b,c,d\" />, deren Produkt eine vierte Potenz ist:"
    proveBox: '\exists\,a,b,c,d\in M\ \text{paarweise verschieden}:\quad abcd=t^4\ \text{für ein}\ t\in\mathbb Z.'
  part2:
    title: "Teil 2 — Mini-Crashkurs: Wann Quadrat? Wann vierte Potenz?"
    p1: "Sei <katex tex=\"p_1,\\dots,p_n\" /> die Liste der erlaubten Primzahlen. Hier ist"
    p2: "Jede Zahl <katex tex=\"x\" /> lässt sich eindeutig schreiben als"
    p3: "Dann gilt:"
    l1: "<katex tex=\"x\" /> ist ein Quadrat genau dann, wenn alle Exponenten gerade sind: <katex tex=\"e_j\\equiv 0 \\pmod 2\\ \\text{für alle }j.\" />"
    l2: "<katex tex=\"x\" /> ist eine vierte Potenz genau dann, wenn alle Exponenten durch <katex tex=\"4\" /> teilbar sind: <katex tex=\"e_j\\equiv 0 \\pmod 4\\ \\text{für alle }j.\" />"
    p4: "Die Grundidee des Beweises ist daher zweistufig:"
    o1: "Zuerst sorgen wir dafür, dass Exponenten gerade werden (Quadrat)."
    o2: "Dann sorgen wir dafür, dass die Exponenten der Quadrat-Wurzeln wieder gerade sind."
  part3:
    title: "Teil 3 — Quadratfreier Kern und Paritätsvektor"
    p1: "Für jedes <katex tex=\"x\" /> betrachten wir nur, welche Primzahlen mit ungeradem Exponenten vorkommen."
    aTitle: "(A) Quadratfreier Kern"
    aText1: "Man kann <katex tex=\"x\" /> eindeutig zerlegen als"
    aText2: "wobei <katex tex=\"q\" /> quadratfrei ist. Dann enthält <katex tex=\"q\" /> genau die Primzahlen, die in <katex tex=\"x\" /> ungerade oft vorkommen."
    bTitle: "(B) Paritätsvektor"
    bText1: "Definiere"
    bText2: "Dieser Vektor speichert: Exponent ungerade (=1) oder gerade (=0)."
    bMemo: "Wichtiger Merksatz:"
    bMemoBox: '\varepsilon(x)=\varepsilon(y)\quad\Longrightarrow\quad xy\ \text{ist ein Quadrat}.'
    bText3: "Denn dann ist in <katex tex=\"xy\" /> jeder Exponent <katex tex=\"e_j(x)+e_j(y)\" /> gerade. Es gibt insgesamt nur <katex tex=\"2^n\" /> Paritätsklassen."
  part4:
    title: "Teil 4 — Warum 1985 sicher reicht (allgemeinere Aussage)"
    p1: "Wir zeigen die stärkere Behauptung:"
    p2: "Wichtig: Es ist weiterhin dieselbe Menge <katex tex=\"M\" /> wie in der Aufgabenstellung; wir benutzen ab hier nur noch die schwächere Information, dass <katex tex=\"|M|\\ge 3\\cdot 2^n+1\" />."
    p3: "Angenommen, alle Zahlen in <katex tex=\"M\" /> haben ihre Primteiler in <katex tex=\"\\{p_1,\\dots,p_n\\}\" />. Gilt"
    p4: "dann gibt es <katex tex=\"a,b,c,d\\in M\" /> paarweise verschieden und ein <katex tex=\"t\\in\\mathbb Z\" /> mit"
    p5: "Für unsere Aufgabe ist <katex tex=\"n=9\" />. Also:"
    p6: "Damit folgt das IMO-Ergebnis direkt aus der allgemeinen Behauptung."
    p7: "Ab hier benutzen wir nur noch die Schranke <katex tex=\"|M|\\ge 3\\cdot 2^n+1\" />; die konkrete Zahl <katex tex=\"1985\" /> ist nur ein Spezialfall davon."
  part5:
    title: "Teil 5 — Herleitung Schritt für Schritt (zweimal Schubfachprinzip)"
    p1: "Schubfachprinzip: Verteilt man mehr Objekte als es Schubfächer gibt, dann enthält mindestens ein Schubfach mindestens zwei Objekte."
    stageATitle: "Stufe A — Wir bilden viele disjunkte Quadrat-Paare"
    stageAText1: "Ordne jede Zahl <katex tex=\"x\\in M\" /> nach ihrem Paritätsvektor <katex tex=\"\\varepsilon(x)\\in\\{0,1\\}^n\" />. Sei <katex tex=\"c_v\" /> die Anzahl der Zahlen in Klasse <katex tex=\"v\" />."
    stageAText2: "In jeder Klasse können wir paarweise zusammenfassen (1. mit 2., 3. mit 4., ...). Das ergibt in Klasse <katex tex=\"v\" /> genau <katex tex=\"\\left\\lfloor c_v/2\\right\\rfloor\" /> disjunkte Quadrat-Paare. Jedes so gebildete Paar <katex tex=\"(a,b)\" /> hat ein Quadrat als Produkt, denn <katex tex=\"\\varepsilon(a)=\\varepsilon(b)\" /> und damit ist <katex tex=\"ab\" /> ein Quadrat."
    stageAText3: "Insgesamt also:"
    stageAText4: "Mit <katex tex=\"\\left\\lfloor c_v/2\\right\\rfloor\\ge (c_v-1)/2\" /> folgt:"
    stageAText5: "Setzen wir <katex tex=\"|M|\\ge 3\\cdot 2^n+1\" /> ein, dann:"
    stageAText6: "Da <katex tex=\"P\" /> eine ganze Zahl ist, folgt daraus <katex tex=\"P\\ge 2^n+1\" />."
    stageAText7: "<b>Ergebnis von Stufe A:</b> Mindestens <katex tex=\"2^n+1\" /> disjunkte Paare <katex tex=\"(a,b)\" /> mit <katex tex=\"ab=u^2\" />."
    stageBTitle: "Stufe B — Aus zwei passenden Quadrat-Paaren wird eine vierte Potenz"
    stageBText1: "Jedes Paar liefert ein Quadrat <katex tex=\"ab=u^2\" /> (mit <katex tex=\"u\\in\\mathbb Z\" />, weil <katex tex=\"ab\" /> ein Quadrat ist). Für <katex tex=\"u\" /> schreiben wir"
    stageBText2: "Es gibt nur <katex tex=\"2^n\" /> mögliche Wurzel-Paritäten, aber mindestens <katex tex=\"P\\ge 2^n+1\" /> Paare. Also existieren zwei verschiedene Paare <katex tex=\"(a,b)\\neq(c,d)\" /> mit <katex tex=\"ab=u^2,\\ cd=v^2\" /> und <katex tex=\"\\varepsilon(u)=\\varepsilon(v)\" />."
    stageBText3: "Dann ist nach dem Merksatz aus Teil 3 das Produkt <katex tex=\"uv\" /> ein Quadrat, also <katex tex=\"uv=s^2\" />, und damit:"
    stageBText4: "Wichtig: Die Paare aus Stufe A sind disjunkt, also haben zwei verschiedene Paare keine gemeinsame Zahl. Damit sind <katex tex=\"a,b,c,d\" /> automatisch vier verschiedene Elemente."
    stageBText5: "Damit ist die Behauptung bewiesen."
  part6:
    title: "Teil 6 — Mini-Beispiel (nur zur Anschauung)"
    p1: "Betrachte"
    p2: "Für die ersten vier Zahlen gilt jeweils <katex tex=\"x=6\\cdot r^2\" /> (mit gleichem quadratfreiem Kern <katex tex=\"6\" />). Hier erhält man sogar:"
    commentTitle: "Mini-Eddie-Kommentar"
    commentText: "Nettes Warm-up, oder? Das Beispiel zeigt die Idee zum Anfassen, aber der eigentliche IMO-Beweis läuft oben ganz sauber über die zwei Schubfach-Schritte - ohne Ratespiel und ohne Glückstreffer."
