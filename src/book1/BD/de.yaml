title: "Baustatik #2 DIN vs. TGL"
bd:
  imageTitle: "E&V albern über Sicherheitsfaktoren rum"
  imageAlt: "Eddie mit Stahlträger"
  introDate: "Stockholm, 23. Oktober 1985"
  subChapter:
    einleitung: "Einleitung"
    eigengewicht: "Eigengewicht"
    schnittgroessen: "Schnittgrößen"
    sicherheitsansatz: "DIN vs. TGL"
    nachweis: "Querschnittsnachweis"
    zahlenbeispiel: "Zahlenbeispiel"
    bewertung: "Bewertung"
    interaktiv: "Interaktiv"
  book:
    p1: "Ich sitze in dieser viel zu sauberen Uni-Bibliothek und fühle mich trotzdem wie ein Fleck auf frisch gewischtem Boden. Draußen pfeift der Wind über die Brücken, drinnen riecht alles nach Holz und Papier. Ich schleiche, ich zähle Schritte, ich verstecke mich sogar vor Blicken."
    p2: "Und dann sehe ich es: <b>Dresden</b>. Schwarz auf weiß. Ein Bauvorhaben, ein West-Architekt, ein DDR-Hotel - und auf dem Tisch liegen <b>DIN</b> und <b>TGL</b> wie zwei Notenblätter fürs gleiche Lied. Nur dass hier jemand die Sicherheitszuschläge nicht vergleicht, sondern einfach zusammenmultipliziert. Wie drei Helme auf einmal. Warm, schwer, teuer - und leider Quatsch."
    p3: "Bevor ich mich wieder in die Regale verkrieche, mache ich kurz mein Mathehirn an: <em>Was sagen DIN und TGL wirklich - und wie groß wird der Fehler, wenn man's falsch macht?</em> Unten kannst du genau das in einer Simulation selbst ausprobieren: dieselbe Last, einmal nach DIN, einmal nach TGL."
  sections:
    part1:
      title: "Teil 1 - Punktlast mittig + Eigengewicht auf beidseitig gelenkig gelagertem Stahlträger"
      p1: 'Wir betrachten einen einfach gelagerten Träger (beidseitig drehbar/gelenkig) mit Stützweite <katex tex="L" />, einer Punktlast <katex tex="P" /> in Feldmitte (<katex tex="x=L/2" />) und einer gleichmäßig verteilten Streckenlast aus Eigengewicht <katex tex="q_g\,[\mathrm{kN/m}]" />.'
      p2: "Der Nachweis erfolgt über den Biegemomenten-Tragfähigkeitsvergleich:"
      p3: 'Dabei koppeln wir Einwirkungen (Lasten mit Sicherheitsbeiwerten <katex tex="\gamma" />) und Widerstand (Materialseite mit <katex tex="f_{yd}=f_y/\gamma_M" />).'
      p4: "Heute führt die DIN ebenfalls getrennte Sicherheitsbeiwerte. Doch wir sind ja im Jahre 1985, da war das bei vielen DIN-Normen noch nicht so. Deshalb wird hier die Aufgabenlogik mit gleich faktorisierten DIN-Lastanteilen einer TGL-Variante mit niedrigerem Eigengewichtsbeiwert gegenübergestellt."
    part2:
      title: 'Teil 2 - Eigengewicht als Streckenlast <katex tex="q_g" />'
      p1: 'Das Eigengewicht pro Meter folgt aus der Querschnittsfläche <katex tex="A" />:'
      selfWeightBox: 'q_g&=\rho_{\text{Stahl}}\,g\,A\\q_g\,[\mathrm{kN/m}]&=\frac{\rho g}{1000}\,A'
      p2: 'mit <katex tex="\rho_{\text{Stahl}}\approx 7850\,\mathrm{kg/m^3}" /> und <katex tex="g\approx 9{,}81\,\mathrm{m/s^2}" />.'
      p3: 'Wichtig: <katex tex="q_g" /> hängt vom gewählten Querschnitt ab. Der Entwurf ist daher leicht iterativ.'
      step1: 'Querschnitt annehmen und <katex tex="q_g" /> berechnen.'
      step2: '<katex tex="M_{Ed}" /> bestimmen und erforderliches <katex tex="W" /> ableiten.'
      step3: "Querschnitt anpassen und erneut prüfen."
      graphTitle: "Einfache Punktlast + Eigengewicht"
    part3:
      title: "Teil 3 - Schnittgrößen (charakteristisch) für Punktlast + Gleichlast"
      step31: "Schritt 3.1 - Auflagerreaktionen"
      p1: "Aus Symmetrie folgt:"
      step32: "Schritt 3.2 - Querkraft (maximal am Auflager)"
      step33: "Schritt 3.3 - Biegemoment (maximal in Feldmitte)"
    part4:
      title: "Teil 4 - Sicherheitsansatz der Einwirkungen: DIN vs. TGL"
      step41: "Schritt 4.1 - DIN-Ansatz: gleicher Faktor auf beide Lastanteile"
      p1: "Dieser gleichfaktorige Ansatz in der DIN ist heute nicht mehr üblich."
      step42: "Schritt 4.2 - TGL-Ansatz: Verkehrslast wie DIN, Eigengewicht niedriger"
      p2: "Die Idee: Eigengewicht ist meist genauer bekannt als Verkehrslast und kann deshalb geringer faktorisiert werden."
      step43: "Schritt 4.3 - Mathematischer Kernausdruck"
      p3: "Der Unterschied entsteht nur über den Eigengewichtsanteil und wächst bei großen Spannweiten oder schweren Trägern."
    part5:
      title: 'Teil 5 - Querschnittsnachweis über Widerstandsmoment <katex tex="W" />'
      p1: 'Die Gegenüberstellung DIN/TGL bleibt konsistent, solange <katex tex="f_{yd}" /> identisch behandelt wird.'
      graphTitle: "Dimensionierung eines I-Trägers"
    part6:
      title: "Teil 6 - Zahlenbeispiel"
      step61: "Schritt 6.1 - Gewählte Parameter"
      pointLoadMid: "Punktlast in Feldmitte"
      sameLoads: "auf beide Lasten gleich"
      steelLabel: "Stahl"
      weldedBeam: 'Geschweißter I-Träger (Dimensionierung über <katex tex="t_f" />):'
      step62: "Schritt 6.2 - Eigengewicht aus Geometrie"
      step63: 'Schritt 6.3 - DIN-Entwurf (gleiches <katex tex="\gamma" />)'
      practicalRounded: "Praktisch gerundet:"
      dinOk: "DIN erfüllt."
      dinNotOk: "DIN nicht erfüllt."
      step64: "Schritt 6.4 - TGL-Entwurf (Eigengewicht niedriger faktorisiert)"
      tglOk: "TGL erfüllt."
      tglNotOk: "TGL nicht erfüllt."
      step65: "Schritt 6.5 - Sichtbares Ergebnis"
      dinNeeds: "DIN benötigt in dieser Konstellation:"
      tglAllows: "TGL erlaubt:"
      p1: 'Der TGL-Träger ist damit rechnerisch schwächer: geringeres erforderliches <katex tex="W" /> (hier etwa <katex tex="{wReduction}" /> weniger) und geringeres Eigengewicht (ca. <katex tex="{qgDin}-{qgTgl}\approx {weightDelta}\,\mathrm{kg/m}" />).'
    part7:
      title: "Teil 7 - Abschließende Bewertung"
      step71: "Schritt 7.1 - Warum der TGL-Gedanke plausibel wirkt"
      p1: 'Eigengewicht ist oft besser bekannt (kleinere Streuung) als Verkehrslast. Daher ist ein kleinerer Zuschlag für <katex tex="G" /> und ein größerer für <katex tex="Q" /> aus probabilistischer Sicht nachvollziehbar.'
      step72: "Schritt 7.2 - Warum rechnerisch schwächere Bauteile herauskommen"
      p2: 'Wenn <katex tex="M_{Ed}" /> sinkt, sinkt auch <katex tex="W_{\text{erf}}" />. Damit werden kleinere Profile bzw. dünnere Flansche zulässig. Wie im interaktiven Teil sichtbar, führt das gelegentlich zu einem leichteren Träger. Ingesamt ist der Unterschied aber moderat (hier ca. 10% weniger Eigengewicht).'
      step73: "Schritt 7.3 - Sicherheitsphilosophischer Haken"
      p3: "Schwächer bedeutet nicht automatisch unsicher, solange Last- und Widerstandsseite konsistent kalibriert sind. Wenn jedoch nur der Eigengewichtsfaktor reduziert wird und alles andere gleich bleibt, sinkt die rechnerische Reserve gegen nicht modellierte Effekte (z.B. Korrosion, Imperfektionen, Montagezustände, Zusatzlasten, Dynamik)."
      p4: "Dazu passt auch die historische Entwicklung: Die DIN wurde später angepasst und rechnet heute ebenfalls mit getrennten Sicherheitsbeiwerten für ständige und veränderliche Einwirkungen."
      p5: "Der gleichfaktorige DIN-Weg wirkt oft grober, ist aber robust gegenüber Modelllücken. Der differenzierte TGL-Weg ist eleganter, setzt jedoch voraus, dass die Modellannahmen gut passen."
