bd:
  title: "Eddie Calculates: Structural Analysis #2 DIN vs. TGL"
  imageTitle: "E&V being silly about safety factors"
  imageAlt: "Eddie with a steel beam"
  introDate: "Stockholm, October 23, 1985"
  subChapter:
    einleitung: "Introduction"
    eigengewicht: "Self-weight"
    schnittgroessen: "Internal forces"
    sicherheitsansatz: "DIN vs. TGL"
    nachweis: "Section verification"
    zahlenbeispiel: "Numerical example"
    bewertung: "Assessment"
    interaktiv: "Interactive"
  book:
    p1: "I am sitting in this far too clean university library and still feel like a stain on a freshly mopped floor. Outside, the wind whistles across the bridges; inside, everything smells of wood and paper. I sneak around, I count steps, I even hide from glances."
    p2: "And then I see it: <b>Dresden</b>. Black on white. A construction project, a West German architect, an East German hotel - and on the table <b>DIN</b> and <b>TGL</b> lie there like two scores for the same song. Except here someone is not comparing the safety surcharges, but simply multiplying them together. Like wearing three helmets at once. Warm, heavy, expensive - and unfortunately nonsense."
    p3: "Before I crawl back into the shelves, I briefly switch my math brain on: <em>What do DIN and TGL actually say - and how large does the error become when you do it wrong?</em> Below you can try exactly that yourself in a simulation: the same load, once according to DIN, once according to TGL."
  sections:
    part1:
      title: "Part 1 - Midspan point load + self-weight on a steel beam with pinned supports on both sides"
      p1: "We consider a simply supported beam (rotatable/pinned at both ends) with span <code>L</code>, a point load <code>P</code> at midspan (<code>x=L/2</code>), and a uniformly distributed load from self-weight <code>q_g\\,[\\mathrm{kN/m}]</code>."
      p2: "Verification is performed by comparing bending moment demand and resistance:"
      p3: "In doing so, we combine actions (loads with safety factors <code>\\gamma</code>) and resistance (material side with <code>f_{yd}=f_y/\\gamma_M</code>)."
      p4: "Today DIN also uses separate partial safety factors. But we are in 1985, and many DIN standards did not yet do that. That is why the task here compares DIN load components with a single common factor against a TGL variant with a lower self-weight factor."
    part2:
      title: "Part 2 - Self-weight as distributed load <code>q_g</code>"
      p1: "The self-weight per meter follows from the cross-sectional area <code>A</code>:"
      p2: "with <code>\\rho_{\\text{steel}}\\approx 7850\\,\\mathrm{kg/m^3}</code> and <code>g\\approx 9.81\\,\\mathrm{m/s^2}</code>."
      p3: "Important: <code>q_g</code> depends on the chosen cross-section. The design process is therefore mildly iterative."
      step1: "Assume a section and calculate <code>q_g</code>."
      step2: "Determine <code>M_{Ed}</code> and derive the required <code>W</code>."
      step3: "Adjust the section and check again."
      graphTitle: "Simple point load + self-weight"
    part3:
      title: "Part 3 - Internal forces (characteristic) for point load + distributed load"
      step31: "Step 3.1 - Support reactions"
      p1: "From symmetry it follows:"
      step32: "Step 3.2 - Shear force (maximum at the support)"
      step33: "Step 3.3 - Bending moment (maximum at midspan)"
    part4:
      title: "Part 4 - Safety approach for actions: DIN vs. TGL"
      step41: "Step 4.1 - DIN approach: same factor on both load components"
      p1: "This equal-factor DIN approach is no longer common today."
      step42: "Step 4.2 - TGL approach: live load like DIN, self-weight lower"
      p2: "The idea: self-weight is usually known more accurately than live load and can therefore be factored less strongly."
      step43: "Step 4.3 - Core mathematical expression"
      p3: "The difference arises only from the self-weight contribution and grows for large spans or heavy beams."
    part5:
      title: "Part 5 - Section verification via section modulus <code>W</code>"
      p1: "The DIN/TGL comparison remains consistent as long as <code>f_{yd}</code> is treated identically."
      graphTitle: "Sizing of an I-beam"
    part6:
      title: "Part 6 - Numerical example"
      step61: "Step 6.1 - Chosen parameters"
      pointLoadMid: "Point load at midspan"
      sameLoads: "same on both loads"
      weldedBeam: "Welded I-beam (sized via <code>t_f</code>):"
      step62: "Step 6.2 - Self-weight from geometry"
      step63: "Step 6.3 - DIN design (same <code>\\gamma</code>)"
      practicalRounded: "Practically rounded:"
      dinOk: "DIN satisfied."
      dinNotOk: "DIN not satisfied."
      step64: "Step 6.4 - TGL design (self-weight factored lower)"
      tglOk: "TGL satisfied."
      tglNotOk: "TGL not satisfied."
      step65: "Step 6.5 - Visible result"
      dinNeeds: "DIN requires in this configuration:"
      tglAllows: "TGL allows:"
      p1: "The TGL beam is therefore computationally weaker: lower required <code>W</code> (here about <code>{wReduction}</code> less) and lower self-weight (about <code>{qgDin}-{qgTgl}\\approx {weightDelta}\\,\\mathrm{kg/m}</code>)."
    part7:
      title: "Part 7 - Final assessment"
      step71: "Step 7.1 - Why the TGL idea seems plausible"
      p1: "Self-weight is often known better (smaller scatter) than live load. Therefore a smaller surcharge for <code>G</code> and a larger one for <code>Q</code> is understandable from a probabilistic point of view."
      step72: "Step 7.2 - Why computationally weaker components result"
      p2: "If <code>M_{Ed}</code> decreases, <code>W_{\\text{req}}</code> also decreases. That makes smaller sections or thinner flanges permissible. As visible in the interactive part, this occasionally leads to a lighter beam. Overall, however, the difference is moderate (here about 10% less self-weight)."
      step73: "Step 7.3 - The safety-philosophical catch"
      p3: "Weaker does not automatically mean unsafe, as long as load side and resistance side are calibrated consistently. But if only the self-weight factor is reduced and everything else remains unchanged, the computational reserve against unmodeled effects decreases (for example corrosion, imperfections, erection states, additional loads, dynamics)."
      p4: "That also fits the historical development: DIN was later adjusted and today also works with separate safety factors for permanent and variable actions."
      p5: "The equal-factor DIN route often looks rougher, but it is robust against modeling gaps. The differentiated TGL route is more elegant, but assumes that the model assumptions fit well."
