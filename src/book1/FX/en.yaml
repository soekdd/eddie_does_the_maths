    help1: "EXE=calc DEL=back"
    help2: "MODE/BASIC UP/DN mem"
    help3: "AC clear ENG angle"
    help4: "sin cos tan log ln"
    busy: "Calculating..."
  programs:
    - id: "hello"
      name: "Hello World"
      source:
        - "Cls"
        - "Locate 1,1,\"HELLO WORLD\""
        - "For 1->I To 5"
        - "Locate 1,I+2,I"
        - "Locate 5,I+2,I*I"
        - "Next"
        - "Stop"
    - id: "graphTest"
      name: "Graphics Test"
      source:
        - "Cls"
        - "Locate 1,1,\"GRAPH TEST\""
        - "ClrGraph"
        - "For 1->X To 95"
        - "PxlOn 32,X"
        - "Next"
        - "For 1->Y To 63"
        - "PxlOn Y,48"
        - "Next"
        - "Circle 48,32,14"
        - "Stop"
    - id: "sinCos"
      name: "Sine and Cosine"
      source:
        - "ViewWindow -2π, 2π, π÷4, -1.6, 1.6, 0.5"
        - "GridOn"
        - "AxesOn"
        - "Rad"
        - "Cls"
        - ""
        - ".2->S"
        - ""
        - "For Xmin->X to Xmax+S Step S"
        - "  F-Line X-S, cos (X-S), X, cos X"
        - "Next"
        - ""
        - "For Xmin->X to Xmax+S Step S"
        - "  F-Line X-S, sin (X-S), X, sin X"
        - "Next"
        - ""
        - "GridOff"
        - "AxesOff"
    - id: "mazes"
      name: "Maze"
      source:
        - "ViewWindow 0,126,0,62,0,0"
        - "For 0->B To 13"
        - "  For 0->A To 25"
        - "    RanInt#(0,1)->C"
        - "    F-line 5A,5(B+C),5(A+1),5(B+1-C)"
        - "  Next"
        - "Next"
    - id: "kochCurveLoopD3"
      name: "Koch Curve (Loop D3)"
      source:
        - "Cls"
        - "Locate 1,1,\"KOCH LOOP D3\""
        - "ClrGraph"
        - "Range 0,95,5,0,63,5"
        - "Deg"
        - "54->L"
        - "20->X"
        - "47->Y"
        - "0->A"
        - "For 1->Z To 3"
        - "For 1->I To 4"
        - "For 1->J To 4"
        - "For 1->K To 4"
        - "X+L/27*Cos(A)->M"
        - "Y+L/27*Sin(A)->N"
        - "F-Line X,Y,M,N"
        - "M->X"
        - "N->Y"
        - "If K=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If K=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If K=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "If J=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If J=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If J=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "If I=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If I=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If I=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "A-120->A"
        - "Next"
        - "Stop"
    - id: "kochCurveLoopD4"
      name: "Koch Curve (Loop D4)"
      source:
        - "Cls"
        - "Locate 1,1,\"KOCH LOOP D4\""
        - "ClrGraph"
        - "Range 0,95,5,0,63,5"
        - "Deg"
        - "54->L"
        - "20->X"
        - "47->Y"
        - "0->A"
        - "For 1->Z To 3"
        - "For 1->I To 4"
        - "For 1->J To 4"
        - "For 1->K To 4"
        - "For 1->Q To 4"
        - "X+L/81*Cos(A)->M"
        - "Y+L/81*Sin(A)->N"
        - "F-Line X,Y,M,N"
        - "M->X"
        - "N->Y"
        - "If Q=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If Q=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If Q=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "If K=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If K=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If K=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "If J=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If J=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If J=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "If I=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If I=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If I=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "A-120->A"
        - "Next"
        - "Stop"
    - id: "vigenere295"
      name: "Vigenere 295 (A=0..Z=25)"
      source:
        - "Cls"
        - "Locate 1,1,\"VIG 295\""
        - "Locate 1,2,\"A(0-25)?\""
        - "?->A"
        - "Locate 1,3,\"POS I?\""
        - "?->I"
        - "I-Int((I-1)/3)*3->J"
        - "2->S"
        - "If J=2"
        - "Then"
        - "9->S"
        - "IfEnd"
        - "If J=0"
        - "Then"
        - "5->S"
        - "IfEnd"
        - "A+S->C"
        - "If C>=26"
        - "Then"
        - "C-26->C"
        - "IfEnd"
        - "Locate 1,5,\"SHIFT=\""
        - "Locate 7,5,S"
        - "Locate 1,6,\"C=\""
        - "Locate 3,6,C"
        - "Stop"
    - id: "fractionReduce"
      name: "Reduce Fraction"
      source:
        - "Cls"
        - "Locate 1,3,\"REDUCE FRACTION\""
        - "Locate 1,4,\"NUMERATOR?\""
        - "?->N"
        - "Locate 1,5,\"DENOM?\""
        - "?->D"
        - "If D=0"
        - "Then"
        - "Locate 1,5,\"DENOM=0\""
        - "Stop"
        - "IfEnd"
        - "If D<0"
        - "Then"
        - "-N->N"
        - "-D->D"
        - "IfEnd"
        - "Abs(N)->A"
        - "D->B"
        - "While B<>0"
        - "A-Int(A/B)*B->T"
        - "B->A"
        - "T->B"
        - "WhileEnd"
        - "N/A->P"
        - "D/A->Q"
        - "Locate 1,6,\"R=\""
        - "Locate 3,6,P"
        - "Locate 6,6,\"/\""
        - "Locate 8,6,Q"
        - "Stop"
    - id: "primes"
      name: "Primes Until Reset"
      source:
        - "Cls"
        - "Locate 1,1,\"PRIMES\""
        - "2->N"
        - "1->C"
        - "While 1"
        - "1->P"
        - "For 2->D To Int(N/2)"
        - "If Int(N/D)=N/D"
        - "Then"
        - "0->P"
        - "IfEnd"
        - "Next"
        - "If P=1"
        - "Then"
        - "C+1->C"
        - "Locate 1,3,\"N=\""
        - "Locate 3,3,N"
        - "Locate 1,4,\"CNT=\""
        - "Locate 5,4,C"
        - "IfEnd"
        - "N+1->N"
        - "WhileEnd"
    - id: "pi"
      name: "PI Approximation Until Reset"
      source:
        - "Cls"
        - "Locate 1,1,\"PI LEIBNIZ\""
        - "0->S"
        - "1->K"
        - "0->I"
        - "While 1"
        - "S+K/(2*I+1)->S"
        - "I+1->I"
        - "-K->K"
        - "4*S->P"
        - "Locate 1,3,\"N=\""
        - "Locate 3,3,I"
        - "Locate 1,4,\"PI=\""
        - "Locate 4,4,P"
        - "WhileEnd"
