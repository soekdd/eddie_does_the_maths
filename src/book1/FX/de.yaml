  programs:
    - id: "hello"
      name: "Hello World"
      source:
        - "Cls"
        - "Locate 1,1,\"HELLO WORLD\""
        - "For 1->I To 5"
        - "Locate 1,I+2,I"
        - "Locate 5,I+2,I*I"
        - "Next"
        - "Stop"
    - id: "graphTest"
      name: "Grafik-Test"
      source:
        - "Cls"
        - "Locate 1,1,\"GRAFIK TEST\""
        - "ClrGraph"
        - "For 1->X To 95"
        - "PxlOn 32,X"
        - "Next"
        - "For 1->Y To 63"
        - "PxlOn Y,48"
        - "Next"
        - "Circle 48,32,14"
        - "Stop"
    - id: "sinCos"
      name: "Sinus und Kosinus"
      source:
        - "ViewWindow -2π, 2π, π÷4, -1.6, 1.6, 0.5"
        - "GridOn"
        - "AxesOn"
        - "Rad"
        - "Cls"
        - ".2->S"
        - "For Xmin->X to Xmax+S Step S"
        - "  F-Line X-S, cos (X-S), X, cos X"
        - "Next"
        - "For Xmin->X to Xmax+S Step S"
        - "  F-Line X-S, sin (X-S), X, sin X"
        - "Next"
        - "GridOff"
        - "AxesOff"
    - id: "mazes"
      name: "Labyrint"
      source:
        - "ViewWindow 0,126,0,62,0,0"
        - "For 0->B To 13"
        - "  For 0->A To 25"
        - "    RanInt#(0,1)->C"
        - "    F-line 5A,5(B+C),5(A+1),5(B+1-C)"
        - "  Next"
        - "Next"
    - id: "kochCurveLoopD3"
      name: "Koch-Kurve (Schleife D3)"
      source:
        - "Cls"
        - "Locate 1,1,\"KOCH LOOP D3\""
        - "ClrGraph"
        - "Range 0,95,5,0,63,5"
        - "Deg"
        - "54->L"
        - "20->X"
        - "47->Y"
        - "0->A"
        - "For 1->Z To 3"
        - "For 1->I To 4"
        - "For 1->J To 4"
        - "For 1->K To 4"
        - "X+L/27*Cos(A)->M"
        - "Y+L/27*Sin(A)->N"
        - "F-Line X,Y,M,N"
        - "M->X"
        - "N->Y"
        - "If K=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If K=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If K=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "If J=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If J=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If J=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "If I=1"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "If I=2"
        - "Then"
        - "A-120->A"
        - "IfEnd"
        - "If I=3"
        - "Then"
        - "A+60->A"
        - "IfEnd"
        - "Next"
        - "A-120->A"
        - "Next"
        - "Stop"
    - id: "kochCurveLoopD4"
