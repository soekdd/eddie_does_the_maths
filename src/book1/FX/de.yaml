    - id: "vigenere295"
      name: "Vigenere 295 (A=0..Z=25)"
      source:
        - "Cls"
        - "Locate 1,1,\"VIG 295\""
        - "Locate 1,2,\"A(0-25)?\""
        - "?->A"
        - "Locate 1,3,\"POS I?\""
        - "?->I"
        - "I-Int((I-1)/3)*3->J"
        - "2->S"
        - "If J=2"
        - "Then"
        - "9->S"
        - "IfEnd"
        - "If J=0"
        - "Then"
        - "5->S"
        - "IfEnd"
        - "A+S->C"
        - "If C>=26"
        - "Then"
        - "C-26->C"
        - "IfEnd"
        - "Locate 1,5,\"SHIFT=\""
        - "Locate 7,5,S"
        - "Locate 1,6,\"C=\""
        - "Locate 3,6,C"
        - "Stop"
    - id: "fractionReduce"
      name: "Bruch kürzen"
      source:
        - "Cls"
        - "Locate 1,3,\"BRUCH KUERZEN\""
        - "Locate 1,4,\"ZAEHLER?\""
        - "?->N"
        - "Locate 1,5,\"NENNER?\""
        - "?->D"
        - "If D=0"
        - "Then"
        - "Locate 1,5,\"NENNER=0\""
        - "Stop"
        - "IfEnd"
        - "If D<0"
        - "Then"
        - "-N->N"
        - "-D->D"
        - "IfEnd"
        - "Abs(N)->A"
        - "D->B"
        - "While B<>0"
        - "A-Int(A/B)*B->T"
        - "B->A"
        - "T->B"
        - "WhileEnd"
        - "N/A->P"
        - "D/A->Q"
        - "Locate 1,6,\"R=\""
        - "Locate 3,6,P"
        - "Locate 6,6,\"/\""
        - "Locate 8,6,Q"
        - "Stop"
    - id: "primes"
      name: "Primzahlen bis Reset"
      source:
        - "Cls"
        - "Locate 1,1,\"PRIMZAHLEN\""
        - "2->N"
        - "1->C"
        - "While 1"
        - "1->P"
        - "For 2->D To Int(N/2)"
        - "If Int(N/D)=N/D"
        - "Then"
        - "0->P"
        - "IfEnd"
        - "Next"
        - "If P=1"
        - "Then"
        - "C+1->C"
        - "Locate 1,3,\"N=\""
        - "Locate 3,3,N"
        - "Locate 1,4,\"ANZ=\""
        - "Locate 5,4,C"
        - "IfEnd"
        - "N+1->N"
        - "WhileEnd"
    - id: "pi"
      name: "PI Näherung bis Reset"
      source:
        - "Cls"
        - "Locate 1,1,\"PI LEIBNIZ\""
        - "0->S"
        - "1->K"
        - "0->I"
        - "While 1"
        - "S+K/(2*I+1)->S"
        - "I+1->I"
        - "-K->K"
        - "4*S->P"
        - "Locate 1,3,\"N=\""
        - "Locate 3,3,I"
        - "Locate 1,4,\"PI=\""
        - "Locate 4,4,P"
        - "WhileEnd"
