<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="./src/images/favicon.webp" />
    <title>Eddie rechnet</title>
    <style>
      html, body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow-x: hidden;
      }

      #app {
        position: relative;
        z-index: 1;
      }

      .koch-bg {
        position: fixed;
        top: 0;
        right: 0;
        width: min(30vw, 340px);
        height: 100vh;
        overflow: hidden;
        pointer-events: none;
        z-index: 1;
        opacity: 0;
        animation: koch-fade-in 2600ms ease-out forwards;
      }

      .koch-bg svg {
        position: absolute;
        top: 0;
        right: 0;
        width: 100%;
        height: 100%;
      }

      @keyframes koch-fade-in {
        from { opacity: 0; }
        to { opacity: 0.7; }
      }

      @media (max-width: 860px) {
        .koch-bg {
          width: min(42vw, 220px);
          opacity: 0.46;
        }
      }
    </style>
  </head>

    <div id="app"></div>

</html>
